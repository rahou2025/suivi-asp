<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASP Connect PRO · Système de Gestion du Temps</title>
    <!-- Graphiques Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@500&display=swap');

        :root {
            --bg: #0b0e14;
            --sidebar: #12161f;
            --card: #1a1f2b;
            --border: rgba(255,255,255,0.06);
            --accent: #4f7ef8;
            --accent-soft: rgba(79, 126, 248, 0.1);
            --text: #f0f2f5;
            --text-dim: #94a3b8;
            --green: #10b981;
            --amber: #f59e0b;
            --red: #ef4444;
            --radius: 12px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            overflow: hidden;
            height: 100vh;
            display: flex;
        }

        /* --- Sidebar --- */
        .sidebar {
            width: 260px;
            background: var(--sidebar);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 24px;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 40px;
        }

        .logo-box {
            width: 40px;
            height: 40px;
            background: var(--accent);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 20px var(--accent-soft);
        }

        .nav-link {
            padding: 12px 16px;
            border-radius: 8px;
            color: var(--text-dim);
            text-decoration: none;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 8px;
            transition: all 0.2s;
            cursor: pointer;
        }

        .nav-link:hover, .nav-link.active {
            background: var(--accent-soft);
            color: var(--accent);
        }

        /* --- Main Content --- */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .top-bar {
            height: 70px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 32px;
            background: rgba(11, 14, 20, 0.5);
            backdrop-filter: blur(10px);
        }

        .content {
            flex: 1;
            padding: 32px;
            overflow-y: auto;
        }

        /* --- UI Elements --- */
        .grid-dashboard {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 32px;
        }

        .stat-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 24px;
            position: relative;
            overflow: hidden;
        }

        .stat-card::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 4px; height: 100%;
            background: var(--accent);
        }

        .stat-label { font-size: 13px; color: var(--text-dim); font-weight: 600; margin-bottom: 10px; display: block; }
        .stat-val { font-size: 28px; font-weight: 700; font-family: 'Plus Jakarta Sans'; }
        .stat-money { color: var(--green); }

        .card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; margin-bottom: 24px; }
        
        /* --- Login Overlay --- */
        #login-overlay {
            position: fixed; inset: 0; background: var(--bg); z-index: 1000;
            display: flex; align-items: center; justify-content: center;
        }

        .login-box {
            width: 400px; padding: 40px; background: var(--sidebar); 
            border-radius: 20px; border: 1px solid var(--border); text-align: center;
        }

        input, select, textarea {
            width: 100%; background: #000; border: 1px solid var(--border);
            padding: 14px; border-radius: 8px; color: white; margin-bottom: 16px; font-family: inherit;
        }

        .btn {
            padding: 12px 24px; border-radius: 8px; border: none; font-weight: 600; cursor: pointer; transition: 0.2s;
        }
        .btn-primary { background: var(--accent); color: white; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 20px var(--accent-soft); }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { text-align: left; padding: 12px; color: var(--text-dim); font-size: 12px; border-bottom: 2px solid var(--border); }
        td { padding: 16px 12px; border-bottom: 1px solid var(--border); font-size: 14px; }

        .progress-container { height: 8px; background: rgba(0,0,0,0.3); border-radius: 10px; margin-top: 10px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--accent); border-radius: 10px; transition: width 0.8s ease; }

        .tag { padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: 700; text-transform: uppercase; }
        .tag-ae { background: rgba(167, 139, 250, 0.15); color: #a78bfa; }
        .tag-sal { background: rgba(79, 126, 248, 0.15); color: var(--accent); }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
    </style>
</head>
<body>

<!-- LOGIN -->
<div id="login-overlay">
    <div class="login-box">
        <div class="logo-box" style="margin: 0 auto 24px;">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
        </div>
        <h2 style="margin-bottom: 8px;">Connexion</h2>
        <p style="color: var(--text-dim); font-size: 14px; margin-bottom: 32px;">Portail d'administration et suivi agents</p>
        <input type="text" id="log-id" placeholder="ID Utilisateur">
        <input type="password" id="log-pw" placeholder="Mot de passe">
        <button class="btn btn-primary" style="width: 100%;" onclick="Auth.login()">Entrer</button>
        <p style="margin-top: 20px; font-size: 11px; color: var(--text-dim);">SUPER / 1234</p>
    </div>
</div>

<!-- SIDEBAR -->
<aside class="sidebar">
    <div class="logo-area">
        <div class="logo-box">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
        </div>
        <span style="font-weight: 800; font-size: 18px; letter-spacing: -0.5px;">ASP CONNECT</span>
    </div>

    <div id="nav-agent">
        <div class="nav-link active" onclick="Router.go('agent-dash', this)">Tableau de bord</div>
        <div class="nav-link" onclick="Router.go('agent-hist', this)">Mes relevés</div>
    </div>

    <div id="nav-admin" style="display:none;">
        <div class="nav-link active" onclick="Router.go('admin-team', this)">Gestion Équipe</div>
        <div class="nav-link" onclick="Router.go('admin-import', this)">Import Vicidial</div>
        <div class="nav-link" onclick="Router.go('admin-reunion', this)">Réunions & Coaching</div>
    </div>

    <div style="margin-top: auto;">
        <div class="nav-link" style="color: var(--red);" onclick="Auth.logout()">Déconnexion</div>
    </div>
</aside>

<!-- MAIN -->
<main class="main">
    <header class="top-bar">
        <h1 id="page-title" style="font-size: 18px; font-weight: 700;">Dashboard</h1>
        <div id="user-info" style="display: flex; align-items: center; gap: 16px;">
            <div style="text-align: right;">
                <div id="user-name" style="font-weight: 600; font-size: 14px;">Utilisateur</div>
                <div id="user-role" style="font-size: 12px; color: var(--text-dim);">Agent</div>
            </div>
            <div style="width: 40px; height: 40px; background: var(--card); border: 1px solid var(--border); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; color: var(--accent);">AG</div>
        </div>
    </header>

    <div class="content" id="app-view">
        <!-- Contenu dynamique ici -->
    </div>
</main>

<script>
/**
 * SYSTEME CORE ASP CONNECT PRO
 */

const GOAL_HOURS = 132;
const QUAL_CAP = 1800; // 30min

// Base de données simulée ou persistante
let DB = JSON.parse(localStorage.getItem('asp_pro_db')) || {
    agents: [
        {id: '06980713', name: 'Houyem Haddad', type: 'AE', pay: 1800, pw: '0000'},
        {id: '104806005', name: 'Amal Ainseba', type: 'SALARIE', pay: 2100, pw: '0000'}
    ],
    records: {} // id: [{date, comm, wait, qual, mtg}]
};

const Utils = {
    save: () => localStorage.setItem('asp_pro_db', JSON.stringify(DB)),
    
    hmsToSec: (hms) => {
        if(!hms || !hms.includes(':')) return 0;
        const pts = hms.split(':').map(Number);
        return pts.length === 3 ? (pts[0] * 3600 + pts[1] * 60 + pts[2]) : (pts[0] * 60 + pts[1]);
    },

    fmtHms: (sec) => {
        const h = Math.floor(sec / 3600);
        const m = Math.floor((sec % 3600) / 60);
        return `${h}h${m.toString().padStart(2, '0')}`;
    },

    calcStats: (id) => {
        const agent = DB.agents.find(a => a.id === id);
        const data = DB.records[id] || [];
        let tComm = 0, tWait = 0, tQualPaid = 0, tMtg = 0;

        data.forEach(r => {
            tComm += r.comm;
            tWait += r.wait;
            tQualPaid += Math.min(r.qual, QUAL_CAP);
            tMtg += (r.mtg || 0);
        });

        const totalSec = tComm + tWait + tQualPaid + tMtg;
        const hours = totalSec / 3600;
        const progress = Math.min(100, (hours / GOAL_HOURS) * 100);
        const earned = (progress / 100) * (agent ? agent.pay : 0);

        return { tComm, tWait, tQualPaid, tMtg, totalSec, hours, progress, earned, pay: agent ? agent.pay : 0 };
    }
};

const Auth = {
    cur: null,
    login: () => {
        const id = document.getElementById('log-id').value;
        const pw = document.getElementById('log-pw').value;

        if(id === 'SUPER' && pw === '1234') {
            Auth.cur = { role: 'admin', name: 'Superviseur' };
            document.getElementById('nav-admin').style.display = 'block';
            document.getElementById('nav-agent').style.display = 'none';
            document.getElementById('login-overlay').style.display = 'none';
            UI.setupAdmin();
            Router.go('admin-team');
        } else {
            const ag = DB.agents.find(a => a.id === id);
            if(ag) {
                Auth.cur = { ...ag, role: 'agent' };
                document.getElementById('nav-admin').style.display = 'none';
                document.getElementById('nav-agent').style.display = 'block';
                document.getElementById('login-overlay').style.display = 'none';
                UI.setupAgent();
                Router.go('agent-dash');
            }
        }
        document.getElementById('user-name').textContent = Auth.cur.name;
        document.getElementById('user-role').textContent = Auth.cur.role.toUpperCase();
    },
    logout: () => {
        location.reload();
    }
};

const Router = {
    go: (path, el) => {
        document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
        if(el) el.classList.add('active');
        
        const view = document.getElementById('app-view');
        
        if(path === 'agent-dash') UI.renderAgentDash(view);
        if(path === 'agent-hist') UI.renderAgentHist(view);
        if(path === 'admin-team') UI.renderAdminTeam(view);
        if(path === 'admin-import') UI.renderAdminImport(view);
        if(path === 'admin-reunion') UI.renderAdminReunion(view);
    }
};

const UI = {
    setupAgent: () => {
        document.getElementById('page-title').textContent = "Espace Agent";
    },
    setupAdmin: () => {
        document.getElementById('page-title').textContent = "Console Supervision";
    },

    renderAgentDash: (view) => {
        const s = Utils.calcStats(Auth.cur.id);
        view.innerHTML = `
            <div class="grid-dashboard">
                <div class="stat-card">
                    <span class="stat-label">Rémunération estimée</span>
                    <div class="stat-val stat-money">${s.earned.toFixed(2)} €</div>
                    <div style="font-size: 11px; color: var(--text-dim); margin-top: 4px;">Basé sur ${s.progress.toFixed(1)}% d'atteinte</div>
                </div>
                <div class="stat-card">
                    <span class="stat-label">Total Heures Payées</span>
                    <div class="stat-val">${Utils.fmtHms(s.totalSec)}</div>
                    <div class="progress-container"><div class="progress-fill" style="width:${s.progress}%"></div></div>
                </div>
                <div class="stat-card">
                    <span class="stat-label">Temps Communication</span>
                    <div class="stat-val" style="color: var(--accent)">${Utils.fmtHms(s.tComm)}</div>
                </div>
                <div class="stat-card">
                    <span class="stat-label">Réunions / Coaching</span>
                    <div class="stat-val" style="color: var(--green)">${Utils.fmtHms(s.tMtg)}</div>
                </div>
            </div>

            <div class="card">
                <h3>Progression de l'objectif mensuel (${GOAL_HOURS}h)</h3>
                <div style="height: 300px; margin-top: 20px;">
                    <canvas id="chart-progression"></canvas>
                </div>
            </div>
        `;

        // Graphique
        const ctx = document.getElementById('chart-progression').getContext('2d');
        new Chart(ctx, {
            type: 'line',
            data: {
                labels: (DB.records[Auth.cur.id] || []).map(r => r.date),
                datasets: [{
                    label: 'Heures Cumulées',
                    data: (DB.records[Auth.cur.id] || []).map((r, i, all) => {
                        let sum = 0;
                        for(let j=0; j<=i; j++) sum += (all[j].comm + all[j].wait + Math.min(all[j].qual, 1800) + (all[j].mtg||0));
                        return (sum / 3600).toFixed(2);
                    }),
                    borderColor: '#4f7ef8',
                    backgroundColor: 'rgba(79, 126, 248, 0.1)',
                    fill: true,
                    tension: 0.4
                }]
            },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
        });
    },

    renderAgentHist: (view) => {
        const data = DB.records[Auth.cur.id] || [];
        const rows = data.slice().reverse().map(r => `
            <tr>
                <td>${r.date}</td>
                <td>${Utils.fmtHms(r.comm)}</td>
                <td>${Utils.fmtHms(r.wait)}</td>
                <td>${Utils.fmtHms(Math.min(r.qual, 1800))}</td>
                <td>${Utils.fmtHms(r.mtg || 0)}</td>
                <td style="font-weight: 700;">${Utils.fmtHms(r.comm + r.wait + Math.min(r.qual, 1800) + (r.mtg||0))}</td>
            </tr>
        `).join('');

        view.innerHTML = `
            <div class="card">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                    <h2>Détail de mon activité</h2>
                    <button class="btn btn-primary" onclick="window.print()">Exporter PDF</button>
                </div>
                <table>
                    <thead>
                        <tr><th>Date</th><th>Communication</th><th>Attente</th><th>Qualification</th><th>Réunion</th><th>Total Payable</th></tr>
                    </thead>
                    <tbody>${rows || '<tr><td colspan="6" style="text-align:center">Aucune donnée enregistrée</td></tr>'}</tbody>
                </table>
            </div>
        `;
    },

    renderAdminTeam: (view) => {
        const rows = DB.agents.map(ag => {
            const s = Utils.calcStats(ag.id);
            return `
                <tr>
                    <td>
                        <div style="font-weight:700">${ag.name}</div>
                        <div style="font-size:11px; color:var(--text-dim)">ID: ${ag.id}</div>
                    </td>
                    <td><span class="tag ${ag.type === 'AE' ? 'tag-ae' : 'tag-sal'}">${ag.type}</span></td>
                    <td><strong>${ag.pay} €</strong></td>
                    <td>
                        <div style="display:flex; justify-content:space-between; font-size:12px; margin-bottom:4px;">
                            <span>${s.hours.toFixed(1)}h / ${GOAL_HOURS}h</span>
                            <span>${s.progress.toFixed(1)}%</span>
                        </div>
                        <div class="progress-container"><div class="progress-fill" style="width:${s.progress}%"></div></div>
                    </td>
                    <td style="color:var(--green); font-weight:700;">${s.earned.toFixed(2)} €</td>
                </tr>
            `;
        }).join('');

        view.innerHTML = `
            <div class="card">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                    <h2>Suivi de l'équipe</h2>
                    <button class="btn btn-primary" onclick="UI.addAgent()">+ Ajouter un agent</button>
                </div>
                <table>
                    <thead>
                        <tr><th>Agent</th><th>Contrat</th><th>Base Fixe</th><th>Progression</th><th>Gains actuels</th></tr>
                    </thead>
                    <tbody>${rows}</tbody>
                </table>
            </div>
        `;
    },

    renderAdminImport: (view) => {
        view.innerHTML = `
            <div class="card">
                <h2>Importation Données Vicidial</h2>
                <p style="color:var(--text-dim); margin: 10px 0 24px;">Collez directement les lignes de l'export Vicidial ci-dessous.</p>
                <textarea id="raw-csv" placeholder='Exemple: "Haddad Houyem ","06980713","ADMIN","","2026-04-03","200","5:06:31"...' style="height: 300px; font-family: 'JetBrains Mono'; font-size: 11px;"></textarea>
                <div style="display:flex; gap:16px;">
                    <button class="btn btn-primary" onclick="UI.doImport()">Lancer l'importation</button>
                    <button class="btn btn-ghost" onclick="document.getElementById('raw-csv').value=''">Effacer</button>
                </div>
            </div>
        `;
    },

    renderAdminReunion: (view) => {
        const opts = DB.agents.map(a => `<option value="${a.id}">${a.name}</option>`).join('');
        view.innerHTML = `
            <div class="card" style="max-width: 500px;">
                <h2>Saisie Réunion / Coaching</h2>
                <div style="margin-top:20px;">
                    <label class="stat-label">Sélectionner l'agent</label>
                    <select id="mtg-id">${opts}</select>
                    
                    <label class="stat-label">Date</label>
                    <input type="date" id="mtg-date" value="${new Date().toISOString().split('T')[0]}">
                    
                    <label class="stat-label">Durée (en minutes)</label>
                    <input type="number" id="mtg-min" placeholder="Ex: 30">
                    
                    <button class="btn btn-primary" style="width:100%" onclick="UI.saveMtg()">Enregistrer le temps</button>
                </div>
            </div>
        `;
    },

    doImport: () => {
        const raw = document.getElementById('raw-csv').value;
        if(!raw) return;

        const lines = raw.split('\n');
        let count = 0;

        lines.forEach(line => {
            const cols = line.split('","').map(c => c.replace(/"/g, '').trim());
            
            // Format Vicidial détecté (ID en colonne 1, Date en colonne 4)
            if(cols.length > 10 && cols[4].includes('2026')) {
                const id = cols[1];
                const date = cols[4];
                const wait = Utils.hmsToSec(cols[9]);
                const comm = Utils.hmsToSec(cols[11]);
                const qual = Utils.hmsToSec(cols[13]);

                if(!DB.records[id]) DB.records[id] = [];
                
                const idx = DB.records[id].findIndex(r => r.date === date);
                const newData = { date, comm, wait, qual, mtg: 0 };
                
                if(idx > -1) {
                    newData.mtg = DB.records[id][idx].mtg || 0;
                    DB.records[id][idx] = newData;
                } else {
                    DB.records[id].push(newData);
                }
                count++;
            }
        });

        Utils.save();
        alert(count + " lignes traitées avec succès !");
        Router.go('admin-team');
    },

    saveMtg: () => {
        const id = document.getElementById('mtg-id').value;
        const date = document.getElementById('mtg-date').value;
        const min = parseInt(document.getElementById('mtg-min').value);

        if(!id || !date || isNaN(min)) return;

        if(!DB.records[id]) DB.records[id] = [];
        const rec = DB.records[id].find(r => r.date === date);
        
        if(rec) rec.mtg = (rec.mtg || 0) + (min * 60);
        else DB.records[id].push({date, comm:0, wait:0, qual:0, mtg: min*60});

        Utils.save();
        alert("Temps ajouté pour " + id);
        Router.go('admin-team');
    }
};

// Start
window.onload = () => {
    // DB init...
};

</script>
</body>
</html>
