},

_handleFile(file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => Views._showImportPreview(e.target.result, file.name);
  reader.onerror = () => U.toast('Erreur lecture fichier', 'error');
  reader.readAsText(file, 'UTF-8');
},

_doImportText() {
  const raw = document.getElementById('imp-raw')?.value || '';
  if (!raw.trim()) { U.toast('Aucune donnée à analyser', 'error'); return; }
  Views._showImportPreview(raw, 'Collage manuel');
},

_saveColMapping() {
  const keys = Object.keys(DB.data.colMapping||{});
  keys.forEach(k => {
    const el = document.getElementById('cm_' + k);
    if (el) DB.data.colMapping[k] = parseInt(el.value)||0;
  });
  DB.save();
  U.toast('Mapping colonnes sauvegardé', 'success');
},

_showImportPreview(text, sourceName) {
  Views._importPendingText   = text;
  Views._importPendingSource = sourceName;
  const report  = ImportEngine.parse(text, DB.data.colMapping);
  const s       = report.stats;
  const preview = report.entries.slice(0, 15);

  let html = '<div class="card">';
  html += '<div class="card-header"><div class="card-title">Prévisualisation — ' + sourceName + '</div><div style="display:flex;gap:6px">';
  html += '<span style="background:rgba(16,185,129,.15);color:var(--green);padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700">✓ ' + s.parsed + ' valides</span>';
  if (s.newEntries) html += '<span style="background:rgba(79,126,248,.15);color:var(--accent);padding:2px 8px;border-radius:10px;font-size:10px">' + s.newEntries + ' nouvelles</span>';
  if (s.updates)    html += '<span style="background:var(--bg3);padding:2px 8px;border-radius:10px;font-size:10px">' + s.updates + ' MàJ</span>';
  if (s.newAgents)  html += '<span style="background:rgba(167,139,250,.15);color:#a78bfa;padding:2px 8px;border-radius:10px;font-size:10px">+' + s.newAgents + ' agents</span>';
  if (s.errorsCount)html += '<span style="background:rgba(239,68,68,.15);color:var(--red);padding:2px 8px;border-radius:10px;font-size:10px">' + s.errorsCount + ' erreurs</span>';
  html += '</div></div>';

  if (report.errors.length)   html += '<div style="background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);border-radius:8px;padding:10px;margin-bottom:10px;font-size:12px"><strong>Erreurs (' + report.errors.length + '):</strong><br>' + report.errors.slice(0,5).map(function(e){return '• L.' + e.line + ': ' + e.msg;}).join('<br>') + '</div>';
  if (report.warnings.length) html += '<div style="background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.3);border-radius:8px;padding:10px;margin-bottom:10px;font-size:12px"><strong>Alertes (' + report.warnings.length + '):</strong><br>' + report.warnings.slice(0,3).map(function(w){return '• L.' + w.line + ': ' + w.msg;}).join('<br>') + '</div>';

  html += '<div style="overflow-x:auto;margin-bottom:14px"><table style="width:100%;border-collapse:collapse;font-size:11.5px"><thead><tr>';
  ['Agent','Date','Comm.','Attente','Qual.(cap)','Appels','RDV','TMC','Statut'].forEach(function(h){ html += '<th style="text-align:left;padding:7px 10px;border-bottom:1px solid var(--border);color:var(--text-dim);font-size:10px;text-transform:uppercase">' + h + '</th>'; });
  html += '</tr></thead><tbody>';
  preview.forEach(function(p) {
    html += '<tr>';
    html += '<td style="padding:7px 10px;font-weight:600">' + p.agName + '</td>';
    html += '<td style="padding:7px 10px;font-family:monospace">' + U.fmtDate(p.date) + '</td>';
    html += '<td style="padding:7px 10px;font-family:monospace;color:var(--accent)">' + U.hms(p.comm) + '</td>';
    html += '<td style="padding:7px 10px;font-family:monospace;color:var(--amber)">' + U.hms(p.wait) + '</td>';
    var qp = Math.min(p.qual, QUAL_CAP);
    html += '<td style="padding:7px 10px;font-family:monospace;color:#a78bfa">' + U.hms(qp) + (p.qual > QUAL_CAP ? '<span style="color:var(--red);font-size:9px"> +' + U.hms(p.qual-QUAL_CAP) + '</span>' : '') + '</td>';
    html += '<td style="padding:7px 10px;font-family:monospace">' + p.calls + '</td>';
    html += '<td style="padding:7px 10px;font-family:monospace;color:var(--red)">' + p.sales + '</td>';
    html += '<td style="padding:7px 10px;font-family:monospace;color:#f97316">' + U.mmss(p.tmc) + '</td>';
    html += '<td style="padding:7px 10px"><span style="padding:2px 7px;border-radius:10px;font-size:9px;font-weight:700;background:' + (p.isNew ? 'rgba(16,185,129,.15)' : 'rgba(79,126,248,.15)') + ';color:' + (p.isNew ? 'var(--green)' : 'var(--accent)') + '">' + (p.isNew ? 'Nouvelle' : 'MàJ') + '</span></td>';
    html += '</tr>';
  });
  if (s.parsed > 15) html += '<tr><td colspan="9" style="padding:7px;text-align:center;color:var(--text-dim)">… et ' + (s.parsed-15) + ' autres lignes</td></tr>';
  html += '</tbody></table></div>';

  if (s.parsed > 0) {
    html += '<div style="display:flex;gap:10px;align-items:center">';
    html += '<button id="btn-imp-ok" style="padding:9px 18px;background:var(--accent);border:none;border-radius:7px;color:#fff;font-weight:700;cursor:pointer;font-size:13px">✓ Valider et Importer (' + s.parsed + ' lignes)</button>';
    html += '<button id="btn-imp-cancel" style="padding:9px 16px;background:var(--bg3);border:1px solid var(--border2);border-radius:7px;color:var(--text);cursor:pointer;font-size:12px">Annuler</button>';
    if (s.warningsCount > 0) html += '<span style="color:var(--amber);font-size:12px">⚠ ' + s.warningsCount + ' alertes</span>';
    html += '</div>';
  } else {
    html += '<div style="background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);border-radius:8px;padding:12px;font-size:12px">Aucune ligne valide. Vérifiez le format du fichier.</div>';
  }
  html += '</div>';

  var el = document.getElementById('imp-preview');
  el.innerHTML = html;
  var btnOk = document.getElementById('btn-imp-ok');
  if (btnOk) btnOk.addEventListener('click', function(){ Views._confirmImport(); });
  var btnX = document.getElementById('btn-imp-cancel');
  if (btnX) btnX.addEventListener('click', function(){ document.getElementById('imp-preview').innerHTML = ''; });
},

_confirmImport() {
  var text       = Views._importPendingText;
  var sourceName = Views._importPendingSource || 'Import';
  if (!text) { U.toast('Aucune donnée en attente', 'error'); return; }
  var report = ImportEngine.parse(text, DB.data.colMapping);
  if (!report.entries.length) { U.toast('Aucune ligne valide', 'error'); return; }
  ImportEngine.apply(report, sourceName);
  Views._importPendingText   = null;
  Views._importPendingSource = null;
  var li = DB.data.lastImport;
  if (li) {
    var de = document.getElementById('upd-date');   if (de) { de.textContent = U.fmtDate(li.date); de.style.color = 'var(--cyan)'; }
    var pe = document.getElementById('upd-period'); if (pe) pe.textContent = '— ' + ((DB.data.periods[li.period] && DB.data.periods[li.period].label) || li.period);
    var ce = document.getElementById('upd-count');  if (ce) ce.textContent = li.count + ' lignes · ' + li.agents + ' agents';
    var dot= document.getElementById('b-dot');      if (dot) dot.style.background = 'var(--green)';
  }
  U.toast('Import validé : ' + report.stats.parsed + ' lignes importées', 'success');
  Views['ad-import']();
},

_previewMeeting() {
  const agIds = [...document.querySelectorAll('[id^="chk_"]:checked')].map(c=>c.value);
  const date  = document.getElementById('m-date')?.value;
  const dur   = parseInt(document.getElementById('m-dur')?.value);
  const type  = document.getElementById('m-type')?.value;
  const justif= document.getElementById('m-justif')?.value;

  if (!agIds.length) { U.toast('Sélectionnez au moins un agent', 'error'); return; }
  if (!date || isNaN(dur) || dur <= 0) { U.toast('Date et durée requises', 'error'); return; }
  if (!justif || justif.trim().length < 5) { U.toast('Justification requise (min 5 caractères)', 'error'); return; }

  // Vérifier doublons
  const dupes = MeetingEngine.checkDuplicate(agIds, date, type, dur);
  // Calcul impact paie
  const impacts = MeetingEngine.calcImpact(agIds, dur);

  const dupesHtml = dupes.length ? `<div class="info-box warn" style="margin-bottom:10px">⚠ Doublons détectés :<br>${dupes.map(d=>`• ${d}`).join('<br>')}</div>` : '';
  const impactHtml = impacts.length ? `
    <div class="info-box" style="margin-bottom:10px">
      <strong>Impact sur la rémunération :</strong>
      ${impacts.map(i => `<div style="margin-top:6px;font-size:12px">
        <strong>${i.name}</strong> : +${i.addH} →
        ${i.before.pct}% (${i.before.earned.toLocaleString('fr-FR')} MAD) →
        <strong style="color:var(--green)">${i.after.pct}% (${i.after.earned.toLocaleString('fr-FR')} MAD)</strong>
        <span style="color:var(--green)">+${i.gain.toLocaleString('fr-FR')} MAD</span>
      </div>`).join('')}
    </div>` : '';

  document.getElementById('mtg-impact-preview').innerHTML = `
    ${dupesHtml}
    ${impactHtml}
    <div style="display:flex;gap:10px">
      <button class="btn btn-primary" onclick="Views._saveMeeting()">✓ Confirmer &amp; Enregistrer</button>
      <button class="btn btn-ghost" onclick="document.getElementById('mtg-impact-preview').innerHTML=''">Annuler</button>
    </div>`;
},

_saveMeeting() {
  const agIds = [...document.querySelectorAll('[id^="chk_"]:checked')].map(c=>c.value);
  const date  = document.getElementById('m-date')?.value;
  const dur   = parseInt(document.getElementById('m-dur')?.value);
  const type  = document.getElementById('m-type')?.value;
  const host  = document.getElementById('m-host')?.value;
  const note  = document.getElementById('m-note')?.value;
  const justif= document.getElementById('m-justif')?.value;
  const id = MeetingEngine.save(agIds, date, dur, type, host, note, justif);
  if (id) {
    U.toast(`Réunion enregistrée (${agIds.length} agent(s))`, 'success');
    Views['ad-meetings']();
  }
},

_deleteMeetingPrompt(meetingId) {
  const reason = prompt('Raison de la suppression (obligatoire, min 5 caractères) :');
  if (!reason) return;
  if (MeetingEngine.delete(meetingId, reason)) {
    U.toast('Réunion supprimée', 'success');
    Views['ad-meetings']();
  }
},


'ad-meetings'() {
  const logs=(DB.data.meetings||[]).filter(m=>m.period===DB.data.period).sort((a,b)=>b.date.localeCompare(a.date));
  const types={coaching:'Coaching',decorticage:'Décorticage appels',reunion:'Réunion équipe',formation:'Formation'};
  const cl=DB.data.agents.map(ag=>`<div class="checklist-item"><input type="checkbox" id="chk-${ag.id}" value="${ag.id}"><div class="avatar" style="background:${ag.color||COLORS[0]};width:24px;height:24px;font-size:10px">${U.initials(ag.name)}</div><label for="chk-${ag.id}">${ag.name}</label></div>`).join('');

  document.getElementById('view').innerHTML=`
    <div class="grid-2">
      <div class="card">
        <div class="card-header"><div class="card-title">Saisir un temps de réunion</div></div>
        <div class="form-group"><label class="form-label">Responsable / Animateur</label>
          <select class="form-control" id="m-host"><option>Superviseur</option><option>Marie</option><option>Wissal</option><option>Yasmine</option><option>Admin</option></select>
        </div>

              ${m.note?`<span style="font-size:10px;color:var(--txt3);width:100%;padding-left:24px">${m.note}</span>`:''}
              <button class="btn btn-danger btn-sm" style="padding:3px 8px" onclick="Views._delMeeting(${logs.indexOf(m)})">✕</button>
            </div>`;
          }).join('')}
        </div>

_saveMeeting() {
  const sel=[...document.querySelectorAll('#m-agents input:checked')].map(c=>c.value);
  const date=document.getElementById('m-date').value;
  const dur=parseInt(document.getElementById('m-dur').value);
  const type=document.getElementById('m-type').value;
  const note=document.getElementById('m-note').value.trim();
  const host=document.getElementById('m-host').value;
  if(!sel.length)return U.toast('Sélectionnez au moins un agent','error');
  if(!date||isNaN(dur)||dur<=0)return U.toast('Date et durée requises','error');

  const meeting={agIds:sel,date,period:DB.data.period,durMin:dur,type,host,note};
  if(!DB.data.meetings)DB.data.meetings=[];
  DB.data.meetings.push(meeting);

  sel.forEach(agId=>{
    if(!DB.data.records[agId])DB.data.records[agId]=[];
    const day=DB.data.records[agId].find(r=>r.date===date&&r.period===DB.data.period);
    if(day)day.mtg=(day.mtg||0)+dur*60;
    else DB.data.records[agId].push({period:DB.data.period,date,comm:0,wait:0,qual:0,calls:0,sales:0,mtg:dur*60});
  });

  DB.save();
  DB.log(host,'Ajout réunion',`${dur}min · ${sel.length} agent(s) · ${date}`);
  U.toast(`Temps ajouté à ${sel.length} agent(s)`,'success');
  Views['ad-meetings']();
},

_delMeeting(idx) {
  if(!confirm('Supprimer cette entrée ?'))return;
  const m=DB.data.meetings.filter(x=>x.period===DB.data.period).sort((a,b)=>b.date.localeCompare(a.date))[idx];
  if(!m)return;
  (m.agIds||[]).forEach(agId=>{
    const day=(DB.data.records[agId]||[]).find(r=>r.date===m.date&&r.period===m.period);
    if(day)day.mtg=Math.max(0,(day.mtg||0)-m.durMin*60);
  });
  const gIdx=DB.data.meetings.indexOf(m);
  if(gIdx>-1)DB.data.meetings.splice(gIdx,1);
  DB.save();
  DB.log(Auth.cur.id,'Suppression réunion',`${m.durMin}min — ${m.date}`);
  U.toast('Entrée supprimée','info');
  Views['ad-meetings']();
},

'ad-export'() {
  const period = DB.data.period;

  const status = PeriodEngine.getStatus(period);
  const STATUS_LABELS = { draft:'Brouillon', validated:'✓ Validée', exported:'📤 Exportée' };
  const STATUS_COLORS = { draft:'', validated:'badge-green', exported:'badge-blue' };
  const storStats = Storage.getStats();

  document.getElementById('view').innerHTML = `
  <!-- Statut période -->
  <div class="card" style="margin-bottom:16px">
    <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px">
      <div>
        <div style="font-size:15px;font-weight:700">Période : ${cfg.label||period}</div>
        <div style="font-size:12px;color:var(--text-dim);margin-top:4px">
          Statut : <span class="badge ${STATUS_COLORS[status]||''}">${STATUS_LABELS[status]||status}</span>
          ${cfg.validatedAt ? `· Clôturée le ${U.fmtDate(cfg.validatedAt.split('T')[0])} par ${cfg.validatedBy||'?'}` : ''}
          ${cfg.exportedAt ? `· Exportée le ${U.fmtDate(cfg.exportedAt.split('T')[0])}` : ''}
        </div>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        ${status === 'draft' ? `<button class="btn btn-sm" style="background:var(--green-bg);color:var(--green);border:1px solid var(--green)" onclick="PeriodEngine.validate('${period}')">🔒 Clôturer la période</button>` : ''}
        <span style="font-size:11px;color:var(--text-dim)">Stockage: ${storStats.usedMB} Mo (${storStats.pct}%)</span>
        <button class="btn btn-ghost btn-sm" onclick="Storage.exportJSON()">📦 Sauvegarde JSON</button>
      </div>
    </div>
  </div>

  <!-- Contrôle avant export -->
  ${status === 'draft' ? '<div class="info-box warn">⚠ Recommandé : clôturez la période avant export pour garantir l’intégrité.</div>' : ''}

  <!-- Grille d'exports -->
  <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:20px">

    <div class="card" style="cursor:pointer;transition:.2s" onmouseenter="this.style.borderColor='var(--blue)'" onmouseleave="this.style.borderColor=''">
      <div style="font-size:28px;margin-bottom:10px">📊</div>
      <div style="font-size:14px;font-weight:700;margin-bottom:5px">Rapport équipe CSV</div>
      <div style="font-size:11.5px;color:var(--text-dim);margin-bottom:12px">Tous les agents : temps, %, RDV, TMC, rémunération. Avec ID export.</div>
      <button class="btn btn-primary btn-sm" onclick="ExportEngine.exportTeamCSV('${period}')">Télécharger CSV ↗</button>
    </div>

    <div class="card" style="cursor:pointer;transition:.2s" onmouseenter="this.style.borderColor='var(--blue)'" onmouseleave="this.style.borderColor=''">
      <div style="font-size:28px;margin-bottom:10px">👤</div>
      <div style="font-size:14px;font-weight:700;margin-bottom:5px">Relevé individuel CSV</div>
      <div style="font-size:11.5px;color:var(--text-dim);margin-bottom:8px">Détail journalier justificatif. Qual. brute vs retenue. ID export.</div>
      <select class="form-control" id="exp-ag" style="margin-bottom:8px;font-size:12px">${DB.data.agents.filter(a=>a.active!==false).map(a=>`<option value="${a.id}">${a.name}</option>`).join('')}</select>
      <button class="btn btn-primary btn-sm" onclick="ExportEngine.exportDetailCSV(document.getElementById('exp-ag').value,'${period}')">Télécharger CSV ↗</button>
    </div>

    <div class="card" style="cursor:pointer;transition:.2s" onmouseenter="this.style.borderColor='var(--green)'" onmouseleave="this.style.borderColor=''">
      <div style="font-size:28px;margin-bottom:10px">📋</div>
      <div style="font-size:14px;font-weight:700;margin-bottom:5px">Rapport réunions CSV</div>
      <div style="font-size:11.5px;color:var(--text-dim);margin-bottom:12px">Coaching, formations, décorticages par agent et type.</div>
      <button class="btn btn-sm" style="background:var(--green-bg);color:var(--green);border:1px solid var(--green)" onclick="Views._exportMeetingsCSV()">Télécharger CSV ↗</button>
    </div>

    <div class="card" style="cursor:pointer;transition:.2s" onmouseenter="this.style.borderColor='var(--purple)'" onmouseleave="this.style.borderColor=''">
      <div style="font-size:28px;margin-bottom:10px">🖨</div>
      <div style="font-size:14px;font-weight:700;margin-bottom:5px">Rapport PDF / Impression</div>
      <div style="font-size:11.5px;color:var(--text-dim);margin-bottom:12px">Ouvre une fenêtre d'impression. Sauvegardez en PDF depuis votre navigateur.</div>
      <button class="btn btn-sm" style="background:var(--purple-bg);color:var(--purple);border:1px solid var(--purple)" onclick="ExportEngine.exportPrint('${period}')">Ouvrir PDF ↗</button>
    </div>

    <div class="card" style="cursor:pointer;transition:.2s" onmouseenter="this.style.borderColor='var(--amber)'" onmouseleave="this.style.borderColor=''">
      <div style="font-size:28px;margin-bottom:10px">📦</div>
      <div style="font-size:14px;font-weight:700;margin-bottom:5px">Sauvegarde complète JSON</div>
      <div style="font-size:11.5px;color:var(--text-dim);margin-bottom:12px">Toutes les données en JSON. Restauration possible. Recommandé avant tout import massif.</div>
      <button class="btn btn-sm" style="background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber)" onclick="Storage.exportJSON()">Sauvegarder JSON ↗</button>
    </div>

    <div class="card" style="cursor:pointer;transition:.2s" onmouseenter="this.style.borderColor='var(--cyan)'" onmouseleave="this.style.borderColor=''">
      <div style="font-size:28px;margin-bottom:10px">📜</div>
      <div style="font-size:14px;font-weight:700;margin-bottom:5px">Audit logs CSV</div>
      <div style="font-size:11.5px;color:var(--text-dim);margin-bottom:12px">Toutes les actions tracées. Horodatées, avec acteur et détail.</div>
      <button class="btn btn-sm" style="background:var(--cyan-bg);color:var(--cyan);border:1px solid var(--cyan)" onclick="Views._exportLogsCSV()">Exporter logs ↗</button>
    </div>
  </div>

  <!-- Récapitulatif complet -->
  <div class="card">
    <div class="card-header">
      <div class="card-title">Récapitulatif complet — ${cfg.label||period}</div>
      <div style="display:flex;gap:6px">
        <button class="btn btn-primary btn-sm" onclick="ExportEngine.exportTeamCSV('${period}')">⬇ Export CSV</button>
        <button class="btn btn-ghost btn-sm" onclick="ExportEngine.exportPrint('${period}')">🖨 PDF</button>
      </div>
    </div>
    <div style="overflow-x:auto">
      <table style="width:100%;border-collapse:collapse;font-size:12.5px">
        <thead><tr>
          <th style="text-align:left;padding:9px;border-bottom:1px solid var(--border);color:var(--text-dim)">Agent</th>
          <th style="padding:9px;border-bottom:1px solid var(--border);color:var(--text-dim)">Comm.</th>
          <th style="padding:9px;border-bottom:1px solid var(--border);color:var(--text-dim)">Attente</th>
          <th style="padding:9px;border-bottom:1px solid var(--border);color:var(--text-dim)">Qual.</th>
          <th style="padding:9px;border-bottom:1px solid var(--border);color:var(--text-dim)">Réunions</th>
          <th style="padding:9px;border-bottom:1px solid var(--border);color:var(--text-dim)">Total</th>
          <th style="padding:9px;border-bottom:1px solid var(--border);color:var(--text-dim)">%</th>
          <th style="padding:9px;border-bottom:1px solid var(--border);color:var(--text-dim)">RDV</th>
          <th style="padding:9px;border-bottom:1px solid var(--border);color:var(--text-dim)">Taux</th>
          <th style="padding:9px;border-bottom:1px solid var(--border);color:var(--text-dim)">TMC</th>
          <th style="padding:9px;border-bottom:1px solid var(--border);color:var(--text-dim)">Contrat</th>
          <th style="padding:9px;border-bottom:1px solid var(--border);color:var(--text-dim)">Gains MAD</th>
          <th style="padding:9px;border-bottom:1px solid var(--border);color:var(--text-dim)">Projection MAD</th>
        </tr></thead>
        <tbody>
          ${DB.data.agents.filter(a=>a.active!==false).map(ag => {
            const s = U.calc(ag.id, period);
            if (!s) return '';
            return `<tr>
              <td style="padding:9px"><div style="display:flex;align-items:center;gap:7px">
                <div style="width:22px;height:22px;border-radius:50%;background:${ag.color||'#4f7ef8'};display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#fff;flex-shrink:0">${U.initials(ag.name)}</div>
                <span style="font-weight:600">${ag.name}</span>
              </div></td>
              <td style="padding:9px;font-family:monospace;color:var(--blue)">${U.hms(s.tC)}</td>
              <td style="padding:9px;font-family:monospace;color:var(--amber)">${U.hms(s.tW)}</td>
              <td style="padding:9px;font-family:monospace;color:var(--purple)">${U.hms(s.tQP)}</td>
              <td style="padding:9px;font-family:monospace;color:var(--green)">${U.hms(s.tM)}</td>
              <td style="padding:9px;font-family:monospace;color:var(--cyan);font-weight:700">${U.hms(s.tot)}</td>
              <td style="padding:9px"><span class="badge ${U.pbadge(s.pct)}">${s.pct.toFixed(1)}%</span></td>
              <td style="padding:9px;font-family:monospace;color:var(--red)">${s.tSales}</td>
              <td style="padding:9px;font-family:monospace">${s.rdvRate.toFixed(1)}%</td>
              <td style="padding:9px;font-family:monospace;color:var(--orange)">${U.mmss(s.tmcSec)}</td>
              <td style="padding:9px"><span class="badge ${ag.salType==='SALARIE'?'badge-blue':'badge-purple'}">${ag.salType||'AE'}</span></td>
              <td style="padding:9px;font-family:monospace;color:var(--green);font-weight:700">${s.earned.toLocaleString('fr-FR')} MAD</td>
              <td style="padding:9px;font-family:monospace">${s.projEarned.toLocaleString('fr-FR')} MAD</td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>
  </div>`;
},

_exportLogsCSV() {
  const logs = DB.data.logs || [];
  let csv = 'ID;Horodatage;Acteur;Action;Detail;Periode\n';
  logs.forEach(function(l) {
    csv += (l.id||'') + ';' + l.ts + ';' + (l.actor||'') + ';' + (l.action||'') + ';' + (l.detail||'').replace(/;/g,'|') + ';' + (l.period||'') + '\n';
  });
  U.dlCSV(csv, 'Audit_Logs_' + DB.data.period + '_' + new Date().toISOString().split('T')[0] + '.csv');
  U.toast('Audit logs exportés', 'success');
},

_exportMeetingsCSV() {
  const period = DB.data.period;
  const logs = (DB.data.meetings || []).filter(function(m){ return m.period === period; });
  let csv = 'ID;Date;Agents;Duree (min);Type;Animateur;Note;Justification;Supprime;Raison suppression\n';
  logs.forEach(function(m) {
    const names = (m.agIds||[]).map(function(id){ const a=DB.data.agents.find(function(a){return a.id===id;}); return a?a.name:id; }).join(' | ');
    csv += (m.id||'') + ';' + m.date + ';' + names + ';' + m.durMin + ';' + (m.type||'') + ';' + (m.host||'') + ';' + (m.note||'').replace(/;/g,'|') + ';' + (m.justification||'').replace(/;/g,'|') + ';' + (m.deletedAt?'Oui':'Non') + ';' + (m.deleteReason||'') + '\n';
  });
  U.dlCSV(csv, 'Reunions_' + period + '.csv');
  U.toast('Export réunions téléchargé', 'success');
},

'ad-logs'() {
  const logs=DB.data.logs||[];
  document.getElementById('view').innerHTML=`
    <div class="info-box">Traçabilité complète de toutes les actions sensibles. Les 500 dernières actions sont conservées.</div>
    <div class="card">
      <div class="card-header"><div class="card-title">Historique des actions (${logs.length})</div><button class="btn btn-ghost btn-sm" onclick="Views._exportLogsCSV()">⬇ Export CSV</button></div>
      ${!logs.length?'<div class="empty-state"><div class="empty-state-icon">📋</div>Aucune action enregistrée.</div>':
      logs.map(l=>`<div class="log-entry">
        <span class="log-time">${new Date(l.ts).toLocaleString('fr-FR')}</span>
        <span class="log-actor">${l.actor||'?'}</span>
        <span class="log-action">${l.action}</span>
        <span class="log-detail">${l.detail||''}</span>
      </div>`).join('')}
    </div>
  `;
},

_exportLogsCSV() {
  let csv='Date;Acteur;Action;Détail\n';
  (DB.data.logs||[]).forEach(l=>{csv+=`${l.ts};${l.actor};${l.action};"${l.detail||''}"\n`;});
  U.dlCSV(csv,`Logs_ASP_${U.today()}.csv`);
  U.toast('Export logs téléchargé','success');
},

// ─────────────────────────────────────────────────────────────────────
// Shared helpers
// ─────────────────────────────────────────────────────────────────────
_exportAgentCSV: Views && Views['ag-history'] ? Views._exportAgentCSV : function(agId){
  const ag=DB.data.agents.find(a=>a.id===agId)||{name:agId};
  const s=U.calc(agId,DB.data.period);
  if(!s)return;
  let csv='Date;Communication;Attente;Qual. brute;Qual. retenue;Réunions;Total payé;Appels;RDV;Taux RDV;TMC (sec)\n';
  [...s.recs].sort((a,b)=>a.date.localeCompare(b.date)).forEach(r=>{
    const qp=Math.min(r.qual,QUAL_CAP),tot=r.comm+r.wait+qp+(r.mtg||0);
    csv+=`${r.date};${U.hms(r.comm)};${U.hms(r.wait)};${U.hms(r.qual)};${U.hms(qp)};${U.hms(r.mtg||0)};${U.hms(tot)};${r.calls||0};${r.sales||0};${r.calls>0?((r.sales/r.calls)*100).toFixed(1)+'%':'0%'};${U.tmc(r.comm,r.calls||0)}\n`;
  });
  U.dlCSV(csv,`Rapport_${ag.name.replace(/ /g,'_')}_${DB.data.period}.csv`);
  U.toast('Export CSV téléchargé','success');
}

};

// ═══════════════════════════════════════════════════════════════════════
// BOOT
// ═══════════════════════════════════════════════════════════════════════
DB.init();
window.addEventListener('DOMContentLoaded', () => {
  document.getElementById('li').focus();
});

</script>
</body>
</html>
