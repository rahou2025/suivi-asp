<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ASP Connect PRO · v5</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap');
:root{
  --bg:#0a0c12;--sb:#0f1219;--card:#141820;--card2:#191e28;
  --b:rgba(255,255,255,.07);--b2:rgba(255,255,255,.12);
  --acc:#4f7ef8;--accG:rgba(79,126,248,.18);--accD:rgba(79,126,248,.08);
  --txt:#e8eaf0;--dim:#7a8394;--mu:#4a5060;
  --grn:#10b981;--grnD:rgba(16,185,129,.12);
  --amb:#f59e0b;--ambD:rgba(245,158,11,.12);
  --red:#ef4444;--redD:rgba(239,68,68,.12);
  --pur:#a78bfa;--purD:rgba(167,139,250,.12);
  --cyn:#22d3ee;--cynD:rgba(34,211,238,.12);
  --ora:#f97316;--oraD:rgba(249,115,22,.12);
  --r:12px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:14px}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--txt);height:100vh;overflow:hidden;display:flex;flex-direction:column;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-thumb{background:var(--b2);border-radius:10px}

/* BANNER DERNIÈRE MISE À JOUR */
#upd-banner{background:linear-gradient(90deg,rgba(79,126,248,.12),rgba(34,211,238,.08));border-bottom:1px solid var(--b2);padding:7px 24px;display:flex;align-items:center;justify-content:space-between;font-size:11px;flex-shrink:0;transition:all .3s}
.upd-left{display:flex;align-items:center;gap:10px;color:var(--dim)}
.upd-dot{width:6px;height:6px;border-radius:50%;background:var(--grn);box-shadow:0 0 6px var(--grn);animation:pulse 2s infinite;flex-shrink:0}
.upd-date{color:var(--cyn);font-family:'JetBrains Mono';font-weight:600}
.upd-period{color:var(--dim);margin-left:6px}
.upd-none{color:var(--amb)}

/* APP BODY */
.app-body{flex:1;display:flex;overflow:hidden}

/* LOGIN */
#login-ov{position:fixed;inset:0;background:radial-gradient(ellipse at center,#0f1630 0%,var(--bg) 70%);z-index:9999;display:flex;align-items:center;justify-content:center;transition:opacity .4s}
.lbox{width:420px;background:var(--card);border:1px solid var(--b2);border-radius:24px;padding:48px;box-shadow:0 40px 80px rgba(0,0,0,.6),0 0 60px var(--accG);text-align:center}
.llogo{width:72px;height:72px;background:linear-gradient(135deg,#4f7ef8,#7c3aed);border-radius:20px;display:flex;align-items:center;justify-content:center;margin:0 auto 24px;box-shadow:0 0 40px var(--accG)}
.lbox h1{font-size:26px;font-weight:800;margin-bottom:6px;letter-spacing:-.5px}
.lbox .sub{color:var(--dim);font-size:14px;margin-bottom:36px}
.lbox input{width:100%;background:rgba(255,255,255,.04);border:1px solid var(--b2);padding:14px 16px;border-radius:10px;color:var(--txt);font-family:inherit;font-size:14px;margin-bottom:14px;outline:none;transition:border-color .2s}
.lbox input:focus{border-color:var(--acc);background:rgba(79,126,248,.06)}
.lbtn{width:100%;padding:15px;background:linear-gradient(135deg,#4f7ef8,#6366f1);border:none;border-radius:10px;color:#fff;font-family:inherit;font-weight:700;font-size:15px;cursor:pointer;transition:all .2s;box-shadow:0 8px 24px var(--accG)}
.lbtn:hover{transform:translateY(-2px)}
.lerr{color:var(--red);font-size:12px;margin-top:12px;display:none}

/* SIDEBAR */
.sidebar{width:240px;min-width:240px;background:var(--sb);border-right:1px solid var(--b);display:flex;flex-direction:column;padding:20px 14px;overflow-y:auto}
.lg-area{display:flex;align-items:center;gap:10px;padding:6px 8px;margin-bottom:28px}
.lg-icon{width:36px;height:36px;min-width:36px;background:linear-gradient(135deg,#4f7ef8,#7c3aed);border-radius:10px;display:flex;align-items:center;justify-content:center;box-shadow:0 0 16px var(--accG)}
.lg-t{font-size:15px;font-weight:800;letter-spacing:-.3px}
.lg-s{font-size:10px;color:var(--dim);margin-top:1px}
.ns{font-size:10px;font-weight:700;color:var(--mu);text-transform:uppercase;letter-spacing:1.2px;padding:0 10px;margin-bottom:8px;margin-top:16px}
.ni{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;color:var(--dim);font-weight:500;font-size:13px;cursor:pointer;transition:all .18s;margin-bottom:2px;border:none;background:none;width:100%;text-align:left}
.ni svg{width:16px;height:16px;opacity:.7;flex-shrink:0}
.ni:hover{background:rgba(255,255,255,.04);color:var(--txt)}
.ni.active{background:var(--accD);color:var(--acc);font-weight:600}
.ni.active svg{opacity:1}
.ni.alert-nav{color:var(--red)}
.ni.alert-nav.active{background:var(--redD);color:var(--red)}
.nb{margin-top:auto;padding-top:16px}
.ubdg{display:flex;align-items:center;gap:10px;padding:10px;background:var(--card2);border-radius:10px;border:1px solid var(--b);margin-top:8px}
.av{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0;color:#fff}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{height:56px;min-height:56px;background:rgba(10,12,18,.8);backdrop-filter:blur(12px);border-bottom:1px solid var(--b);display:flex;align-items:center;justify-content:space-between;padding:0 24px;gap:16px;z-index:10}
#pt{font-size:15px;font-weight:700}
.tbr{display:flex;align-items:center;gap:12px}
.psel{background:var(--card2);border:1px solid var(--b2);color:var(--txt);padding:6px 12px;border-radius:8px;font-family:inherit;font-size:13px;outline:none;cursor:pointer}
.ckbox{display:flex;align-items:center;gap:8px;background:var(--card2);border:1px solid var(--b);padding:5px 12px;border-radius:8px}
.cktm{font-family:'JetBrains Mono';font-size:13px;font-weight:600;color:var(--grn)}
.ckdt{font-size:11px;color:var(--dim)}
.dot-live{width:7px;height:7px;border-radius:50%;background:var(--grn);box-shadow:0 0 6px var(--grn);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.85)}}
.content{flex:1;overflow-y:auto;padding:24px}

/* KPI */
.kg{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:18px}
.kg3{grid-template-columns:repeat(3,1fr)}
.kg5{grid-template-columns:repeat(5,1fr)}
.kg6{grid-template-columns:repeat(6,1fr)}
.kg2{grid-template-columns:repeat(2,1fr)}
.kc{background:var(--card);border:1px solid var(--b);border-radius:var(--r);padding:18px 16px;position:relative;overflow:hidden;transition:border-color .2s}
.kc:hover{border-color:var(--b2)}
.kc::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%}
.kcomm::before{background:var(--acc)}
.kwait::before{background:var(--amb)}
.kqual::before{background:var(--pur)}
.kmtg::before{background:var(--grn)}
.ktot::before{background:var(--cyn)}
.krdv::before{background:var(--red)}
.ktmc::before{background:var(--ora)}
.kalert::before{background:var(--red)}
.kl{font-size:10px;color:var(--dim);font-weight:600;text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px}
.kv{font-family:'JetBrains Mono';font-size:20px;font-weight:600;line-height:1.1}
.ks{font-size:11px;color:var(--dim);margin-top:5px;line-height:1.5}

/* CARD */
.card{background:var(--card);border:1px solid var(--b);border-radius:var(--r);padding:20px;margin-bottom:18px}
.ch{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px}
.ct{font-size:14px;font-weight:700}
.cs{font-size:12px;color:var(--dim);margin-top:2px}

/* PROGRESS */
.pb{height:7px;background:rgba(255,255,255,.05);border-radius:10px;overflow:hidden;margin-top:8px}
.pf{height:100%;border-radius:10px;transition:width .8s cubic-bezier(.22,1,.36,1)}
.pf.g{background:linear-gradient(90deg,var(--grn),#059669)}
.pf.a{background:linear-gradient(90deg,var(--amb),#d97706)}
.pf.r{background:linear-gradient(90deg,var(--red),#dc2626)}
.pf.b{background:linear-gradient(90deg,var(--acc),#7c3aed)}
.pf.o{background:linear-gradient(90deg,var(--ora),#ea580c)}

/* TABLE */
.tw{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{text-align:left;padding:9px 12px;color:var(--dim);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;border-bottom:1px solid var(--b);white-space:nowrap}
tbody td{padding:11px 12px;border-bottom:1px solid var(--b);font-family:'JetBrains Mono';font-size:12px}
tbody td.tn{font-family:'Inter';font-size:13px}
tbody td.tb{font-family:'Inter';font-size:13px;font-weight:700}
tbody tr:hover td{background:rgba(255,255,255,.015)}
tbody tr:last-child td{border-bottom:none}
tr.trtot td{background:rgba(79,126,248,.05);font-weight:700}
tr.alert-row td{background:rgba(239,68,68,.04)}

/* BADGE */
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.bg{background:var(--grnD);color:var(--grn)}
.ba{background:var(--ambD);color:var(--amb)}
.br{background:var(--redD);color:var(--red)}
.bb{background:var(--accD);color:var(--acc)}
.bp{background:var(--purD);color:var(--pur)}
.bc{background:var(--cynD);color:var(--cyn)}
.bo{background:var(--oraD);color:var(--ora)}

/* FORMS */
.fg{margin-bottom:14px}
.fl{display:block;font-size:11px;font-weight:700;color:var(--dim);margin-bottom:5px;text-transform:uppercase;letter-spacing:.6px}
.fc{width:100%;background:rgba(255,255,255,.04);border:1px solid var(--b2);padding:10px 12px;border-radius:9px;color:var(--txt);font-family:inherit;font-size:13px;outline:none;transition:border-color .2s}
.fc:focus{border-color:var(--acc);background:rgba(79,126,248,.06)}
select.fc{cursor:pointer}
select.fc option{background:#1a1f2b}
textarea.fc{resize:vertical;min-height:160px;font-family:'JetBrains Mono';font-size:11px;line-height:1.7}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:9px 16px;border-radius:8px;border:none;font-family:inherit;font-weight:600;font-size:13px;cursor:pointer;transition:all .18s;white-space:nowrap}
.btn:active{transform:scale(.97)}
.btnp{background:var(--acc);color:#fff;box-shadow:0 4px 16px var(--accG)}
.btnp:hover{background:#5a88ff}
.btng{background:rgba(255,255,255,.05);color:var(--txt);border:1px solid var(--b2)}
.btng:hover{background:rgba(255,255,255,.09)}
.btnd{background:var(--redD);color:var(--red);border:1px solid rgba(239,68,68,.2)}
.btnd:hover{background:rgba(239,68,68,.2)}
.bsm{padding:5px 11px;font-size:12px}
.bfw{width:100%}

/* GRIDS */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:18px}

/* REALTIME */
.rtp{background:var(--card2);border:1px solid var(--b2);border-radius:var(--r);padding:18px;margin-bottom:18px;position:relative;overflow:hidden}
.rtp::after{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at top right,rgba(79,126,248,.06) 0%,transparent 60%);pointer-events:none}
.rtg{display:grid;grid-template-columns:repeat(7,1fr);gap:10px}
.rti{background:var(--card);border:1px solid var(--b);border-radius:10px;padding:12px 10px;text-align:center}
.rtl{font-size:9px;color:var(--dim);font-weight:600;text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px}
.rtv{font-family:'JetBrains Mono';font-size:16px;font-weight:600}
.rts{font-size:9px;color:var(--mu);margin-top:3px;line-height:1.4}

/* AGENT ROW */
.agr{display:flex;align-items:center;gap:12px;padding:12px 16px;background:var(--card);border:1px solid var(--b);border-radius:10px;margin-bottom:8px;transition:border-color .2s;cursor:pointer}
.agr:hover{border-color:var(--b2)}
.agr.alert-row-bg{border-color:rgba(239,68,68,.25);background:rgba(239,68,68,.03)}
.agav{width:40px;height:40px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:#fff}
.agi{flex:1;min-width:0}
.agn{font-size:13px;font-weight:700}
.agid{font-size:11px;color:var(--dim);font-family:'JetBrains Mono'}
.agpg{flex:2;min-width:0}
.agpct{font-family:'JetBrains Mono';font-size:15px;font-weight:700;text-align:right;min-width:55px}
.aghr{font-size:11px;color:var(--dim);font-family:'JetBrains Mono';text-align:right;min-width:100px}

/* MTG */
.mtgi{display:flex;align-items:center;gap:10px;padding:9px 12px;background:var(--card2);border-radius:8px;margin-bottom:5px;font-size:12px}

/* CHECKLIST */
.agcl{display:flex;flex-direction:column;gap:5px;max-height:200px;overflow-y:auto;border:1px solid var(--b2);border-radius:9px;padding:8px}
.agci{display:flex;align-items:center;gap:10px;padding:7px 9px;border-radius:7px;cursor:pointer;transition:background .15s}
.agci:hover{background:rgba(255,255,255,.04)}
.agci input[type=checkbox]{width:15px;height:15px;accent-color:var(--acc);cursor:pointer;flex-shrink:0}
.agci label{cursor:pointer;font-size:13px;font-weight:500}

/* TOAST */
#toasts{position:fixed;bottom:20px;right:20px;z-index:99999;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{background:var(--card2);border:1px solid var(--b2);border-left:3px solid var(--acc);padding:10px 16px;border-radius:10px;font-size:13px;font-weight:500;box-shadow:0 8px 30px rgba(0,0,0,.5);animation:tIn .3s ease-out;pointer-events:all}
.toast.s{border-left-color:var(--grn)}
.toast.e{border-left-color:var(--red)}
.toast.i{border-left-color:var(--cyn)}
@keyframes tIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}

/* MODAL */
.mo-ov{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);z-index:9000;display:flex;align-items:center;justify-content:center}
.mo{background:var(--card);border:1px solid var(--b2);border-radius:16px;padding:28px;width:560px;max-width:95vw;max-height:90vh;overflow-y:auto;box-shadow:0 4px 24px rgba(0,0,0,.4);animation:moIn .25s ease-out}
.mot{font-size:17px;font-weight:700;margin-bottom:5px}
.mos{font-size:12px;color:var(--dim);margin-bottom:20px}
@keyframes moIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}

/* MISC */
.empty{text-align:center;padding:40px 20px;color:var(--dim);font-size:14px}
.ibox{background:var(--accD);border:1px solid rgba(79,126,248,.2);border-radius:9px;padding:12px 14px;font-size:12px;color:var(--dim);margin-bottom:14px;line-height:1.6}
.itip{background:var(--cynD);border:1px solid rgba(34,211,238,.2);border-radius:8px;padding:10px 14px;font-size:12px;color:var(--cyn);margin-bottom:14px;line-height:1.6}
.ifmt{background:rgba(0,0,0,.3);border-radius:8px;padding:10px 12px;font-family:'JetBrains Mono';font-size:11px;color:var(--dim);line-height:1.7;margin-bottom:14px;overflow-x:auto;white-space:pre}
.divider{height:1px;background:var(--b);margin:14px 0}
.fdrop{border:2px dashed var(--b2);border-radius:12px;padding:32px 20px;text-align:center;cursor:pointer;transition:all .2s;position:relative}
.fdrop:hover,.fdrop.over{border-color:var(--acc);background:var(--accD)}
.fdrop input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}

/* ALERT SCORE */
.alert-score{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700;background:var(--redD);color:var(--red);border:1px solid rgba(239,68,68,.3)}
.alert-score.medium{background:var(--ambD);color:var(--amb);border-color:rgba(245,158,11,.3)}

/* TREND */
.trend-up{color:var(--grn)}
.trend-dn{color:var(--red)}
.trend-eq{color:var(--dim)}
</style>
</head>
<body>
<div id="toasts"></div>

<!-- BANNER DERNIÈRE MISE À JOUR -->
<div id="upd-banner">
  <div class="upd-left">
    <div class="upd-dot"></div>
    <span>Dernière mise à jour des données :</span>
    <span class="upd-date" id="upd-date">Aucune donnée importée</span>
    <span class="upd-period" id="upd-period"></span>
  </div>
  <span style="font-size:11px;color:var(--mu)" id="upd-count"></span>
</div>

<!-- LOGIN -->
<div id="login-ov">
  <div class="lbox">
    <div class="llogo">
      <svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
    </div>
    <h1>ASP Connect PRO</h1>
    <p class="sub">Suivi du temps de travail &amp; performance</p>
    <input type="text" id="log-id" placeholder="Identifiant">
    <input type="password" id="log-pw" placeholder="Mot de passe" onkeydown="if(event.key==='Enter')Auth.login()">
    <button class="lbtn" onclick="Auth.login()">Se connecter</button>
    <div id="lerr" class="lerr">Identifiants incorrects.</div>
  </div>
</div>

<div class="app-body">
<!-- SIDEBAR -->
<aside class="sidebar">
  <div class="lg-area">
    <div class="lg-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg></div>
    <div><div class="lg-t">ASP Connect</div><div class="lg-s">PRO · v5</div></div>
  </div>

  <div id="nav-agent" style="display:none">
    <div class="ns">Mon espace</div>
    <button class="ni active" onclick="R.go('ag-dash',this)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>Tableau de bord</button>
    <button class="ni" onclick="R.go('ag-hist',this)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>Historique détaillé</button>
    <button class="ni" onclick="R.go('ag-stats',this)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>Mes statistiques</button>
    <button class="ni" onclick="R.go('ag-perf',this)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>Mes indicateurs clés</button>
  </div>

  <div id="nav-admin" style="display:none">
    <div class="ns">Supervision</div>
    <button class="ni active" onclick="R.go('ad-team',this)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87m-4-12a4 4 0 010 7.75"/></svg>Vue équipe</button>
    <button class="ni" onclick="R.go('ad-detail',this)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>Détail par agent</button>
    <button class="ni alert-nav" onclick="R.go('ad-alerts',this)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>Agents en alerte</button>

// ═══════════════════════════════════════════════
// UTILITAIRES
// ═══════════════════════════════════════════════
const U = {
  toSec(v){
    if(!v) return 0;
    const s=String(v).trim().replace(/"/g,'');
    if(!s.includes(':')) return parseFloat(s)*86400||parseInt(s)||0;
    const p=s.split(':').map(Number);
    if(p.length===3) return p[0]*3600+p[1]*60+p[2];
    if(p.length===2) return p[0]*60+p[1];
    return 0;
  },
  hms(s){
    s=Math.floor(s||0);
    return `${Math.floor(s/3600)}h${String(Math.floor((s%3600)/60)).padStart(2,'0')}`;
  },
  hmsFull(s){
    s=Math.floor(s||0);
    return `${String(Math.floor(s/3600)).padStart(2,'0')}:${String(Math.floor((s%3600)/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
  },
  secToMMSS(s){
    s=Math.floor(s||0);
    return `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
  },
  fmtDate(d){ return (d||'').split('-').reverse().join('/'); },
  today(){ return new Date().toISOString().split('T')[0]; },
  initials(n){ return (n||'?').trim().split(/\s+/).slice(0,2).map(w=>w[0]).join('').toUpperCase(); },
  pcolor(p){ return p>=90?'var(--grn)':p>=65?'var(--amb)':'var(--red)'; },
  pcls(p){ return p>=90?'g':p>=65?'a':'r'; },
  pbadge(p){ return p>=90?'bg':p>=65?'ba':'br'; },
  // TMC : temps moyen de communication par appel en secondes
  tmc(comm, calls){ return calls>0?Math.round(comm/calls):0; },
  // Calcul complet agent/période
  calc(agId, period){
    const recs=(DB.records[agId]||[]).filter(r=>r.period===period);
    let tC=0,tW=0,tQR=0,tQP=0,tM=0,tCalls=0,tSales=0;
    recs.forEach(r=>{
      tC+=(r.comm||0); tW+=(r.wait||0);
      tQR+=(r.qual||0); tQP+=Math.min(r.qual||0,QUAL_CAP);
      tM+=(r.mtg||0); tCalls+=(r.calls||0); tSales+=(r.sales||0);
    });
    const tot=tC+tW+tQP+tM, h=tot/3600;
    const cfg=DB.periods[period]||{goalH:132};
    const pct=Math.min(100,h/cfg.goalH*100);
    const rdvRate=tCalls>0?tSales/tCalls*100:0;
    const tmcSec=U.tmc(tC,tCalls);
    const qualRatio=tot>0?tQP/tot*100:0;
    return {tC,tW,tQR,tQP,tM,tCalls,tSales,tot,h,pct,goalH:cfg.goalH,recs,rdvRate,tmcSec,qualRatio};
  },
  // Calcul score alerte (0-100, plus élevé = plus en danger)
  alertScore(agId, period){
    const s=U.calc(agId,period);
    const peers=DB.agents.map(a=>U.calc(a.id,period));
    const avgCalls=peers.reduce((a,p)=>a+p.tCalls,0)/Math.max(1,peers.length);
    const avgTmc=peers.reduce((a,p)=>a+p.tmcSec,0)/Math.max(1,peers.length);
    const avgRdv=peers.reduce((a,p)=>a+p.rdvRate,0)/Math.max(1,peers.length);
    const avgQR=peers.reduce((a,p)=>a+p.qualRatio,0)/Math.max(1,peers.length);
    const avgH=peers.reduce((a,p)=>a+p.h,0)/Math.max(1,peers.length);
    let score=0;
    // Peu d'heures (-35 pts max)
    if(avgH>0) score+=Math.max(0,35*(1-s.h/avgH));
    // Peu d'appels (-25 pts max)
    if(avgCalls>0) score+=Math.max(0,25*(1-s.tCalls/avgCalls));
    // TMC faible (-20 pts max)
    if(avgTmc>0) score+=Math.max(0,20*(1-s.tmcSec/avgTmc));
    // Taux RDV faible (-15 pts max)
    if(avgRdv>0) score+=Math.max(0,15*(1-s.rdvRate/avgRdv));
    // Qualification élevée (+5 pts max)
    if(avgQR>0&&s.qualRatio>avgQR) score+=Math.min(5,(s.qualRatio-avgQR)/avgQR*5);
    return Math.round(Math.min(100,score));
  },
  parseVicidialLine(line){
    const sep=line.includes(';')?';':',';
    const cols=[]; let cur='',inQ=false;
    for(let i=0;i<line.length;i++){
      const c=line[i];
      if(c==='"'){inQ=!inQ;continue;}
      if(c===sep&&!inQ){cols.push(cur.trim());cur='';continue;}
      cur+=c;
    }
    cols.push(cur.trim());
    return cols;
  },
  parseVicidial(text){
    const lines=text.split('\n').filter(l=>l.trim());
    const results=[]; let curAgent=null;
    for(const line of lines){
      const cols=U.parseVicidialLine(line);
      if(cols.length<6) continue;
      const skip=['USER NAME','TOTALS','AGENT PERF','---','Agent Perform'].some(s=>line.toUpperCase().includes(s.toUpperCase()));
      if(skip) continue;
      const col0=cols[0],col1=cols[1],dateCol=cols[4]||'';
      const isDate=/^\d{4}-\d{2}-\d{2}$/.test(dateCol)||/^\d{2}\/\d{2}\/\d{4}$/.test(dateCol);
      if(col0&&col1&&!isDate&&col0.length>2){curAgent={id:col1.trim(),name:col0.trim()};continue;}
      if(!curAgent||!isDate) continue;
      let date=dateCol;
      if(date.includes('/')){const p=date.split('/');date=p[2]+'-'+p[1].padStart(2,'0')+'-'+p[0].padStart(2,'0');}
      const calls=parseInt(cols[5])||0,wait=U.toSec(cols[9]||'0'),comm=U.toSec(cols[11]||cols[6]||'0'),qual=U.toSec(cols[13]||'0');
      const trailing=cols.slice(14).map(x=>parseInt(x)||0);
      const sales=trailing.length?trailing[trailing.length-1]:0;
      results.push({agId:curAgent.id,agName:curAgent.name,date,comm,wait,qual,calls,sales});
    }
    return results;
  },
  updateBanner(){
    const li=DB.lastImport;
    if(li){
      document.getElementById('upd-date').textContent=U.fmtDate(li.date);
      document.getElementById('upd-date').className='upd-date';
      document.getElementById('upd-period').textContent=`— ${DB.periods[li.period]?.label||li.period}`;
      document.getElementById('upd-count').textContent=`${li.count||0} lignes · ${li.agents||0} agents`;
    } else {
      document.getElementById('upd-date').textContent='Aucune donnée importée';
      document.getElementById('upd-date').className='upd-date upd-none';
    }
  },
};

// ══ AGENT HISTORIQUE ════════════════════════════════════════════════
'ag-hist'(){
  const s=U.calc(Auth.cur.id,DB.period);
  const sorted=[...s.recs].sort((a,b)=>b.date.localeCompare(a.date));
  const rows=sorted.map(r=>{
    const qp=Math.min(r.qual,QUAL_CAP),ov=r.qual-qp,tot=r.comm+r.wait+qp+(r.mtg||0);
    const rate=r.calls>0?((r.sales/r.calls)*100).toFixed(1):'—';
    const tmc=U.secToMMSS(U.tmc(r.comm,r.calls||0));
    return `<tr><td class="tn">${U.fmtDate(r.date)}</td><td style="color:var(--acc)">${U.hms(r.comm)}</td><td style="color:var(--amb)">${U.hms(r.wait)}</td><td style="color:var(--pur)">${U.hms(qp)}${ov>0?`<br><span style="font-size:9px;color:var(--red)">+${U.hms(ov)} exclu</span>`:''}</td><td style="color:var(--grn)">${U.hms(r.mtg||0)}</td><td style="color:var(--cyn);font-weight:700">${U.hms(tot)}</td><td>${r.calls||0}</td><td style="color:var(--red);font-weight:700">${r.sales||0}</td><td>${rate!=='—'?rate+'%':'—'}</td><td style="color:var(--ora)">${tmc}</td></tr>`;

        <tbody>${rows||'<tr><td colspan="10" class="empty">Aucune donnée.</td></tr>'}
        ${sorted.length?`<tr class="trtot"><td class="tb">TOTAL</td><td style="color:var(--acc)">${U.hms(s.tC)}</td><td style="color:var(--amb)">${U.hms(s.tW)}</td><td style="color:var(--pur)">${U.hms(s.tQP)}</td><td style="color:var(--grn)">${U.hms(s.tM)}</td><td style="color:var(--cyn)">${U.hms(s.tot)}</td><td>${s.tCalls}</td><td style="color:var(--red)">${s.tSales}</td><td>${s.rdvRate.toFixed(1)}%</td><td style="color:var(--ora)">${U.secToMMSS(s.tmcSec)}</td></tr>`:''}
        </tbody>

    </div>`;
},

exportCSV(agId){
  const ag=DB.agents.find(a=>a.id===agId)||{name:agId};
  const s=U.calc(agId,DB.period);
  let csv='Date;Communication;Attente;Qualification payée;Réunions;Total;Appels;RDV;Taux RDV;TMC (sec)\n';
  [...s.recs].sort((a,b)=>a.date.localeCompare(b.date)).forEach(r=>{
    const qp=Math.min(r.qual,QUAL_CAP),tot=r.comm+r.wait+qp+(r.mtg||0);
    csv+=`${r.date};${U.hms(r.comm)};${U.hms(r.wait)};${U.hms(qp)};${U.hms(r.mtg||0)};${U.hms(tot)};${r.calls||0};${r.sales||0};${r.calls>0?((r.sales/r.calls)*100).toFixed(1)+'%':'0%'};${U.tmc(r.comm,r.calls||0)}\n`;
  });
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'}));
  a.download=`Rapport_${ag.name.replace(/ /g,'_')}_${DB.period}.csv`;
  a.click(); App.toast('Export CSV téléchargé','s');
},

      }).join('')}

      <div class="card"><div class="ct" style="margin-bottom:16px">Évolution taux RDV équipe (moy. journalière)</div><div style="height:220px"><canvas id="ch-team-rdv"></canvas></div></div>
      <div class="card"><div class="ct" style="margin-bottom:16px">TMC moyen équipe par agent</div><div style="height:220px"><canvas id="ch-team-tmc"></canvas></div></div>
    </div>
    <div class="g2">
      <div class="card"><div class="ct" style="margin-bottom:16px">Heures par type — équipe</div><div style="height:220px"><canvas id="ch-team-h"></canvas></div></div>
      <div class="card"><div class="ct" style="margin-bottom:16px">Progression % — classement</div><div style="height:220px"><canvas id="ch-team-p"></canvas></div></div>
    </div>`;
  V._openDetail=(agId)=>{R.go('ad-detail');setTimeout(()=>{const sel=document.getElementById('det-sel');if(sel){sel.value=agId;document.getElementById('det-body').innerHTML=V._rdr(agId);}},50);};
  requestAnimationFrame(()=>{
    // TMC par agent
    const sorted2=[...rows].sort((a,b)=>b.s.tmcSec-a.s.tmcSec);
    destroyChart('ch-team-tmc');
    const tmcEl=document.getElementById('ch-team-tmc');
    if(tmcEl) new Chart(tmcEl,{type:'bar',data:{labels:sorted2.map(r=>r.ag.name.split(' ')[0]),datasets:[{label:'TMC (sec)',data:sorted2.map(r=>r.s.tmcSec),backgroundColor:sorted2.map(r=>r.s.tmcSec>=avgTmc?'rgba(249,115,22,.7)':'rgba(239,68,68,.5)'),borderRadius:4}]},options:{...CHART_OPTS,indexAxis:'y',scales:{x:{ticks:{color:'#7a8394',callback:v=>{const m=Math.floor(v/60),s=Math.floor(v%60);return`${m}:${String(s).padStart(2,'0')}`;},grid:{color:'rgba(255,255,255,.04)'}},y:{ticks:{color:'#7a8394'},grid:{display:false}}}}});
    // Taux RDV evolution (moy équipe par jour)
    const allDates=[...new Set(rows.flatMap(r=>r.s.recs.map(x=>x.date)))].sort();
    const teamRdvByDay=allDates.map(d=>{
      let c=0,s=0;
      rows.forEach(r=>{const rec=r.s.recs.find(x=>x.date===d);if(rec){c+=rec.calls||0;s+=rec.sales||0;}});
      return c>0?parseFloat((s/c*100).toFixed(2)):null;
    });
    destroyChart('ch-team-rdv');
    const rdvEl=document.getElementById('ch-team-rdv');
    if(rdvEl) new Chart(rdvEl,{type:'line',data:{labels:allDates.map(d=>U.fmtDate(d)),datasets:[{label:'Taux RDV équipe %',data:teamRdvByDay,borderColor:'#ef4444',backgroundColor:'rgba(239,68,68,.08)',fill:true,tension:.4,pointRadius:3,spanGaps:true}]},options:{...CHART_OPTS,scales:{x:{ticks:{color:'#7a8394',font:{size:9},maxRotation:45},grid:{display:false}},y:{ticks:{color:'#7a8394',callback:v=>v+'%'},grid:{color:'rgba(255,255,255,.04)'}}}}});
    // Heures par type
    destroyChart('ch-team-h');
    const hEl=document.getElementById('ch-team-h');
    if(hEl) new Chart(hEl,{type:'bar',data:{labels:rows.map(r=>r.ag.name.split(' ')[0]),datasets:[{label:'Comm.',data:rows.map(r=>r.s.tC/3600),backgroundColor:'#4f7ef8',stack:'a'},{label:'Attente',data:rows.map(r=>r.s.tW/3600),backgroundColor:'#f59e0b',stack:'a'},{label:'Qual.',data:rows.map(r=>r.s.tQP/3600),backgroundColor:'#a78bfa',stack:'a'},{label:'Réunions',data:rows.map(r=>r.s.tM/3600),backgroundColor:'#10b981',stack:'a'}]},options:{...CHART_OPTS,scales:{x:{stacked:true,ticks:{color:'#7a8394'},grid:{display:false}},y:{stacked:true,ticks:{color:'#7a8394'},grid:{color:'rgba(255,255,255,.04)'},title:{display:true,text:'Heures',color:'#7a8394'}}}}});
    // Progression %
    const sortedPct=[...rows].sort((a,b)=>b.s.pct-a.s.pct);
    destroyChart('ch-team-p');
    const pEl=document.getElementById('ch-team-p');
    if(pEl) new Chart(pEl,{type:'bar',data:{labels:sortedPct.map(r=>r.ag.name.split(' ')[0]),datasets:[{label:'Progression %',data:sortedPct.map(r=>parseFloat(r.s.pct.toFixed(1))),backgroundColor:sortedPct.map(r=>r.s.pct>=90?'rgba(16,185,129,.7)':r.s.pct>=65?'rgba(245,158,11,.7)':'rgba(239,68,68,.6)'),borderRadius:4}]},options:{...CHART_OPTS,scales:{x:{ticks:{color:'#7a8394'},grid:{display:false}},y:{ticks:{color:'#7a8394',callback:v=>v+'%'},grid:{color:'rgba(255,255,255,.04)'},max:100}}}});
  });
},

exportTeam(){
  let csv='Agent;ID Vicidial;Communication;Attente;Qualification;Réunions;Total;Progression;Appels;RDV;Taux RDV;TMC (sec)\n';
  DB.agents.forEach(ag=>{const s=U.calc(ag.id,DB.period);csv+=`${ag.name};${ag.viciId||ag.id};${U.hms(s.tC)};${U.hms(s.tW)};${U.hms(s.tQP)};${U.hms(s.tM)};${U.hms(s.tot)};${s.pct.toFixed(1)}%;${s.tCalls};${s.tSales};${s.rdvRate.toFixed(1)}%;${s.tmcSec}\n`;});
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob(['\uFEFF'+csv],{type:'text/csv'}));a.download=`Equipe_${DB.period}.csv`;a.click();
  App.toast('Export équipe téléchargé','s');
},

// ══ ADMIN DÉTAIL AGENT ══════════════════════════════════════════════
'ad-detail'(){

    const s=U.calc(agId,DB.period);
    const sorted=[...s.recs].sort((a,b)=>b.date.localeCompare(a.date));
    const rows=sorted.map(r=>{
      const qp=Math.min(r.qual,QUAL_CAP),ov=r.qual-qp,tot=r.comm+r.wait+qp+(r.mtg||0);

      return `<tr><td class="tn">${U.fmtDate(r.date)}</td><td style="color:var(--acc)">${U.hms(r.comm)}</td><td style="color:var(--amb)">${U.hms(r.wait)}</td><td style="color:var(--pur)">${U.hms(qp)}${ov>0?`<br><span style="color:var(--red);font-size:9px">+${U.hms(ov)}</span>`:''}</td><td style="color:var(--grn)">${U.hms(r.mtg||0)}</td><td style="color:var(--cyn);font-weight:700">${U.hms(tot)}</td><td>${r.calls||0}</td><td style="color:var(--red)">${r.sales||0}</td><td>${rate!=='—'?rate+'%':'—'}</td><td style="color:var(--ora)">${tmc}</td><td><button class="btn btnd bsm" onclick="V.delRec('${agId}','${r.date}')">✕</button></td></tr>`;
    }).join('');
    return `
      <div class="kg kg6" style="margin-bottom:14px">
        <div class="kc kcomm"><div class="kl">Communication</div><div class="kv" style="color:var(--acc)">${U.hms(s.tC)}</div></div>
        <div class="kc kwait"><div class="kl">Attente</div><div class="kv" style="color:var(--amb)">${U.hms(s.tW)}</div></div>
        <div class="kc kqual"><div class="kl">Qualification</div><div class="kv" style="color:var(--pur)">${U.hms(s.tQP)}</div><div class="ks">Réel: ${U.hms(s.tQR)}</div></div>
        <div class="kc kmtg"><div class="kl">Réunions</div><div class="kv" style="color:var(--grn)">${U.hms(s.tM)}</div></div>
        <div class="kc krdv"><div class="kl">Taux RDV</div><div class="kv" style="color:var(--red)">${s.rdvRate.toFixed(1)}%</div><div class="ks">${s.tSales} RDV / ${s.tCalls} appels</div></div>
        <div class="kc ktmc"><div class="kl">TMC moy.</div><div class="kv" style="color:var(--ora)">${U.secToMMSS(s.tmcSec)}</div><div class="ks">min:sec / appel</div></div>
      </div>
      <div class="card">
        <div class="ch">
          <div class="ct">Relevé journalier</div>
          <div style="display:flex;gap:8px"><span class="badge bc">${U.hms(s.tot)} · ${s.pct.toFixed(1)}%</span><button class="btn btng bsm" onclick="V.exportCSV('${agId}')">⬇ CSV</button></div>
        </div>
        <div class="tw"><table>
          <thead><tr><th>Date</th><th style="color:var(--acc)">Comm.</th><th style="color:var(--amb)">Attente</th><th style="color:var(--pur)">Qual.</th><th style="color:var(--grn)">Réunions</th><th style="color:var(--cyn)">Total</th><th>Appels</th><th style="color:var(--red)">RDV</th><th>Taux</th><th style="color:var(--ora)">TMC</th><th></th></tr></thead>
          <tbody>${rows||'<tr><td colspan="11" class="empty">Aucune donnée.</td></tr>'}</tbody>
        </table></div>
      </div>`;
  };
  document.getElementById('view').innerHTML=`
    <div class="card" style="margin-bottom:14px">
      <select class="fc" id="det-sel" onchange="document.getElementById('det-body').innerHTML=V._rdr(this.value)">${opts}</select>
    </div>
    <div id="det-body">${render(def)}</div>`;

},

delRec(agId,date){
  if(!confirm(`Supprimer la ligne du ${U.fmtDate(date)} ?`)) return;
  DB.records[agId]=(DB.records[agId]||[]).filter(r=>!(r.date===date&&r.period===DB.period));
  save(); App.toast('Ligne supprimée','i');
  const sel=document.getElementById('det-sel');
  if(sel) document.getElementById('det-body').innerHTML=V._rdr(agId);
},

// ══ ADMIN AGENTS EN ALERTE ══════════════════════════════════════════
'ad-alerts'(){
  const scored=DB.agents.map(ag=>{
    const s=U.calc(ag.id,DB.period);
    const sc=U.alertScore(ag.id,DB.period);
    return {ag,s,sc};
  }).filter(x=>x.sc>=30).sort((a,b)=>b.sc-a.sc);
  const cfg=DB.periods[DB.period]||{};
  const peers=DB.agents.map(a=>U.calc(a.id,DB.period));
  const avgH=peers.reduce((a,p)=>a+p.h,0)/Math.max(1,peers.length);
  const avgCalls=peers.reduce((a,p)=>a+p.tCalls,0)/Math.max(1,peers.length);
  const avgTmc=peers.reduce((a,p)=>a+p.tmcSec,0)/Math.max(1,peers.length);
  const avgRdv=peers.reduce((a,p)=>a+p.rdvRate,0)/Math.max(1,peers.length);
  const avgQR=peers.reduce((a,p)=>a+p.qualRatio,0)/Math.max(1,peers.length);
  document.getElementById('view').innerHTML=`
    <div class="ibox" style="background:var(--redD);border-color:rgba(239,68,68,.2);color:var(--red)">
      <strong>Algorithme de détection</strong> — Score 0-100 basé sur : heures travaillées, nb d'appels, TMC, taux RDV, % qualification. Score ≥ 45 = alerte rouge. Score 30-44 = alerte modérée.
      <br><span style="color:var(--dim)">Moyennes équipe : ${U.hms(avgH*3600)}/mois · ${Math.round(avgCalls)} appels · TMC ${U.secToMMSS(Math.round(avgTmc))} · Taux RDV ${avgRdv.toFixed(1)}% · Qual. ${avgQR.toFixed(0)}%</span>
    </div>
    ${!scored.length?`<div class="card"><div class="empty">✓ Aucun agent en situation d'alerte sur ${cfg.label||DB.period}</div></div>`:`
    <div class="card">
      <div class="ch"><div class="ct">Agents en alerte — ${cfg.label||DB.period}</div><span class="badge br">${scored.length} agent(s)</span></div>
      ${scored.map(({ag,s,sc})=>{
        const issues=[];
        if(s.h<avgH*.75) issues.push(`<span class="badge br" style="font-size:9px">⏱ Peu d'heures ${U.hms(s.h*3600)} vs moy. ${U.hms(avgH*3600)}</span>`);
        if(s.tCalls<avgCalls*.7) issues.push(`<span class="badge br" style="font-size:9px">📞 Peu d'appels ${s.tCalls} vs moy. ${Math.round(avgCalls)}</span>`);
        if(s.tmcSec<avgTmc*.7) issues.push(`<span class="badge br" style="font-size:9px">⏱ TMC faible ${U.secToMMSS(s.tmcSec)} vs moy. ${U.secToMMSS(Math.round(avgTmc))}</span>`);
        if(s.rdvRate<avgRdv*.7) issues.push(`<span class="badge br" style="font-size:9px">📋 RDV faible ${s.rdvRate.toFixed(1)}% vs moy. ${avgRdv.toFixed(1)}%</span>`);
        if(s.qualRatio>avgQR*1.3) issues.push(`<span class="badge ba" style="font-size:9px">⚠ Qual. élevée ${s.qualRatio.toFixed(0)}% vs moy. ${avgQR.toFixed(0)}%</span>`);
        return `<div class="agr alert-row-bg" style="flex-wrap:wrap;gap:10px">
          <div class="agav" style="background:${ag.color||'#4f7ef8'}">${U.initials(ag.name)}</div>
          <div class="agi"><div class="agn">${ag.name}</div><div class="agid">${ag.viciId||ag.id}</div></div>
          <div style="display:flex;gap:6px;flex-wrap:wrap;flex:2">${issues.join('')}</div>
          <div class="alert-score ${sc<65?'medium':''}" style="font-size:13px;padding:6px 14px">${sc}/100</div>
          <div style="text-align:right;min-width:90px;font-size:11px">
            <div style="color:var(--cyn)">${U.hms(s.tot)} · ${s.pct.toFixed(1)}%</div>
            <div style="color:var(--ora)">TMC ${U.secToMMSS(s.tmcSec)}</div>
          </div>
        </div>`;
      }).join('')}
    </div>`}
    <div class="card">
      <div class="ch"><div class="ct">Radar de performance équipe</div></div>
      <div style="height:300px"><canvas id="ch-radar"></canvas></div>
    </div>`;
  requestAnimationFrame(()=>{
    destroyChart('ch-radar');
    const rc=document.getElementById('ch-radar');
    if(!rc) return;
    const top=DB.agents.slice(0,6);
    new Chart(rc,{type:'radar',data:{labels:['Heures','Appels','TMC','Taux RDV','Qual. OK'],datasets:top.map((ag,i)=>{
      const s=U.calc(ag.id,DB.period);
      return {label:ag.name.split(' ')[0],data:[
        Math.min(100,s.h/Math.max(1,avgH)*100),
        Math.min(100,s.tCalls/Math.max(1,avgCalls)*100),
        Math.min(100,s.tmcSec/Math.max(1,avgTmc)*100),
        Math.min(100,s.rdvRate/Math.max(1,avgRdv)*100),
        Math.min(100,Math.max(0,100-(s.qualRatio/Math.max(1,avgQR)-1)*50)),
      ],borderColor:ag.color||COLORS[i],backgroundColor:(ag.color||COLORS[i])+'28',pointRadius:4,borderWidth:2};
    })},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#7a8394',font:{size:10}}}},scales:{r:{ticks:{color:'#7a8394',font:{size:9},backdropColor:'transparent'},grid:{color:'rgba(255,255,255,.08)'},pointLabels:{color:'#7a8394',font:{size:11}},min:0,max:100}}}});
  });
},

handleFile(file){
  if(!file) return;
  document.getElementById('imp-st').textContent=`Lecture de ${file.name}…`;
  const reader=new FileReader();
  reader.onload=e=>V._processImport(e.target.result,file.name);
  reader.readAsText(file,'UTF-8');
},

doImportText(){
  const raw=document.getElementById('imp-raw')?.value||'';
  if(!raw.trim()) return App.toast('Aucune donnée','e');
  V._processImport(raw,'saisie manuelle');
},

_processImport(text,src){
  const entries=U.parseVicidial(text);
  if(!entries.length){App.toast('Aucune ligne détectée','e');return;}
  let added=0,updated=0;
  // Trouver la date la plus récente pour le banner
  let latestDate='';
  entries.forEach(e=>{
    const{agId,agName,date,comm,wait,qual,calls,sales}=e;
    if(date>latestDate) latestDate=date;
    // Auto-register: cherche par ID Vicidial ou ID interne
    let ag=DB.agents.find(a=>a.viciId===agId||a.id===agId);
    if(!ag){
      ag={id:agId,viciId:agId,name:agName,pw:'0000',color:COLORS[DB.agents.length%COLORS.length],salBase:0,salType:'AE',hpd:6};
      DB.agents.push(ag);
    }
    if(!DB.records[ag.id]) DB.records[ag.id]=[];
    const ex=DB.records[ag.id].find(r=>r.date===date&&r.period===DB.period);
    const entry={period:DB.period,date,comm,wait,qual,calls,sales,mtg:ex?.mtg||0};
    if(ex){Object.assign(ex,entry);updated++;}else{DB.records[ag.id].push(entry);added++;}
  });
  // Mise à jour banner
  DB.lastImport={date:latestDate||U.today(),period:DB.period,count:added+updated,agents:new Set(entries.map(e=>e.agId)).size};
  save();
  U.updateBanner();
  const preview=entries.slice(0,12);
  const dst=document.getElementById('imp-st');
  if(dst) dst.textContent=`Source : "${src}"`;
  document.getElementById('imp-res').innerHTML=`<div class="card">
    <div class="ch"><div class="ct">Résultat</div><div style="display:flex;gap:8px"><span class="badge bg">✓ ${added} nouvelles</span><span class="badge bb">↺ ${updated} mises à jour</span><span class="badge bp">${new Set(entries.map(e=>e.agId)).size} agents</span></div></div>
    <div class="tw"><table><thead><tr><th>Agent</th><th>Date</th><th style="color:var(--acc)">Comm.</th><th style="color:var(--amb)">Attente</th><th style="color:var(--pur)">Qual. (cap)</th><th>Appels</th><th style="color:var(--red)">RDV</th><th style="color:var(--ora)">TMC</th></tr></thead><tbody>
    ${preview.map(p=>`<tr><td class="tn">${p.agName}</td><td class="tn">${U.fmtDate(p.date)}</td><td style="color:var(--acc)">${U.hms(p.comm)}</td><td style="color:var(--amb)">${U.hms(p.wait)}</td><td style="color:var(--pur)">${U.hms(Math.min(p.qual,QUAL_CAP))}${p.qual>QUAL_CAP?`<span style="color:var(--red);font-size:9px"> +${U.hms(p.qual-QUAL_CAP)}</span>`:''}</td><td>${p.calls}</td><td style="color:var(--red)">${p.sales}</td><td style="color:var(--ora)">${U.secToMMSS(U.tmc(p.comm,p.calls))}</td></tr>`).join('')}
    ${entries.length>12?`<tr><td colspan="8" style="text-align:center;color:var(--dim);padding:8px">… et ${entries.length-12} autres lignes</td></tr>`:''}
    </tbody></table></div>
  </div>`;
  App.toast(`${added+updated} lignes importées`,'s');
},

// ══ ADMIN RÉUNIONS ══════════════════════════════════════════════════
'ad-mtg'(){
  const logs=DB.mtg_log.filter(m=>m.period===DB.period).sort((a,b)=>b.date.localeCompare(a.date));
  const tp={coaching:'Coaching',reunion:'Réunion équipe',decorticage:'Décorticage',formation:'Formation'};
  const cl=DB.agents.map(ag=>`<div class="agci"><input type="checkbox" id="chk-${ag.id}" value="${ag.id}"><div class="av" style="background:${ag.color||'#4f7ef8'};width:26px;height:26px;font-size:10px">${U.initials(ag.name)}</div><label for="chk-${ag.id}">${ag.name}</label></div>`).join('');
  document.getElementById('view').innerHTML=`
    <div class="g2">
      <div class="card">
        <div class="ct" style="margin-bottom:18px">Saisir un temps</div>
        <div class="fg"><label class="fl">Agents (sélection multiple)</label>
          <div class="agcl" id="agcl">${cl}</div>
          <div style="display:flex;gap:8px;margin-top:7px">
            <button class="btn btng bsm" onclick="document.querySelectorAll('#agcl input').forEach(c=>c.checked=true)">Tout</button>
            <button class="btn btng bsm" onclick="document.querySelectorAll('#agcl input').forEach(c=>c.checked=false)">Aucun</button>
          </div>
        </div>
        <div class="fg"><label class="fl">Date</label><input type="date" class="fc" id="m-dt" value="${U.today()}"></div>
        <div class="fg"><label class="fl">Durée (minutes)</label><input type="number" class="fc" id="m-dur" placeholder="Ex : 30" min="1" max="480"></div>
        <div class="fg"><label class="fl">Type</label><select class="fc" id="m-type"><option value="coaching">Coaching</option><option value="reunion">Réunion équipe</option><option value="decorticage">Décorticage appels</option><option value="formation">Formation</option></select></div>
        <div class="fg"><label class="fl">Note (optionnel)</label><input type="text" class="fc" id="m-note" placeholder="Ex : Débriefing résultats"></div>
        <button class="btn btnp bfw" onclick="V.saveMtg()">Enregistrer le temps</button>
      </div>
      <div class="card">
        <div class="ch"><div class="ct">Historique — ${DB.periods[DB.period]?.label}</div><span class="badge bg">${logs.length} entrées</span></div>
        <div style="max-height:520px;overflow-y:auto">
          ${!logs.length?'<div class="empty">Aucune réunion ce mois.</div>':logs.map(m=>{
            const ag=DB.agents.find(a=>a.id===m.agId);
            return `<div class="mtgi"><div class="av" style="background:${ag?.color||'#4f7ef8'};width:26px;height:26px;font-size:10px">${U.initials(ag?.name||m.agId)}</div><span style="flex:1;font-weight:600;font-size:12px">${ag?.name||m.agId}</span><span class="badge bp" style="font-size:9px">${tp[m.type]||m.type}</span><span style="color:var(--dim);font-family:'JetBrains Mono';font-size:11px">${U.fmtDate(m.date)}</span><span style="color:var(--grn);font-family:'JetBrains Mono';font-weight:700">+${m.durMin}min</span>${m.note?`<span style="font-size:10px;color:var(--mu)">${m.note}</span>`:''}<button class="btn btnd bsm" style="padding:2px 7px;font-size:11px" onclick="V.delMtg('${m.agId}','${m.date}',${m.durMin},'${m.type}')">✕</button></div>`;
          }).join('')}
        </div>
      </div>
    </div>`;
},

saveMtg(){
  const sel=[...document.querySelectorAll('#agcl input:checked')].map(c=>c.value);
  const date=document.getElementById('m-dt').value;
  const dur=parseInt(document.getElementById('m-dur').value);
  const type=document.getElementById('m-type').value,note=document.getElementById('m-note').value;
  if(!sel.length) return App.toast('Sélectionnez au moins un agent','e');
  if(!date||isNaN(dur)||dur<=0) return App.toast('Date et durée requises','e');
  sel.forEach(agId=>{
    DB.mtg_log.push({agId,date,period:DB.period,durMin:dur,type,note});
    if(!DB.records[agId]) DB.records[agId]=[];
    const day=DB.records[agId].find(r=>r.date===date&&r.period===DB.period);
    if(day) day.mtg=(day.mtg||0)+dur*60;
    else DB.records[agId].push({period:DB.period,date,comm:0,wait:0,qual:0,calls:0,sales:0,mtg:dur*60});
  });
  save(); App.toast(`Temps ajouté à ${sel.length} agent(s)`,'s'); R.go('ad-mtg');
},

delMtg(agId,date,dur,type){
  if(!confirm('Supprimer cette entrée ?')) return;
  const i=DB.mtg_log.findIndex(m=>m.agId===agId&&m.date===date&&m.durMin===dur&&m.type===type);
  if(i>-1) DB.mtg_log.splice(i,1);
  const day=(DB.records[agId]||[]).find(r=>r.date===date&&r.period===DB.period);
  if(day) day.mtg=Math.max(0,(day.mtg||0)-dur*60);
  save(); App.toast('Entrée supprimée','i'); R.go('ad-mtg');
},

// ══ ADMIN GESTION AGENTS ════════════════════════════════════════════
'ad-agents'(){
  // Trié par heures travaillées (desc)
  const sorted=[...DB.agents].map(ag=>({ag,s:U.calc(ag.id,DB.period)})).sort((a,b)=>b.s.h-a.s.h);
  document.getElementById('view').innerHTML=`
    <div class="ibox">Les agents sont créés automatiquement à l'import Vicidial. Ici vous gérez les profils : mot de passe, rémunération, accord horaire. Triés par heures travaillées ce mois.</div>
    <div class="card">
      <div class="ch"><div class="ct">Agents (${DB.agents.length})</div></div>
      <div class="tw"><table>
        <thead><tr><th>Nom</th><th>ID Vicidial</th><th>MDP</th><th>Rémunération (MAD)</th><th>Type contrat</th><th>Accord H/jour</th><th>Heures mois</th><th>Actions</th></tr></thead>
        <tbody>
          ${sorted.map(({ag,s})=>`<tr>
            <td><div style="display:flex;align-items:center;gap:8px"><div class="agav" style="background:${ag.color||'#4f7ef8'};width:30px;height:30px;font-size:10px">${U.initials(ag.name)}</div><span class="tb">${ag.name}</span></div></td>
            <td style="font-family:'JetBrains Mono';font-size:11px;color:var(--dim)">${ag.viciId||ag.id}</td>
            <td><span class="badge bb">${ag.pw}</span></td>
            <td style="color:var(--grn);font-family:'JetBrains Mono'">${ag.salBase?ag.salBase.toLocaleString('fr-FR')+' MAD':'—'}</td>
            <td><span class="badge ${ag.salType==='SALARIE'?'bc':'bp'}">${ag.salType||'AE'}</span></td>
            <td style="text-align:center">${ag.hpd||6}h</td>
            <td style="color:var(--cyn);font-family:'JetBrains Mono'">${U.hms(s.tot)}</td>
            <td><button class="btn btng bsm" onclick="V.openEdit('${ag.id}')">Modifier</button></td>
          </tr>`).join('')}
        </tbody>
      </table></div>
    </div>`;
},

openEdit(id){
  const ag=DB.agents.find(a=>a.id===id);if(!ag) return;
  const s=U.calc(id,DB.period);
  const salEarned=ag.salBase&&s.pct>0?Math.round(ag.salBase*(s.pct/100)):0;
  const o=document.createElement('div');o.className='mo-ov';
  o.innerHTML=`<div class="mo">
    <div class="mot">${ag.name}</div>
    <div class="mos">ID Vicidial : ${ag.viciId||ag.id} · ${U.hms(s.tot)} ce mois (${s.pct.toFixed(1)}%)</div>
    ${salEarned?`<div style="background:var(--grnD);border:1px solid rgba(16,185,129,.2);border-radius:8px;padding:10px 14px;font-size:13px;color:var(--grn);margin-bottom:14px">Rémunération estimée ce mois : <strong>${salEarned.toLocaleString('fr-FR')} MAD</strong></div>`:''}
    <div class="g2">
      <div class="fg"><label class="fl">Mot de passe</label><input class="fc" id="me-pw" value="${ag.pw}"></div>
      <div class="fg"><label class="fl">Couleur avatar</label><select class="fc" id="me-col">${COLORS.map((c,i)=>`<option value="${c}" ${ag.color===c?'selected':''} style="background:${c}">${['Bleu','Vert','Orange','Violet','Cyan','Rouge','Orange vif','Rose','Turquoise','Lime','Indigo','Teal'][i]||c}</option>`).join('')}</select></div>
    </div>
    <div class="g2">
      <div class="fg"><label class="fl">Rémunération base (MAD)</label><input type="number" class="fc" id="me-sal" value="${ag.salBase||''}" placeholder="Ex: 5000"></div>
      <div class="fg"><label class="fl">Type contrat</label><select class="fc" id="me-type"><option value="AE" ${ag.salType!=='SALARIE'?'selected':''}>Auto-entrepreneur</option><option value="SALARIE" ${ag.salType==='SALARIE'?'selected':''}>Salarié</option></select></div>
    </div>
    <div class="fg"><label class="fl">Accord horaire (h/jour)</label>
      <select class="fc" id="me-hpd">${HPD_OPTIONS.map(h=>`<option value="${h}" ${(ag.hpd||6)===h?'selected':''}>${h}h / jour (objectif mensuel : ${h*(DB.periods[DB.period]?.days||22)}h)</option>`).join('')}</select>
    </div>
    <div class="divider"></div>
    <div style="display:flex;gap:10px">
      <button class="btn btng" style="flex:1" onclick="this.closest('.mo-ov').remove()">Annuler</button>
      <button class="btn btnp" style="flex:1" onclick="V.confirmEdit('${id}')">Enregistrer</button>
    </div>
  </div>`;
  document.body.appendChild(o);
},

confirmEdit(id){
  const ag=DB.agents.find(a=>a.id===id);if(!ag) return;
  ag.pw=document.getElementById('me-pw')?.value.trim()||ag.pw;
  ag.color=document.getElementById('me-col')?.value||ag.color;
  ag.salBase=parseFloat(document.getElementById('me-sal')?.value)||ag.salBase||0;
  ag.salType=document.getElementById('me-type')?.value||ag.salType||'AE';
  ag.hpd=parseInt(document.getElementById('me-hpd')?.value)||ag.hpd||6;
  // Recalcule objectif si hpd changé
  save(); document.querySelector('.mo-ov')?.remove();
  App.toast('Profil agent mis à jour','s'); R.go('ad-agents');
},

// ══ ADMIN PÉRIODES ══════════════════════════════════════════════════
'ad-periodes'(){
  const renderTable=()=>{
    const rows=Object.entries(DB.periods).map(([k,p])=>`<tr>
      <td class="tb">${p.label}</td>
      <td style="font-family:'JetBrains Mono'">${k}</td>
      <td style="color:var(--cyn);font-weight:700">${p.goalH}h</td>
      <td>${p.days} jours</td>
      <td>${p.hpd||6}h/jour</td>
      <td><div style="display:flex;gap:6px"><button class="btn btng bsm" onclick="V.openEditPer('${k}')">Modifier</button><button class="btn btnd bsm" onclick="V.delPer('${k}')">Supprimer</button></div></td>
    </tr>`).join('');
    const agProg=Object.entries(DB.periods).map(([k,p])=>`<tr><td class="tb">${p.label}</td>${DB.agents.map(ag=>{const s=U.calc(ag.id,k);return`<td><span class="badge ${U.pbadge(s.pct)}">${s.pct.toFixed(0)}%</span></td>`;}).join('')}</tr>`).join('');
    return `<div class="card"><div class="ch"><div class="ct">Périodes</div><button class="btn btnp bsm" onclick="V.openAddPer()">+ Ajouter</button></div>
      <div class="tw"><table><thead><tr><th>Période</th><th>Code</th><th>Objectif</th><th>Jours</th><th>H/jour</th><th>Actions</th></tr></thead><tbody>${rows}</tbody></table></div>
    </div>
    <div class="card"><div class="ch"><div class="ct">Avancement par période</div></div>
      <div class="tw"><table><thead><tr><th>Période</th>${DB.agents.map(ag=>`<th style="color:${ag.color||'var(--acc)'}">${ag.name.split(' ')[0]}</th>`).join('')}</tr></thead><tbody>${agProg}</tbody></table></div>
    </div>`;
  };
  document.getElementById('view').innerHTML=`<div id="per-body">${renderTable()}</div>`;
  V._renderPer=renderTable;
},

openAddPer(){
  const o=document.createElement('div');o.className='mo-ov';
  o.innerHTML=`<div class="mo"><div class="mot">Nouvelle période</div>
    <div class="g2"><div class="fg"><label class="fl">Code</label><input class="fc" id="pp-k" placeholder="2026-07"></div><div class="fg"><label class="fl">Label</label><input class="fc" id="pp-l" placeholder="Juillet 2026"></div></div>
    <div class="g2"><div class="fg"><label class="fl">Objectif heures</label><input type="number" class="fc" id="pp-h" placeholder="132"></div><div class="fg"><label class="fl">Jours ouvrés</label><input type="number" class="fc" id="pp-d" placeholder="22"></div></div>
    <div class="fg"><label class="fl">H/jour accord</label><input type="number" class="fc" id="pp-hd" value="6" placeholder="6"></div>
    <div style="display:flex;gap:10px;margin-top:8px"><button class="btn btng" style="flex:1" onclick="this.closest('.mo-ov').remove()">Annuler</button><button class="btn btnp" style="flex:1" onclick="V.confirmAddPer()">Créer</button></div>
  </div>`;
  document.body.appendChild(o);
},

confirmAddPer(){
  const k=document.getElementById('pp-k')?.value.trim(),l=document.getElementById('pp-l')?.value.trim();
  const h=parseFloat(document.getElementById('pp-h')?.value),d=parseInt(document.getElementById('pp-d')?.value),hd=parseFloat(document.getElementById('pp-hd')?.value)||6;
  if(!k||!l||!h||!d) return App.toast('Tous les champs requis','e');
  if(DB.periods[k]) return App.toast('Ce code existe déjà','e');
  DB.periods[k]={label:l,goalH:h,days:d,hpd:hd};
  const sel=document.getElementById('psel');
  sel.innerHTML=Object.entries(DB.periods).map(([kk,v])=>`<option value="${kk}">${v.label}</option>`).join('');
  sel.value=DB.period;
  save(); document.querySelector('.mo-ov')?.remove(); App.toast(`Période ${l} créée`,'s');
  document.getElementById('per-body').innerHTML=V._renderPer();
},

openEditPer(k){
  const p=DB.periods[k];if(!p) return;
  const o=document.createElement('div');o.className='mo-ov';
  o.innerHTML=`<div class="mo"><div class="mot">Modifier — ${p.label}</div>
    <div class="fg"><label class="fl">Label</label><input class="fc" id="ep-l" value="${p.label}"></div>
    <div class="g2"><div class="fg"><label class="fl">Objectif heures</label><input type="number" class="fc" id="ep-h" value="${p.goalH}"></div><div class="fg"><label class="fl">Jours ouvrés</label><input type="number" class="fc" id="ep-d" value="${p.days}"></div></div>
    <div class="fg"><label class="fl">H/jour accord</label><input type="number" class="fc" id="ep-hd" value="${p.hpd||6}"></div>
    <div style="display:flex;gap:10px;margin-top:8px"><button class="btn btng" style="flex:1" onclick="this.closest('.mo-ov').remove()">Annuler</button><button class="btn btnp" style="flex:1" onclick="V.confirmEditPer('${k}')">Enregistrer</button></div>
  </div>`;
  document.body.appendChild(o);
},

confirmEditPer(k){
  const p=DB.periods[k];if(!p) return;
  p.label=document.getElementById('ep-l')?.value.trim()||p.label;
  p.goalH=parseFloat(document.getElementById('ep-h')?.value)||p.goalH;
  p.days=parseInt(document.getElementById('ep-d')?.value)||p.days;
  p.hpd=parseFloat(document.getElementById('ep-hd')?.value)||p.hpd||6;
  const sel=document.getElementById('psel');
  sel.innerHTML=Object.entries(DB.periods).map(([kk,v])=>`<option value="${kk}">${v.label}</option>`).join('');
  sel.value=DB.period;
  save(); document.querySelector('.mo-ov')?.remove(); App.toast('Période mise à jour','s');
  document.getElementById('per-body').innerHTML=V._renderPer();
},

delPer(k){
  if(!confirm(`Supprimer la période ${DB.periods[k]?.label} ?`)) return;
  delete DB.periods[k];
  if(DB.period===k) DB.period=Object.keys(DB.periods)[0]||'';
  const sel=document.getElementById('psel');
  sel.innerHTML=Object.entries(DB.periods).map(([kk,v])=>`<option value="${kk}">${v.label}</option>`).join('');
  sel.value=DB.period;
  save(); App.toast('Période supprimée','i');
  document.getElementById('per-body').innerHTML=V._renderPer();
},

// ══ ADMIN EXPORTS ════════════════════════════════════════════════════
'ad-export'(){
  const cfg=DB.periods[DB.period]||{};
  document.getElementById('view').innerHTML=`
    <div class="ibox">Tous les exports sont basés sur la période : <strong style="color:var(--acc)">${cfg.label||DB.period}</strong>. Format CSV UTF-8 avec BOM (compatible Excel).</div>
    <div class="g3">
      <div class="card" style="cursor:pointer" onclick="V.exportTeam()">
        <div style="font-size:32px;margin-bottom:10px">📊</div>
        <div class="ct" style="margin-bottom:5px">Rapport équipe</div>
        <div style="font-size:12px;color:var(--dim)">Tous les agents : temps, %, RDV, TMC</div>
        <button class="btn btnp bsm" style="margin-top:12px">Télécharger ↗</button>
      </div>
      <div class="card">
        <div style="font-size:32px;margin-bottom:10px">👤</div>
        <div class="ct" style="margin-bottom:5px">Rapport individuel</div>
        <select class="fc bsm" id="exp-ag" style="margin-bottom:8px">${DB.agents.map(a=>`<option value="${a.id}">${a.name}</option>`).join('')}</select>
        <button class="btn btnp bsm" onclick="V.exportCSV(document.getElementById('exp-ag').value)">Télécharger ↗</button>
      </div>
      <div class="card" style="cursor:pointer" onclick="V.exportMtg()">
        <div style="font-size:32px;margin-bottom:10px">📋</div>
        <div class="ct" style="margin-bottom:5px">Rapport réunions</div>
        <div style="font-size:12px;color:var(--dim)">Coaching, formations, décorticages</div>
        <button class="btn bsm" style="margin-top:12px;background:var(--grnD);color:var(--grn);border:1px solid rgba(16,185,129,.2)">Télécharger ↗</button>
      </div>
    </div>
    <div class="card">
      <div class="ch"><div class="ct">Récapitulatif — ${cfg.label||DB.period}</div></div>
      <div class="tw"><table>
        <thead><tr><th>Agent</th><th style="color:var(--acc)">Comm.</th><th style="color:var(--amb)">Attente</th><th style="color:var(--pur)">Qual.</th><th style="color:var(--grn)">Réunions</th><th style="color:var(--cyn)">Total</th><th>%</th><th style="color:var(--red)">RDV</th><th>Taux</th><th style="color:var(--ora)">TMC</th><th style="color:var(--grn)">Rém. (MAD)</th></tr></thead>
        <tbody>
          ${DB.agents.map(ag=>{
            const s=U.calc(ag.id,DB.period);
            const rem=ag.salBase?Math.round(ag.salBase*(s.pct/100)):0;
            return`<tr>
              <td><div style="display:flex;align-items:center;gap:7px"><div class="agav" style="background:${ag.color||'#4f7ef8'};width:24px;height:24px;font-size:9px">${U.initials(ag.name)}</div><span class="tn">${ag.name}</span></div></td>
              <td style="color:var(--acc)">${U.hms(s.tC)}</td><td style="color:var(--amb)">${U.hms(s.tW)}</td><td style="color:var(--pur)">${U.hms(s.tQP)}</td><td style="color:var(--grn)">${U.hms(s.tM)}</td>
              <td style="color:var(--cyn);font-weight:700">${U.hms(s.tot)}</td>
              <td><span class="badge ${U.pbadge(s.pct)}">${s.pct.toFixed(1)}%</span></td>
              <td style="color:var(--red)">${s.tSales}</td><td>${s.rdvRate.toFixed(1)}%</td>
              <td style="color:var(--ora)">${U.secToMMSS(s.tmcSec)}</td>
              <td style="color:var(--grn);font-weight:700">${rem?rem.toLocaleString('fr-FR')+' MAD':'—'}</td>
            </tr>`;
          }).join('')}
        </tbody>
      </table></div>
    </div>`;
},

exportMtg(){
  const logs=DB.mtg_log.filter(m=>m.period===DB.period);
  let csv='Agent;ID Vicidial;Date;Durée (min);Type;Note\n';
  logs.forEach(m=>{const ag=DB.agents.find(a=>a.id===m.agId);csv+=`${ag?.name||m.agId};${ag?.viciId||m.agId};${m.date};${m.durMin};${m.type};${m.note||''}\n`;});
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob(['\uFEFF'+csv],{type:'text/csv'}));a.download=`Reunions_${DB.period}.csv`;a.click();
  App.toast('Export réunions téléchargé','s');
},

};// fin V

window.addEventListener('DOMContentLoaded',()=>{ document.getElementById('log-id').focus(); });
</script>
</body>
