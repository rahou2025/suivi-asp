<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ASP Connect PRO · Logiciel de Pointage</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap');
:root {
  --bg:#0a0c12; --sb:#0f1219; --card:#141820; --card2:#191e28;
  --brd:rgba(255,255,255,0.07); --brd2:rgba(255,255,255,0.12);
  --acc:#4f7ef8; --accG:rgba(79,126,248,0.18); --accD:rgba(79,126,248,0.08);
  --txt:#e8eaf0; --dim:#7a8394; --muted:#4a5060;
  --grn:#10b981; --grnD:rgba(16,185,129,0.12);
  --amb:#f59e0b; --ambD:rgba(245,158,11,0.12);
  --red:#ef4444; --redD:rgba(239,68,68,0.12);
  --pur:#a78bfa; --purD:rgba(167,139,250,0.12);
  --cyn:#22d3ee; --cynD:rgba(34,211,238,0.12);
  --r:12px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:14px}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--txt);height:100vh;overflow:hidden;display:flex;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-thumb{background:var(--brd2);border-radius:10px}

/* LOGIN */
#login-ov{position:fixed;inset:0;background:radial-gradient(ellipse at center,#0f1630 0%,var(--bg) 70%);z-index:9999;display:flex;align-items:center;justify-content:center;transition:opacity .4s}
.lbox{width:420px;background:var(--card);border:1px solid var(--brd2);border-radius:24px;padding:48px;box-shadow:0 40px 80px rgba(0,0,0,.6),0 0 60px var(--accG);text-align:center}
.llogo{width:72px;height:72px;background:linear-gradient(135deg,#4f7ef8,#7c3aed);border-radius:20px;display:flex;align-items:center;justify-content:center;margin:0 auto 24px;box-shadow:0 0 40px var(--accG)}
.lbox h1{font-size:26px;font-weight:800;margin-bottom:6px}
.lbox .sub{color:var(--dim);font-size:14px;margin-bottom:36px}
.lbox input{width:100%;background:rgba(255,255,255,.04);border:1px solid var(--brd2);padding:14px 16px;border-radius:10px;color:var(--txt);font-family:inherit;font-size:14px;margin-bottom:14px;outline:none;transition:border-color .2s}
.lbox input:focus{border-color:var(--acc);background:rgba(79,126,248,.06)}
.lbtn{width:100%;padding:15px;background:linear-gradient(135deg,#4f7ef8,#6366f1);border:none;border-radius:10px;color:#fff;font-family:inherit;font-weight:700;font-size:15px;cursor:pointer;transition:all .2s;box-shadow:0 8px 24px var(--accG)}
.lbtn:hover{transform:translateY(-2px)}
.lerr{color:var(--red);font-size:12px;margin-top:10px;display:none}
.lhint{margin-top:16px;font-size:11px;color:var(--muted)}

/* SIDEBAR */
.sidebar{width:240px;min-width:240px;background:var(--sb);border-right:1px solid var(--brd);display:flex;flex-direction:column;padding:20px 14px}
.logo-area{display:flex;align-items:center;gap:10px;padding:6px 8px;margin-bottom:32px}
.logo-icon{width:36px;height:36px;min-width:36px;background:linear-gradient(135deg,#4f7ef8,#7c3aed);border-radius:10px;display:flex;align-items:center;justify-content:center;box-shadow:0 0 16px var(--accG)}
.logo-t{font-size:15px;font-weight:800}
.logo-s{font-size:10px;color:var(--dim);margin-top:1px}
.ns{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1.2px;padding:0 10px;margin-bottom:8px;margin-top:16px}
.ni{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;color:var(--dim);font-weight:500;font-size:13px;cursor:pointer;transition:all .18s;margin-bottom:2px;border:none;background:none;width:100%;text-align:left}
.ni svg{width:16px;height:16px;opacity:.7;flex-shrink:0}
.ni:hover{background:rgba(255,255,255,.04);color:var(--txt)}
.ni.active{background:var(--accD);color:var(--acc);font-weight:600}
.ni.active svg{opacity:1}
.nb{margin-top:auto}
.ubadge{display:flex;align-items:center;gap:10px;padding:10px;background:var(--card2);border-radius:10px;border:1px solid var(--brd);margin-top:8px}
.av{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0;color:#fff}
.ubn{font-size:12px;font-weight:600;line-height:1.3}
.ubr{font-size:10px;color:var(--dim)}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{height:62px;min-height:62px;background:rgba(10,12,18,.8);backdrop-filter:blur(12px);border-bottom:1px solid var(--brd);display:flex;align-items:center;justify-content:space-between;padding:0 28px;gap:16px;z-index:10}
#pt{font-size:16px;font-weight:700}
.tbr{display:flex;align-items:center;gap:14px}
.clkbox{display:flex;align-items:center;gap:8px;background:var(--card2);border:1px solid var(--brd);padding:6px 14px;border-radius:8px}
.dot{width:8px;height:8px;border-radius:50%;background:var(--grn);box-shadow:0 0 8px var(--grn);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.85)}}
.ct{font-family:'JetBrains Mono';font-size:13px;font-weight:600;color:var(--grn)}
.cd{font-size:11px;color:var(--dim)}
.psel{background:var(--card2);border:1px solid var(--brd2);color:var(--txt);padding:7px 12px;border-radius:8px;font-family:inherit;font-size:13px;outline:none;cursor:pointer}
.psel option{background:#1a1f2b}
.content{flex:1;overflow-y:auto;padding:28px}

/* CARDS */
.card{background:var(--card);border:1px solid var(--brd);border-radius:var(--r);padding:22px;margin-bottom:20px}
.ch{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:10px}
.ct2{font-size:14px;font-weight:700}
.cs{font-size:12px;color:var(--dim);margin-top:2px}

/* KPI */
.kg{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:20px}
.kg3{grid-template-columns:repeat(3,1fr)}
.kg5{grid-template-columns:repeat(5,1fr)}
.kc{background:var(--card);border:1px solid var(--brd);border-radius:var(--r);padding:20px 18px;position:relative;overflow:hidden}
.kc::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%}
.kcomm::before{background:var(--acc)}
.kwait::before{background:var(--amb)}
.kqual::before{background:var(--pur)}
.kmtg::before{background:var(--grn)}
.ktot::before{background:var(--cyn)}
.krdv::before{background:var(--red)}
.kl{font-size:11px;color:var(--dim);font-weight:600;text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px}
.kv{font-family:'JetBrains Mono';font-size:22px;font-weight:600;line-height:1.1}
.ks{font-size:11px;color:var(--dim);margin-top:6px;line-height:1.5}

/* PROGRESS */
.pb{height:8px;background:rgba(255,255,255,.05);border-radius:10px;overflow:hidden;margin-top:8px}
.pf{height:100%;border-radius:10px;background:linear-gradient(90deg,var(--acc),#7c3aed);transition:width .8s cubic-bezier(.22,1,.36,1)}
.pf.g{background:linear-gradient(90deg,var(--grn),#059669)}
.pf.a{background:linear-gradient(90deg,var(--amb),#d97706)}
.pf.r{background:linear-gradient(90deg,var(--red),#dc2626)}

/* TABLE */
.tw{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{text-align:left;padding:10px 14px;color:var(--dim);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;border-bottom:1px solid var(--brd);white-space:nowrap}
tbody td{padding:12px 14px;border-bottom:1px solid var(--brd);font-family:'JetBrains Mono';font-size:12px}
tbody td.tn{font-family:'Inter';font-size:13px}
tbody td.tb{font-family:'Inter';font-size:13px;font-weight:700}
tbody tr:hover td{background:rgba(255,255,255,.015)}
tbody tr:last-child td{border-bottom:none}
tr.trtot td{background:rgba(79,126,248,.05);font-weight:700}

/* BADGE */
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.bg{background:var(--grnD);color:var(--grn)}
.ba{background:var(--ambD);color:var(--amb)}
.br{background:var(--redD);color:var(--red)}
.bb{background:var(--accD);color:var(--acc)}
.bp{background:var(--purD);color:var(--pur)}
.bc{background:var(--cynD);color:var(--cyn)}

/* FORMS */
.fg{margin-bottom:16px}
.fl{display:block;font-size:11px;font-weight:700;color:var(--dim);margin-bottom:6px;text-transform:uppercase;letter-spacing:.6px}
.fc{width:100%;background:rgba(255,255,255,.04);border:1px solid var(--brd2);padding:12px 14px;border-radius:9px;color:var(--txt);font-family:inherit;font-size:13px;outline:none;transition:border-color .2s,background .2s}
.fc:focus{border-color:var(--acc);background:rgba(79,126,248,.06)}
select.fc{cursor:pointer}
select.fc option{background:#1a1f2b}
textarea.fc{resize:vertical;min-height:180px;font-family:'JetBrains Mono';font-size:11px;line-height:1.7}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:10px 18px;border-radius:8px;border:none;font-family:inherit;font-weight:600;font-size:13px;cursor:pointer;transition:all .18s;white-space:nowrap}
.btn:active{transform:scale(.97)}
.btnp{background:var(--acc);color:#fff;box-shadow:0 4px 16px var(--accG)}
.btnp:hover{background:#5a88ff}
.btng{background:rgba(255,255,255,.05);color:var(--txt);border:1px solid var(--brd2)}
.btng:hover{background:rgba(255,255,255,.09)}
.btnd{background:var(--redD);color:var(--red);border:1px solid rgba(239,68,68,.2)}
.btnd:hover{background:rgba(239,68,68,.2)}
.bsm{padding:6px 12px;font-size:12px}
.bfw{width:100%}

/* GRIDS */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:20px}
.fx{display:flex}
.fxb{display:flex;justify-content:space-between;align-items:center}
.fxc{display:flex;align-items:center}

/* REALTIME */
.rtp{background:var(--card2);border:1px solid var(--brd2);border-radius:var(--r);padding:20px;margin-bottom:20px;position:relative;overflow:hidden}
.rtp::after{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at top right,rgba(79,126,248,.06) 0%,transparent 60%);pointer-events:none}
.rtg{display:grid;grid-template-columns:repeat(6,1fr);gap:12px}
.rti{background:var(--card);border:1px solid var(--brd);border-radius:10px;padding:14px 12px;text-align:center}
.rtl{font-size:10px;color:var(--dim);font-weight:600;text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px}
.rtv{font-family:'JetBrains Mono';font-size:17px;font-weight:600}
.rts{font-size:10px;color:var(--muted);margin-top:4px;line-height:1.4}

/* AGENT ROW */
.agr{display:flex;align-items:center;gap:14px;padding:14px 18px;background:var(--card);border:1px solid var(--brd);border-radius:10px;margin-bottom:10px;transition:border-color .2s}
.agr:hover{border-color:var(--brd2)}
.agav{width:42px;height:42px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;color:#fff}
.agi{flex:1;min-width:0}
.agn{font-size:14px;font-weight:700}
.agid{font-size:11px;color:var(--dim);font-family:'JetBrains Mono'}
.agpg{flex:2;min-width:0}
.agpct{font-family:'JetBrains Mono';font-size:16px;font-weight:700;text-align:right;min-width:60px}
.aghr{font-size:11px;color:var(--dim);font-family:'JetBrains Mono';text-align:right;min-width:100px}

/* MTG */
.mtgi{display:flex;align-items:center;gap:12px;padding:10px 14px;background:var(--card2);border-radius:8px;margin-bottom:6px;font-size:13px}

/* CHECKBOX multi-select */
.agent-check-list{display:flex;flex-direction:column;gap:8px;max-height:220px;overflow-y:auto;border:1px solid var(--brd2);border-radius:9px;padding:10px}
.agent-check-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:7px;cursor:pointer;transition:background .15s}
.agent-check-item:hover{background:rgba(255,255,255,.04)}
.agent-check-item input[type=checkbox]{width:16px;height:16px;accent-color:var(--acc);cursor:pointer;flex-shrink:0}
.agent-check-item label{cursor:pointer;font-size:13px;font-weight:500}

/* TOAST */
#toasts{position:fixed;bottom:24px;right:24px;z-index:99999;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{background:var(--card2);border:1px solid var(--brd2);border-left:3px solid var(--acc);padding:12px 18px;border-radius:10px;font-size:13px;font-weight:500;box-shadow:0 8px 30px rgba(0,0,0,.5);animation:tIn .3s ease-out;pointer-events:all}
.toast.s{border-left-color:var(--grn)}
.toast.e{border-left-color:var(--red)}
.toast.i{border-left-color:var(--cyn)}
@keyframes tIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}

/* MODAL */
.mo-ov{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);z-index:9000;display:flex;align-items:center;justify-content:center}
.mo{background:var(--card);border:1px solid var(--brd2);border-radius:16px;padding:32px;width:520px;max-width:95vw;box-shadow:0 4px 24px rgba(0,0,0,.4);animation:moIn .25s ease-out}
.mot{font-size:18px;font-weight:700;margin-bottom:6px}
.mos{font-size:13px;color:var(--dim);margin-bottom:24px}
@keyframes moIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}

/* MISC */
.empty{text-align:center;padding:50px 20px;color:var(--dim);font-size:14px}
.ibox{background:var(--accD);border:1px solid rgba(79,126,248,.2);border-radius:9px;padding:14px 16px;font-size:13px;color:var(--dim);margin-bottom:16px;line-height:1.6}
.itip{background:var(--cynD);border:1px solid rgba(34,211,238,.2);border-radius:8px;padding:12px 16px;font-size:12px;color:var(--cyn);margin-bottom:16px;line-height:1.6}
.ifmt{background:rgba(0,0,0,.3);border-radius:8px;padding:12px 14px;font-family:'JetBrains Mono';font-size:11px;color:var(--dim);line-height:1.7;margin-bottom:16px;overflow-x:auto;white-space:pre}
.divider{height:1px;background:var(--brd);margin:16px 0}

/* FILE INPUT */
.file-drop{border:2px dashed var(--brd2);border-radius:12px;padding:40px 20px;text-align:center;cursor:pointer;transition:all .2s;position:relative}
.file-drop:hover,.file-drop.over{border-color:var(--acc);background:var(--accD)}
.file-drop input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.file-drop-icon{font-size:40px;margin-bottom:12px}
.file-drop-txt{font-size:14px;font-weight:600;margin-bottom:6px}
.file-drop-sub{font-size:12px;color:var(--dim)}
</style>
</head>
<body>
<div id="toasts"></div>

<!-- LOGIN -->
<div id="login-ov">
  <div class="lbox">
    <div class="llogo">
      <svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
    </div>
    <h1>ASP Connect PRO</h1>
    <p class="sub">Logiciel de Pointage &amp; Suivi de Performance</p>
    <input type="text" id="log-id" placeholder="Identifiant agent" autocomplete="off">
    <input type="password" id="log-pw" placeholder="Mot de passe" onkeydown="if(event.key==='Enter')Auth.login()">
    <button class="lbtn" onclick="Auth.login()">Se connecter</button>
    <div id="lerr" class="lerr">Identifiants incorrects.</div>
    <p class="lhint">Admin : SUPER / 1234</p>
  </div>
</div>

<!-- SIDEBAR -->
<aside class="sidebar">
  <div class="logo-area">
    <div class="logo-icon">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
    </div>
    <div><div class="logo-t">ASP Connect</div><div class="logo-s">PRO Edition</div></div>
  </div>

  <div id="nav-agent" style="display:none">
    <div class="ns">Mon espace</div>
    <button class="ni active" onclick="R.go('ag-dash',this)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>Tableau de bord</button>
    <button class="ni" onclick="R.go('ag-hist',this)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>Historique détaillé</button>
    <button class="ni" onclick="R.go('ag-stats',this)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>Mes statistiques</button>
  </div>

  <div id="nav-admin" style="display:none">
    <div class="ns">Supervision</div>
    <button class="ni active" onclick="R.go('ad-team',this)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87m-4-12a4 4 0 010 7.75"/></svg>Vue équipe</button>
    <button class="ni" onclick="R.go('ad-detail',this)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>Détail par agent</button>
    <div class="ns" style="margin-top:18px">Données</div>
    <button class="ni" onclick="R.go('ad-import',this)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/></svg>Import Vicidial</button>
    <button class="ni" onclick="R.go('ad-mtg',this)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0"/></svg>Réunions &amp; Coaching</button>
    <div class="ns" style="margin-top:18px">Gestion</div>
    <button class="ni" onclick="R.go('ad-agents',this)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197"/></svg>Gestion agents</button>
    <button class="ni" onclick="R.go('ad-periodes',this)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>Périodes &amp; Objectifs</button>
  </div>

  <div class="nb">
    <button class="ni" style="color:var(--red)" onclick="Auth.logout()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/></svg>Déconnexion</button>
    <div class="ubadge"><div class="av" id="sbav">?</div><div><div class="ubn" id="sbnm">—</div><div class="ubr" id="sbrole">—</div></div></div>
  </div>
</aside>

<!-- MAIN -->
<main class="main">
  <header class="topbar">
    <div id="pt">Tableau de bord</div>
    <div class="tbr">
      <select class="psel" id="psel" onchange="App.setPeriod(this.value)"></select>
      <div class="clkbox">
        <div class="dot"></div>
        <div><div class="ct" id="ltime">--:--:--</div><div class="cd" id="ldate">--</div></div>
      </div>
    </div>
  </header>
  <div class="content" id="view"></div>
</main>

<script>
// ═══════════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════════
const QUAL_CAP = 1800;
const COLORS = ['#4f7ef8','#10b981','#f59e0b','#a78bfa','#22d3ee','#ef4444','#f97316','#ec4899','#06b6d4','#84cc16'];
const KEY = 'asp_v5';

// ═══════════════════════════════════════════════
// DATABASE
// ═══════════════════════════════════════════════
let DB = (() => {
  const s = localStorage.getItem(KEY);
  if (s) try { return JSON.parse(s); } catch(e) {}
  return {
    period: '2026-04',
    periods: {
      '2026-03': { label:'Mars 2026',   goalH:132, days:22, hoursPerDay:6, startDate:'2026-03-01' },
      '2026-04': { label:'Avril 2026',  goalH:126, days:21, hoursPerDay:6, startDate:'2026-04-01' },
      '2026-05': { label:'Mai 2026',    goalH:132, days:22, hoursPerDay:6, startDate:'2026-05-01' },
      '2026-06': { label:'Juin 2026',   goalH:126, days:21, hoursPerDay:6, startDate:'2026-06-01' },
    },
    agents: [],
    records: {},   // agId → [{period,date,comm,wait,qual,mtg,calls,sales,b}]
    mtg_log: [],
  };
})();

function save() { localStorage.setItem(KEY, JSON.stringify(DB)); }

// ═══════════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════════
const U = {
  hms(s) {
    s = Math.floor(s || 0);
    return `${Math.floor(s/3600)}h${String(Math.floor((s%3600)/60)).padStart(2,'0')}`;
  },
  hmsLong(s) {
    s = Math.floor(s || 0);
    return `${String(Math.floor(s/3600)).padStart(2,'0')}:${String(Math.floor((s%3600)/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
  },
  toSec(v) {
    if (!v || typeof v !== 'string') return parseInt(v) || 0;
    v = v.trim().replace(/"/g,'');
    if (!v.includes(':')) return parseFloat(v) || 0;
    const p = v.split(':').map(Number);
    return p.length === 3 ? p[0]*3600+p[1]*60+p[2] : p[0]*60+p[1];
  },
  fmtDate(d) { return d.split('-').reverse().join('/'); },
  today()    { return new Date().toISOString().split('T')[0]; },
  initials(n){ return (n||'?').trim().split(/\s+/).slice(0,2).map(w=>w[0]).join('').toUpperCase(); },
  pc(p)   { return p>=90?'g':p>=65?'a':'r'; },
  badge(p){ return p>=90?'bg':p>=65?'ba':'br'; },
  calc(agId, period) {
    const recs = (DB.records[agId]||[]).filter(r=>r.period===period);
    let tC=0,tW=0,tQR=0,tQP=0,tM=0,tCalls=0,tSales=0,tB=0;
    recs.forEach(r=>{
      tC    += (r.comm||0);
      tW    += (r.wait||0);
      tQR   += (r.qual||0);
      tQP   += Math.min(r.qual||0, QUAL_CAP);
      tM    += (r.mtg||0);
      tCalls+= (r.calls||0);
      tSales+= (r.sales||0);
      tB    += (r.b||0);
    });
    const tot = tC+tW+tQP+tM;
    const h   = tot/3600;
    const cfg = DB.periods[period];
    const goalH = cfg?.goalH || 132;
    const pct = Math.min(100,(h/goalH)*100);
    const rdvRate = tCalls > 0 ? ((tSales/tCalls)*100) : 0;
    return {tC,tW,tQR,tQP,tM,tCalls,tSales,tB,tot,h,pct,goalH,recs,rdvRate};
  },
  // Parse one full Vicidial CSV file text
  parseVicidial(text) {
    const lines = text.split('\n').filter(l => l.trim());
    const results = []; // [{agId, agName, date, comm, wait, qual, calls, sales, b}]
    let currentAgent = null;
    for (const line of lines) {
      // Split CSV respecting quotes
      const cols = U.splitCSV(line);
      if (cols.length < 6) continue;
      const name = cols[0];
      const id   = cols[1];
      const dateCol = cols[4];
      // Agent header line: has name and id
      if (name && id && !/^\d{4}-\d{2}-\d{2}$/.test(dateCol)) {
        currentAgent = { id: id.trim(), name: name.trim() };
        continue;
      }
      // Day detail line: no name, has date YYYY-MM-DD
      if (!name && currentAgent && /^\d{4}-\d{2}-\d{2}$/.test(dateCol)) {
        const comm  = U.toSec(cols[11] || cols[6] || '0');
        const wait  = U.toSec(cols[9]  || '0');
        const qual  = U.toSec(cols[13] || '0');
        const calls = parseInt(cols[5]) || 0;
        // SALE is last non-empty column in the trailing numbers
        // Based on the CSV: cols after col 13 are B,HC,OCC,PI,PRO,PU,RPD,SALE per day
        // Day line trailing: cols[14..] → B=14,HC=15,...,SALE=last
        const trailing = cols.slice(14).map(x=>parseInt(x)||0).filter(x=>!isNaN(x));
        const sales = trailing.length > 0 ? trailing[trailing.length-1] : 0;
        const b     = trailing.length > 0 ? trailing[0] : 0;
        results.push({
          agId: currentAgent.id,
          agName: currentAgent.name,
          date: dateCol,
          comm, wait, qual, calls, sales, b
        });
      }
    }
    return results;
  },
  splitCSV(line) {
    const result = [];
    let cur = '', inQ = false;
    for (let i = 0; i < line.length; i++) {
      const c = line[i];
      if (c === '"') { inQ = !inQ; continue; }
      if (c === ',' && !inQ) { result.push(cur.trim()); cur = ''; continue; }
      cur += c;
    }
    result.push(cur.trim());
    return result;
  },
  salary(agId, period) {
    const ag = DB.agents.find(a=>a.id===agId);
    if (!ag || !ag.salBase) return null;
    const s = U.calc(agId, period);
    const ratio = s.pct / 100;
    return { base: ag.salBase, earned: ag.salBase * ratio, type: ag.salType||'AE', ratio };
  },
};

// AUTH
// ═══════════════════════════════════════════════
const Auth = {
  cur: null,
  login() {
    const id = document.getElementById('log-id').value.trim();
    const pw = document.getElementById('log-pw').value;
    document.getElementById('lerr').style.display = 'none';
    if (id === 'SUPER' && pw === '1234') {
      Auth.cur = { role:'admin', name:'Superviseur', id:'SUPER', color:'#ef4444' };
      App.boot('admin');
    } else {
      const ag = DB.agents.find(a => a.id===id && a.pw===pw);
      if (ag) { Auth.cur = {...ag, role:'agent'}; App.boot('agent'); }
      else document.getElementById('lerr').style.display = 'block';
    }
  },
  logout() { location.reload(); }
};

// ═══════════════════════════════════════════════
// APP
// ═══════════════════════════════════════════════
const App = {
  boot(role) {
    document.getElementById('login-ov').style.opacity = '0';
    setTimeout(()=>document.getElementById('login-ov').style.display='none', 400);
    document.getElementById('sbnm').textContent   = Auth.cur.name;
    document.getElementById('sbrole').textContent = role==='admin'?'Administrateur':'Agent';
    document.getElementById('sbav').textContent   = U.initials(Auth.cur.name);
    document.getElementById('sbav').style.background = Auth.cur.color||'#4f7ef8';
    document.getElementById('nav-'+role).style.display = 'block';
    const sel = document.getElementById('psel');
    sel.innerHTML = Object.entries(DB.periods).map(([k,v])=>`<option value="${k}">${v.label}</option>`).join('');
    sel.value = DB.period;
    const tick = () => {
      const n = new Date();
      document.getElementById('ltime').textContent = n.toLocaleTimeString('fr-FR');
      document.getElementById('ldate').textContent = n.toLocaleDateString('fr-FR',{weekday:'short',day:'2-digit',month:'short'});
    };
    tick(); setInterval(tick, 1000);
    R.go(role==='admin'?'ad-team':'ag-dash');
  },
  setPeriod(v) {
    DB.period = v; save();
    const a = document.querySelector('.ni.active');
    if (a) a.click();
  },
  toast(msg, type='s') {
    const c = document.getElementById('toasts');
    const el = document.createElement('div');
    el.className = `toast ${type}`; el.textContent = msg;
    c.appendChild(el);
    setTimeout(()=>{ el.style.opacity='0'; el.style.transition='opacity .3s'; setTimeout(()=>el.remove(),300); }, 3000);
  }
};

// ═══════════════════════════════════════════════
// ROUTER
// ═══════════════════════════════════════════════
const R = {
  go(path, el) {
    if (el) {
      const p = el.closest('[id^="nav-"]');
      if (p) p.querySelectorAll('.ni').forEach(i=>i.classList.remove('active'));
      el.classList.add('active');
    }
    const titles = {
      'ag-dash':'Tableau de bord','ag-hist':'Historique détaillé','ag-stats':'Mes statistiques',
      'ad-team':'Vue équipe','ad-detail':'Détail par agent','ad-import':'Import Vicidial',
      'ad-mtg':'Réunions & Coaching','ad-agents':'Gestion des agents','ad-periodes':'Périodes & Objectifs'
    };
    document.getElementById('pt').textContent = titles[path]||path;
    V[path]?.();
  }
};

exportCSV(agId) {
  const s = U.calc(agId, DB.period);
  const ag = DB.agents.find(a=>a.id===agId)||{name:agId};
  let csv = 'Date;Communication;Attente;Qualification payée;Réunions;Total;Appels;RDV;Taux RDV\n';
  [...s.recs].sort((a,b)=>a.date.localeCompare(b.date)).forEach(r=>{
    const qp=Math.min(r.qual,QUAL_CAP),tot=r.comm+r.wait+qp+(r.mtg||0);
    const rate=r.calls>0?((r.sales/r.calls)*100).toFixed(1):'0';
    csv+=`${r.date};${U.hms(r.comm)};${U.hms(r.wait)};${U.hms(qp)};${U.hms(r.mtg||0)};${U.hms(tot)};${r.calls||0};${r.sales||0};${rate}%\n`;
  });
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'}));
  a.download=`Rapport_${ag.name.replace(/ /g,'_')}_${DB.period}.csv`;
  a.click(); App.toast('Export CSV téléchargé');
},

// ── AGENT STATS ─────────────────────────────────────────────────────
'ag-stats'() {
  const s = U.calc(Auth.cur.id, DB.period);

  const n=Math.max(1,days.length);
  const aD=s.tot/n;
  const maxD=Math.max(0,...days.map(r=>r.comm+r.wait+Math.min(r.qual,QUAL_CAP)+(r.mtg||0)));
  const minD=Math.min(1e9,...days.map(r=>r.comm+r.wait+Math.min(r.qual,QUAL_CAP)+(r.mtg||0)));
  document.getElementById('view').innerHTML=`
    <div class="kg">
      <div class="kc"><div class="kl">Jours travaillés</div><div class="kv">${days.length}</div><div class="ks">sur ${DB.periods[DB.period]?.days||22} théoriques</div></div>

delRec(agId,date){

  Col 0: Nom agent   Col 1: ID agent   Col 4: Date (YYYY-MM-DD)

      <div class="ch">
        <div><div class="ct2">Fichier Vicidial</div><div class="cs">Période cible : <strong style="color:var(--acc)">${DB.periods[DB.period]?.label}</strong></div></div>
      </div>
      <div class="file-drop" id="fdrop">

    </div>
    <div id="imp-res"></div>`;
  const drop=document.getElementById('fdrop');
  drop.addEventListener('dragover',e=>{e.preventDefault();drop.classList.add('over');});
  drop.addEventListener('dragleave',()=>drop.classList.remove('over'));
  drop.addEventListener('drop',e=>{e.preventDefault();drop.classList.remove('over');V.handleFile(e.dataTransfer.files[0]);});
},

handleFile(file) {
  if (!file) return;
  document.getElementById('imp-status').textContent=`Lecture de ${file.name}…`;
  const reader=new FileReader();
  reader.onload=e=>{
    V.processImport(e.target.result, file.name);
  };
  reader.readAsText(file, 'UTF-8');
},

processImport(text, filename) {
  const entries = U.parseVicidial(text);
  if (!entries.length) { App.toast('Aucune ligne détectée','e'); return; }
  let added=0, updated=0;
  entries.forEach(e=>{
    const {agId,agName,date,comm,wait,qual,calls,sales,b}=e;
    // Auto-register agent if unknown
    if (!DB.agents.find(a=>a.id===agId)) {
      DB.agents.push({id:agId,name:agName,pw:'0000',color:COLORS[DB.agents.length%COLORS.length]});
    }
    if (!DB.records[agId]) DB.records[agId]=[];
    const ex=DB.records[agId].find(r=>r.date===date&&r.period===DB.period);
    const entry={period:DB.period,date,comm,wait,qual,calls,sales,b,mtg:ex?.mtg||0};
    if(ex){Object.assign(ex,entry);updated++;}else{DB.records[agId].push(entry);added++;}
  });
  save();
  // Preview table
  const preview=entries.slice(0,20);
  document.getElementById('imp-status').textContent=`Fichier "${filename}" traité.`;
  document.getElementById('imp-res').innerHTML=`
    <div class="card">
      <div class="ch">
        <div class="ct2">Résultat de l'import</div>
        <div style="display:flex;gap:8px">
          <span class="badge bg">✓ ${added} nouvelles</span>
          <span class="badge bb">↺ ${updated} mises à jour</span>
          <span class="badge bp">${new Set(entries.map(e=>e.agId)).size} agents</span>
        </div>
      </div>
      <div class="tw">
        <table>
          <thead><tr><th>Agent</th><th>Date</th><th style="color:var(--acc)">Communication</th><th style="color:var(--amb)">Attente</th><th style="color:var(--pur)">Qualification</th><th>Appels</th><th style="color:var(--red)">RDV</th></tr></thead>
          <tbody>
            ${preview.map(p=>`<tr>
              <td class="tn">${p.agName}</td>
              <td class="tn">${U.fmtDate(p.date)}</td>
              <td style="color:var(--acc)">${U.hms(p.comm)}</td>
              <td style="color:var(--amb)">${U.hms(p.wait)}</td>
              <td style="color:var(--pur)">${U.hms(Math.min(p.qual,QUAL_CAP))}</td>
              <td>${p.calls}</td>
              <td style="color:var(--red)">${p.sales}</td>
            </tr>`).join('')}
            ${entries.length>20?`<tr><td colspan="7" style="text-align:center;color:var(--dim);padding:10px">… et ${entries.length-20} autres lignes</td></tr>`:''}
          </tbody>
        </table>
      </div>
    </div>`;
  App.toast(`${added+updated} lignes importées depuis ${filename}`,'s');
},

saveMtg() {
  const selected=[...document.querySelectorAll('#ag-checks input:checked')].map(c=>c.value);
  const date=document.getElementById('m-dt').value;
  const durMin=parseInt(document.getElementById('m-dur').value);
  const type=document.getElementById('m-type').value;
  const note=document.getElementById('m-note').value;
  if(!selected.length) return App.toast('Sélectionnez au moins un agent','e');
  if(!date||isNaN(durMin)||durMin<=0) return App.toast('Date et durée requises','e');
  selected.forEach(agId=>{
    DB.mtg_log.push({agId,date,period:DB.period,durMin,type,note});
    if(!DB.records[agId]) DB.records[agId]=[];
    const day=DB.records[agId].find(r=>r.date===date&&r.period===DB.period);
    if(day) day.mtg=(day.mtg||0)+durMin*60;
    else DB.records[agId].push({period:DB.period,date,comm:0,wait:0,qual:0,calls:0,sales:0,b:0,mtg:durMin*60});
  });
  save(); App.toast(`Temps ajouté à ${selected.length} agent(s)`,'s'); R.go('ad-mtg');
},

delMtg(agId,date,durMin,type){
  if(!confirm('Supprimer cette entrée ?')) return;
  const i=DB.mtg_log.findIndex(m=>m.agId===agId&&m.date===date&&m.durMin===durMin&&m.type===type);
  if(i>-1) DB.mtg_log.splice(i,1);
  const day=(DB.records[agId]||[]).find(r=>r.date===date&&r.period===DB.period);
  if(day) day.mtg=Math.max(0,(day.mtg||0)-durMin*60);
  save(); App.toast('Entrée supprimée','i'); R.go('ad-mtg');
},

// ── ADMIN GESTION AGENTS ────────────────────────────────────────────
'ad-agents'() {
  document.getElementById('view').innerHTML=`
    <div class="card">
      <div class="ch">
        <div><div class="ct2">Agents (${DB.agents.length})</div></div>
        <button class="btn btnp bsm" onclick="V.openAdd()">+ Ajouter un agent</button>
      </div>
      <div class="tw">
        <table>
          <thead><tr><th>Nom</th><th>ID Vicidial</th><th>MDP</th><th>Type</th><th>Salaire base</th><th>Actions</th></tr></thead>
          <tbody>
            ${DB.agents.map(ag=>`<tr>
              <td><div style="display:flex;align-items:center;gap:10px"><div class="agav" style="background:${ag.color||'#4f7ef8'};width:32px;height:32px;font-size:11px">${U.initials(ag.name)}</div><span class="tb">${ag.name}</span></div></td>
              <td>${ag.id}</td>
              <td><span class="badge bb">${ag.pw}</span></td>
              <td><span class="badge ${ag.salType==='SALARIE'?'bc':'bp'}">${ag.salType||'AE'}</span></td>
              <td>${ag.salBase?ag.salBase+'€':'—'}</td>
              <td><div style="display:flex;gap:6px">
                <button class="btn btng bsm" onclick="V.openEdit('${ag.id}')">Modifier</button>
                <button class="btn btnd bsm" onclick="V.delAgent('${ag.id}')">Supprimer</button>
              </div></td>
            </tr>`).join('')}
          </tbody>
        </table>
      </div>
    </div>`;
},

openAdd(){
  const o=document.createElement('div');o.className='mo-ov';
  o.innerHTML=`<div class="mo"><div class="mot">Nouvel agent</div><div class="mos">L'agent pourra se connecter avec cet ID et mot de passe.</div>
    <div class="fg"><label class="fl">Nom complet</label><input class="fc" id="ma-n" placeholder="Prénom Nom"></div>
    <div class="fg"><label class="fl">ID (identifiant Vicidial)</label><input class="fc" id="ma-i" placeholder="Ex : 06980713"></div>
    <div class="fg"><label class="fl">Mot de passe agent</label><input class="fc" id="ma-p" placeholder="Ex : 0001"></div>
    <div class="g2">
      <div class="fg"><label class="fl">Type contrat</label><select class="fc" id="ma-t"><option value="AE">Auto-entrepreneur</option><option value="SALARIE">Salarié</option></select></div>
      <div class="fg"><label class="fl">Salaire de base (€)</label><input type="number" class="fc" id="ma-s" placeholder="Ex : 1800"></div>
    </div>
    <div class="fg"><label class="fl">Couleur</label><select class="fc" id="ma-c">${COLORS.map((c,i)=>`<option value="${c}" style="background:${c}">${['Bleu','Vert','Orange','Violet','Cyan','Rouge','Orange vif','Rose','Turquoise','Lime'][i]||c}</option>`).join('')}</select></div>
    <div style="display:flex;gap:10px;margin-top:8px"><button class="btn btng" style="flex:1" onclick="this.closest('.mo-ov').remove()">Annuler</button><button class="btn btnp" style="flex:1" onclick="V.confirmAdd()">Créer</button></div>
  </div>`;
  document.body.appendChild(o);
},

confirmAdd(){
  const n=document.getElementById('ma-n')?.value.trim(),id=document.getElementById('ma-i')?.value.trim(),pw=document.getElementById('ma-p')?.value.trim();
  const salType=document.getElementById('ma-t')?.value,salBase=parseFloat(document.getElementById('ma-s')?.value)||0,color=document.getElementById('ma-c')?.value;
  if(!n||!id||!pw) return App.toast('Champs requis manquants','e');
  if(DB.agents.find(a=>a.id===id)) return App.toast('Cet ID existe déjà','e');
  DB.agents.push({id,name:n,pw,salType,salBase,color});
  save(); document.querySelector('.mo-ov')?.remove(); App.toast(`Agent ${n} créé`,'s'); R.go('ad-agents');
},

openEdit(id){
  const ag=DB.agents.find(a=>a.id===id); if(!ag) return;
  const o=document.createElement('div');o.className='mo-ov';
  o.innerHTML=`<div class="mo"><div class="mot">Modifier l'agent</div><div class="mos">ID Vicidial : ${ag.id}</div>
    <div class="fg"><label class="fl">Nom complet</label><input class="fc" id="me-n" value="${ag.name}"></div>
    <div class="fg"><label class="fl">Mot de passe</label><input class="fc" id="me-p" value="${ag.pw}"></div>
    <div class="g2">
      <div class="fg"><label class="fl">Type contrat</label><select class="fc" id="me-t"><option value="AE" ${ag.salType!=='SALARIE'?'selected':''}>Auto-entrepreneur</option><option value="SALARIE" ${ag.salType==='SALARIE'?'selected':''}>Salarié</option></select></div>
      <div class="fg"><label class="fl">Salaire de base (€)</label><input type="number" class="fc" id="me-s" value="${ag.salBase||''}"></div>
    </div>
    <div style="display:flex;gap:10px;margin-top:8px"><button class="btn btng" style="flex:1" onclick="this.closest('.mo-ov').remove()">Annuler</button><button class="btn btnp" style="flex:1" onclick="V.confirmEdit('${id}')">Enregistrer</button></div>
  </div>`;
  document.body.appendChild(o);
},

confirmEdit(id){
  const ag=DB.agents.find(a=>a.id===id); if(!ag) return;
  ag.name=document.getElementById('me-n')?.value.trim()||ag.name;
  ag.pw=document.getElementById('me-p')?.value.trim()||ag.pw;
  ag.salType=document.getElementById('me-t')?.value||ag.salType;
  ag.salBase=parseFloat(document.getElementById('me-s')?.value)||ag.salBase||0;
  save(); document.querySelector('.mo-ov')?.remove(); App.toast('Agent mis à jour','s'); R.go('ad-agents');
},

delAgent(id){
  const ag=DB.agents.find(a=>a.id===id); if(!ag) return;
  if(!confirm(`Supprimer ${ag.name} et toutes ses données ?`)) return;
  DB.agents=DB.agents.filter(a=>a.id!==id); delete DB.records[id];
  DB.mtg_log=DB.mtg_log.filter(m=>m.agId!==id);
  save(); App.toast('Agent supprimé','i'); R.go('ad-agents');
},

// ── ADMIN PÉRIODES & OBJECTIFS ──────────────────────────────────────
'ad-periodes'() {
  const render=()=>{
    const rows=Object.entries(DB.periods).map(([k,p])=>`
      <tr>
        <td class="tb">${p.label}</td>
        <td style="font-family:'JetBrains Mono'">${k}</td>
        <td style="color:var(--cyn);font-weight:700">${p.goalH}h</td>
        <td>${p.days} jours</td>
        <td>${p.hoursPerDay}h/jour</td>
        <td>${(p.goalH/p.days).toFixed(1)}h/jour théorique</td>
        <td>
          <div style="display:flex;gap:6px">
            <button class="btn btng bsm" onclick="V.openEditPeriod('${k}')">Modifier</button>
            <button class="btn btnd bsm" onclick="V.delPeriod('${k}')">Supprimer</button>
          </div>
        </td>
      </tr>`).join('');
    return `
      <div class="card">
        <div class="ch"><div class="ct2">Périodes configurées</div><button class="btn btnp bsm" onclick="V.openAddPeriod()">+ Nouvelle période</button></div>
        <div class="tw">
          <table>
            <thead><tr><th>Période</th><th>Code</th><th>Objectif</th><th>Jours travail</th><th>H/jour accord</th><th>Moy. théorique</th><th>Actions</th></tr></thead>
            <tbody>${rows}</tbody>
          </table>
        </div>
      </div>
      <div class="card">
        <div class="ch"><div class="ct2">Avancement par période & agent</div></div>
        <div class="tw">
          <table>
            <thead><tr><th>Période</th>${DB.agents.map(ag=>`<th style="color:${ag.color||'var(--acc)'}">${ag.name.split(' ')[0]}</th>`).join('')}</tr></thead>
            <tbody>
              ${Object.entries(DB.periods).map(([k,p])=>`<tr>
                <td class="tb">${p.label}</td>
                ${DB.agents.map(ag=>{const s=U.calc(ag.id,k);return `<td><span class="badge ${U.badge(s.pct)}">${s.pct.toFixed(0)}%</span></td>`;}).join('')}
              </tr>`).join('')}
            </tbody>
          </table>
        </div>
      </div>`;
  };
  document.getElementById('view').innerHTML=`<div id="per-body">${render()}</div>`;
  V._renderPeriods=render;
},

openAddPeriod(){
  const o=document.createElement('div');o.className='mo-ov';
  o.innerHTML=`<div class="mo"><div class="mot">Nouvelle période</div><div class="mos">Configurez les paramètres de la période.</div>
    <div class="g2">
      <div class="fg"><label class="fl">Code (ex: 2026-07)</label><input class="fc" id="pp-k" placeholder="2026-07"></div>
      <div class="fg"><label class="fl">Label (ex: Juillet 2026)</label><input class="fc" id="pp-l" placeholder="Juillet 2026"></div>
    </div>
    <div class="g2">
      <div class="fg"><label class="fl">Objectif heures</label><input type="number" class="fc" id="pp-h" placeholder="132"></div>
      <div class="fg"><label class="fl">Jours travaillés</label><input type="number" class="fc" id="pp-d" placeholder="22"></div>
    </div>
    <div class="fg"><label class="fl">Heures par jour (accord)</label><input type="number" class="fc" id="pp-hd" placeholder="6" value="6"></div>
    <div style="display:flex;gap:10px;margin-top:8px"><button class="btn btng" style="flex:1" onclick="this.closest('.mo-ov').remove()">Annuler</button><button class="btn btnp" style="flex:1" onclick="V.confirmAddPeriod()">Créer</button></div>
  </div>`;
  document.body.appendChild(o);
},

confirmAddPeriod(){
  const k=document.getElementById('pp-k')?.value.trim(),l=document.getElementById('pp-l')?.value.trim();
  const h=parseFloat(document.getElementById('pp-h')?.value),d=parseInt(document.getElementById('pp-d')?.value),hd=parseFloat(document.getElementById('pp-hd')?.value)||6;
  if(!k||!l||!h||!d) return App.toast('Tous les champs sont requis','e');
  if(DB.periods[k]) return App.toast('Ce code existe déjà','e');
  DB.periods[k]={label:l,goalH:h,days:d,hoursPerDay:hd};
  // Update period selector
  const sel=document.getElementById('psel');
  sel.innerHTML=Object.entries(DB.periods).map(([kk,v])=>`<option value="${kk}">${v.label}</option>`).join('');
  sel.value=DB.period;
  save(); document.querySelector('.mo-ov')?.remove(); App.toast(`Période ${l} créée`,'s');
  document.getElementById('per-body').innerHTML=V._renderPeriods();
},

openEditPeriod(k){
  const p=DB.periods[k]; if(!p) return;
  const o=document.createElement('div');o.className='mo-ov';
  o.innerHTML=`<div class="mo"><div class="mot">Modifier la période</div><div class="mos">Code : ${k}</div>
    <div class="fg"><label class="fl">Label</label><input class="fc" id="ep-l" value="${p.label}"></div>
    <div class="g2">
      <div class="fg"><label class="fl">Objectif heures</label><input type="number" class="fc" id="ep-h" value="${p.goalH}"></div>
      <div class="fg"><label class="fl">Jours travaillés</label><input type="number" class="fc" id="ep-d" value="${p.days}"></div>
    </div>
    <div class="fg"><label class="fl">Heures par jour (accord)</label><input type="number" class="fc" id="ep-hd" value="${p.hoursPerDay||6}"></div>
    <div style="display:flex;gap:10px;margin-top:8px"><button class="btn btng" style="flex:1" onclick="this.closest('.mo-ov').remove()">Annuler</button><button class="btn btnp" style="flex:1" onclick="V.confirmEditPeriod('${k}')">Enregistrer</button></div>
  </div>`;
  document.body.appendChild(o);
},

confirmEditPeriod(k){
  const p=DB.periods[k]; if(!p) return;
  p.label=document.getElementById('ep-l')?.value.trim()||p.label;
  p.goalH=parseFloat(document.getElementById('ep-h')?.value)||p.goalH;
  p.days=parseInt(document.getElementById('ep-d')?.value)||p.days;
  p.hoursPerDay=parseFloat(document.getElementById('ep-hd')?.value)||p.hoursPerDay||6;
  const sel=document.getElementById('psel');
  sel.innerHTML=Object.entries(DB.periods).map(([kk,v])=>`<option value="${kk}">${v.label}</option>`).join('');
  sel.value=DB.period;
  save(); document.querySelector('.mo-ov')?.remove(); App.toast('Période mise à jour','s');
  document.getElementById('per-body').innerHTML=V._renderPeriods();
},

delPeriod(k){
  if(!confirm(`Supprimer la période ${DB.periods[k]?.label} ?`)) return;
  delete DB.periods[k];
  if(DB.period===k) DB.period=Object.keys(DB.periods)[0]||'';
  const sel=document.getElementById('psel');
  sel.innerHTML=Object.entries(DB.periods).map(([kk,v])=>`<option value="${kk}">${v.label}</option>`).join('');
  sel.value=DB.period;
  save(); App.toast('Période supprimée','i');
  document.getElementById('per-body').innerHTML=V._renderPeriods();
},

};
