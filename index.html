<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ASP Connect PRO · Logiciel de Pointage</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap');

:root {
  --bg: #0a0c12;
  --sidebar: #0f1219;
  --card: #141820;
  --card2: #191e28;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.12);
  --accent: #4f7ef8;
  --accent-glow: rgba(79,126,248,0.18);
  --accent-dim: rgba(79,126,248,0.08);
  --text: #e8eaf0;
  --text-dim: #7a8394;
  --text-muted: #4a5060;
  --green: #10b981;
  --green-dim: rgba(16,185,129,0.12);
  --amber: #f59e0b;
  --amber-dim: rgba(245,158,11,0.12);
  --red: #ef4444;
  --red-dim: rgba(239,68,68,0.12);
  --purple: #a78bfa;
  --purple-dim: rgba(167,139,250,0.12);
  --cyan: #22d3ee;
  --cyan-dim: rgba(34,211,238,0.12);
  --radius: 12px;
  --shadow: 0 4px 24px rgba(0,0,0,0.4);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 14px; }
body {
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  overflow: hidden;
  display: flex;
  -webkit-font-smoothing: antialiased;
}

/* ─── SCROLLBAR ─── */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 10px; }

/* ─── LOGIN ─── */
#login-overlay {
  position: fixed; inset: 0;
  background: radial-gradient(ellipse at center, #0f1630 0%, var(--bg) 70%);
  z-index: 9999;
  display: flex; align-items: center; justify-content: center;
  transition: opacity 0.4s;
}
.login-box {
  width: 420px;
  background: var(--card);
  border: 1px solid var(--border2);
  border-radius: 24px;
  padding: 48px;
  box-shadow: 0 40px 80px rgba(0,0,0,0.6), 0 0 60px var(--accent-glow);
  text-align: center;
}
.login-logo {
  width: 72px; height: 72px;
  background: linear-gradient(135deg, #4f7ef8, #7c3aed);
  border-radius: 20px;
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 24px;
  box-shadow: 0 0 40px var(--accent-glow);
}
.login-box h1 { font-size: 26px; font-weight: 800; margin-bottom: 6px; letter-spacing: -0.5px; }
.login-box .sub { color: var(--text-dim); font-size: 14px; margin-bottom: 36px; }
.login-box input {
  width: 100%; background: rgba(255,255,255,0.04);
  border: 1px solid var(--border2);
  padding: 14px 16px; border-radius: 10px;
  color: var(--text); font-family: inherit; font-size: 14px;
  margin-bottom: 14px; outline: none; transition: border-color 0.2s;
}
.login-box input:focus { border-color: var(--accent); background: rgba(79,126,248,0.06); }
.login-btn {
  width: 100%; padding: 15px;
  background: linear-gradient(135deg, #4f7ef8, #6366f1);
  border: none; border-radius: 10px;
  color: white; font-family: inherit; font-weight: 700; font-size: 15px;
  cursor: pointer; transition: all 0.2s; margin-top: 4px;
  box-shadow: 0 8px 24px var(--accent-glow);
}
.login-btn:hover { transform: translateY(-2px); box-shadow: 0 12px 32px var(--accent-glow); }
.login-btn:active { transform: translateY(0); }
.login-hint { margin-top: 20px; font-size: 12px; color: var(--text-muted); }

/* ─── SIDEBAR ─── */
.sidebar {
  width: 240px; min-width: 240px;
  background: var(--sidebar);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  padding: 20px 14px;
  transition: width 0.3s;
}
.logo-area {
  display: flex; align-items: center; gap: 10px;
  padding: 6px 8px; margin-bottom: 32px;
}
.logo-icon {
  width: 36px; height: 36px; min-width: 36px;
  background: linear-gradient(135deg, #4f7ef8, #7c3aed);
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 0 16px var(--accent-glow);
}
.logo-text { font-size: 15px; font-weight: 800; letter-spacing: -0.3px; }
.logo-sub { font-size: 10px; color: var(--text-dim); margin-top: 1px; }

.nav-section-title {
  font-size: 10px; font-weight: 700; color: var(--text-muted);
  text-transform: uppercase; letter-spacing: 1.2px;
  padding: 0 10px; margin-bottom: 8px; margin-top: 16px;
}
.nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 12px; border-radius: 8px;
  color: var(--text-dim); font-weight: 500; font-size: 13px;
  cursor: pointer; transition: all 0.18s; margin-bottom: 2px;
  border: none; background: none; width: 100%; text-align: left;
}
.nav-item svg { width: 16px; height: 16px; opacity: 0.7; flex-shrink: 0; }
.nav-item:hover { background: rgba(255,255,255,0.04); color: var(--text); }
.nav-item.active {
  background: var(--accent-dim);
  color: var(--accent);
  font-weight: 600;
}
.nav-item.active svg { opacity: 1; }
.nav-bottom { margin-top: auto; }

/* ─── USER BADGE (sidebar bottom) ─── */
.user-badge {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 10px;
  background: var(--card2); border-radius: 10px;
  border: 1px solid var(--border);
  margin-top: 8px;
}
.avatar {
  width: 34px; height: 34px; border-radius: 50%;
  background: linear-gradient(135deg, var(--accent), #7c3aed);
  display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: 13px; flex-shrink: 0; color: white;
}
.user-badge-name { font-size: 12px; font-weight: 600; line-height: 1.3; }
.user-badge-role { font-size: 10px; color: var(--text-dim); }

/* ─── MAIN ─── */
.main {
  flex: 1; display: flex; flex-direction: column; overflow: hidden;
  min-width: 0;
}
.topbar {
  height: 62px; min-height: 62px;
  background: rgba(10,12,18,0.8); backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 28px; gap: 16px; z-index: 10;
}
.topbar-left { display: flex; align-items: center; gap: 16px; }
#page-title { font-size: 16px; font-weight: 700; }
.topbar-right { display: flex; align-items: center; gap: 14px; }

/* ─── LIVE CLOCK ─── */
.live-clock-box {
  display: flex; align-items: center; gap: 8px;
  background: var(--card2); border: 1px solid var(--border);
  padding: 6px 14px; border-radius: 8px;
}
.live-clock-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--green);
  box-shadow: 0 0 8px var(--green);
  animation: pulse 2s infinite;
}
@keyframes pulse {
  0%,100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.5; transform: scale(0.85); }
}
.live-clock-time { font-family: 'JetBrains Mono'; font-size: 13px; font-weight: 600; color: var(--green); }
.live-date { font-size: 11px; color: var(--text-dim); }

/* ─── CONTENT ─── */
.content {
  flex: 1; overflow-y: auto; padding: 28px;
  scrollbar-width: thin;
}

/* ─── CARDS ─── */
.card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 22px; margin-bottom: 20px; }
.card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; }
.card-title { font-size: 14px; font-weight: 700; }
.card-sub { font-size: 12px; color: var(--text-dim); margin-top: 2px; }
.section-label {
  font-size: 11px; font-weight: 700; color: var(--text-dim);
  text-transform: uppercase; letter-spacing: 1px;
  margin-bottom: 14px; display: block;
}

/* ─── KPI GRID ─── */
.kpi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 20px; }
.kpi-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 20px 18px;
  position: relative; overflow: hidden;
  transition: border-color 0.2s;
}
.kpi-card:hover { border-color: var(--border2); }
.kpi-card::before {
  content: '';
  position: absolute; top: 0; left: 0; width: 3px; height: 100%;
}
.kpi-comm::before { background: var(--accent); }
.kpi-wait::before { background: var(--amber); }
.kpi-qual::before { background: var(--purple); }
.kpi-mtg::before { background: var(--green); }
.kpi-total::before { background: var(--cyan); }
.kpi-label { font-size: 11px; color: var(--text-dim); font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 10px; }
.kpi-val { font-family: 'JetBrains Mono'; font-size: 22px; font-weight: 600; line-height: 1.1; }
.kpi-sub { font-size: 11px; color: var(--text-dim); margin-top: 6px; }
.kpi-icon {
  position: absolute; right: 14px; top: 14px;
  width: 32px; height: 32px; border-radius: 8px;
  display: flex; align-items: center; justify-content: center; font-size: 15px;
}

/* ─── PROGRESS ─── */
.prog-bar {
  height: 8px; background: rgba(255,255,255,0.05);
  border-radius: 10px; overflow: hidden; margin-top: 10px;
}
.prog-fill {
  height: 100%; border-radius: 10px;
  background: linear-gradient(90deg, var(--accent), #7c3aed);
  transition: width 0.8s cubic-bezier(0.22,1,0.36,1);
}
.prog-fill.green { background: linear-gradient(90deg, var(--green), #059669); }
.prog-fill.amber { background: linear-gradient(90deg, var(--amber), #d97706); }
.prog-fill.red { background: linear-gradient(90deg, var(--red), #dc2626); }

/* ─── TABLE ─── */
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
thead th {
  text-align: left; padding: 10px 14px;
  color: var(--text-dim); font-size: 11px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.8px;
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
}
tbody td {
  padding: 13px 14px;
  border-bottom: 1px solid var(--border);
  font-family: 'JetBrains Mono';
  font-size: 12px;
}
tbody td.name { font-family: 'Inter'; font-size: 13px; font-weight: 600; }
tbody td.normal { font-family: 'Inter'; }
tbody tr:hover td { background: rgba(255,255,255,0.015); }
tbody tr:last-child td { border-bottom: none; }

/* ─── BADGE ─── */
.badge {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 3px 9px; border-radius: 20px;
  font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px;
}
.badge-green { background: var(--green-dim); color: var(--green); }
.badge-amber { background: var(--amber-dim); color: var(--amber); }
.badge-red { background: var(--red-dim); color: var(--red); }
.badge-blue { background: var(--accent-dim); color: var(--accent); }
.badge-purple { background: var(--purple-dim); color: var(--purple); }
.badge-cyan { background: var(--cyan-dim); color: var(--cyan); }

/* ─── FORMS ─── */
.form-group { margin-bottom: 18px; }
.form-label { display: block; font-size: 12px; font-weight: 600; color: var(--text-dim); margin-bottom: 7px; text-transform: uppercase; letter-spacing: 0.6px; }
.form-control {
  width: 100%; background: rgba(255,255,255,0.04);
  border: 1px solid var(--border2); padding: 12px 14px;
  border-radius: 9px; color: var(--text);
  font-family: inherit; font-size: 13px; outline: none;
  transition: border-color 0.2s, background 0.2s;
}
.form-control:focus { border-color: var(--accent); background: rgba(79,126,248,0.06); }
select.form-control { cursor: pointer; }
select.form-control option { background: #1a1f2b; }
textarea.form-control { resize: vertical; min-height: 200px; font-family: 'JetBrains Mono'; font-size: 11px; line-height: 1.6; }

/* ─── BUTTONS ─── */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 7px;
  padding: 10px 18px; border-radius: 8px;
  border: none; font-family: inherit; font-weight: 600; font-size: 13px;
  cursor: pointer; transition: all 0.18s; white-space: nowrap;
}
.btn:active { transform: scale(0.97); }
.btn-primary { background: var(--accent); color: white; box-shadow: 0 4px 16px var(--accent-glow); }
.btn-primary:hover { background: #5a88ff; }
.btn-ghost { background: rgba(255,255,255,0.05); color: var(--text); border: 1px solid var(--border2); }
.btn-ghost:hover { background: rgba(255,255,255,0.09); }
.btn-danger { background: var(--red-dim); color: var(--red); border: 1px solid rgba(239,68,68,0.2); }
.btn-danger:hover { background: rgba(239,68,68,0.2); }
.btn-sm { padding: 6px 12px; font-size: 12px; }
.btn-full { width: 100%; }

/* ─── GRID LAYOUTS ─── */
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
.grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; }
.flex { display: flex; }
.flex-between { display: flex; justify-content: space-between; align-items: center; }
.flex-center { display: flex; align-items: center; }
.gap-8 { gap: 8px; }
.gap-12 { gap: 12px; }
.gap-16 { gap: 16px; }

/* ─── AGENT ROW (team view) ─── */
.agent-row {
  display: flex; align-items: center; gap: 16px;
  padding: 14px 18px;
  background: var(--card); border: 1px solid var(--border);
  border-radius: 10px; margin-bottom: 10px;
  transition: border-color 0.2s;
}
.agent-row:hover { border-color: var(--border2); }
.agent-avatar {
  width: 42px; height: 42px; border-radius: 50%; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: 14px; color: white;
}
.agent-info { flex: 1; min-width: 0; }
.agent-name { font-size: 14px; font-weight: 700; }
.agent-id { font-size: 11px; color: var(--text-dim); font-family: 'JetBrains Mono'; }
.agent-prog { flex: 2; min-width: 0; }
.agent-pct { font-family: 'JetBrains Mono'; font-size: 16px; font-weight: 700; text-align: right; min-width: 60px; }
.agent-hours { font-size: 11px; color: var(--text-dim); font-family: 'JetBrains Mono'; text-align: right; min-width: 100px; }

/* ─── REAL-TIME PRODUCTION PANEL ─── */
.realtime-panel {
  background: var(--card2); border: 1px solid var(--border2);
  border-radius: var(--radius); padding: 20px;
  margin-bottom: 20px;
  position: relative; overflow: hidden;
}
.realtime-panel::after {
  content: '';
  position: absolute; inset: 0;
  background: radial-gradient(ellipse at top right, rgba(79,126,248,0.06) 0%, transparent 60%);
  pointer-events: none;
}
.realtime-header { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
.realtime-title { font-size: 14px; font-weight: 700; }
.realtime-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; }
.rt-item {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 10px; padding: 14px 12px; text-align: center;
}
.rt-label { font-size: 10px; color: var(--text-dim); font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 8px; }
.rt-val { font-family: 'JetBrains Mono'; font-size: 18px; font-weight: 600; }
.rt-sub { font-size: 10px; color: var(--text-muted); margin-top: 4px; }

/* ─── CHART WRAPPER ─── */
.chart-wrap { position: relative; }

/* ─── BREAKDOWN BARS ─── */
.breakdown-bar { display: flex; gap: 3px; height: 10px; border-radius: 6px; overflow: hidden; margin: 10px 0; }
.bb-comm { background: var(--accent); }
.bb-wait { background: var(--amber); }
.bb-qual { background: var(--purple); }
.bb-mtg { background: var(--green); }

/* ─── TOAST ─── */
#toast-container {
  position: fixed; bottom: 24px; right: 24px;
  z-index: 99999; display: flex; flex-direction: column; gap: 8px;
  pointer-events: none;
}
.toast {
  background: var(--card2); border: 1px solid var(--border2);
  border-left: 3px solid var(--accent);
  padding: 12px 18px; border-radius: 10px;
  font-size: 13px; font-weight: 500;
  box-shadow: 0 8px 30px rgba(0,0,0,0.5);
  animation: toastIn 0.3s ease-out;
  pointer-events: all;
}
.toast.success { border-left-color: var(--green); }
.toast.error { border-left-color: var(--red); }
.toast.info { border-left-color: var(--cyan); }
@keyframes toastIn {
  from { opacity: 0; transform: translateX(20px); }
  to { opacity: 1; transform: translateX(0); }
}

/* ─── MODAL ─── */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.7);
  backdrop-filter: blur(4px); z-index: 9000;
  display: flex; align-items: center; justify-content: center;
}
.modal {
  background: var(--card); border: 1px solid var(--border2);
  border-radius: 16px; padding: 32px; width: 480px; max-width: 95vw;
  box-shadow: var(--shadow);
  animation: modalIn 0.25s ease-out;
}
.modal-title { font-size: 18px; font-weight: 700; margin-bottom: 6px; }
.modal-sub { font-size: 13px; color: var(--text-dim); margin-bottom: 24px; }
@keyframes modalIn {
  from { opacity: 0; transform: scale(0.95); }
  to { opacity: 1; transform: scale(1); }
}

/* ─── DIVIDER ─── */
.divider { height: 1px; background: var(--border); margin: 20px 0; }

/* ─── SUMMARY ROW (in detail table) ─── */
.summary-row td { background: rgba(79,126,248,0.05); font-weight: 700; color: var(--text); }

/* ─── STATUS DOTS ─── */
.dot-green { display: inline-block; width: 7px; height: 7px; border-radius: 50%; background: var(--green); margin-right: 5px; }
.dot-amber { display: inline-block; width: 7px; height: 7px; border-radius: 50%; background: var(--amber); margin-right: 5px; }
.dot-red { display: inline-block; width: 7px; height: 7px; border-radius: 50%; background: var(--red); margin-right: 5px; }

/* ─── IMPORT ZONE ─── */
.import-tip {
  background: var(--cyan-dim); border: 1px solid rgba(34,211,238,0.2);
  border-radius: 8px; padding: 12px 16px;
  font-size: 12px; color: var(--cyan); margin-bottom: 16px;
  line-height: 1.6;
}
.import-format {
  background: rgba(0,0,0,0.3); border-radius: 8px;
  padding: 12px 14px; font-family: 'JetBrains Mono';
  font-size: 11px; color: var(--text-dim); line-height: 1.7;
  margin-bottom: 16px; overflow-x: auto; white-space: pre;
}

/* ─── MTG LOG ─── */
.mtg-log-item {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 14px;
  background: var(--card2); border-radius: 8px;
  margin-bottom: 6px; font-size: 13px;
}
.mtg-log-agent { font-weight: 600; flex: 1; }
.mtg-log-date { font-family: 'JetBrains Mono'; font-size: 11px; color: var(--text-dim); }
.mtg-log-dur { font-family: 'JetBrains Mono'; font-weight: 600; color: var(--green); }

/* ─── PERIOD SELECTOR ─── */
.period-select {
  background: var(--card2); border: 1px solid var(--border2);
  color: var(--text); padding: 7px 12px; border-radius: 8px;
  font-family: inherit; font-size: 13px; outline: none; cursor: pointer;
}

/* ─── EMPTY STATE ─── */
.empty-state {
  text-align: center; padding: 60px 20px; color: var(--text-dim);
}
.empty-state svg { width: 48px; height: 48px; margin-bottom: 14px; opacity: 0.3; }
.empty-state p { font-size: 14px; }

/* ─── INFO BOX ─── */
.info-box {
  background: var(--accent-dim); border: 1px solid rgba(79,126,248,0.2);
  border-radius: 9px; padding: 14px 16px;
  font-size: 13px; color: var(--text-dim); margin-bottom: 16px;
}
.info-box strong { color: var(--accent); }
</style>
</head>
<body>

<!-- TOAST CONTAINER -->
<div id="toast-container"></div>

<!-- LOGIN OVERLAY -->
<div id="login-overlay">
  <div class="login-box">
    <div class="login-logo">
      <svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5">
        <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
      </svg>
    </div>
    <h1>ASP Connect PRO</h1>
    <p class="sub">Logiciel de Pointage &amp; Performance</p>
    <input type="text" id="log-id" placeholder="Identifiant (ex: 06980713)" autocomplete="off">
    <input type="password" id="log-pw" placeholder="Mot de passe" onkeydown="if(event.key==='Enter')Auth.login()">
    <button class="login-btn" onclick="Auth.login()">Se connecter</button>
    <div id="login-error" style="color:var(--red);font-size:12px;margin-top:12px;display:none;">Identifiants incorrects</div>
    <p class="login-hint">Admin : SUPER / 1234</p>
  </div>
</div>

<!-- SIDEBAR -->
<aside class="sidebar">
  <div class="logo-area">
    <div class="logo-icon">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5">
        <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
      </svg>
    </div>
    <div>

<script>
// ═══════════════════════════════════════════════════════════
//  CONFIGURATION MÉTIER
// ═══════════════════════════════════════════════════════════
const PERIODS = {
  '2026-03': { label: 'Mars 2026',  goalH: 132, days: 22 },
  '2026-04': { label: 'Avril 2026', goalH: 126, days: 21 },
  '2026-05': { label: 'Mai 2026',   goalH: 132, days: 22 },
};
const QUAL_CAP_SEC = 1800; // 30 min/jour max
const DB_KEY = 'asp_pro_v3';

// ═══════════════════════════════════════════════════════════
//  STATE & STORAGE
// ═══════════════════════════════════════════════════════════
let DB = (() => {
  const raw = localStorage.getItem(DB_KEY);
  if (raw) return JSON.parse(raw);
  // Données de démo
  const demo = {
    currentPeriod: '2026-04',
    agents: [
      { id: '06980713',  name: 'Houyem Haddad',   pw: '0001', color: '#4f7ef8' },
      { id: '104806005', name: 'Amal Ainseba',     pw: '0002', color: '#10b981' },
      { id: '207113002', name: 'Fatima Benzara',   pw: '0003', color: '#f59e0b' },
      { id: '309220104', name: 'Sara Ouali',       pw: '0004', color: '#a78bfa' },
      { id: '415300205', name: 'Nadia Chraibi',    pw: '0005', color: '#22d3ee' },
    ],
    records: {},  // agentId → [ {period, date, comm, wait, qual, mtg} ]
    mtg_log: [],  // [{agentId, date, period, durMin, type, note}]
  };
  // Seed demo records
  const agents = demo.agents;
  agents.forEach((ag, ai) => {
    demo.records[ag.id] = [];
    const base = [ai*600+3000, ai*300+2500, ai*200+1800];
    for (let d = 1; d <= 18; d++) {
      const dow = new Date(2026,3,d).getDay();
      if (dow === 0 || dow === 6) continue;
      demo.records[ag.id].push({
        period: '2026-04',
        date: `2026-04-${String(d).padStart(2,'0')}`,
        comm: base[0] + Math.floor(Math.random()*1800),
        wait: base[1] + Math.floor(Math.random()*900),
        qual: 1200 + Math.floor(Math.random()*1200),
        mtg: 0
      });
    }
    demo.records[ag.id].push({
      period: '2026-03',
      date: '2026-03-31',
      comm: base[0], wait: base[1], qual: base[2], mtg: 0
    });
  });
  demo.mtg_log.push(
    { agentId:'06980713',  date:'2026-04-07', period:'2026-04', durMin:30, type:'coaching', note:'Débriefing appels' },
    { agentId:'104806005', date:'2026-04-05', period:'2026-04', durMin:45, type:'reunion', note:'Réunion équipe' }
  );
  // Apply mtg to records
  demo.mtg_log.forEach(m => {
    const rec = demo.records[m.agentId];
    if (!rec) return;
    const day = rec.find(r => r.date === m.date);
    if (day) day.mtg += m.durMin * 60;
    else rec.push({ period: m.period, date: m.date, comm:0, wait:0, qual:0, mtg: m.durMin*60 });
  });
  localStorage.setItem(DB_KEY, JSON.stringify(demo));
  return demo;
})();

function saveDB() { localStorage.setItem(DB_KEY, JSON.stringify(DB)); }

// ═══════════════════════════════════════════════════════════
//  UTILITIES
// ═══════════════════════════════════════════════════════════
const Utils = {
  hmsToSec(hms) {
    if (!hms || typeof hms !== 'string') return 0;
    hms = hms.trim();
    if (!hms.includes(':')) return parseInt(hms) || 0;
    const parts = hms.split(':').map(Number);
    if (parts.length === 3) return parts[0]*3600 + parts[1]*60 + parts[2];
    if (parts.length === 2) return parts[0]*60 + parts[1];
    return 0;
  },
  fmtHms(sec) {
    sec = Math.floor(sec);
    const h = Math.floor(sec / 3600);
    const m = Math.floor((sec % 3600) / 60);
    const s = sec % 60;
    return `${h}h${String(m).padStart(2,'0')}`;
  },
  fmtHmsLong(sec) {
    sec = Math.floor(sec);
    const h = Math.floor(sec / 3600);
    const m = Math.floor((sec % 3600) / 60);
    const s = sec % 60;
    return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  },
  fmtDate(d) { return d.split('-').reverse().join('/'); },
  getInitials(name) {
    return name.split(' ').slice(0,2).map(w=>w[0]).join('').toUpperCase();
  },
  progColor(pct) {
    if (pct >= 90) return 'green';
    if (pct >= 65) return 'amber';
    return 'red';
  },
  progBadge(pct) {
    if (pct >= 90) return 'badge-green';
    if (pct >= 65) return 'badge-amber';
    return 'badge-red';
  },
  calcAgent(agentId, period) {
    const recs = (DB.records[agentId] || []).filter(r => r.period === period);
    let tComm=0, tWait=0, tQualReal=0, tQualPaid=0, tMtg=0;
    recs.forEach(r => {
      tComm     += (r.comm || 0);
      tWait     += (r.wait || 0);
      tQualReal += (r.qual || 0);
      tQualPaid += Math.min(r.qual || 0, QUAL_CAP_SEC);
      tMtg      += (r.mtg  || 0);
    });
    const totalSec = tComm + tWait + tQualPaid + tMtg;
    const hours    = totalSec / 3600;
    const goalH    = PERIODS[period]?.goalH || 132;
    const progress = Math.min(100, (hours / goalH) * 100);
    return { tComm, tWait, tQualPaid, tQualReal, tMtg, totalSec, hours, progress, goalH, recs };
  },
  todayStr() { return new Date().toISOString().split('T')[0]; },
};

// ═══════════════════════════════════════════════════════════
//  AUTH
// ═══════════════════════════════════════════════════════════
const Auth = {
  cur: null,
  login() {
    const id = document.getElementById('log-id').value.trim();
    const pw = document.getElementById('log-pw').value;
    document.getElementById('login-error').style.display = 'none';
    if (id === 'SUPER' && pw === '1234') {
      Auth.cur = { role:'admin', name:'Superviseur', id:'SUPER', color:'#ef4444' };
      App.boot('admin');
    } else {
      const ag = DB.agents.find(a => a.id === id && a.pw === pw);
      if (ag) {
        Auth.cur = { ...ag, role:'agent' };
        App.boot('agent');
      } else {
        document.getElementById('login-error').style.display = 'block';
      }
    }
  },
  logout() {
    Auth.cur = null;
    location.reload();
  }
};

// ═══════════════════════════════════════════════════════════
//  APP CORE
// ═══════════════════════════════════════════════════════════
const App = {
  period: DB.currentPeriod || '2026-04',
  clockInterval: null,

  boot(role) {
    document.getElementById('login-overlay').style.opacity = '0';
    setTimeout(() => document.getElementById('login-overlay').style.display = 'none', 400);
    document.getElementById('sidebar-name').textContent = Auth.cur.name;
    document.getElementById('sidebar-role').textContent = role === 'admin' ? 'Administrateur' : 'Agent';
    document.getElementById('sidebar-avatar').textContent = Utils.getInitials(Auth.cur.name);
    document.getElementById('sidebar-avatar').style.background = Auth.cur.color || '#4f7ef8';
    document.getElementById('nav-' + role).style.display = 'block';
    // Populate period select
    const sel = document.getElementById('period-select');
    sel.value = App.period;
    App.startClock();
    Router.go(role + '-' + (role==='admin' ? 'team' : 'dash'));
  },

  changePeriod(val) {
    App.period = val;
    DB.currentPeriod = val;
    saveDB();
    // Re-render current view
    const active = document.querySelector('.nav-item.active');
    if (active) active.click();
  },

  startClock() {
    const updateClock = () => {
      const now = new Date();
      document.getElementById('live-time').textContent = now.toLocaleTimeString('fr-FR');
      document.getElementById('live-date').textContent = now.toLocaleDateString('fr-FR', {weekday:'short', day:'2-digit', month:'short'});
    };
    updateClock();
    App.clockInterval = setInterval(updateClock, 1000);
  },

  toast(msg, type='success') {
    const c = document.getElementById('toast-container');
    const el = document.createElement('div');
    el.className = `toast ${type}`;
    el.textContent = msg;
    c.appendChild(el);
    setTimeout(() => { el.style.opacity='0'; el.style.transition='opacity 0.3s'; setTimeout(()=>el.remove(),300); }, 3000);
  }
};

// ═══════════════════════════════════════════════════════════
//  ROUTER
// ═══════════════════════════════════════════════════════════
const Router = {
  go(path, el) {
    if (el) {
      const navParent = el.closest('[id^="nav-"]');
      if (navParent) navParent.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
      el.classList.add('active');
    }
    const titles = {
      'agent-dash':   'Tableau de bord',
      'agent-hist':   'Historique détaillé',
      'agent-stats':  'Mes statistiques',
      'admin-team':   'Vue équipe',
      'admin-detail': 'Détail par agent',
      'admin-import': 'Import Vicidial',
      'admin-mtg':    'Réunions & Coaching',
      'admin-agents': 'Gestion des agents',
      'admin-periodes':'Gestion des périodes',
    };
    document.getElementById('page-title').textContent = titles[path] || path;
    Views[path]?.();
  }
};

// ═══════════════════════════════════════════════════════════
//  VIEWS
// ═══════════════════════════════════════════════════════════
const Views = {

  // ── AGENT DASHBOARD ───────────────────────────────────────
  'agent-dash'() {
    const s = Utils.calcAgent(Auth.cur.id, App.period);
    const periodCfg = PERIODS[App.period];
    const periodLabel = periodCfg?.label || App.period;
    const goalH = s.goalH;
    const remainSec = Math.max(0, goalH * 3600 - s.totalSec);
    const pct = s.progress;
    const pc = Utils.progColor(pct);
    const badgeClass = Utils.progBadge(pct);

    // Today record
    const today = Utils.todayStr();
    const todayRec = s.recs.find(r => r.date === today);
    const tComm  = todayRec?.comm || 0;
    const tWait  = todayRec?.wait || 0;
    const tQual  = todayRec?.qual || 0;
    const tMtg   = todayRec?.mtg  || 0;
    const tQualP = Math.min(tQual, QUAL_CAP_SEC);
    const tTotal = tComm + tWait + tQualP + tMtg;

    // Breakdown widths (mensuel)
    const bTot = Math.max(1, s.tComm + s.tWait + s.tQualPaid + s.tMtg);
    const bComm = (s.tComm / bTot * 100).toFixed(1);
    const bWait = (s.tWait / bTot * 100).toFixed(1);
    const bQual = (s.tQualPaid / bTot * 100).toFixed(1);
    const bMtg  = (s.tMtg  / bTot * 100).toFixed(1);

    document.getElementById('app-view').innerHTML = `
      <!-- REALTIME TODAY -->
      <div class="realtime-panel">
        <div class="realtime-header">
          <div class="live-clock-dot"></div>
          <span class="realtime-title">Production du jour — <span style="color:var(--text-dim);font-size:13px;font-weight:500">${Utils.fmtDate(today)}</span></span>
          ${todayRec ? '' : '<span class="badge badge-amber">Aucune donnée aujourd\'hui</span>'}
        </div>
        <div class="realtime-grid">
          <div class="rt-item">
            <div class="rt-label" style="color:var(--accent)">Communication</div>
            <div class="rt-val" style="color:var(--accent)">${Utils.fmtHms(tComm)}</div>
            <div class="rt-sub">Temps appels</div>
          </div>
          <div class="rt-item">
            <div class="rt-label" style="color:var(--amber)">Attente fiches</div>
            <div class="rt-val" style="color:var(--amber)">${Utils.fmtHms(tWait)}</div>
            <div class="rt-sub">Temps dispo</div>
          </div>
          <div class="rt-item">
            <div class="rt-label" style="color:var(--purple)">Qualification</div>
            <div class="rt-val" style="color:var(--purple)">${Utils.fmtHms(tQualP)}</div>
            <div class="rt-sub">${tQual > QUAL_CAP_SEC ? `<span style="color:var(--red)">⚠ +${Utils.fmtHms(tQual - QUAL_CAP_SEC)} hors plafond</span>` : 'Sous le plafond 30min'}</div>
          </div>
          <div class="rt-item">
            <div class="rt-label" style="color:var(--green)">Réunions</div>
            <div class="rt-val" style="color:var(--green)">${Utils.fmtHms(tMtg)}</div>
            <div class="rt-sub">Coaching/formation</div>
          </div>
          <div class="rt-item" style="border-left:2px solid var(--cyan);">
            <div class="rt-label" style="color:var(--cyan)">Total journée</div>
            <div class="rt-val" style="color:var(--cyan)">${Utils.fmtHms(tTotal)}</div>
            <div class="rt-sub">Temps payable</div>
          </div>
        </div>
      </div>

      <!-- KPI MENSUEL -->
      <div class="kpi-grid">
        <div class="kpi-card kpi-total">
          <div class="kpi-label">Total Payé — ${periodLabel}</div>
          <div class="kpi-val" style="color:var(--cyan)">${Utils.fmtHms(s.totalSec)}</div>
          <div class="kpi-sub">Objectif : ${goalH}h</div>
          <div class="prog-bar" style="margin-top:12px">
            <div class="prog-fill ${pc}" style="width:${pct}%"></div>
          </div>
          <div style="display:flex;justify-content:space-between;margin-top:6px;font-size:11px;color:var(--text-dim)">
            <span>${pct.toFixed(1)}% atteint</span>
            <span>Reste : ${Utils.fmtHms(remainSec)}</span>
          </div>
        </div>
        <div class="kpi-card kpi-comm">
          <div class="kpi-icon" style="background:var(--accent-dim)">📞</div>
          <div class="kpi-label">Communication</div>
          <div class="kpi-val" style="color:var(--accent)">${Utils.fmtHms(s.tComm)}</div>
          <div class="kpi-sub">${((s.tComm/Math.max(1,s.totalSec))*100).toFixed(0)}% du total</div>
        </div>
        <div class="kpi-card kpi-wait">
          <div class="kpi-icon" style="background:var(--amber-dim)">⏳</div>
          <div class="kpi-label">Attente fiches</div>
          <div class="kpi-val" style="color:var(--amber)">${Utils.fmtHms(s.tWait)}</div>
          <div class="kpi-sub">${((s.tWait/Math.max(1,s.totalSec))*100).toFixed(0)}% du total</div>
        </div>
        <div class="kpi-card kpi-qual">
          <div class="kpi-icon" style="background:var(--purple-dim)">📝</div>
          <div class="kpi-label">Qualification</div>
          <div class="kpi-val" style="color:var(--purple)">${Utils.fmtHms(s.tQualPaid)}</div>
          <div class="kpi-sub">
            Réel : ${Utils.fmtHms(s.tQualReal)}
            ${s.tQualReal > s.tQualPaid ? `<br><span style="color:var(--red)">⚠ ${Utils.fmtHms(s.tQualReal-s.tQualPaid)} hors plafond</span>` : ''}
          </div>
        </div>
      </div>

      <div class="grid-2">
        <!-- RÉPARTITION -->
        <div class="card">
          <div class="card-header">
            <div>
              <div class="card-title">Répartition du temps</div>
              <div class="card-sub">${periodLabel}</div>
            </div>
          </div>
          <div style="height:220px"><canvas id="chart-pie"></canvas></div>
          <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:14px;font-size:12px">
            <span style="color:var(--accent)">■ Communication ${bComm}%</span>
            <span style="color:var(--amber)">■ Attente ${bWait}%</span>
            <span style="color:var(--purple)">■ Qualification ${bQual}%</span>
            <span style="color:var(--green)">■ Réunions ${bMtg}%</span>
          </div>
        </div>

        <!-- PROGRESSION CUMULÉE -->
        <div class="card">
          <div class="card-header">
            <div>
              <div class="card-title">Progression cumulée</div>
              <div class="card-sub">Heures payables / objectif</div>
            </div>
            <span class="badge ${badgeClass}">${pct.toFixed(1)}%</span>
          </div>
          <div style="height:220px"><canvas id="chart-prog"></canvas></div>
        </div>
      </div>

      <!-- RÉUNIONS du mois -->
      <div class="card">
        <div class="card-header">
          <div class="card-title">Réunions & Coaching ce mois</div>
          <span class="badge badge-green">${Utils.fmtHms(s.tMtg)} total</span>
        </div>
        ${(() => {
          const logs = DB.mtg_log.filter(m => m.agentId === Auth.cur.id && m.period === App.period);
          if (!logs.length) return '<div class="empty-state" style="padding:20px"><p>Aucune réunion enregistrée ce mois</p></div>';
          const types = {coaching:'Coaching',reunion:'Réunion équipe',decorticage:'Décorticage',formation:'Formation'};
          return logs.map(m => `
            <div class="mtg-log-item">
              <div style="font-size:13px">📅</div>
              <div class="mtg-log-agent">${types[m.type]||m.type}</div>
              <div class="mtg-log-date">${Utils.fmtDate(m.date)}</div>
              <div class="mtg-log-dur">+${m.durMin}min</div>
              ${m.note ? `<div style="font-size:11px;color:var(--text-dim);flex:1">${m.note}</div>` : ''}
            </div>
          `).join('');
        })()}

  'admin-import'() {
    document.getElementById('app-view').innerHTML = `
      <div class="import-tip">
        <strong>Format Vicidial attendu :</strong> Fichier TXT/CSV exporté depuis Vicidial. Collez les lignes directement — le parser détecte automatiquement l'agent, la date et les temps (H:MM:SS ou secondes).
      </div>
      <div class="import-format">Exemple de ligne Vicidial :
"Haddad Houyem","06980713","ADMIN","","2026-04-03","200","5:06:31","","","1:02:14","","3:20:58","","0:28:11","0:00:00"
 └─ Col 0:Nom  └─ Col 1:ID  └─ Col 4:Date  └─ Col 9:Attente  └─ Col 11:Comm  └─ Col 13:Qual</div>

      <div class="card">
        <div class="card-header">
          <div class="card-title">Coller les données Vicidial</div>
          <div style="display:flex;gap:8px">
            <button class="btn btn-ghost btn-sm" onclick="document.getElementById('imp-raw').value=''">Effacer</button>
            <button class="btn btn-primary btn-sm" onclick="Views.doImport()">Analyser &amp; Importer</button>
          </div>
        </div>
        <textarea class="form-control" id="imp-raw" placeholder='Collez ici les lignes du rapport Vicidial...'></textarea>
        <div style="margin-top:12px;font-size:12px;color:var(--text-dim)">
          La période cible est : <strong style="color:var(--accent)">${PERIODS[App.period]?.label||App.period}</strong>
        </div>
      </div>

    `;

  doImport() {
    const raw = (document.getElementById('imp-raw')?.value || '').trim();
    if (!raw) return App.toast('Aucune donnée à importer', 'error');
    const lines = raw.split('\n').filter(l => l.trim());
    let count = 0, errors = 0, updated = 0;
    const preview = [];

    lines.forEach(line => {
      // Parse CSV with quotes
      const cols = line.split('","').map(c => c.replace(/^"|"$/g,'').trim());
      if (cols.length < 10) { errors++; return; }

      // Detect date (YYYY-MM-DD or DD/MM/YYYY)
      let date = cols[4] || '';
      if (date.includes('/')) {
        const p = date.split('/');
        date = p.length === 3 ? (p[2].length===4 ? `${p[2]}-${p[1].padStart(2,'0')}-${p[0].padStart(2,'0')}` : date) : date;
      }
      if (!/^\d{4}-\d{2}-\d{2}$/.test(date)) { errors++; return; }

      const id   = cols[1];
      const name = cols[0];
      const wait = Utils.hmsToSec(cols[9]  || '0');
      const comm = Utils.hmsToSec(cols[11] || '0');
      const qual = Utils.hmsToSec(cols[13] || '0');

      if (!id) { errors++; return; }

      // Auto-register agent
      if (!DB.agents.find(a => a.id === id)) {
        const colors = ['#4f7ef8','#10b981','#f59e0b','#a78bfa','#22d3ee','#ef4444'];
        DB.agents.push({ id, name: name||'Agent Inconnu', pw: '0000', color: colors[DB.agents.length%colors.length] });
      }
      if (!DB.records[id]) DB.records[id] = [];

      const existing = DB.records[id].find(r => r.date === date && r.period === App.period);
      const entry = { period: App.period, date, comm, wait, qual, mtg: existing?.mtg || 0 };
      if (existing) { Object.assign(existing, entry); updated++; }
      else { DB.records[id].push(entry); count++; }

      preview.push({ name: name||id, date, comm, wait, qual, qualP: Math.min(qual, QUAL_CAP_SEC) });
    });

    saveDB();

    const resHtml = preview.slice(0,10).map(p => `
      <tr>
        <td class="normal">${p.name}</td>
        <td class="normal">${Utils.fmtDate(p.date)}</td>
        <td style="color:var(--accent)">${Utils.fmtHms(p.comm)}</td>
        <td style="color:var(--amber)">${Utils.fmtHms(p.wait)}</td>
        <td style="color:var(--purple)">${Utils.fmtHms(p.qualP)}</td>
      </tr>
    `).join('');

    document.getElementById('imp-result').innerHTML = `
      <div class="card">
        <div class="card-header">
          <div class="card-title">Résultat de l'import</div>
          <div style="display:flex;gap:8px">
            <span class="badge badge-green">✓ ${count} nouvelles</span>
            <span class="badge badge-blue">↺ ${updated} mises à jour</span>
            ${errors ? `<span class="badge badge-red">⚠ ${errors} erreurs</span>` : ''}
          </div>
        </div>
        ${preview.length > 0 ? `
        <div class="table-wrap">
          <table>
            <thead><tr><th>Agent</th><th>Date</th><th>Communication</th><th>Attente</th><th>Qualification</th></tr></thead>
            <tbody>${resHtml}</tbody>
          </table>
        </div>
        ${preview.length > 10 ? `<p style="font-size:12px;color:var(--text-dim);margin-top:10px">… et ${preview.length-10} autres lignes importées</p>` : ''}
        ` : ''}
      </div>
    `;
    App.toast(`${count + updated} lignes importées avec succès`, 'success');
  },

  // ── ADMIN RÉUNIONS ────────────────────────────────────────
  'admin-mtg'() {
    const opts = DB.agents.map(a => `<option value="${a.id}">${a.name}</option>`).join('');
    const logs = DB.mtg_log.filter(m => m.period === App.period)
                           .sort((a,b) => b.date.localeCompare(a.date));
    const types = { coaching:'Coaching', reunion:'Réunion équipe', decorticage:'Décorticage appels', formation:'Formation' };

    document.getElementById('app-view').innerHTML = `
      <div class="grid-2">
        <div class="card">
          <div class="card-title" style="margin-bottom:20px">Ajouter du temps</div>
          <div class="form-group">
            <label class="form-label">Agent</label>
            <select class="form-control" id="mtg-ag">${opts}</select>
          </div>
          <div class="form-group">
            <label class="form-label">Date</label>
            <input type="date" class="form-control" id="mtg-date" value="${Utils.todayStr()}">
          </div>
          <div class="form-group">
            <label class="form-label">Durée (minutes)</label>
            <input type="number" class="form-control" id="mtg-dur" placeholder="Ex: 30" min="1" max="480">
          </div>
          <div class="form-group">
            <label class="form-label">Type</label>
            <select class="form-control" id="mtg-type">
              <option value="coaching">Coaching</option>
              <option value="reunion">Réunion équipe</option>
              <option value="decorticage">Décorticage appels</option>
              <option value="formation">Formation</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Note (optionnel)</label>
            <input type="text" class="form-control" id="mtg-note" placeholder="Ex: Débriefing résultats semaine">
          </div>
          <button class="btn btn-primary btn-full" onclick="Views.saveMtg()">Enregistrer le temps</button>
        </div>

        <div class="card">
          <div class="card-header">
            <div class="card-title">Historique — ${PERIODS[App.period]?.label}</div>
            <span class="badge badge-green">${logs.length} entrées</span>
          </div>
          <div id="mtg-log-list" style="max-height:520px;overflow-y:auto">
            ${logs.length === 0 ? '<div class="empty-state"><p>Aucune réunion ce mois</p></div>' :
              logs.map(m => {
                const ag = DB.agents.find(a => a.id === m.agentId);
                return `
                <div class="mtg-log-item">
                  <div class="avatar" style="background:${ag?.color||'#4f7ef8'};width:28px;height:28px;font-size:10px">${Utils.getInitials(ag?.name||m.agentId)}</div>
                  <div class="mtg-log-agent">${ag?.name||m.agentId}</div>
                  <span class="badge badge-purple" style="font-size:9px">${types[m.type]||m.type}</span>
                  <div class="mtg-log-date">${Utils.fmtDate(m.date)}</div>
                  <div class="mtg-log-dur">+${m.durMin}min</div>
                  <button class="btn btn-danger btn-sm" style="padding:4px 8px;font-size:11px" onclick="Views.deleteMtg('${m.agentId}','${m.date}',${m.durMin},'${m.type}')">✕</button>
                </div>
              `}).join('')}
          </div>
        </div>
      </div>
    `;
  },

  saveMtg() {
    const agId = document.getElementById('mtg-ag').value;
    const date = document.getElementById('mtg-date').value;
    const durMin = parseInt(document.getElementById('mtg-dur').value);
    const type = document.getElementById('mtg-type').value;
    const note = document.getElementById('mtg-note').value;
    if (!agId || !date || isNaN(durMin) || durMin <= 0)
      return App.toast('Remplissez tous les champs requis', 'error');

    // Add to mtg_log
    DB.mtg_log.push({ agentId:agId, date, period:App.period, durMin, type, note });

    // Update records
    if (!DB.records[agId]) DB.records[agId] = [];
    const day = DB.records[agId].find(r => r.date === date && r.period === App.period);
    if (day) day.mtg = (day.mtg||0) + durMin*60;
    else DB.records[agId].push({ period:App.period, date, comm:0, wait:0, qual:0, mtg:durMin*60 });

    saveDB();
    App.toast('Temps de réunion enregistré', 'success');
    Router.go('admin-mtg');
  },

  deleteMtg(agId, date, durMin, type) {
    if (!confirm('Supprimer cette entrée ?')) return;
    const idx = DB.mtg_log.findIndex(m => m.agentId===agId && m.date===date && m.durMin===durMin && m.type===type);
    if (idx > -1) DB.mtg_log.splice(idx,1);
    const day = (DB.records[agId]||[]).find(r => r.date===date && r.period===App.period);
    if (day) day.mtg = Math.max(0, (day.mtg||0) - durMin*60);
    saveDB();
    App.toast('Entrée supprimée', 'info');
    Router.go('admin-mtg');
  },

  // ── ADMIN GESTION AGENTS ──────────────────────────────────
  'admin-agents'() {
    const rows = DB.agents.map(ag => `
      <tr>
        <td>
          <div style="display:flex;align-items:center;gap:10px">
            <div class="avatar" style="background:${ag.color||'#4f7ef8'};width:32px;height:32px;font-size:11px">${Utils.getInitials(ag.name)}</div>
            <div class="name">${ag.name}</div>
          </div>
        </td>
        <td style="font-family:'JetBrains Mono'">${ag.id}</td>
        <td><span class="badge badge-blue">${ag.pw}</span></td>
        <td>
          <div style="display:flex;gap:6px">
            <button class="btn btn-ghost btn-sm" onclick="Views.openEditAgent('${ag.id}')">Modifier</button>
            <button class="btn btn-danger btn-sm" onclick="Views.deleteAgent('${ag.id}')">Supprimer</button>
          </div>
        </td>
      </tr>
    `).join('');

    document.getElementById('app-view').innerHTML = `
      <div class="card">
        <div class="card-header">
          <div class="card-title">Liste des agents (${DB.agents.length})</div>
          <button class="btn btn-primary btn-sm" onclick="Views.openAddAgent()">+ Ajouter un agent</button>
        </div>
        <div class="table-wrap">
          <table>
            <thead><tr><th>Nom</th><th>ID</th><th>Mot de passe</th><th>Actions</th></tr></thead>
            <tbody>${rows}</tbody>
          </table>
        </div>
      </div>
    `;
  },

  openAddAgent() {
    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    overlay.innerHTML = `
      <div class="modal">
        <div class="modal-title">Ajouter un agent</div>
        <div class="modal-sub">Le mot de passe sera communiqué directement à l'agent.</div>
        <div class="form-group"><label class="form-label">Nom complet</label><input class="form-control" id="m-name" placeholder="Prénom Nom"></div>
        <div class="form-group"><label class="form-label">Identifiant (ID Vicidial)</label><input class="form-control" id="m-id" placeholder="Ex: 06980713"></div>
        <div class="form-group"><label class="form-label">Mot de passe</label><input class="form-control" id="m-pw" placeholder="Ex: 0001"></div>
        <div class="form-group"><label class="form-label">Couleur</label>
          <select class="form-control" id="m-color">
            <option value="#4f7ef8">Bleu</option><option value="#10b981">Vert</option>
            <option value="#f59e0b">Orange</option><option value="#a78bfa">Violet</option>
            <option value="#22d3ee">Cyan</option><option value="#ef4444">Rouge</option>
          </select>
        </div>
        <div style="display:flex;gap:10px;margin-top:8px">
          <button class="btn btn-ghost" style="flex:1" onclick="this.closest('.modal-overlay').remove()">Annuler</button>
          <button class="btn btn-primary" style="flex:1" onclick="Views.confirmAddAgent()">Créer l'agent</button>
        </div>
      </div>`;
    document.body.appendChild(overlay);
  },

  confirmAddAgent() {
    const name  = document.getElementById('m-name')?.value.trim();
    const id    = document.getElementById('m-id')?.value.trim();
    const pw    = document.getElementById('m-pw')?.value.trim();
    const color = document.getElementById('m-color')?.value;
    if (!name||!id||!pw) return App.toast('Tous les champs sont requis', 'error');
    if (DB.agents.find(a=>a.id===id)) return App.toast('Cet ID existe déjà', 'error');
    DB.agents.push({id, name, pw, color});
    saveDB();
    document.querySelector('.modal-overlay')?.remove();
    App.toast(`Agent ${name} créé`, 'success');
    Router.go('admin-agents');
  },

  openEditAgent(id) {
    const ag = DB.agents.find(a=>a.id===id);
    if (!ag) return;
    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    overlay.innerHTML = `
      <div class="modal">
        <div class="modal-title">Modifier l'agent</div>
        <div class="modal-sub">ID : ${ag.id}</div>
        <div class="form-group"><label class="form-label">Nom complet</label><input class="form-control" id="m-name" value="${ag.name}"></div>
        <div class="form-group"><label class="form-label">Mot de passe</label><input class="form-control" id="m-pw" value="${ag.pw}"></div>
        <div style="display:flex;gap:10px;margin-top:8px">
          <button class="btn btn-ghost" style="flex:1" onclick="this.closest('.modal-overlay').remove()">Annuler</button>
          <button class="btn btn-primary" style="flex:1" onclick="Views.confirmEditAgent('${id}')">Enregistrer</button>
        </div>
      </div>`;
    document.body.appendChild(overlay);
  },

  confirmEditAgent(id) {
    const ag = DB.agents.find(a=>a.id===id);
    if (!ag) return;
    ag.name = document.getElementById('m-name')?.value.trim() || ag.name;
    ag.pw   = document.getElementById('m-pw')?.value.trim()   || ag.pw;
    saveDB();
    document.querySelector('.modal-overlay')?.remove();
    App.toast('Agent mis à jour', 'success');
    Router.go('admin-agents');
  },

  deleteAgent(id) {
    const ag = DB.agents.find(a=>a.id===id);
    if (!ag) return;
    if (!confirm(`Supprimer définitivement ${ag.name} et toutes ses données ?`)) return;
    DB.agents = DB.agents.filter(a=>a.id!==id);
    delete DB.records[id];
    DB.mtg_log = DB.mtg_log.filter(m=>m.agentId!==id);
    saveDB();
    App.toast(`Agent ${ag.name} supprimé`, 'info');
    Router.go('admin-agents');
  },

  // ── ADMIN PÉRIODES ────────────────────────────────────────
  'admin-periodes'() {
    const rows = Object.entries(PERIODS).map(([key, p]) => `
      <tr>
        <td class="normal">${p.label}</td>
        <td class="name">${key}</td>
        <td>${p.goalH}h</td>
        <td>${p.days} jours</td>
        <td>${Utils.fmtHms(p.goalH/p.days*3600)}/jour</td>
        <td>
          ${DB.agents.map(ag => {
            const s = Utils.calcAgent(ag.id, key);
            return `<span class="badge ${Utils.progBadge(s.progress)}" style="margin:2px">${ag.name.split(' ')[0]}: ${s.progress.toFixed(0)}%</span>`;
          }).join('')}
        </td>
      </tr>
    `).join('');

    document.getElementById('app-view').innerHTML = `
      <div class="card">
        <div class="card-header">
          <div class="card-title">Périodes configurées</div>
        </div>
        <div class="table-wrap">
          <table>
            <thead><tr><th>Période</th><th>Code</th><th>Objectif</th><th>Jours</th><th>Moy./jour</th><th>Avancement équipe</th></tr></thead>
            <tbody>${rows}</tbody>
          </table>
        </div>
      </div>
      <div class="info-box">
        <strong>Note :</strong> Pour ajouter de nouvelles périodes, modifiez la constante <code>PERIODS</code> dans le code source.
        Accord de base : <strong>6h/jour × jours ouvrés</strong>. Qualification plafonnée à <strong>30min/jour/agent</strong>.
      </div>
    `;
  },
};

// ═══════════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════════
window.addEventListener('DOMContentLoaded', () => {
  document.getElementById('log-id').focus();
  // Period select sync
  document.getElementById('period-select').value = App.period;
});
</script>
</body>
</html>
