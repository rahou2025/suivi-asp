<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ASP Connect PRO · Business Intelligence</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@400;500;600;700&display=swap');

/* ═══ RESET + ROOT ═════════════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 14px; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }

:root {
  /* Base palette — deep navy/slate */
  --bg:       #060810;
  --bg1:      #0b0e18;
  --bg2:      #101420;
  --bg3:      #161c2c;
  --bg4:      #1c2335;
  --surface:  #202738;

  /* Borders */
  --border:   rgba(255,255,255,.065);
  --border2:  rgba(255,255,255,.12);
  --border3:  rgba(255,255,255,.2);

  /* Text */
  --txt:      #dde4f0;
  --txt2:     #8a96b0;
  --txt3:     #4a5470;
  --txt4:     #2e3550;

  /* Accent — electric blue */
  --acc:      #3d78ff;
  --acc2:     #2563eb;
  --acc-glow: rgba(61,120,255,.25);
  --acc-dim:  rgba(61,120,255,.12);

  /* Semantic colors */
  --green:    #00d68f;
  --green-d:  rgba(0,214,143,.12);
  --green-g:  rgba(0,214,143,.3);
  --amber:    #ffb020;
  --amber-d:  rgba(255,176,32,.12);
  --red:      #ff4d4d;
  --red-d:    rgba(255,77,77,.12);
  --red-g:    rgba(255,77,77,.3);
  --purple:   #a78bfa;
  --purple-d: rgba(167,139,250,.12);
  --cyan:     #22d3ee;
  --cyan-d:   rgba(34,211,238,.12);
  --orange:   #fb923c;
  --orange-d: rgba(251,146,60,.12);

  /* Typography */
  --font-display: 'Syne', sans-serif;
  --font-body:    'DM Sans', sans-serif;
  --font-mono:    'JetBrains Mono', monospace;

  /* Spacing */
  --r: 10px;
  --r2: 14px;
  --r3: 20px;
  --sidebar-w: 248px;
}

body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--txt);
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* ═══ SCROLLBAR ═════════════════════════════════════════════════════ */
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--bg4); border-radius: 10px; }
::-webkit-scrollbar-thumb:hover { background: var(--surface); }

/* ═══ UPDATE BANNER ═════════════════════════════════════════════════ */
#banner {
  height: 36px;
  min-height: 36px;
  background: linear-gradient(90deg, rgba(61,120,255,.08), rgba(34,211,238,.05));
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 24px;
  font-size: 11.5px;
  flex-shrink: 0;
  gap: 12px;
}
.banner-left { display: flex; align-items: center; gap: 10px; min-width: 0; overflow: hidden; }
.pulse-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--green); box-shadow: 0 0 8px var(--green-g);
  animation: pulse-anim 2s ease-in-out infinite; flex-shrink: 0;
}
.pulse-dot.stale { background: var(--amber); box-shadow: 0 0 8px rgba(255,176,32,.3); }
.pulse-dot.none  { background: var(--txt3);  box-shadow: none; animation: none; }
@keyframes pulse-anim {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: .5; transform: scale(.8); }
}
.banner-label { color: var(--txt3); }
#b-date { font-family: var(--font-mono); font-weight: 600; color: var(--cyan); }
#b-date.none { color: var(--amber); }
#b-period { color: var(--txt3); }
#b-count { font-size: 11px; color: var(--txt3); }

/* ═══ APP BODY ═══════════════════════════════════════════════════════ */
.app-body { flex: 1; display: flex; overflow: hidden; }

/* ═══ SIDEBAR ════════════════════════════════════════════════════════ */
.sidebar {
  width: var(--sidebar-w);
  min-width: var(--sidebar-w);
  background: var(--bg1);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  padding: 18px 12px 16px;
  overflow-y: auto;
  overflow-x: hidden;
  flex-shrink: 0;
}
.sb-logo {
  display: flex; align-items: center; gap: 10px;
  padding: 4px 8px 4px 6px;
  margin-bottom: 26px;
}
.sb-logo-icon {
  width: 36px; height: 36px; min-width: 36px;
  background: linear-gradient(135deg, #3d78ff, #7c3aed);
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 4px 16px rgba(61,120,255,.35);
}
.sb-logo-text { flex: 1; min-width: 0; }
.sb-logo-name {
  font-family: var(--font-display);
  font-size: 15px; font-weight: 800;
  letter-spacing: -.4px;
  color: var(--txt);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.sb-logo-sub { font-size: 10px; color: var(--txt3); font-family: var(--font-mono); margin-top: 1px; }

.sb-section {
  font-size: 9.5px; font-weight: 700;
  color: var(--txt4); text-transform: uppercase; letter-spacing: 1.3px;
  padding: 0 10px; margin: 18px 0 7px;
  font-family: var(--font-display);
}
.sb-item {
  display: flex; align-items: center; gap: 9px;
  padding: 9px 10px; border-radius: 8px;
  color: var(--txt3); font-weight: 500; font-size: 12.5px;
  cursor: pointer; transition: all .15s;
  margin-bottom: 2px; border: none; background: none;
  width: 100%; text-align: left; white-space: nowrap;
  overflow: hidden; text-overflow: ellipsis;
}
.sb-item svg { width: 15px; height: 15px; opacity: .7; flex-shrink: 0; }
.sb-item:hover { background: rgba(255,255,255,.04); color: var(--txt); }
.sb-item.active {
  background: var(--acc-dim);
  color: var(--acc);
  font-weight: 600;
}
.sb-item.active svg { opacity: 1; }
.sb-item.alert { color: var(--red); }
.sb-item.alert.active { background: var(--red-d); }

.sb-footer { margin-top: auto; padding-top: 14px; border-top: 1px solid var(--border); }
.sb-user {
  display: flex; align-items: center; gap: 9px;
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 9px; padding: 9px 10px; margin-top: 8px;
}
.avatar {
  width: 32px; height: 32px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: 12px;
  color: #fff; flex-shrink: 0;
}
.sb-user-name { font-size: 12px; font-weight: 600; color: var(--txt); line-height: 1.3; }
.sb-user-role { font-size: 10px; color: var(--txt3); }

/* ═══ MAIN ════════════════════════════════════════════════════════════ */
.main-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }

.topbar {
  height: 60px; min-height: 60px;
  background: rgba(6,8,16,.9);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 28px; gap: 16px; flex-shrink: 0; z-index: 10;
}
#page-title {
  font-family: var(--font-display);
  font-size: 16px; font-weight: 700;
  color: var(--txt); letter-spacing: -.3px;
}
.topbar-right { display: flex; align-items: center; gap: 12px; }

.period-select {
  background: var(--bg2); border: 1px solid var(--border2);
  color: var(--txt); padding: 7px 12px; border-radius: 8px;
  font-family: var(--font-body); font-size: 12.5px;
  outline: none; cursor: pointer;
  transition: border-color .2s;
}
.period-select:hover { border-color: var(--border3); }
.period-select option { background: var(--bg2); }

.clock-widget {
  display: flex; align-items: center; gap: 8px;
  background: var(--bg2); border: 1px solid var(--border);
  padding: 6px 13px; border-radius: 8px;
}
.clock-time {
  font-family: var(--font-mono); font-size: 13px;
  font-weight: 600; color: var(--green);
}
.clock-date { font-size: 10.5px; color: var(--txt3); }

.view-content { flex: 1; overflow-y: auto; padding: 26px; }

/* ═══ GRID SYSTEMS ════════════════════════════════════════════════════ */
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
.grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
.grid-5 { display: grid; grid-template-columns: repeat(5, 1fr); gap: 14px; }
.grid-6 { display: grid; grid-template-columns: repeat(6, 1fr); gap: 14px; }
.mb16 { margin-bottom: 16px; }
.mb20 { margin-bottom: 20px; }
.mb24 { margin-bottom: 24px; }

/* ═══ KPI CARDS ═══════════════════════════════════════════════════════ */
.kpi-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--r2);
  padding: 18px 16px;
  position: relative;
  overflow: hidden;
  transition: border-color .2s, transform .15s;
}
.kpi-card:hover { border-color: var(--border2); transform: translateY(-1px); }
.kpi-card::before {
  content: ''; position: absolute;
  top: 0; left: 0; width: 3px; height: 100%;
  border-radius: 0;
}
.kpi-acc::before  { background: var(--acc); }
.kpi-green::before { background: var(--green); }
.kpi-amber::before { background: var(--amber); }
.kpi-red::before   { background: var(--red); }
.kpi-purple::before { background: var(--purple); }
.kpi-cyan::before  { background: var(--cyan); }
.kpi-orange::before { background: var(--orange); }

.kpi-label {
  font-size: 10.5px; color: var(--txt3);
  font-weight: 700; text-transform: uppercase;
  letter-spacing: .8px; margin-bottom: 8px;
  font-family: var(--font-display);
}
.kpi-value {
  font-family: var(--font-mono);
  font-size: 22px; font-weight: 700;
  line-height: 1.1; color: var(--txt);
}
.kpi-sub {
  font-size: 10.5px; color: var(--txt3);
  margin-top: 5px; line-height: 1.5;
}
.kpi-bar-wrap { height: 4px; background: rgba(255,255,255,.05); border-radius: 10px; overflow: hidden; margin-top: 9px; }
.kpi-bar-fill { height: 100%; border-radius: 10px; transition: width .8s cubic-bezier(.22,1,.36,1); }

/* ═══ CARDS ═══════════════════════════════════════════════════════════ */
.card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--r2);
  padding: 20px;
  margin-bottom: 18px;
}
.card-header {
  display: flex; align-items: center;
  justify-content: space-between;
  margin-bottom: 16px; flex-wrap: wrap; gap: 8px;
}
.card-title {
  font-family: var(--font-display);
  font-size: 13.5px; font-weight: 700; color: var(--txt);
}
.card-sub { font-size: 11.5px; color: var(--txt3); margin-top: 2px; }

/* ═══ TABLES ══════════════════════════════════════════════════════════ */
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 12.5px; }
thead th {
  text-align: left; padding: 10px 13px;
  color: var(--txt3); font-size: 10.5px; font-weight: 700;
  text-transform: uppercase; letter-spacing: .7px;
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
  font-family: var(--font-display);
}
tbody td {
  padding: 11px 13px;
  border-bottom: 1px solid var(--border);
  font-family: var(--font-mono); font-size: 11.5px;
  vertical-align: middle;
}
tbody td.text-cell { font-family: var(--font-body); font-size: 12.5px; }
tbody td.bold-cell { font-family: var(--font-body); font-weight: 700; }
tbody tr:hover td { background: rgba(255,255,255,.012); }
tbody tr:last-child td { border-bottom: none; }
.tr-total td { background: rgba(61,120,255,.06); font-weight: 700; }

/* ═══ BADGES ══════════════════════════════════════════════════════════ */
.badge {
  display: inline-flex; align-items: center; gap: 3px;
  padding: 2px 8px; border-radius: 20px;
  font-size: 9.5px; font-weight: 700;
  text-transform: uppercase; letter-spacing: .4px;
  font-family: var(--font-display);
}
.badge-green  { background: var(--green-d);  color: var(--green); }
.badge-amber  { background: var(--amber-d);  color: var(--amber); }
.badge-red    { background: var(--red-d);    color: var(--red); }
.badge-acc    { background: var(--acc-dim);  color: var(--acc); }
.badge-purple { background: var(--purple-d); color: var(--purple); }
.badge-cyan   { background: var(--cyan-d);   color: var(--cyan); }
.badge-orange { background: var(--orange-d); color: var(--orange); }

/* ═══ BUTTONS ═════════════════════════════════════════════════════════ */
.btn {
  display: inline-flex; align-items: center; justify-content: center;
  gap: 6px; padding: 9px 17px;
  border-radius: 8px; border: none;
  font-family: var(--font-body); font-weight: 600; font-size: 12.5px;
  cursor: pointer; transition: all .16s; white-space: nowrap;
}
.btn:active { transform: scale(.97); }
.btn-primary {
  background: var(--acc); color: #fff;
  box-shadow: 0 4px 14px rgba(61,120,255,.35);
}
.btn-primary:hover { background: #2563eb; }
.btn-ghost {
  background: rgba(255,255,255,.05);
  color: var(--txt); border: 1px solid var(--border2);
}
.btn-ghost:hover { background: rgba(255,255,255,.09); }
.btn-danger {
  background: var(--red-d); color: var(--red);
  border: 1px solid rgba(255,77,77,.2);
}
.btn-danger:hover { background: rgba(255,77,77,.2); }
.btn-green {
  background: var(--green-d); color: var(--green);
  border: 1px solid rgba(0,214,143,.2);
}
.btn-sm { padding: 5px 11px; font-size: 11.5px; }
.btn-full { width: 100%; }

/* ═══ FORMS ═══════════════════════════════════════════════════════════ */
.form-group { margin-bottom: 15px; }
.form-label {
  display: block; font-size: 10.5px; font-weight: 700;
  color: var(--txt3); margin-bottom: 5px;
  text-transform: uppercase; letter-spacing: .6px;
  font-family: var(--font-display);
}
.form-control {
  width: 100%;
  background: rgba(255,255,255,.04); border: 1px solid var(--border2);
  padding: 10px 13px; border-radius: 8px;
  color: var(--txt); font-family: var(--font-body); font-size: 12.5px;
  outline: none; transition: border-color .2s, background .2s;
}
.form-control:focus {
  border-color: var(--acc);
  background: rgba(61,120,255,.06);
}
select.form-control { cursor: pointer; }
select.form-control option { background: var(--bg2); }
textarea.form-control {
  resize: vertical; min-height: 160px;
  font-family: var(--font-mono); font-size: 11px; line-height: 1.75;
}

/* ═══ DIVIDER ═════════════════════════════════════════════════════════ */
.divider { height: 1px; background: var(--border); margin: 14px 0; }

/* ═══ INFO BOXES ══════════════════════════════════════════════════════ */
.info-box {
  background: var(--acc-dim); border: 1px solid rgba(61,120,255,.18);
  border-radius: 9px; padding: 12px 15px;
  font-size: 12.5px; color: var(--txt3);
  margin-bottom: 14px; line-height: 1.65;
}
.info-box.warning {
  background: var(--amber-d); border-color: rgba(255,176,32,.2); color: var(--amber);
}
.info-box.danger {
  background: var(--red-d); border-color: rgba(255,77,77,.2); color: var(--red);
}
.info-box.success {
  background: var(--green-d); border-color: rgba(0,214,143,.2); color: var(--green);
}
.code-block {
  background: rgba(0,0,0,.3); border-radius: 7px;
  padding: 10px 13px; font-family: var(--font-mono);
  font-size: 10.5px; color: var(--txt3); line-height: 1.75;
  margin-bottom: 14px; overflow-x: auto; white-space: pre;
}

/* ═══ DROP ZONE ════════════════════════════════════════════════════════ */
.drop-zone {
  border: 2px dashed var(--border2); border-radius: 12px;
  padding: 36px 20px; text-align: center;
  cursor: pointer; transition: all .2s; position: relative;
}
.drop-zone:hover, .drop-zone.drag-over {
  border-color: var(--acc); background: var(--acc-dim);
}
.drop-zone input[type=file] {
  position: absolute; inset: 0; opacity: 0;
  cursor: pointer; width: 100%; height: 100%;
}

/* ═══ AGENT ROW ═══════════════════════════════════════════════════════ */
.agent-row {
  display: flex; align-items: center; gap: 13px;
  padding: 13px 16px; background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 10px; margin-bottom: 9px;
  transition: border-color .2s, transform .15s;
  cursor: pointer;
}
.agent-row:hover { border-color: var(--border2); transform: translateX(2px); }
.agent-row.alert-row { border-color: rgba(255,77,77,.25); background: rgba(255,77,77,.03); }
.agent-info { flex: 1; min-width: 0; }
.agent-name { font-size: 13.5px; font-weight: 700; color: var(--txt); }
.agent-id { font-size: 10.5px; color: var(--txt3); font-family: var(--font-mono); margin-top: 1px; }
.agent-progress-area { flex: 2; min-width: 0; }
.agent-stats-right { text-align: right; min-width: 80px; }
.agent-pct { font-family: var(--font-mono); font-size: 16px; font-weight: 700; }

/* ═══ REALTIME PANEL ══════════════════════════════════════════════════ */
.realtime-panel {
  background: linear-gradient(135deg, var(--bg3), var(--bg2));
  border: 1px solid var(--border2);
  border-radius: var(--r2); padding: 18px;
  margin-bottom: 18px; position: relative; overflow: hidden;
}
.realtime-panel::after {
  content: ''; position: absolute; inset: 0;
  background: radial-gradient(ellipse at top right, rgba(61,120,255,.06) 0%, transparent 60%);
  pointer-events: none;
}
.realtime-grid {
  display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px;
}
.rt-item {
  background: var(--bg1); border: 1px solid var(--border);
  border-radius: 9px; padding: 12px 10px; text-align: center;
}
.rt-label { font-size: 9.5px; color: var(--txt3); font-weight: 700; text-transform: uppercase; letter-spacing: .6px; margin-bottom: 6px; font-family: var(--font-display); }
.rt-value { font-family: var(--font-mono); font-size: 15px; font-weight: 700; }
.rt-sub { font-size: 9.5px; color: var(--txt4); margin-top: 3px; line-height: 1.4; }

/* ═══ MULTI-SELECT CHECKLIST ══════════════════════════════════════════ */
.checklist {
  display: flex; flex-direction: column; gap: 5px;
  max-height: 220px; overflow-y: auto;
  border: 1px solid var(--border2); border-radius: 8px; padding: 9px;
}
.checklist-item {
  display: flex; align-items: center; gap: 9px;
  padding: 7px 9px; border-radius: 6px;
  cursor: pointer; transition: background .14s;
}
.checklist-item:hover { background: rgba(255,255,255,.04); }
.checklist-item input[type=checkbox] {
  width: 15px; height: 15px;
  accent-color: var(--acc); cursor: pointer; flex-shrink: 0;
}
.checklist-item label { cursor: pointer; font-size: 12.5px; font-weight: 500; }

/* ═══ ALERT SCORE ══════════════════════════════════════════════════════ */
.alert-score-badge {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 4px 10px; border-radius: 20px;
  font-size: 10.5px; font-weight: 700;
  background: var(--red-d); color: var(--red);
  border: 1px solid rgba(255,77,77,.25);
  font-family: var(--font-mono);
}
.alert-score-badge.medium {
  background: var(--amber-d); color: var(--amber);
  border-color: rgba(255,176,32,.25);
}

/* ═══ MODAL ════════════════════════════════════════════════════════════ */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.72); backdrop-filter: blur(5px);
  z-index: 9000; display: flex; align-items: center; justify-content: center;
}
.modal {
  background: var(--bg2); border: 1px solid var(--border2);
  border-radius: 16px; padding: 30px; width: 580px;
  max-width: 95vw; max-height: 90vh; overflow-y: auto;
  box-shadow: 0 20px 60px rgba(0,0,0,.6);
  animation: modal-in .22s ease-out;
}
@keyframes modal-in {
  from { opacity: 0; transform: scale(.95) translateY(-10px); }
  to   { opacity: 1; transform: scale(1) translateY(0); }
}
.modal-title { font-family: var(--font-display); font-size: 18px; font-weight: 700; margin-bottom: 5px; }
.modal-sub { font-size: 12.5px; color: var(--txt3); margin-bottom: 22px; }

/* ═══ TOAST ════════════════════════════════════════════════════════════ */
#toasts {
  position: fixed; bottom: 22px; right: 22px;
  z-index: 99999; display: flex; flex-direction: column; gap: 7px;
  pointer-events: none;
}
.toast {
  background: var(--bg3); border: 1px solid var(--border2);
  border-left: 3px solid var(--acc);
  padding: 11px 17px; border-radius: 10px; font-size: 12.5px; font-weight: 500;
  box-shadow: 0 8px 30px rgba(0,0,0,.5);
  animation: toast-in .28s ease-out; pointer-events: all;
  max-width: 340px;
}
.toast.success { border-left-color: var(--green); }
.toast.error   { border-left-color: var(--red); }
.toast.info    { border-left-color: var(--cyan); }
.toast.warning { border-left-color: var(--amber); }
@keyframes toast-in {
  from { opacity: 0; transform: translateX(20px); }
  to   { opacity: 1; transform: translateX(0); }
}

<script>
// ═══════════════════════════════════════════════════════════════════════
// CONSTANTS
// ═══════════════════════════════════════════════════════════════════════
const DB_KEY      = 'asp_pro_final_v1';
const QUAL_CAP    = 1800;   // 30 min en secondes
const QUAL_ALERT  = 2700;   // 45 min
const COLORS      = ['#3d78ff','#00d68f','#ffb020','#a78bfa','#22d3ee',
                      '#ff4d4d','#fb923c','#ec4899','#06b6d4','#84cc16',
                      '#8b5cf6','#14b8a6','#f472b6','#fbbf24','#a3e635'];
const HPD_OPTIONS = [4,5,6,7,8];
const MTG_TYPES   = { coaching:'Coaching', reunion:'Réunion équipe', decorticage:'Décorticage appels', formation:'Formation' };
const MANAGERS    = ['Marie','Wissal','Yasmine','Admin','Superviseur'];

// ═══════════════════════════════════════════════════════════════════════
// UTILITY FUNCTIONS
// ═══════════════════════════════════════════════════════════════════════
const U = {
  // Convert various duration formats to seconds
  toSec(v) {
    if (v === null || v === undefined || v === '') return 0;
    if (typeof v === 'number') {
      // Excel fractional day
      if (v > 0 && v < 1) return Math.round(v * 86400);
      if (v >= 1) return Math.round(v); // already seconds
      return 0;
    }
    const s = String(v).trim().replace(/"/g, '');
    if (!s) return 0;
    // H:MM:SS or HH:MM:SS
    const m3 = s.match(/^(\d{1,3}):(\d{2}):(\d{2})$/);
    if (m3) return +m3[1]*3600 + +m3[2]*60 + +m3[3];
    // MM:SS
    const m2 = s.match(/^(\d{1,2}):(\d{2})$/);
    if (m2) return +m2[1]*60 + +m2[2];
    // plain number
    const n = parseFloat(s);
    if (!isNaN(n)) {
      if (n > 0 && n < 1) return Math.round(n * 86400);
      return Math.round(n);
    }
    return 0;
  },

  // Format seconds → "Xh MM"
  hms(s) {
    s = Math.max(0, Math.floor(s || 0));
    const h = Math.floor(s / 3600);
    const m = Math.floor((s % 3600) / 60);
    return `${h}h${String(m).padStart(2,'0')}`;
  },

  // Format seconds → "MM:SS"
  mmss(s) {
    s = Math.max(0, Math.floor(s || 0));
    return `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
  },

  // Format seconds → full "HH:MM:SS"
  full(s) {
    s = Math.max(0, Math.floor(s || 0));
    return `${String(Math.floor(s/3600)).padStart(2,'0')}:${String(Math.floor((s%3600)/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
  },

  // "YYYY-MM-DD" → "DD/MM/YYYY"
  fmtDate(d) { return (d||'').split('-').reverse().join('/'); },

  today() { return new Date().toISOString().split('T')[0]; },

  initials(n) {
    return (n||'?').trim().split(/\s+/).slice(0,2).map(w=>w[0]||'').join('').toUpperCase() || '?';
  },

  // TMC = total_comm / calls  (seconds per call)
  tmc(comm, calls) { return calls > 0 ? Math.round(comm / calls) : 0; },

  // Color helpers
  pcolor(p) { return p >= 90 ? 'var(--green)' : p >= 65 ? 'var(--amber)' : 'var(--red)'; },
  pclass(p) { return p >= 90 ? 'pf-green' : p >= 65 ? 'pf-amber' : 'pf-red'; },
  pbadge(p) { return p >= 90 ? 'badge-green' : p >= 65 ? 'badge-amber' : 'badge-red'; },

  // Safe division
  div(a, b) { return b > 0 ? a / b : 0; },

  // Format number safely
  n(v, dec=1) { const x = +v; return isNaN(x) ? '0' : x.toFixed(dec); },

  // Download CSV
  dlCSV(content, filename) {
    const blob = new Blob(['\uFEFF' + content], {type:'text/csv;charset=utf-8'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = filename; a.click();
  },

  // Toast notification
  toast(msg, type='info') {
    const c = document.getElementById('toasts');
    const el = document.createElement('div');
    el.className = `toast ${type}`;
    el.textContent = msg;
    c.appendChild(el);
    setTimeout(() => {
      el.style.opacity = '0'; el.style.transition = 'opacity .3s';
      setTimeout(() => el.remove(), 330);
    }, 3800);
  },

  // Compute stats for one agent/period
  calc(agId, period) {
    const ag = DB.data.agents.find(a => a.id === agId);
    if (!ag) return null;
    const recs = (DB.data.records[agId] || []).filter(r => r.period === period);
    let tC=0, tW=0, tQR=0, tQP=0, tM=0, tCalls=0, tSales=0;
    recs.forEach(r => {
      tC   += (r.comm  || 0);
      tW   += (r.wait  || 0);
      tQR  += (r.qual  || 0);
      tQP  += Math.min(r.qual || 0, QUAL_CAP);
      tM   += (r.mtg   || 0);
      tCalls += (r.calls || 0);
      tSales += (r.sales || 0);
    });
    const tot   = tC + tW + tQP + tM;
    const hours = tot / 3600;
    const cfg   = DB.data.periods[period] || { goalH: 132, days: 22, hpd: 6 };
    const pct   = Math.min(100, U.div(hours, cfg.goalH) * 100);
    const rdv   = U.div(tSales, tCalls) * 100;
    const tmc   = U.tmc(tC, tCalls);
    const qualR = U.div(tQP, Math.max(1,tot)) * 100;
    const earned    = ag.salBase ? Math.round(ag.salBase * (pct/100)) : 0;
    const dW        = recs.length;
    const avgH      = dW > 0 ? hours / dW : 0;
    const projH     = avgH * (cfg.days || 22);
    const projEarned = ag.salBase && cfg.goalH ? Math.round(ag.salBase * (projH / cfg.goalH)) : 0;
    // Qual alert: check last day
    const lastRec = recs.length ? [...recs].sort((a,b)=>b.date.localeCompare(a.date))[0] : null;
    const qualAlert = lastRec ? (lastRec.qual||0) > QUAL_ALERT : false;
    return {
      tC, tW, tQR, tQP, tM, tCalls, tSales,
      tot, hours, pct, rdv, tmc, qualR,
      earned, projEarned, daysWorked: dW, avgH,
      goalH: cfg.goalH, recs, qualAlert,
      cfg
    };
  },

  // Alert score for an agent (0-100, higher = more concerning)
  alertScore(agId, period) {
    const s = U.calc(agId, period);
    if (!s) return 0;
    const peers = DB.data.agents.map(a => U.calc(a.id, period)).filter(Boolean);
    const avgH    = U.div(peers.reduce((a,p)=>a+p.hours,0), peers.length);
    const avgC    = U.div(peers.reduce((a,p)=>a+p.tCalls,0), peers.length);
    const avgTmc  = U.div(peers.reduce((a,p)=>a+p.tmc,0), peers.length);
    const avgRdv  = U.div(peers.reduce((a,p)=>a+p.rdv,0), peers.length);
    const avgQR   = U.div(peers.reduce((a,p)=>a+p.qualR,0), peers.length);
    let score = 0;
    if (avgH   > 0) score += Math.max(0, 35 * (1 - s.hours / avgH));
    if (avgC   > 0) score += Math.max(0, 25 * (1 - s.tCalls / avgC));
    if (avgTmc > 0) score += Math.max(0, 20 * (1 - s.tmc / avgTmc));
    if (avgRdv > 0) score += Math.max(0, 15 * (1 - s.rdv / avgRdv));
    if (avgQR  > 0 && s.qualR > avgQR * 1.2) score += Math.min(5, (s.qualR - avgQR) / avgQR * 5);
    return Math.round(Math.min(100, score));
  },

  // Parse Vicidial CSV/TXT (fill-down logic)
  parseVicidial(text) {
    const lines = text.split('\n');
    const results = [];
    let curAgent = null;
    const SKIP = ['user name','totals','agent perf','---','time range','date range','performance detail'];

    for (const raw of lines) {
      const line = raw.trim();
      if (!line) continue;
      if (SKIP.some(s => line.toLowerCase().includes(s))) continue;

      // Split by common separators
      const sep = line.includes('\t') ? '\t' : line.includes(';') ? ';' : ',';
      const cols = [];
      let cur = '', inQ = false;
      for (const ch of line) {
        if (ch === '"') { inQ = !inQ; continue; }
        if (ch === sep && !inQ) { cols.push(cur.trim()); cur = ''; continue; }
        cur += ch;
      }
      cols.push(cur.trim());

      if (cols.length < 5) continue;

      // Check if this is an agent master line (col0=name, col1=id, no date in col4)
      const c0 = cols[0] || '', c1 = cols[1] || '', c4 = cols[4] || '';
      const isDate = /^\d{4}-\d{2}-\d{2}$/.test(c4) || /^\d{2}\/\d{2}\/\d{4}$/.test(c4) || /^\d{4}\/\d{2}\/\d{2}$/.test(c4);
      const looksAgentLine = c0.length > 2 && c1.length > 2 && !isDate && !/^\d+$/.test(c0.replace(/\s/g,''));

      if (looksAgentLine && !isDate) {
        // Could be agent master or data row with agent data
        if (cols.length >= 15 && !c4.match(/^\d+$/)) {
          curAgent = { name: c0, id: c1 };
          continue;
        }
        if (!isDate) {
          curAgent = { name: c0, id: c1 };
          if (cols.length < 10) continue;
        }
      }

      if (!curAgent) continue;

      // Parse date
      let dateStr = c4;
      if (!dateStr && cols[0] && /\d{4}-\d{2}-\d{2}/.test(cols[0])) dateStr = cols[0];
      if (!dateStr) continue;

      let date = '';
      if (/^\d{4}-\d{2}-\d{2}$/.test(dateStr)) {
        date = dateStr;
      } else if (/^\d{2}\/\d{2}\/\d{4}$/.test(dateStr)) {
        const [d,m,y] = dateStr.split('/');
        date = `${y}-${m.padStart(2,'0')}-${d.padStart(2,'0')}`;
      } else if (/^\d{4}\/\d{2}\/\d{2}$/.test(dateStr)) {
        date = dateStr.replace(/\//g,'-');
      } else continue;

      const calls = parseInt(cols[5]) || 0;
      const wait  = U.toSec(cols[9] || '0');
      const comm  = U.toSec(cols[11] || '0');
      const qual  = U.toSec(cols[13] || '0');
      // Last non-empty column = SALE
      const trailing = cols.slice(14).map(x=>parseInt(x)||0);
      const sales = trailing.length ? trailing[trailing.length-1] : 0;

      results.push({
        agId:   curAgent.id,
        agName: curAgent.name,
        date, comm, wait, qual, calls, sales
      });
    }
    return results;
  },

  // Update top banner
  updateBanner() {
    const li = DB.data.lastImport;
    const dot = document.getElementById('b-dot');
    const dEl = document.getElementById('b-date');
    const pEl = document.getElementById('b-period');
    const cEl = document.getElementById('b-count');
    if (!dot) return;
    if (li) {
      dot.className = 'pulse-dot';
      dEl.className = ''; dEl.textContent = U.fmtDate(li.date);
      pEl.textContent = ` — ${DB.data.periods[li.period]?.label || li.period}`;
      cEl.textContent = `${li.count} lignes · ${li.agents} agents`;
    } else {
      dot.className = 'pulse-dot none';
      dEl.className = 'none'; dEl.textContent = 'Aucune donnée importée';
      pEl.textContent = ''; cEl.textContent = '';
    }
  },

  // Destroy chart safely
  destroyChart(id) {
    try {
      const el = document.getElementById(id);
      if (!el || typeof Chart === 'undefined') return;
      const ch = Chart.getChart(el);
      if (ch) ch.destroy();
    } catch(e) {}
  },

  // Default Chart.js options
  chartOpts(extra={}) {
    return {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { labels: { color: 'var(--txt3)', font: { size: 10 } } } },
      scales: {
        x: { ticks: { color: 'var(--txt3)', font: { size: 9 }, maxRotation: 45 }, grid: { color: 'rgba(255,255,255,.04)' } },
        y: { ticks: { color: 'var(--txt3)', font: { size: 10 } }, grid: { color: 'rgba(255,255,255,.04)' } }
      },
      ...extra
    };
  }
};

// ═══════════════════════════════════════════════════════════════════════
// AMÉLIORATIONS STORAGE — Compression + Chunking + Export/Import JSON
// ═══════════════════════════════════════════════════════════════════════
const Storage = {
  // Taille max avant alerte (4 Mo sur 5 Mo limite)
  WARN_SIZE: 4 * 1024 * 1024,
  MAX_LOGS: 2000,
  MAX_IMPORT_HISTORY: 50,

  // Sauvegarde avec gestion quota et compression
  save(data) {
    try {
      const payload = JSON.stringify(data);
      const sizeBytes = new Blob([payload]).size;

      // Alerte si proche de la limite
      if (sizeBytes > this.WARN_SIZE) {
        U.toast(`⚠ Stockage utilisé : ${(sizeBytes/1024/1024).toFixed(1)} Mo / ~5 Mo. Exportez une sauvegarde JSON.`, 'warn', 8000);
      }

      // Sauvegarder les records séparément si trop gros
      if (sizeBytes > 3 * 1024 * 1024) {
        // Nettoyer les vieux logs pour libérer de l'espace
        if (data.logs && data.logs.length > 200) {
          data.logs = data.logs.slice(0, 200);
        }
        const payload2 = JSON.stringify(data);
        localStorage.setItem(DB_KEY, payload2);
      } else {
        localStorage.setItem(DB_KEY, payload);
      }
      return true;
    } catch(e) {
      if (e.name === 'QuotaExceededError') {
        U.toast('🔴 Stockage plein ! Exportez une sauvegarde JSON puis videz les vieilles données.', 'error', 10000);
        // Tentative de récupération : purger les vieux logs
        if (data.logs && data.logs.length > 50) {
          data.logs = data.logs.slice(0, 50);
          try { localStorage.setItem(DB_KEY, JSON.stringify(data)); return true; } catch(e2) {}
        }
      } else {
        U.toast('Erreur de sauvegarde : ' + e.message, 'error');
      }
      return false;
    }
  },

  // Statistiques stockage
  getStats() {
    const used = localStorage.getItem(DB_KEY) ? new Blob([localStorage.getItem(DB_KEY)]).size : 0;
    const total = 5 * 1024 * 1024;
    return {
      usedBytes: used,
      usedMB: (used / 1024 / 1024).toFixed(2),
      pct: Math.round(used / total * 100),
      remaining: ((total - used) / 1024 / 1024).toFixed(2)
    };
  },

  // Export JSON complet (sauvegarde manuelle)
  exportJSON() {
    const payload = JSON.stringify(DB.data, null, 2);
    const blob = new Blob([payload], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `ASP_Backup_${new Date().toISOString().split('T')[0]}.json`;
    a.click();
    URL.revokeObjectURL(url);
    DB.log('Système', 'Export sauvegarde JSON', `${(payload.length/1024).toFixed(0)} Ko`);
    U.toast('Sauvegarde JSON exportée', 'success');
  },

  // Import JSON (restauration)
  importJSON(file) {
    const reader = new FileReader();
    reader.onload = e => {
      try {
        const parsed = JSON.parse(e.target.result);
        if (!parsed.agents || !parsed.records) throw new Error('Format invalide');
        if (!confirm(`Restaurer la sauvegarde du ${parsed.lastImport?.date||'?'} avec ${parsed.agents.length} agents ? Les données actuelles seront remplacées.`)) return;
        DB.data = parsed;
        DB.save();
        DB.log('Système', 'Restauration JSON', file.name);
        U.toast('Sauvegarde restaurée avec succès', 'success');
        location.reload();
      } catch(err) {
        U.toast('Fichier JSON invalide : ' + err.message, 'error');
      }
    };
    reader.readAsText(file);
  }
};

// ═══════════════════════════════════════════════════════════════════════
// MOTEUR D'IMPORT AMÉLIORÉ — Pipeline complet avec aperçu/validation
// ═══════════════════════════════════════════════════════════════════════
const ImportEngine = {
  // État courant d'un import en cours
  pending: null,

  // Parser principal — retourne un rapport détaillé
  parse(text, colMapping) {
    const cm = colMapping || DB.data.colMapping || { agentName:0,agentId:1,date:4,calls:5,wait:9,comm:11,qual:13 };
    const lines = text.split('\n').filter(l => l.trim());
    const SKIP = ['USER NAME','TOTALS','AGENT PERF','---','REPORT','TIME RANGE','SYSTEM'];
    const results = [];
    const errors  = [];
    const warnings = [];
    let curAgent = null;
    let lineNum = 0;
    let skipped = 0;

    for (const line of lines) {
      lineNum++;
      // Skip headers
      if (SKIP.some(p => line.toUpperCase().includes(p))) { skipped++; continue; }

      // Parse colonnes (supporte ; et ,)
      const sep = line.includes(';') ? ';' : ',';
      const cols = [];
      let cur = '', inQ = false;
      for (let i = 0; i < line.length; i++) {
        const c = line[i];
        if (c === '"') { inQ = !inQ; continue; }
        if (c === sep && !inQ) { cols.push(cur.trim()); cur = ''; continue; }
        cur += c;
      }
      cols.push(cur.trim());

      if (cols.length < 6) { skipped++; continue; }

      // Détecter ligne agent (fill-down)
      const col0 = (cols[cm.agentName] || '').trim();
      const col1 = (cols[cm.agentId]   || '').trim();
      const dateRaw = (cols[cm.date]   || '').trim();
      const isDate = /^\d{4}-\d{2}-\d{2}$/.test(dateRaw) || /^\d{2}\/\d{2}\/\d{4}$/.test(dateRaw);

      if (!isDate && col0.length > 2 && !/^\d+$/.test(col0) && col1) {
        curAgent = { id: col1, name: col0 };
        continue;
      }
      if (!curAgent) continue;
      if (!isDate) { warnings.push({ line: lineNum, msg: `Date invalide: "${dateRaw}" pour ${curAgent.name}` }); continue; }

      // Normaliser date
      let date = dateRaw;
      if (date.includes('/')) {
        const p = date.split('/');
        date = p.length === 3 ? `${p[2]}-${String(p[1]).padStart(2,'0')}-${String(p[0]).padStart(2,'0')}` : dateRaw;
      }

      // Vérifier cohérence date/période
      const period = DB.data.period;
      const periodPrefix = period; // ex: '2026-04'
      if (!date.startsWith(periodPrefix.substring(0,7))) {
        warnings.push({ line: lineNum, msg: `Date ${date} hors période ${period} (agent: ${curAgent.name})` });
      }

      const calls  = parseInt(cols[cm.calls] || '0') || 0;
      const wait   = U.toSec(cols[cm.wait]  || '0');
      const comm   = U.toSec(cols[cm.comm]  || '0');
      const qual   = U.toSec(cols[cm.qual]  || '0');
      const trailing = cols.slice(Math.max(cm.qual+1, 14)).map(x => parseInt(x)||0).filter(x => x >= 0);
      const sales  = trailing.length ? trailing[trailing.length-1] : 0;

      // Validation basique
      if (comm < 0 || wait < 0 || qual < 0) {
        errors.push({ line: lineNum, msg: `Valeurs négatives pour ${curAgent.name} le ${date}` });
        continue;
      }

      // Vérifier doublon dans les résultats déjà parsés
      const existsInResult = results.find(r => r.agId === curAgent.id && r.date === date);
      if (existsInResult) {
        warnings.push({ line: lineNum, msg: `Doublon: ${curAgent.name} - ${date} (ligne ignorée)` });
        continue;
      }

      // Vérifier si déjà en DB (pour info)
      const ag = DB.data.agents.find(a => a.viciId === curAgent.id || a.id === curAgent.id);
      const existsInDB = ag && (DB.data.records[ag.id]||[]).find(r => r.date === date && r.period === period);

      results.push({
        agId: curAgent.id, agName: curAgent.name, date, comm, wait, qual, calls, sales,
        isNew: !existsInDB, isUpdate: !!existsInDB,
        tmc: calls > 0 ? Math.round(comm/calls) : 0,
        rdvRate: calls > 0 ? (sales/calls*100).toFixed(1) : '0',
      });
    }

    return {
      entries: results,
      errors, warnings,
      stats: {
        totalLines: lineNum,
        parsed: results.length,
        skipped,
        errorsCount: errors.length,
        warningsCount: warnings.length,
        newEntries: results.filter(r => r.isNew).length,
        updates: results.filter(r => r.isUpdate).length,
        newAgents: [...new Set(results.filter(r => {
          const ag = DB.data.agents.find(a => a.viciId === r.agId || a.id === r.agId);
          return !ag;
        }).map(r => r.agId))].length,
        agents: [...new Set(results.map(r => r.agId))].length,
        latestDate: results.length ? results.map(r=>r.date).sort().reverse()[0] : null,
      }
    };
  },

  // Appliquer l'import validé
  apply(report, sourceName) {
    if (!report || !report.entries.length) return;
    const period = DB.data.period;
    const newAgents = [];

    report.entries.forEach(e => {
      let ag = DB.data.agents.find(a => a.viciId === e.agId || a.id === e.agId);
      if (!ag) {
        const colorIdx = DB.data.agents.length % COLORS.length;
        ag = { id:e.agId, viciId:e.agId, name:e.agName, pw:'0000',
          color:COLORS[colorIdx], salBase:0, salType:'AE', hpd:6, active:true };
        DB.data.agents.push(ag);
        newAgents.push(e.agName);
      }
      if (!DB.data.records[ag.id]) DB.data.records[ag.id] = [];
      const ex = DB.data.records[ag.id].find(r => r.date === e.date && r.period === period);
      const entry = { period, date:e.date, comm:e.comm, wait:e.wait, qual:e.qual, calls:e.calls, sales:e.sales, mtg:ex?.mtg||0 };
      if (ex) Object.assign(ex, entry);
      else DB.data.records[ag.id].push(entry);
    });

    // Enregistrer l'historique d'import
    if (!DB.data.importHistory) DB.data.importHistory = [];
    const importRecord = {
      id: `imp_${Date.now()}`,
      ts: new Date().toISOString(),
      source: sourceName,
      period,
      stats: report.stats,
      actor: Auth.cur?.name || 'Système',
      canUndo: true, // permet annulation dans les 10 premières minutes
      entries: report.entries.map(e => ({ agId:e.agId, date:e.date, wasNew:e.isNew }))
    };
    DB.data.importHistory.unshift(importRecord);
    if (DB.data.importHistory.length > Storage.MAX_IMPORT_HISTORY) {
      DB.data.importHistory = DB.data.importHistory.slice(0, Storage.MAX_IMPORT_HISTORY);
    }

    DB.data.lastImport = {
      id: importRecord.id,
      date: report.stats.latestDate || U.today(),
      period,
      count: report.stats.parsed,
      agents: report.stats.agents,
      source: sourceName,
      ts: importRecord.ts
    };

    DB.log(Auth.cur?.name||'Système', 'Import Vicidial',
      `${report.stats.parsed} lignes · ${report.stats.newEntries} nouvelles · ${report.stats.updates} MàJ · ${newAgents.length} agents créés · source: ${sourceName}`);
    DB.save();
    ImportEngine.pending = null;
    return importRecord;
  },

  // Annuler le dernier import (si récent < 10 min)
  undo(importId) {
    if (!DB.data.importHistory) return;
    const imp = DB.data.importHistory.find(i => i.id === importId);
    if (!imp) { U.toast('Import introuvable', 'error'); return; }
    const ageMins = (Date.now() - new Date(imp.ts).getTime()) / 60000;
    if (ageMins > 10) { U.toast('Annulation impossible après 10 minutes', 'error'); return; }
    if (!confirm(`Annuler l'import "${imp.source}" du ${U.fmtDate(imp.ts.split('T')[0])} ? Les données importées seront supprimées.`)) return;

    // Supprimer les entrées créées par cet import
    imp.entries.forEach(e => {
      if (!e.wasNew) return; // ne supprimer que les nouvelles entrées
      const ag = DB.data.agents.find(a => a.viciId === e.agId || a.id === e.agId);
      if (!ag) return;
      DB.data.records[ag.id] = (DB.data.records[ag.id]||[]).filter(
        r => !(r.date === e.date && r.period === imp.period)
      );
    });

    imp.canUndo = false;
    DB.log(Auth.cur?.name||'Système', 'Annulation import', imp.source);
    DB.save();
    U.toast('Import annulé', 'success');
    Views['ad-import']();
  }
};

// ═══════════════════════════════════════════════════════════════════════
// MOTEUR RÉUNIONS AMÉLIORÉ — Garde-fous + Impact paie + Justification
// ═══════════════════════════════════════════════════════════════════════
const MeetingEngine = {
  // Vérifier doublons avant saisie
  checkDuplicate(agIds, date, type, durMin) {
    const period = DB.data.period;
    const dupes = [];
    agIds.forEach(agId => {
      const existing = (DB.data.meetings||[]).find(m =>
        m.agIds.includes(agId) && m.date === date && m.type === type
      );
      if (existing) {
        const ag = DB.data.agents.find(a => a.id === agId);
        dupes.push(`${ag?.name||agId} le ${U.fmtDate(date)} (${existing.durMin}min déjà saisie)`);
      }
    });
    return dupes;
  },

  // Calculer l'impact paie avant validation
  calcImpact(agIds, durMin) {
    const period = DB.data.period;
    return agIds.map(agId => {
      const ag = DB.data.agents.find(a => a.id === agId);
      if (!ag || !ag.salBase) return null;
      const s = U.calc(agId, period);
      if (!s) return null;
      const cfg = DB.data.periods[period] || { goalH:132 };
      const addSec = durMin * 60;
      const newTot = s.tot + addSec;
      const newPct = Math.min(100, newTot / 3600 / cfg.goalH * 100);
      const newEarned = Math.round(ag.salBase * newPct / 100);
      return {
        name: ag.name,
        addH: U.hms(addSec),
        before: { pct: s.pct.toFixed(1), earned: s.earned },
        after:  { pct: newPct.toFixed(1), earned: newEarned },
        gain: newEarned - s.earned
      };
    }).filter(Boolean);
  },

  // Sauvegarder avec justification obligatoire
  save(agIds, date, durMin, type, host, note, justification) {
    if (!agIds.length || !date || !durMin || durMin <= 0) return false;
    const period = DB.data.period;
    const id = `mtg_${Date.now()}`;
    const meeting = { id, agIds, date, period, durMin, type, host, note: note||'', justification: justification||'', ts: new Date().toISOString(), deletedAt: null, deleteReason: null };
    if (!DB.data.meetings) DB.data.meetings = [];
    DB.data.meetings.unshift(meeting);

    // Appliquer le temps
    agIds.forEach(agId => {
      if (!DB.data.records[agId]) DB.data.records[agId] = [];
      const day = DB.data.records[agId].find(r => r.date === date && r.period === period);
      if (day) day.mtg = (day.mtg||0) + durMin*60;
      else DB.data.records[agId].push({ period, date, comm:0,wait:0,qual:0,calls:0,sales:0, mtg:durMin*60 });
    });

    DB.log(Auth.cur?.name||'Système', 'Ajout réunion',
      `${MTG_TYPES[type]||type} · ${durMin}min · ${agIds.length} agent(s) · ${U.fmtDate(date)} · host:${host}`);
    DB.save();
    return id;
  },

  // Supprimer avec justification obligatoire
  delete(meetingId, reason) {
    if (!reason || reason.trim().length < 5) {
      U.toast('Justification requise (min 5 caractères)', 'error');
      return false;
    }
    const m = (DB.data.meetings||[]).find(x => x.id === meetingId);
    if (!m) return false;
    m.deletedAt = new Date().toISOString();
    m.deleteReason = reason.trim();
    // Retirer le temps des records
    const period = m.period;
    m.agIds.forEach(agId => {
      const day = (DB.data.records[agId]||[]).find(r => r.date === m.date && r.period === period);
      if (day) day.mtg = Math.max(0, (day.mtg||0) - m.durMin*60);
    });
    DB.log(Auth.cur?.name||'Système', 'Suppression réunion', `ID:${meetingId} · raison: ${reason}`);
    DB.save();
    return true;
  }
};

// ═══════════════════════════════════════════════════════════════════════
// MOTEUR PÉRIODES — Clôture, gel, gouvernance
// ═══════════════════════════════════════════════════════════════════════
const PeriodEngine = {
  STATUS: { DRAFT: 'draft', VALIDATED: 'validated', EXPORTED: 'exported' },

  getStatus(periodKey) {
    return DB.data.periods[periodKey]?.status || this.STATUS.DRAFT;
  },

  isLocked(periodKey) {
    const s = this.getStatus(periodKey);
    return s === this.STATUS.VALIDATED || s === this.STATUS.EXPORTED;
  },

  validate(periodKey) {
    if (!DB.data.periods[periodKey]) return;
    if (!confirm(`Valider et geler la période ${DB.data.periods[periodKey].label} ? Les données ne pourront plus être modifiées.`)) return;
    DB.data.periods[periodKey].status = this.STATUS.VALIDATED;
    DB.data.periods[periodKey].validatedAt = new Date().toISOString();
    DB.data.periods[periodKey].validatedBy = Auth.cur?.name;
    DB.log(Auth.cur?.name, 'Clôture période', `${periodKey} - ${DB.data.periods[periodKey].label}`);
    DB.save();
    U.toast(`Période ${DB.data.periods[periodKey].label} validée et gelée`, 'success');
    Views['ad-periods']();
  },

  markExported(periodKey) {
    if (!DB.data.periods[periodKey]) return;
    DB.data.periods[periodKey].status = this.STATUS.EXPORTED;
    DB.data.periods[periodKey].exportedAt = new Date().toISOString();
    DB.data.periods[periodKey].exportedBy = Auth.cur?.name;
    DB.log(Auth.cur?.name, 'Export comptable', periodKey);
    DB.save();
  },

  // Historique des modifications de contrat/salaire
  logContractChange(agId, field, oldVal, newVal) {
    if (!DB.data.contractHistory) DB.data.contractHistory = [];
    DB.data.contractHistory.unshift({
      ts: new Date().toISOString(),
      agId, field, oldVal, newVal,
      actor: Auth.cur?.name,
      period: DB.data.period
    });
    if (DB.data.contractHistory.length > 1000) DB.data.contractHistory = DB.data.contractHistory.slice(0, 1000);
  }
};

// ═══════════════════════════════════════════════════════════════════════
// ALERTES SUPERVISEUR AMÉLIORÉES
// ═══════════════════════════════════════════════════════════════════════
const AlertEngine = {
  // Analyser toute l'équipe et générer des alertes prioritaires
  analyze(period) {
    const alerts = [];
    const peers = DB.data.agents.filter(a => a.active !== false).map(ag => {
      const s = U.calc(ag.id, period);
      return { ag, s, sc: U.alertScore(ag.id, period) };
    });
    if (!peers.length) return [];

    const avgTmc   = peers.reduce((a,p)=>a+p.s.tmcSec,0)/peers.length;
    const avgRdv   = peers.reduce((a,p)=>a+p.s.rdvRate,0)/peers.length;
    const avgH     = peers.reduce((a,p)=>a+p.s.h,0)/peers.length;

    peers.forEach(({ ag, s, sc }) => {
      const agAlerts = [];

      // 1. Qualification excessive
      if (s.qualRatio > 25) agAlerts.push({ type:'qual', sev:'red', msg:`Qualification excessive : ${s.qualRatio.toFixed(0)}% du temps total` });
      else if (s.qualRatio > 18) agAlerts.push({ type:'qual', sev:'amber', msg:`Qualification élevée : ${s.qualRatio.toFixed(0)}%` });

      // 2. TMC faible
      if (avgTmc > 0 && s.tmcSec < avgTmc * 0.65) agAlerts.push({ type:'tmc', sev:'red', msg:`TMC faible : ${U.mmss(s.tmcSec)} vs moy. ${U.mmss(Math.round(avgTmc))}` });
      else if (avgTmc > 0 && s.tmcSec < avgTmc * 0.80) agAlerts.push({ type:'tmc', sev:'amber', msg:`TMC sous la moyenne : ${U.mmss(s.tmcSec)}` });

      // 3. Taux RDV faible
      if (avgRdv > 0 && s.rdvRate < avgRdv * 0.60) agAlerts.push({ type:'rdv', sev:'red', msg:`RDV faible : ${s.rdvRate.toFixed(1)}% vs moy. ${avgRdv.toFixed(1)}%` });

      // 4. Peu d'heures
      if (avgH > 0 && s.h < avgH * 0.70) agAlerts.push({ type:'hours', sev:'red', msg:`Heures insuffisantes : ${U.hms(s.h*3600)} vs moy. ${U.hms(avgH*3600)}` });

      // 5. Baisse brutale : comparer avec période précédente (si disponible)
      const periods = Object.keys(DB.data.periods).sort();
      const curIdx = periods.indexOf(period);
      if (curIdx > 0) {
        const prevPeriod = periods[curIdx-1];
        const prevS = U.calc(ag.id, prevPeriod);
        if (prevS && prevS.tCalls > 10 && s.tCalls > 5) {
          if (s.rdvRate < prevS.rdvRate * 0.70) {
            agAlerts.push({ type:'drop', sev:'red', msg:`Baisse RDV vs mois préc. : ${s.rdvRate.toFixed(1)}% vs ${prevS.rdvRate.toFixed(1)}%` });
          }
          if (s.tmcSec < prevS.tmcSec * 0.70) {
            agAlerts.push({ type:'drop', sev:'amber', msg:`Baisse TMC vs mois préc. : ${U.mmss(s.tmcSec)} vs ${U.mmss(prevS.tmcSec)}` });
          }
        }
      }

      if (agAlerts.length) alerts.push({ ag, s, sc, alerts: agAlerts });
    });

    return alerts.sort((a,b) => b.alerts.filter(x=>x.sev==='red').length - a.alerts.filter(x=>x.sev==='red').length || b.sc - a.sc);
  },

  // Actions prioritaires du jour
  getDailyActions(period) {
    const today = U.today();
    const actions = [];

    // Agents sans données aujourd'hui
    DB.data.agents.filter(a => a.active !== false).forEach(ag => {
      const hasToday = (DB.data.records[ag.id]||[]).some(r => r.date === today);
      if (!hasToday) actions.push({ priority:'info', msg:`${ag.name} : aucune donnée aujourd'hui` });
    });

    // Import pas fait depuis > 1 jour
    if (DB.data.lastImport) {
      const daysSince = Math.floor((Date.now() - new Date(DB.data.lastImport.date).getTime()) / 86400000);
      if (daysSince > 1) actions.push({ priority:'warn', msg:`Dernier import : il y a ${daysSince} jours (${U.fmtDate(DB.data.lastImport.date)})` });
    } else {
      actions.push({ priority:'red', msg:'Aucun import Vicidial effectué' });
    }

    // Périodes non clôturées
    Object.entries(DB.data.periods).forEach(([k,p]) => {
      if (k < period && (!p.status || p.status === 'draft')) {
        actions.push({ priority:'warn', msg:`Période ${p.label} non clôturée` });
      }
    });

    return actions;
  }
};

const ExportEngine = {
  genId() {
    return `EXP-${DB.data.period}-${Date.now().toString(36).toUpperCase()}`;
  },

  // Export CSV équipe avec identifiant
  exportTeamCSV(period) {
    const expId = this.genId();
    const cfg = DB.data.periods[period] || {};
    let csv = `# Export ASP Connect PRO\n# ID: ${expId}\n# Période: ${cfg.label||period}\n# Généré le: ${new Date().toLocaleString('fr-FR')}\n# Par: ${Auth.cur?.name}\n#\n`;
    csv += 'Agent;ID Vicidial;Contrat;Base MAD;Comm.;Attente;Qual. brute;Qual. retenue;Réunions;Total;Progression %;Appels;RDV;Taux RDV;TMC (sec);Gains MAD;Projection MAD\n';
    DB.data.agents.filter(a => a.active !== false).forEach(ag => {
      const s = U.calc(ag.id, period);
      if (!s) return;
      csv += `${ag.name};${ag.viciId||ag.id};${ag.salType||'AE'};${ag.salBase||0};${U.hms(s.tC)};${U.hms(s.tW)};${U.hms(s.tQR)};${U.hms(s.tQP)};${U.hms(s.tM)};${U.hms(s.tot)};${s.pct.toFixed(1)};${s.tCalls};${s.tSales};${s.rdvRate.toFixed(2)};${s.tmcSec};${s.earned};${s.projEarned}\n`;
    });
    U.downloadCSV(csv, `Equipe_${period}_${expId}.csv`);
    DB.log(Auth.cur?.name, 'Export CSV équipe', `${expId} · ${period}`);
    if (PeriodEngine.getStatus(period) !== PeriodEngine.STATUS.EXPORTED) PeriodEngine.markExported(period);
    U.toast(`Export téléchargé (ID: ${expId})`, 'success');
    return expId;
  },

  // Export CSV journalier détaillé (justificatif)
  exportDetailCSV(agId, period) {
    const ag = DB.data.agents.find(a => a.id === agId);
    const s = U.calc(agId, period);
    if (!s || !ag) return;
    const expId = this.genId();
    const cfg = DB.data.periods[period] || {};
    let csv = `# Relevé justificatif — ${ag.name}\n# ID: ${expId}\n# Période: ${cfg.label||period}\n# Généré le: ${new Date().toLocaleString('fr-FR')}\n# Superviseur: ${Auth.cur?.name}\n#\n`;
    csv += 'Date;Communication;Attente;Qual. brute;Qual. retenue;Dépassement exclu;Réunions;Total payable;Appels;RDV;Taux RDV;TMC (sec)\n';
    [...s.recs].sort((a,b)=>a.date.localeCompare(b.date)).forEach(r => {
      const qp = Math.min(r.qual, QUAL_CAP);
      const ov = r.qual - qp;
      const tot = r.comm + r.wait + qp + (r.mtg||0);
      csv += `${r.date};${U.hms(r.comm)};${U.hms(r.wait)};${U.hms(r.qual)};${U.hms(qp)};${ov>0?U.hms(ov):'0'};${U.hms(r.mtg||0)};${U.hms(tot)};${r.calls||0};${r.sales||0};${r.calls>0?((r.sales/r.calls)*100).toFixed(2)+'%':'0%'};${U.tmc(r.comm,r.calls||0)}\n`;
    });
    csv += `\nTOTAL;${U.hms(s.tC)};${U.hms(s.tW)};${U.hms(s.tQR)};${U.hms(s.tQP)};;;${U.hms(s.tot)};${s.tCalls};${s.tSales};${s.rdvRate.toFixed(2)}%;${s.tmcSec}\n`;
    U.downloadCSV(csv, `Relevé_${ag.name.replace(/ /g,'_')}_${period}_${expId}.csv`);
    DB.log(Auth.cur?.name||ag.name, 'Export relevé individuel', `${ag.name} · ${period} · ${expId}`);
    U.toast('Relevé exporté', 'success');
  },

  // Export PDF via impression navigateur
  exportPrint(period) {
    const cfg = DB.data.periods[period] || {};
    const expId = this.genId();
    const rows = DB.data.agents.filter(a=>a.active!==false).map(ag => {
      const s = U.calc(ag.id, period);
      if (!s) return '';
      return `<tr><td>${ag.name}</td><td>${ag.viciId||ag.id}</td><td>${ag.salType||'AE'}</td><td>${(ag.salBase||0).toLocaleString('fr-FR')} MAD</td><td>${U.hms(s.tot)}</td><td>${s.pct.toFixed(1)}%</td><td>${s.tCalls}</td><td>${s.tSales}</td><td>${s.rdvRate.toFixed(1)}%</td><td>${U.mmss(s.tmcSec)}</td><td>${s.earned.toLocaleString('fr-FR')} MAD</td></tr>`;
    }).join('');

    const win = window.open('', '_blank');
    win.document.write(`<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8"><title>Rapport ${cfg.label||period}</title>
    <style>body{font-family:Arial,sans-serif;font-size:12px;margin:20px}h1{font-size:16px}table{width:100%;border-collapse:collapse}th,td{border:1px solid #ccc;padding:6px;text-align:left}th{background:#f0f0f0;font-weight:bold}.meta{color:#666;font-size:11px;margin-bottom:15px}@media print{button{display:none}}</style></head>
    <body><h1>ASP Connect PRO — ${cfg.label||period}</h1>
    <div class="meta">ID Export: ${expId} · Généré le ${new Date().toLocaleString('fr-FR')} · Par ${Auth.cur?.name}</div>
    <button onclick="window.print()">🖨 Imprimer / Sauvegarder PDF</button>
    <table><thead><tr><th>Agent</th><th>ID Vicidial</th><th>Contrat</th><th>Base</th><th>Heures</th><th>%</th><th>Appels</th><th>RDV</th><th>Taux</th><th>TMC</th><th>Gains</th></tr></thead><tbody>${rows}</tbody></table>
    </body></html>`);
    win.document.close();
    DB.log(Auth.cur?.name, 'Export PDF/Impression', `${expId} · ${period}`);
  }
};

const Auth = {
  cur: null,

  login() {
    const id = (document.getElementById('li').value || '').trim();
    const pw = document.getElementById('lp').value || '';
    document.getElementById('lerr').style.display = 'none';

    if (id.toUpperCase() === 'SUPER' && pw === '1234') {
      this.cur = { role:'admin', name:'Superviseur', id:'SUPER', color:'#ff4d4d' };
      this._boot();
      return;
    }

    const ag = DB.data.agents.find(a =>
      (a.id === id || a.viciId === id) && a.pw === pw && a.active !== false
    );
    if (ag) {
      this.cur = { role:'agent', ...ag };
      this._boot();
    } else {
      document.getElementById('lerr').style.display = 'block';
    }
  },

  _boot() {
    const ls = document.getElementById('login-screen');
    ls.style.opacity = '0';
    setTimeout(() => ls.style.display = 'none', 420);

    document.getElementById('sb-name').textContent = this.cur.name;
    document.getElementById('sb-role').textContent = this.cur.role === 'admin' ? 'Administrateur' : 'Agent';
    const av = document.getElementById('sb-avatar');
    av.textContent = U.initials(this.cur.name);
    av.style.background = this.cur.color || COLORS[0];

    document.getElementById('nav-' + this.cur.role).style.display = 'block';

      .map(([k,v]) => `<option value="${k}"${k===DB.data.period?' selected':''}>${v.label}</option>`)

  logout() { Auth.cur = null; location.reload(); }

// AGENT — HISTORY
// ─────────────────────────────────────────────────────────────────────
'ag-history'() {
  const s = U.calc(Auth.cur.id, DB.data.period);
  if (!s) { document.getElementById('view').innerHTML='<div class="empty-state"><div class="empty-state-icon">📋</div>Aucune donnée.</div>'; return; }
  const sorted = [...s.recs].sort((a,b)=>b.date.localeCompare(a.date));

  const rows = sorted.map(r=>{
    const qp=Math.min(r.qual,QUAL_CAP), ov=r.qual-qp;
    const tot=r.comm+r.wait+qp+(r.mtg||0);
    const tmc=U.mmss(U.tmc(r.comm,r.calls||0));
    const rdvR=r.calls>0?((r.sales/r.calls)*100).toFixed(1)+'%':'—';
    return `<tr>
      <td class="text-cell">${U.fmtDate(r.date)}</td>
      <td style="color:var(--acc)">${U.hms(r.comm)}</td>
      <td style="color:var(--amber)">${U.hms(r.wait)}</td>
      <td style="color:var(--purple)">${U.hms(qp)}${ov>0?`<br><span style="font-size:9px;color:var(--red)">+${U.hms(ov)} exclu</span>`:''}</td>
      <td style="color:var(--green)">${U.hms(r.mtg||0)}</td>
      <td style="color:var(--cyan);font-weight:700">${U.hms(tot)}</td>
      <td>${r.calls||0}</td>
      <td style="color:var(--red);font-weight:700">${r.sales||0}</td>
      <td>${rdvR}</td>
      <td style="color:var(--orange)">${tmc}</td>
    </tr>`;
  }).join('');

  document.getElementById('view').innerHTML = `
    <div class="info-box"><strong style="color:var(--acc)">Qualification :</strong> Plafonnée à 30min/jour. Dépassements en rouge. <strong style="color:var(--orange)">TMC</strong> = Temps Moyen Communication/appel (mm:ss).</div>
    <div class="card">
      <div class="card-header">
        <div><div class="card-title">Relevé journalier — ${DB.data.periods[DB.data.period]?.label||DB.data.period}</div></div>
        <button class="btn btn-ghost btn-sm" onclick="Views._exportAgentCSV('${Auth.cur.id}')">⬇ Export CSV</button>
      </div>
      <div class="table-wrap"><table>
        <thead><tr><th>Date</th><th style="color:var(--acc)">Comm.</th><th style="color:var(--amber)">Attente</th><th style="color:var(--purple)">Qual. retenue</th><th style="color:var(--green)">Réunions</th><th style="color:var(--cyan)">Total payé</th><th>Appels</th><th style="color:var(--red)">RDV</th><th>Taux RDV</th><th style="color:var(--orange)">TMC</th></tr></thead>
        <tbody>
          ${rows || '<tr><td colspan="10" class="empty-state">Aucune donnée.</td></tr>'}
          ${sorted.length ? `<tr class="tr-total"><td class="bold-cell">TOTAL</td><td style="color:var(--acc)">${U.hms(s.tC)}</td><td style="color:var(--amber)">${U.hms(s.tW)}</td><td style="color:var(--purple)">${U.hms(s.tQP)}</td><td style="color:var(--green)">${U.hms(s.tM)}</td><td style="color:var(--cyan)">${U.hms(s.tot)}</td><td>${s.tCalls}</td><td style="color:var(--red)">${s.tSales}</td><td>${U.n(s.rdv,1)}%</td><td style="color:var(--orange)">${U.mmss(s.tmc)}</td></tr>` : ''}
        </tbody>
      </table></div>
    </div>
  `;
},

_exportAgentCSV(agId) {
  const ag = DB.data.agents.find(a=>a.id===agId)||{name:agId};
  const s  = U.calc(agId, DB.data.period);
  if (!s) return;
  let csv = 'Date;Communication;Attente;Qual. brute;Qual. retenue;Réunions;Total payé;Appels;RDV;Taux RDV;TMC (sec)\n';
  [...s.recs].sort((a,b)=>a.date.localeCompare(b.date)).forEach(r=>{
    const qp=Math.min(r.qual,QUAL_CAP), tot=r.comm+r.wait+qp+(r.mtg||0);
    csv += `${r.date};${U.hms(r.comm)};${U.hms(r.wait)};${U.hms(r.qual)};${U.hms(qp)};${U.hms(r.mtg||0)};${U.hms(tot)};${r.calls||0};${r.sales||0};${r.calls>0?((r.sales/r.calls)*100).toFixed(1)+'%':'0%'};${U.tmc(r.comm,r.calls||0)}\n`;
  });
  U.dlCSV(csv, `Rapport_${ag.name.replace(/ /g,'_')}_${DB.data.period}.csv`);
  U.toast('Export CSV téléchargé', 'success');
},

    let cumH=0, cumS=0; const cH=[], cS=[];
    sorted.forEach(r=>{cumH+=r.comm+r.wait+Math.min(r.qual,QUAL_CAP)+(r.mtg||0);cumS+=r.sales||0;cH.push((cumH/3600).toFixed(2));cS.push(cumS);});

  });
},

    if (tmcEl) new Chart(tmcEl,{type:'bar',data:{labels:sorted2.map(r=>r.ag.name.split(' ')[0]),datasets:[{label:'TMC (sec)',data:sorted2.map(r=>r.s.tmc),backgroundColor:sorted2.map(r=>r.s.tmc>=avgTmc?'rgba(251,146,60,.7)':'rgba(255,77,77,.5)'),borderRadius:3}]},options:{...U.chartOpts(),indexAxis:'y',scales:{x:{ticks:{color:'var(--txt3)',callback:v=>U.mmss(v)},grid:{color:'rgba(255,255,255,.04)'}},y:{ticks:{color:'var(--txt3)'},grid:{display:false}}}}});

_exportTeamCSV() {
  let csv='Agent;ID Vicidial;Communication;Attente;Qualification;Réunions;Total;Progression;Appels;RDV;Taux RDV;TMC (sec);Gains MAD;Projection MAD\n';
  DB.data.agents.forEach(ag=>{const s=U.calc(ag.id,DB.data.period);csv+=`${ag.name};${ag.viciId||ag.id};${U.hms(s.tC)};${U.hms(s.tW)};${U.hms(s.tQP)};${U.hms(s.tM)};${U.hms(s.tot)};${U.n(s.pct,1)}%;${s.tCalls};${s.tSales};${U.n(s.rdv,1)}%;${s.tmc};${s.earned};${s.projEarned}\n`;});
  U.dlCSV(csv,`Equipe_${DB.data.period}.csv`);
  U.toast('Export équipe téléchargé','success');
},

},

// ADMIN — AGENT DETAIL
// ─────────────────────────────────────────────────────────────────────
'ad-agent-detail'() {
  const opts = DB.data.agents.map(ag=>`<option value="${ag.id}">${ag.name} (${ag.viciId||ag.id})</option>`).join('');
  const def  = DB.data.agents[0]?.id;
  document.getElementById('view').innerHTML = `
    <div class="card mb16">
      <select class="form-control" id="det-ag-sel" onchange="Views._renderAgentDetail(this.value)">${opts}</select>
    </div>
    <div id="det-body">${def?Views._renderAgentDetail(def,true):''}</div>
  `;
},

_renderAgentDetail(agId, returnHtml=false) {
  const ag = DB.data.agents.find(a=>a.id===agId);
  if (!ag) return '<div class="empty-state">Agent introuvable.</div>';
  const s  = U.calc(agId, DB.data.period);
  const sorted=[...s.recs].sort((a,b)=>b.date.localeCompare(a.date));

  const rows=sorted.map(r=>{
    const qp=Math.min(r.qual,QUAL_CAP), ov=r.qual-qp, tot=r.comm+r.wait+qp+(r.mtg||0);
    const rdvR=r.calls>0?((r.sales/r.calls)*100).toFixed(1)+'%':'—';
    const tmc=U.mmss(U.tmc(r.comm,r.calls||0));
    return `<tr>
      <td class="text-cell">${U.fmtDate(r.date)}</td>
      <td style="color:var(--acc)">${U.hms(r.comm)}</td>
      <td style="color:var(--amber)">${U.hms(r.wait)}</td>
      <td style="color:var(--purple)">${U.hms(qp)}${ov>0?`<br><span style="font-size:9px;color:var(--red)">+${U.hms(ov)}</span>`:''}</td>
      <td style="color:var(--green)">${U.hms(r.mtg||0)}</td>
      <td style="color:var(--cyan);font-weight:700">${U.hms(tot)}</td>
      <td>${r.calls||0}</td><td style="color:var(--red)">${r.sales||0}</td><td>${rdvR}</td>
      <td style="color:var(--orange)">${tmc}</td>
      <td><button class="btn btn-danger btn-sm" onclick="Views._deleteRecord('${agId}','${r.date}')">✕</button></td>
    </tr>`;
  }).join('');

  const html=`
    <div class="grid-6 mb16">
      <div class="kpi-card kpi-acc"><div class="kpi-label">Communication</div><div class="kpi-value" style="color:var(--acc)">${U.hms(s.tC)}</div></div>
      <div class="kpi-card kpi-amber"><div class="kpi-label" style="color:var(--amber)">Attente</div><div class="kpi-value" style="color:var(--amber)">${U.hms(s.tW)}</div></div>
      <div class="kpi-card kpi-purple"><div class="kpi-label" style="color:var(--purple)">Qualification</div><div class="kpi-value" style="color:var(--purple)">${U.hms(s.tQP)}</div><div class="kpi-sub">Réel: ${U.hms(s.tQR)}</div></div>
      <div class="kpi-card kpi-green"><div class="kpi-label">Réunions</div><div class="kpi-value" style="color:var(--green)">${U.hms(s.tM)}</div></div>
      <div class="kpi-card kpi-red"><div class="kpi-label">RDV · Taux</div><div class="kpi-value" style="color:var(--red)">${s.tSales}</div><div class="kpi-sub">${U.n(s.rdv,2)}% · ${s.tCalls} appels</div></div>
      <div class="kpi-card kpi-orange"><div class="kpi-label">TMC moy.</div><div class="kpi-value" style="color:var(--orange)">${U.mmss(s.tmc)}</div><div class="kpi-sub">mm:ss / appel</div></div>
    </div>
    <div class="card">
      <div class="card-header">
        <div><div class="card-title">Relevé journalier — ${ag.name}</div></div>
        <div style="display:flex;gap:8px"><span class="badge badge-cyan">${U.hms(s.tot)} · ${U.n(s.pct,1)}%</span><button class="btn btn-ghost btn-sm" onclick="Views._exportAgentCSV('${agId}')">⬇ CSV</button></div>
      </div>
      <div class="table-wrap"><table>
        <thead><tr><th>Date</th><th style="color:var(--acc)">Comm.</th><th style="color:var(--amber)">Attente</th><th style="color:var(--purple)">Qual.</th><th style="color:var(--green)">Réunions</th><th style="color:var(--cyan)">Total</th><th>Appels</th><th style="color:var(--red)">RDV</th><th>Taux</th><th style="color:var(--orange)">TMC</th><th></th></tr></thead>
        <tbody>${rows||'<tr><td colspan="11" class="empty-state">Aucune donnée.</td></tr>'}</tbody>
      </table></div>
    </div>
  `;

  if (returnHtml) return html;
  const el=document.getElementById('det-body');
  if (el) el.innerHTML=html;
},

_deleteRecord(agId, date) {
  if (!confirm(`Supprimer la ligne du ${U.fmtDate(date)} ?`)) return;
  DB.data.records[agId] = (DB.data.records[agId]||[]).filter(r=>!(r.date===date&&r.period===DB.data.period));
  DB.save();
  DB.log('SUPER','Suppression relevé',`${agId} — ${date}`);
  U.toast('Ligne supprimée','info');
  const sel=document.getElementById('det-ag-sel');
  if(sel) Views._renderAgentDetail(sel.value);
},

// ADMIN — ALERTS
// ─────────────────────────────────────────────────────────────────────
'ad-alerts'() {
  const period=DB.data.period;
  const scored=DB.data.agents.map(ag=>({ag,s:U.calc(ag.id,period),sc:U.alertScore(ag.id,period)}))
    .filter(x=>x.sc>=30).sort((a,b)=>b.sc-a.sc);
  const peers=DB.data.agents.map(a=>U.calc(a.id,period)).filter(Boolean);
  const avgH   =U.div(peers.reduce((a,p)=>a+p.hours,0),peers.length);
  const avgC   =U.div(peers.reduce((a,p)=>a+p.tCalls,0),peers.length);
  const avgTmc =U.div(peers.reduce((a,p)=>a+p.tmc,0),peers.length);
  const avgRdv =U.div(peers.reduce((a,p)=>a+p.rdv,0),peers.length);
  const avgQR  =U.div(peers.reduce((a,p)=>a+p.qualR,0),peers.length);

  document.getElementById('view').innerHTML=`
    <div class="info-box danger" style="color:var(--txt)">
      <strong style="color:var(--red)">Algorithme de détection (score 0-100)</strong> — Heures (35pts) · Appels (25pts) · TMC (20pts) · Taux RDV (15pts) · Qualification excessive (5pts). Score ≥ 45 = alerte rouge, 30-44 = modérée.<br>
      <span style="font-size:10.5px;color:var(--txt3)">Moy. équipe : ${U.hms(avgH*3600)} · ${Math.round(avgC)} appels · TMC ${U.mmss(Math.round(avgTmc))} · RDV ${U.n(avgRdv,1)}% · Qual. ${U.n(avgQR,0)}%</span>
    </div>

    ${!scored.length?`<div class="card"><div class="empty-state"><div class="empty-state-icon">✅</div>Aucun agent en alerte sur ${DB.data.periods[period]?.label||period}</div></div>`:`
    <div class="card mb20">
      <div class="card-header"><div class="card-title">Agents en situation d'alerte — ${DB.data.periods[period]?.label||period}</div><span class="badge badge-red">${scored.length} agent(s)</span></div>
      ${scored.map(({ag,s,sc})=>{
        const issues=[];
        if(s.hours<avgH*.75)   issues.push(`<span class="badge badge-red" style="font-size:9px">⏱ Peu d'heures ${U.hms(s.hours*3600)} / moy. ${U.hms(avgH*3600)}</span>`);
        if(s.tCalls<avgC*.7)   issues.push(`<span class="badge badge-red" style="font-size:9px">📞 Peu d'appels ${s.tCalls} / moy. ${Math.round(avgC)}</span>`);
        if(s.tmc<avgTmc*.7)    issues.push(`<span class="badge badge-red" style="font-size:9px">⏱ TMC faible ${U.mmss(s.tmc)} vs ${U.mmss(Math.round(avgTmc))}</span>`);
        if(s.rdv<avgRdv*.7)    issues.push(`<span class="badge badge-red" style="font-size:9px">📋 RDV faible ${U.n(s.rdv,1)}% vs ${U.n(avgRdv,1)}%</span>`);
        if(s.qualR>avgQR*1.3)  issues.push(`<span class="badge badge-amber" style="font-size:9px">⚠ Qual. excessive ${U.n(s.qualR,0)}% vs ${U.n(avgQR,0)}%</span>`);
        return `<div class="agent-row alert-row" style="flex-wrap:wrap;gap:9px">
          <div class="avatar" style="background:${ag.color||COLORS[0]}">${U.initials(ag.name)}</div>
          <div class="agent-info"><div class="agent-name">${ag.name}</div><div class="agent-id">${ag.viciId||ag.id}</div></div>
          <div style="display:flex;gap:5px;flex-wrap:wrap;flex:2">${issues.join('')}</div>
          <div class="alert-score-badge ${sc<65?'medium':''}" style="font-size:12.5px;padding:5px 12px">${sc}/100</div>
          <div style="text-align:right;min-width:90px;font-size:10.5px">
            <div style="color:var(--cyan)">${U.hms(s.tot)} · ${U.n(s.pct,1)}%</div>
            <div style="color:var(--orange)">TMC ${U.mmss(s.tmc)}</div>
            <div style="color:var(--red)">RDV ${U.n(s.rdv,1)}%</div>
          </div>
        </div>`;
      }).join('')}
    </div>`}

    <div class="card">
      <div class="card-header"><div class="card-title">Radar de performance — Top 6 agents</div></div>
      <div class="chart-container" style="height:300px"><canvas id="ch-radar"></canvas></div>
    </div>
  `;

  requestAnimationFrame(()=>{
    U.destroyChart('ch-radar');
    const rc=document.getElementById('ch-radar');if(!rc)return;
    const top=DB.data.agents.slice(0,6);
    new Chart(rc,{type:'radar',data:{labels:['Heures','Appels','TMC','Taux RDV','Qual. OK'],datasets:top.map((ag,i)=>{const s=U.calc(ag.id,period);return{label:ag.name.split(' ')[0],data:[Math.min(100,U.div(s.hours,avgH)*100),Math.min(100,U.div(s.tCalls,avgC)*100),Math.min(100,U.div(s.tmc,avgTmc)*100),Math.min(100,U.div(s.rdv,avgRdv)*100),Math.min(100,Math.max(0,100-(U.div(s.qualR,avgQR)-1)*50))],borderColor:ag.color||COLORS[i],backgroundColor:(ag.color||COLORS[i])+'28',pointRadius:4,borderWidth:2};})},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'var(--txt3)',font:{size:10}}}},scales:{r:{ticks:{color:'var(--txt3)',font:{size:9},backdropColor:'transparent'},grid:{color:'rgba(255,255,255,.07)'},pointLabels:{color:'var(--txt3)',font:{size:11}},min:0,max:100}}}});
  });
},

  const period = DB.data.period;
  const periodLocked = PeriodEngine.isLocked(period);

  document.getElementById('view').innerHTML = `

    ${storStats.pct > 70 ? '<br><strong style="color:var(--amber)">⚠ Approche limite — exportez une sauvegarde.</strong>' : ''}
    <button onclick="Storage.exportJSON()" style="margin-left:10px;padding:3px 10px;background:var(--bg3);border:1px solid var(--border2);border-radius:5px;color:var(--text);cursor:pointer;font-size:11px">📦 Sauvegarde JSON</button>
    <label style="margin-left:6px;padding:3px 10px;background:var(--bg3);border:1px solid var(--border2);border-radius:5px;color:var(--text);cursor:pointer;font-size:11px">

  <div class="grid-2">

      <div class="card-header">
        <div class="card-title">Import Vicidial</div>
        <span class="kpi-badge kpi-badge-blue">${DB.data.periods[period]?.label||period}</span>
      </div>
      ${!periodLocked ? `
      <div class="drop-zone" id="fdrop" style="border:2px dashed var(--border2);border-radius:10px;padding:30px;text-align:center;cursor:pointer;transition:.2s;position:relative">
        <input type="file" accept=".csv,.txt" onchange="Views._handleFile(this.files[0])" style="position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%">

        <div style="font-size:11px;color:var(--text-dim)">AGENT_PERFORMANCE_DETAIL*.csv / *.txt</div>
      </div>
      <div style="text-align:center;margin:10px 0;color:var(--text-dim);font-size:12px">— ou coller les données —</div>
      <textarea id="imp-raw" style="width:100%;height:110px;background:var(--bg3);border:1px solid var(--border2);border-radius:8px;color:var(--text);padding:10px;font-family:monospace;font-size:11px;resize:vertical" placeholder="Coller ici les lignes de l'export Vicidial…"></textarea>
      <div style="display:flex;gap:8px;margin-top:8px">
        <button onclick="document.getElementById('imp-raw').value=''" style="padding:7px 14px;background:var(--bg3);border:1px solid var(--border2);border-radius:6px;color:var(--text);cursor:pointer;font-size:12px">Effacer</button>
        <button onclick="Views._doImportText()" style="padding:7px 14px;background:var(--accent);border:none;border-radius:6px;color:#fff;cursor:pointer;font-size:12px;font-weight:600">🔍 Analyser &amp; Prévisualiser</button>
      </div>
      <details style="margin-top:14px">
        <summary style="cursor:pointer;font-size:12px;color:var(--text-dim);font-weight:600">⚙ Mapping colonnes (avancé)</summary>
        <div style="margin-top:10px;display:grid;grid-template-columns:1fr 1fr;gap:8px">
          ${Object.entries(cm).map(([k,v]) =>
            '<div><label style="font-size:10px;font-weight:700;color:var(--text-dim);display:block;margin-bottom:3px;text-transform:uppercase">' + k + '</label>' +
            '<input type="number" id="cm_' + k + '" value="' + v + '" min="0" max="30" style="width:70px;background:var(--bg3);border:1px solid var(--border2);border-radius:5px;color:var(--text);padding:4px 8px;font-size:12px"></div>'

          <div style="display:flex;justify-content:space-between;align-items:flex-start">

              <span style="background:var(--bg3);padding:2px 7px;border-radius:10px;font-size:10px">${imp.stats.agents} agents</span>
              ${imp.canUndo && (Date.now()-new Date(imp.ts).getTime())<600000 ?
                `<button data-undo-id="${imp.id}" style="padding:2px 8px;background:rgba(239,68,68,.15);color:var(--red);border:1px solid rgba(239,68,68,.3);border-radius:5px;cursor:pointer;font-size:10px">↩ Annuler</button>` : ''}

          </div>
          <div style="color:var(--text-dim);margin-top:3px;font-size:11px">
            ${imp.stats.newEntries} nouvelles · ${imp.stats.updates} MàJ · ${imp.stats.newAgents} créés
            ${imp.stats.warningsCount > 0 ? '· <span style="color:var(--amber)">' + imp.stats.warningsCount + ' alertes</span>' : ''}
          </div>
        </div>`).join('')}

  </div>

  const drop = document.getElementById('fdrop');
  if (drop) {

    drop.addEventListener('dragleave', () => { drop.style.borderColor=''; drop.style.background=''; });
    drop.addEventListener('drop', e => { e.preventDefault(); drop.style.borderColor=''; drop.style.background=''; if(e.dataTransfer.files[0]) Views._handleFile(e.dataTransfer.files[0]); });
