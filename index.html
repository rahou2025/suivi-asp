<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASP CONNECT ULTIME · BI & Rémunération</title>
    <!-- Librairie pour les graphiques -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Librairie pour l'export Excel -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500&display=swap');
        :root {
            --bg: #0A0C10; --sidebar: #11151C; --card: #1A1F29; --border: #2D3440;
            --accent: #5E56F0; --accent-soft: rgba(94, 86, 240, 0.1);
            --text: #EAEBF0; --text-dim: #8A91A0;
            --green: #22C55E; --amber: #F59E0B; --red: #EF4444; --radius: 10px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; overflow: hidden; }

        /* --- Layout & Structure --- */
        .sidebar { width: 260px; background: var(--sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 20px; }
        .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .top-bar { height: 65px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 30px; background: var(--sidebar); flex-shrink: 0; }
        .content { flex: 1; padding: 30px; overflow-y: auto; }
        #login-overlay { position: fixed; inset: 0; background: rgba(10, 12, 16, 0.9); backdrop-filter: blur(10px); z-index: 1000; display: flex; align-items: center; justify-content: center; }
        .login-box { width: 400px; background: var(--sidebar); padding: 40px; border-radius: var(--radius); border: 1px solid var(--border); text-align: center; }

        /* --- Navigation & Header --- */
        .logo { font-weight: 800; font-size: 22px; color: var(--text); margin-bottom: 30px; }
        .nav-group-label { font-size: 11px; font-weight: 700; color: var(--text-dim); text-transform: uppercase; margin: 20px 0 10px 12px; }
        .nav-link { padding: 10px 12px; border-radius: 6px; color: var(--text-dim); text-decoration: none; font-weight: 500; display: flex; align-items: center; gap: 10px; margin-bottom: 4px; cursor: pointer; transition: 0.2s; }
        .nav-link:hover, .nav-link.active { background: var(--accent); color: white; }

        /* --- Cards & Stats --- */
        .card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; margin-bottom: 24px; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
        .stat-label { font-size: 13px; color: var(--text-dim); margin-bottom: 8px; font-weight: 500; }
        .stat-value { font-size: 28px; font-weight: 700; font-family: 'JetBrains Mono'; }
        .stat-unit { font-size: 18px; color: var(--green); margin-left: 6px; font-weight: 500; }

        /* --- Tables & Forms --- */
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 12px; color: var(--text-dim); font-size: 12px; border-bottom: 2px solid var(--border); text-transform: uppercase; }
        td { padding: 14px 12px; border-bottom: 1px solid var(--border); font-size: 14px; vertical-align: middle; }
        input, select, textarea { width: 100%; background: var(--bg); border: 1px solid var(--border); padding: 12px; border-radius: 6px; color: white; margin-bottom: 16px; font-family: inherit; }
        .btn { padding: 12px 20px; border-radius: 6px; border: none; font-weight: 600; cursor: pointer; transition: 0.2s; display: inline-flex; align-items: center; gap: 8px; }
        .btn-primary { background: var(--accent); color: white; }
        
        .agent-multiselect { max-height: 250px; overflow-y: auto; border: 1px solid var(--border); padding: 8px; border-radius: 6px; }
        .agent-multiselect label { display: flex; padding: 8px; border-radius: 4px; cursor: pointer; }
        .agent-multiselect label:hover { background: rgba(255,255,255,0.05); }
    </style>
</head>
<body>

<div id="login-overlay">
    <div class="login-box">
        <h2 class="logo">ASP CONNECT</h2>
        <input type="text" id="log-id" placeholder="ID Utilisateur">
        <input type="password" id="log-pw" placeholder="Mot de passe">
        <button class="btn btn-primary" style="width: 100%;" onclick="Auth.login()">Connexion</button>
        <p style="margin-top: 20px; font-size: 11px; color: var(--text-dim);">Admin: SUPER / 1234</p>
    </div>
</div>

<aside class="sidebar">
    <h1 class="logo">ASP CONNECT</h1>
    <div id="nav-container"></div> <!-- Navigation dynamique -->
    <div style="margin-top: auto;">
        <div class="nav-link" style="color: var(--red);" onclick="location.reload()">Déconnexion</div>
    </div>
</aside>

<main class="main">
    <header class="top-bar">
        <h2 id="view-title" style="font-weight: 600;"></h2>
        <div id="user-display" style="display: flex; align-items: center; gap: 12px;">
            <span id="user-name-tag" style="font-weight: 600; font-size: 14px;"></span>
        </div>
    </header>
    <div class="content" id="view-port"></div>
</main>

<script>
/**
 * ASP CONNECT ULTIME (v5.0) - BI & Rémunération
 * Moteur de calcul, parser Vicidial, et interface de gestion complète.
 */
const CONFIG = {
    DB_KEY: 'asp_ultimate_db',
    QUAL_LIMIT_SEC: 1800, // 30min
    QUAL_ALERT_SEC: 2700, // 45min
    WORKING_DAYS_IN_MONTH: 22,
};

let DB = JSON.parse(localStorage.getItem(CONFIG.DB_KEY)) || {
    agents: [
        {id: '06980713', name: 'Houyem Haddad', type: 'AE', base: 4500, goal: 132},
        {id: '104806005', name: 'Amal Ainseba', type: 'SALARIE', base: 5500, goal: 132}
    ],
    records: {}, // { agentId: { "YYYY-MM-DD": {comm, wait, qual, mtg, qualRaw} } }
    managers: ['Marie', 'Wissal', 'Yasmine', 'Admin'],
    logs: [] // { date, manager, action, details }
};

const Engine = {
    save: () => localStorage.setItem(CONFIG.DB_KEY, JSON.stringify(DB)),
    
    hmsToSec: (hms) => {
        if(!hms || typeof hms !== 'string' || !hms.includes(':')) return 0;
        const p = hms.split(':').map(Number);
        return p.length === 3 ? (p[0]*3600 + p[1]*60 + p[2]) : (p[0]*60 + p[1]);
    },

    fmtHms: (s) => {
        const h = Math.floor(s/3600);
        const m = Math.floor((s%3600)/60);
        return `${h}h ${m.toString().padStart(2, '0')}m`;
    },

    calculateStats: (id) => {
        const agent = DB.agents.find(a => a.id === id);
        if(!agent) return null;
        
        const days = DB.records[id] ? Object.values(DB.records[id]) : [];
        let tComm=0, tWait=0, tQualPaid=0, tMtg=0;

        days.forEach(d => {
            tComm += d.comm;
            tWait += d.wait;
            tQualPaid += Math.min(d.qual, CONFIG.QUAL_LIMIT_SEC);
            tMtg += (d.mtg || 0);
        });

        const totalSec = tComm + tWait + tQualPaid + tMtg;
        const totalHrs = totalSec / 3600;
        const progress = (totalHrs / agent.goal) * 100;
        const earned = (progress / 100) * agent.base;
        
        // Projection
        const daysWorked = days.length;
        const avgDailyHrs = daysWorked > 0 ? totalHrs / daysWorked : 0;
        const projectedHrs = avgDailyHrs * CONFIG.WORKING_DAYS_IN_MONTH;
        const projectedEarned = (projectedHrs / agent.goal) * agent.base;

        // Alerte Qualification
        const lastDay = days.length > 0 ? days[days.length - 1] : null;
        const qualAlert = lastDay ? lastDay.qual > CONFIG.QUAL_ALERT_SEC : false;

        return { tComm, tWait, tQualPaid, tMtg, totalSec, totalHrs, progress, earned, base: agent.base, goal: agent.goal, projectedEarned, qualAlert };
    },

    logAction: (manager, action, details) => {
        DB.logs.unshift({ date: new Date().toISOString(), manager, action, details });
        Engine.save();
    },

    exportAccounting: () => {
        const salaries = [];
        const autoEntrepreneurs = [];

        DB.agents.forEach(ag => {
            const stats = Engine.calculateStats(ag.id);
            const data = {
                "ID Agent": ag.id,
                "Nom": ag.name,
                "Base Fixe (MAD)": ag.base,
                "Objectif (h)": ag.goal,
                "Heures Réalisées": stats.totalHrs.toFixed(2),
                "Atteinte (%)": stats.progress.toFixed(2),
                "Rémunération Brute (MAD)": stats.earned.toFixed(2)
            };
            if(ag.type === 'SALARIE') salaries.push(data);
            else autoEntrepreneurs.push(data);
        });

        const wb = XLSX.utils.book_new();
        const ws_sal = XLSX.utils.json_to_sheet(salaries);
        const ws_ae = XLSX.utils.json_to_sheet(autoEntrepreneurs);
        XLSX.utils.book_append_sheet(wb, ws_sal, "Salariés");
        XLSX.utils.book_append_sheet(wb, ws_ae, "Auto-entrepreneurs");
        XLSX.writeFile(wb, `Export_Comptable_ASP_${new Date().toISOString().split('T')[0]}.xlsx`);
    }
};

const Auth = {
    user: null,
    login: () => {
        const id = document.getElementById('log-id').value.trim();
        const pw = document.getElementById('log-pw').value;
        let foundUser = null;

        if(id.toUpperCase() === 'SUPER' && pw === '1234') {
            foundUser = { role: 'admin', name: 'Superviseur' };
        } else {
            const agent = DB.agents.find(a => a.id === id);
            // Pour la démo, on n'a pas de mdp, mais en prod, il faudrait vérifier.
            if(agent) foundUser = { ...agent, role: 'agent' };
        }
        
        if (foundUser) {
            Auth.user = foundUser;
            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('user-name-tag').textContent = Auth.user.name;
            UI.buildNav();
            Router.go(Auth.user.role === 'admin' ? 'admin-team' : 'agent-dash');
        } else {
            alert("Identifiant incorrect.");
        }
    }
};

const Router = {
    go: (path, el) => {
        if(el) {
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            el.classList.add('active');
        }
        document.getElementById('view-title').textContent = el ? el.textContent : path.split('-')[1];
        UI.render(path);
    }
};

const UI = {
    buildNav: () => {
        const nav = document.getElementById('nav-container');
        if (Auth.user.role === 'admin') {
            nav.innerHTML = `
                <div class="nav-group-label">Pilotage</div>
                <div class="nav-link" onclick="Router.go('admin-team', this)">Équipe & Paie</div>
                <div class="nav-link" onclick="Router.go('admin-import', this)">Import Vicidial</div>
                <div class="nav-link" onclick="Router.go('admin-reunion', this)">Réunions</div>
                <div class="nav-group-label">Reporting</div>
                <div class="nav-link" onclick="Router.go('admin-compta', this)">Comptabilité</div>
                <div class="nav-link" onclick="Router.go('admin-logs', this)">Historique Actions</div>
            `;
        } else {
            nav.innerHTML = `
                <div class="nav-group-label">Mon Espace</div>
                <div class="nav-link" onclick="Router.go('agent-dash', this)">Dashboard</div>
                <div class="nav-link" onclick="Router.go('agent-hist', this)">Relevés</div>
            `;
        }
    },

    render: (path) => {
        const view = document.getElementById('view-port');
        
        if (path === 'agent-dash') {
            const s = Engine.calculateStats(Auth.user.id);
            const qualAlertHtml = s.qualAlert ? `<div style="color:var(--amber); font-size:12px; font-weight:600; margin-top:4px;">⚠️ Dépassement 45min hier</div>` : '';
            view.innerHTML = `
                <div class="stats-grid">
                    <div class="stat-box"><span class="stat-label">Gains actuels</span><div class="stat-value">${s.earned.toFixed(2)}<span class="stat-unit">MAD</span></div></div>
                    <div class="stat-box"><span class="stat-label">Projection Fin de Mois</span><div class="stat-value">${s.projectedEarned.toFixed(2)}<span class="stat-unit">MAD</span></div></div>
                    <div class="stat-box"><span class="stat-label">Progression Objectif</span><div class="stat-value">${s.progress.toFixed(1)}%</div></div>
                    <div class="stat-box"><span class="stat-label">Qualification Payée</span><div class="stat-value">${Engine.fmtHms(s.tQualPaid)}</div>${qualAlertHtml}</div>
                </div>
                <div class="card"><canvas id="perfChart" style="height:300px;"></canvas></div>
            `;
            new Chart(document.getElementById('perfChart'), { type: 'bar', data: { labels: ['Communication', 'Attente', 'Qualif.', 'Réunions'], datasets: [{ label: 'Temps (secondes)', data: [s.tComm, s.tWait, s.tQualPaid, s.tMtg], backgroundColor: '#5E56F0' }] }, options: { maintainAspectRatio: false, plugins: { legend: { display: false } } } });
        }
        
        if (path === 'admin-team') {
            const rows = DB.agents.map(ag => {
                const s = Engine.calculateStats(ag.id);
                return `<tr>
                    <td><b>${ag.name}</b><br><small>${ag.id}</small></td>
                    <td><span class="badge ${ag.type === 'AE' ? 'badge-ae' : 'badge-sal'}">${ag.type}</span></td>
                    <td><input type="number" value="${ag.base}" onchange="UI.updateAgent('${ag.id}', 'base', this.value)" style="width:100px;margin:0"></td>
                    <td><input type="number" value="${ag.goal}" onchange="UI.updateAgent('${ag.id}', 'goal', this.value)" style="width:80px;margin:0"></td>
                    <td style="width:200px">
                         <div class="progress-bar"><div class="progress-fill" style="width:${s.progress}%"></div></div>
                         <div style="display:flex;justify-content:space-between;font-size:11px;margin-top:4px;"><span>${s.progress.toFixed(1)}%</span><span>${s.totalHrs.toFixed(1)}h</span></div>
                    </td>
                    <td style="font-weight:700; color:var(--green)">${s.earned.toFixed(2)} MAD</td>
                </tr>`;
            }).join('');
            view.innerHTML = `<div class="card"><div style="display:flex;justify-content:space-between;margin-bottom:20px;"><h2>Équipe & Rémunération</h2><button class="btn btn-primary">+ Ajouter Agent</button></div><table><thead><tr><th>Agent</th><th>Type</th><th>Base (MAD)</th><th>Objectif (h)</th><th>Progression</th><th>Gains Actuels</th></tr></thead><tbody>${rows}</tbody></table></div>`;
        }

        if (path === 'admin-import') {
            view.innerHTML = `<div class="card"><h2>Importation Fichier Vicidial</h2><p style="color:var(--text-dim);margin-bottom:20px;">Le système détectera automatiquement les agents, les dates et les temps.</p><input type="file" id="file-input" accept=".csv,.txt"><button class="btn btn-primary" onclick="UI.handleImport()">Lancer l'import</button></div>`;
        }
        
        if (path === 'admin-reunion') {
            const agentsHtml = DB.agents.map(a => `<label><input type="checkbox" name="agent-ids" value="${a.id}"> ${a.name}</label>`).join('');
            const managersHtml = DB.managers.map(m => `<option>${m}</option>`).join('');
            view.innerHTML = `<div class="card" style="max-width: 600px;"><h2>Saisie de Réunion Groupée</h2>
                <label class="nav-group-label">Responsable</label><select id="manager-name">${managersHtml}</select>
                <label class="nav-group-label">Agents Participants</label><div class="agent-multiselect">${agentsHtml}</div>
                <label class="nav-group-label" style="margin-top:15px;">Date & Durée</label><div style="display:grid;grid-template-columns:1fr 1fr;gap:15px"><input type="date" id="mtg-date" value="${new Date().toISOString().split('T')[0]}"><input type="number" id="mtg-duration" placeholder="Durée en minutes"></div>
                <button class="btn btn-primary" style="width:100%; margin-top:10px" onclick="UI.saveMeeting()">Enregistrer le temps</button></div>`;
        }

        if (path === 'admin-compta') {
            view.innerHTML = `<div class="card"><h2>Module Comptabilité</h2><p style="color:var(--text-dim);margin-bottom:20px;">Générez un rapport Excel détaillé pour la période en cours.</p><button class="btn btn-primary" onclick="Engine.exportAccounting()">Exporter le Fichier Comptable (.xlsx)</button></div>`;
        }

        if (path === 'admin-logs') {
            const logsHtml = DB.logs.map(log => `<tr><td>${new Date(log.date).toLocaleString('fr-FR')}</td><td>${log.manager}</td><td>${log.action}</td><td>${log.details}</td></tr>`).join('');
            view.innerHTML = `<div class="card"><h2>Historique des Actions Administrateur</h2><table><thead><tr><th>Date</th><th>Manager</th><th>Action</th><th>Détails</th></tr></thead><tbody>${logsHtml}</tbody></table></div>`;
        }
    },

    updateAgent: (id, key, value) => {
        const agent = DB.agents.find(a => a.id === id);
        if(agent) {
            agent[key] = parseFloat(value);
            Engine.logAction(Auth.user.name, `Modification Agent ${id}`, `${key} changé à ${value}`);
            Engine.save();
            UI.render('admin-team');
        }
    },
    
    handleImport: () => {
        const file = document.getElementById('file-input').files[0];
        if(!file) return alert("Veuillez sélectionner un fichier.");
        const reader = new FileReader();
        reader.onload = (e) => {
            const content = e.target.result;
            const lines = content.split('\n');
            let count = 0;
            lines.forEach(line => {
                const cols = line.includes('","') ? line.split('","').map(c => c.replace(/"/g, '').trim()) : line.split('\t');
                if(cols.length > 13 && cols[4].match(/\d{4}-\d{2}-\d{2}/)) {
                    const id = cols[1];
                    const date = cols[4];
                    const name = cols[0];
                    if (!DB.agents.find(a => a.id === id)) {
                        DB.agents.push({id, name, type: 'SALARIE', base: 5000, goal: 132});
                    }
                    if(!DB.records[id]) DB.records[id] = {};
                    const prevMtg = DB.records[id][date] ? DB.records[id][date].mtg : 0;
                    DB.records[id][date] = {
                        comm: Engine.hmsToSec(cols[11]),
                        wait: Engine.hmsToSec(cols[9]),
                        qual: Engine.hmsToSec(cols[13]),
                        mtg: prevMtg
                    };
                    count++;
                }
            });
            Engine.logAction(Auth.user.name, "Import Vicidial", `${count} lignes traitées.`);
            Engine.save();
            alert(`${count} lignes de données ont été importées et mises à jour.`);
            Router.go('admin-team');
        };
        reader.readAsText(file);
    },

    saveMeeting: () => {
        const manager = document.getElementById('manager-name').value;
        const ids = Array.from(document.querySelectorAll('input[name="agent-ids"]:checked')).map(cb => cb.value);
        const date = document.getElementById('mtg-date').value;
        const duration = parseInt(document.getElementById('mtg-duration').value) * 60;
        
        if (ids.length === 0 || !duration) return alert("Veuillez sélectionner les agents et la durée.");

        ids.forEach(id => {
            if(!DB.records[id]) DB.records[id] = {};
            if(!DB.records[id][date]) DB.records[id][date] = {comm:0, wait:0, qual:0, mtg:0};
            DB.records[id][date].mtg += duration;
        });

        Engine.logAction(manager, "Ajout Réunion", `${duration/60}min pour ${ids.length} agents.`);
        Engine.save();
        alert("Temps de réunion enregistré !");
        Router.go('admin-team');
    }
};

window.onload = () => { /* App Ready */ };
</script>
</body>
</html>
