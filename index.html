<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ASP Connect PRO · Suivi Temps & Performance</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap');
:root{
  --bg:#0a0c12;--sb:#0f1219;--card:#141820;--card2:#191e28;
  --b:rgba(255,255,255,.07);--b2:rgba(255,255,255,.12);
  --acc:#4f7ef8;--accG:rgba(79,126,248,.18);--accD:rgba(79,126,248,.08);
  --txt:#e8eaf0;--dim:#7a8394;--mu:#4a5060;
  --grn:#10b981;--grnD:rgba(16,185,129,.12);
  --amb:#f59e0b;--ambD:rgba(245,158,11,.12);
  --red:#ef4444;--redD:rgba(239,68,68,.12);
  --pur:#a78bfa;--purD:rgba(167,139,250,.12);
  --cyn:#22d3ee;--cynD:rgba(34,211,238,.12);
  --r:12px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:14px}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--txt);height:100vh;overflow:hidden;display:flex;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-thumb{background:var(--b2);border-radius:10px}

/* LOGIN */
#login-ov{position:fixed;inset:0;background:radial-gradient(ellipse at center,#0f1630 0%,var(--bg) 70%);z-index:9999;display:flex;align-items:center;justify-content:center;transition:opacity .4s}
.lbox{width:420px;background:var(--card);border:1px solid var(--b2);border-radius:24px;padding:48px;box-shadow:0 40px 80px rgba(0,0,0,.6),0 0 60px var(--accG);text-align:center}
.llogo{width:72px;height:72px;background:linear-gradient(135deg,#4f7ef8,#7c3aed);border-radius:20px;display:flex;align-items:center;justify-content:center;margin:0 auto 24px;box-shadow:0 0 40px var(--accG)}
.lbox h1{font-size:26px;font-weight:800;margin-bottom:6px;letter-spacing:-.5px}
.lbox .sub{color:var(--dim);font-size:14px;margin-bottom:36px}
.lbox input{width:100%;background:rgba(255,255,255,.04);border:1px solid var(--b2);padding:14px 16px;border-radius:10px;color:var(--txt);font-family:inherit;font-size:14px;margin-bottom:14px;outline:none;transition:border-color .2s}
.lbox input:focus{border-color:var(--acc);background:rgba(79,126,248,.06)}
.lbtn{width:100%;padding:15px;background:linear-gradient(135deg,#4f7ef8,#6366f1);border:none;border-radius:10px;color:#fff;font-family:inherit;font-weight:700;font-size:15px;cursor:pointer;transition:all .2s;box-shadow:0 8px 24px var(--accG)}
.lbtn:hover{transform:translateY(-2px)}
.lerr{color:var(--red);font-size:12px;margin-top:12px;display:none}
.lhint{margin-top:18px;font-size:11px;color:var(--mu);line-height:1.8}

/* SIDEBAR */
.sidebar{width:240px;min-width:240px;background:var(--sb);border-right:1px solid var(--b);display:flex;flex-direction:column;padding:20px 14px}
.lg-area{display:flex;align-items:center;gap:10px;padding:6px 8px;margin-bottom:32px}
.lg-icon{width:36px;height:36px;min-width:36px;background:linear-gradient(135deg,#4f7ef8,#7c3aed);border-radius:10px;display:flex;align-items:center;justify-content:center;box-shadow:0 0 16px var(--accG)}
.lg-t{font-size:15px;font-weight:800;letter-spacing:-.3px}
.lg-s{font-size:10px;color:var(--dim);margin-top:1px}
.ns{font-size:10px;font-weight:700;color:var(--mu);text-transform:uppercase;letter-spacing:1.2px;padding:0 10px;margin-bottom:8px;margin-top:16px}
.ni{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;color:var(--dim);font-weight:500;font-size:13px;cursor:pointer;transition:all .18s;margin-bottom:2px;border:none;background:none;width:100%;text-align:left}
.ni svg{width:16px;height:16px;opacity:.7;flex-shrink:0}
.ni:hover{background:rgba(255,255,255,.04);color:var(--txt)}
.ni.active{background:var(--accD);color:var(--acc);font-weight:600}
.ni.active svg{opacity:1}
.nb{margin-top:auto}
.ubdg{display:flex;align-items:center;gap:10px;padding:10px;background:var(--card2);border-radius:10px;border:1px solid var(--b);margin-top:8px}
.av{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0;color:#fff}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{height:62px;min-height:62px;background:rgba(10,12,18,.8);backdrop-filter:blur(12px);border-bottom:1px solid var(--b);display:flex;align-items:center;justify-content:space-between;padding:0 28px;gap:16px;z-index:10}
#pt{font-size:16px;font-weight:700}
.tbr{display:flex;align-items:center;gap:14px}
.psel{background:var(--card2);border:1px solid var(--b2);color:var(--txt);padding:7px 12px;border-radius:8px;font-family:inherit;font-size:13px;outline:none;cursor:pointer}
.psel option{background:#1a1f2b}
.ckbox{display:flex;align-items:center;gap:8px;background:var(--card2);border:1px solid var(--b);padding:6px 14px;border-radius:8px}
.cktm{font-family:'JetBrains Mono';font-size:13px;font-weight:600;color:var(--grn)}
.ckdt{font-size:11px;color:var(--dim)}
.dot-live{width:8px;height:8px;border-radius:50%;background:var(--grn);box-shadow:0 0 8px var(--grn);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.85)}}
.content{flex:1;overflow-y:auto;padding:28px}

/* KPI */
.kg{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:20px}
.kg3{grid-template-columns:repeat(3,1fr)}
.kg5{grid-template-columns:repeat(5,1fr)}
.kg6{grid-template-columns:repeat(6,1fr)}
.kc{background:var(--card);border:1px solid var(--b);border-radius:var(--r);padding:20px 18px;position:relative;overflow:hidden;transition:border-color .2s}
.kc:hover{border-color:var(--b2)}
.kc::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%}
.kcomm::before{background:var(--acc)}
.kwait::before{background:var(--amb)}
.kqual::before{background:var(--pur)}
.kmtg::before{background:var(--grn)}
.ktot::before{background:var(--cyn)}
.krdv::before{background:var(--red)}
.kl{font-size:11px;color:var(--dim);font-weight:600;text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px}
.kv{font-family:'JetBrains Mono';font-size:22px;font-weight:600;line-height:1.1}
.ks{font-size:11px;color:var(--dim);margin-top:6px;line-height:1.5}

/* CARD */
.card{background:var(--card);border:1px solid var(--b);border-radius:var(--r);padding:22px;margin-bottom:20px}
.ch{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:10px}
.ct{font-size:14px;font-weight:700}
.cs{font-size:12px;color:var(--dim);margin-top:2px}

/* PROGRESS */
.pb{height:8px;background:rgba(255,255,255,.05);border-radius:10px;overflow:hidden;margin-top:8px}
.pf{height:100%;border-radius:10px;transition:width .8s cubic-bezier(.22,1,.36,1)}
.pf.g{background:linear-gradient(90deg,var(--grn),#059669)}
.pf.a{background:linear-gradient(90deg,var(--amb),#d97706)}
.pf.r{background:linear-gradient(90deg,var(--red),#dc2626)}
.pf.b{background:linear-gradient(90deg,var(--acc),#7c3aed)}

/* TABLE */
.tw{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{text-align:left;padding:10px 14px;color:var(--dim);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;border-bottom:1px solid var(--b);white-space:nowrap}
tbody td{padding:12px 14px;border-bottom:1px solid var(--b);font-family:'JetBrains Mono';font-size:12px}
tbody td.tn{font-family:'Inter';font-size:13px}
tbody td.tb{font-family:'Inter';font-size:13px;font-weight:700}
tbody tr:hover td{background:rgba(255,255,255,.015)}
tbody tr:last-child td{border-bottom:none}
tr.trtot td{background:rgba(79,126,248,.05);font-weight:700}

/* BADGE */
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.bg{background:var(--grnD);color:var(--grn)}
.ba{background:var(--ambD);color:var(--amb)}
.br{background:var(--redD);color:var(--red)}
.bb{background:var(--accD);color:var(--acc)}
.bp{background:var(--purD);color:var(--pur)}
.bc{background:var(--cynD);color:var(--cyn)}

/* FORMS */
.fg{margin-bottom:16px}
.fl{display:block;font-size:11px;font-weight:700;color:var(--dim);margin-bottom:6px;text-transform:uppercase;letter-spacing:.6px}
.fc{width:100%;background:rgba(255,255,255,.04);border:1px solid var(--b2);padding:12px 14px;border-radius:9px;color:var(--txt);font-family:inherit;font-size:13px;outline:none;transition:border-color .2s,background .2s}
.fc:focus{border-color:var(--acc);background:rgba(79,126,248,.06)}
select.fc{cursor:pointer}
select.fc option{background:#1a1f2b}
textarea.fc{resize:vertical;min-height:180px;font-family:'JetBrains Mono';font-size:11px;line-height:1.7}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:10px 18px;border-radius:8px;border:none;font-family:inherit;font-weight:600;font-size:13px;cursor:pointer;transition:all .18s;white-space:nowrap}
.btn:active{transform:scale(.97)}
.btnp{background:var(--acc);color:#fff;box-shadow:0 4px 16px var(--accG)}
.btnp:hover{background:#5a88ff}
.btng{background:rgba(255,255,255,.05);color:var(--txt);border:1px solid var(--b2)}
.btng:hover{background:rgba(255,255,255,.09)}
.btnd{background:var(--redD);color:var(--red);border:1px solid rgba(239,68,68,.2)}
.btnd:hover{background:rgba(239,68,68,.2)}
.bsm{padding:6px 12px;font-size:12px}
.bfw{width:100%}

/* GRIDS */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:20px}

/* REALTIME PANEL */
.rtp{background:var(--card2);border:1px solid var(--b2);border-radius:var(--r);padding:20px;margin-bottom:20px;position:relative;overflow:hidden}
.rtp::after{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at top right,rgba(79,126,248,.06) 0%,transparent 60%);pointer-events:none}
.rtg{display:grid;grid-template-columns:repeat(6,1fr);gap:12px}
.rti{background:var(--card);border:1px solid var(--b);border-radius:10px;padding:14px 12px;text-align:center}
.rtl{font-size:10px;color:var(--dim);font-weight:600;text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px}
.rtv{font-family:'JetBrains Mono';font-size:17px;font-weight:600}
.rts{font-size:10px;color:var(--mu);margin-top:4px;line-height:1.4}

/* AGENT ROW */
.agr{display:flex;align-items:center;gap:14px;padding:14px 18px;background:var(--card);border:1px solid var(--b);border-radius:10px;margin-bottom:10px;transition:border-color .2s;cursor:pointer}
.agr:hover{border-color:var(--b2)}
.agav{width:42px;height:42px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;color:#fff}
.agi{flex:1;min-width:0}
.agn{font-size:14px;font-weight:700}
.agid{font-size:11px;color:var(--dim);font-family:'JetBrains Mono'}
.agpg{flex:2;min-width:0}
.agpct{font-family:'JetBrains Mono';font-size:16px;font-weight:700;text-align:right;min-width:60px}
.aghr{font-size:11px;color:var(--dim);font-family:'JetBrains Mono';text-align:right;min-width:110px}

/* MTG ITEM */
.mtgi{display:flex;align-items:center;gap:12px;padding:10px 14px;background:var(--card2);border-radius:8px;margin-bottom:6px;font-size:13px}

/* AGENT CHECKLIST */
.agcl{display:flex;flex-direction:column;gap:6px;max-height:220px;overflow-y:auto;border:1px solid var(--b2);border-radius:9px;padding:10px}
.agci{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:7px;cursor:pointer;transition:background .15s}
.agci:hover{background:rgba(255,255,255,.04)}
.agci input[type=checkbox]{width:16px;height:16px;accent-color:var(--acc);cursor:pointer;flex-shrink:0}
.agci label{cursor:pointer;font-size:13px;font-weight:500}

/* TOAST */
#toasts{position:fixed;bottom:24px;right:24px;z-index:99999;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{background:var(--card2);border:1px solid var(--b2);border-left:3px solid var(--acc);padding:12px 18px;border-radius:10px;font-size:13px;font-weight:500;box-shadow:0 8px 30px rgba(0,0,0,.5);animation:tIn .3s ease-out;pointer-events:all}
.toast.s{border-left-color:var(--grn)}
.toast.e{border-left-color:var(--red)}
.toast.i{border-left-color:var(--cyn)}
@keyframes tIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}

/* MODAL */
.mo-ov{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);z-index:9000;display:flex;align-items:center;justify-content:center}
.mo{background:var(--card);border:1px solid var(--b2);border-radius:16px;padding:32px;width:520px;max-width:95vw;box-shadow:0 4px 24px rgba(0,0,0,.4);animation:moIn .25s ease-out}
.mot{font-size:18px;font-weight:700;margin-bottom:6px}
.mos{font-size:13px;color:var(--dim);margin-bottom:24px}
@keyframes moIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}

/* MISC */
.empty{text-align:center;padding:50px 20px;color:var(--dim);font-size:14px}
.ibox{background:var(--accD);border:1px solid rgba(79,126,248,.2);border-radius:9px;padding:14px 16px;font-size:13px;color:var(--dim);margin-bottom:16px;line-height:1.6}
.itip{background:var(--cynD);border:1px solid rgba(34,211,238,.2);border-radius:8px;padding:12px 16px;font-size:12px;color:var(--cyn);margin-bottom:16px;line-height:1.6}
.ifmt{background:rgba(0,0,0,.3);border-radius:8px;padding:12px 14px;font-family:'JetBrains Mono';font-size:11px;color:var(--dim);line-height:1.7;margin-bottom:16px;overflow-x:auto;white-space:pre}
.divider{height:1px;background:var(--b);margin:16px 0}
.fdrop{border:2px dashed var(--b2);border-radius:12px;padding:40px 20px;text-align:center;cursor:pointer;transition:all .2s;position:relative}
.fdrop:hover,.fdrop.over{border-color:var(--acc);background:var(--accD)}
.fdrop input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}

/* SUMMARY STATS */
.sstat{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px}
.sstatitem{background:var(--card2);border-radius:8px;padding:8px 14px;font-size:12px;font-family:'JetBrains Mono'}
</style>
</head>
<body>
<div id="toasts"></div>

<!-- LOGIN -->
<div id="login-ov">
  <div class="lbox">
    <div class="llogo">
      <svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
    </div>
    <h1>ASP Connect PRO</h1>
    <p class="sub">Suivi du temps de travail & performance</p>
    <input type="text" id="log-id" placeholder="Identifiant (ex: FATIMA_01 ou ID Vicidial)" autocomplete="off">
    <input type="password" id="log-pw" placeholder="Mot de passe" onkeydown="if(event.key==='Enter')Auth.login()">
    <button class="lbtn" onclick="Auth.login()">Se connecter</button>
    <div id="lerr" class="lerr">Identifiants incorrects.</div>
    <p class="lhint">
      Admin : <strong style="color:var(--acc)">SUPER</strong> / <strong style="color:var(--acc)">1234</strong><br>
      Agents test : FATIMA_01 / 0001 · SARA_02 / 0002 · etc.
    </p>
  </div>
</div>

<!-- SIDEBAR -->
<aside class="sidebar">
  <div class="lg-area">
    <div class="lg-icon">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
    </div>
    <div><div class="lg-t">ASP Connect</div><div class="lg-s">PRO Edition</div></div>
  </div>

  <div id="nav-agent" style="display:none">
    <div class="ns">Mon espace</div>
    <button class="ni active" onclick="R.go('ag-dash',this)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>Tableau de bord</button>
    <button class="ni" onclick="R.go('ag-hist',this)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>Historique détaillé</button>
    <button class="ni" onclick="R.go('ag-stats',this)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>Mes statistiques</button>
  </div>

  <div id="nav-admin" style="display:none">
    <div class="ns">Supervision</div>
    <button class="ni active" onclick="R.go('ad-team',this)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87m-4-12a4 4 0 010 7.75"/></svg>Vue équipe</button>
    <button class="ni" onclick="R.go('ad-detail',this)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>Détail par agent</button>
    <div class="ns" style="margin-top:18px">Données</div>
    <button class="ni" onclick="R.go('ad-import',this)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/></svg>Import Vicidial</button>
    <button class="ni" onclick="R.go('ad-mtg',this)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0"/></svg>Réunions & Coaching</button>
    <div class="ns" style="margin-top:18px">Gestion</div>
    <button class="ni" onclick="R.go('ad-agents',this)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197"/></svg>Gestion agents</button>
    <button class="ni" onclick="R.go('ad-periodes',this)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>Périodes & Objectifs</button>
    <button class="ni" onclick="R.go('ad-export',this)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 10v6m0 0l-3-3m3 3l3-3M3 17V7a2 2 0 012-2h6l2 2h6a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg>Exports & Rapports</button>
  </div>

  <div class="nb">
    <button class="ni" style="color:var(--red)" onclick="Auth.logout()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/></svg>Déconnexion</button>
    <div class="ubdg"><div class="av" id="sbav">?</div><div><div style="font-size:12px;font-weight:600" id="sbnm">—</div><div style="font-size:10px;color:var(--dim)" id="sbrole">—</div></div></div>
  </div>
</aside>

<!-- MAIN -->
<main class="main">
  <header class="topbar">
    <div id="pt">Tableau de bord</div>
    <div class="tbr">
      <select class="psel" id="psel" onchange="App.setPeriod(this.value)"></select>
      <div class="ckbox">
        <div class="dot-live"></div>

// ══════════════════════════════════════════════
// UTILITAIRES
// ══════════════════════════════════════════════
const U = {
  // Convertit H:MM:SS ou secondes en secondes
  toSec(v) {
    if (!v) return 0;
    const s = String(v).trim().replace(/"/g,'');
    if (!s.includes(':')) return parseFloat(s)*86400 || parseInt(s) || 0; // fraction de jour Vicidial
    const p = s.split(':').map(Number);
    if (p.length===3) return p[0]*3600+p[1]*60+p[2];
    if (p.length===2) return p[0]*60+p[1];
    return 0;
  },
  hms(s){
    s=Math.floor(s||0);
    return `${Math.floor(s/3600)}h${String(Math.floor((s%3600)/60)).padStart(2,'0')}`;
  },
  hmsFull(s){
    s=Math.floor(s||0);
    return `${String(Math.floor(s/3600)).padStart(2,'0')}:${String(Math.floor((s%3600)/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
  },
  fmtDate(d){ return d.split('-').reverse().join('/'); },
  today(){ return new Date().toISOString().split('T')[0]; },
  initials(n){ return (n||'?').trim().split(/\s+/).slice(0,2).map(w=>w[0]).join('').toUpperCase(); },
  pcolor(p){ return p>=90?'var(--grn)':p>=65?'var(--amb)':'var(--red)'; },
  pcls(p){ return p>=90?'g':p>=65?'a':'r'; },
  pbadge(p){ return p>=90?'bg':p>=65?'ba':'br'; },

  // Calcul complet d'un agent sur une période
  calc(agId, period) {
    const recs = (DB.records[agId]||[]).filter(r=>r.period===period);
    let tC=0,tW=0,tQR=0,tQP=0,tM=0,tCalls=0,tSales=0;
    recs.forEach(r=>{
      tC    += (r.comm||0);
      tW    += (r.wait||0);
      tQR   += (r.qual||0);
      tQP   += Math.min(r.qual||0, QUAL_CAP);
      tM    += (r.mtg||0);
      tCalls+= (r.calls||0);
      tSales+= (r.sales||0);
    });
    const tot=tC+tW+tQP+tM, h=tot/3600;
    const cfg=DB.periods[period]||{goalH:132};
    const pct=Math.min(100,(h/cfg.goalH)*100);
    const rdvRate=tCalls>0?tSales/tCalls*100:0;
    return {tC,tW,tQR,tQP,tM,tCalls,tSales,tot,h,pct,goalH:cfg.goalH,recs,rdvRate};
  },

  // Parse une ligne CSV Vicidial (format standard export)
  parseVicidialLine(line) {
    // Séparateur : virgule ou point-virgule, avec ou sans guillemets
    const sep = line.includes(';') ? ';' : ',';
    const cols = [];
    let cur='', inQ=false;
    for (let i=0;i<line.length;i++){
      const c=line[i];
      if(c==='"'){inQ=!inQ;continue;}
      if(c===sep&&!inQ){cols.push(cur.trim());cur='';continue;}
      cur+=c;
    }
    cols.push(cur.trim());
    return cols;
  },

  // Parse fichier complet Vicidial avec fill-down agent
  parseVicidial(text) {
    const lines = text.split('\n').filter(l=>l.trim());
    const results=[];
    let curAgent=null;
    for (const line of lines) {
      const cols = U.parseVicidialLine(line);
      if (cols.length<6) continue;
      const skip=['USER NAME','TOTALS','AGENT PERF','---','Agent Perform'].some(s=>line.toUpperCase().includes(s.toUpperCase()));
      if (skip) continue;

      // Détection ligne agent (nom en col 0, ID en col 1)
      const col0=cols[0], col1=cols[1];
      const dateCol=cols[4]||'';
      const isDate=/^\d{4}-\d{2}-\d{2}$/.test(dateCol)||/^\d{2}\/\d{2}\/\d{4}$/.test(dateCol);

      if (col0&&col1&&!isDate&&col0.length>2) {
        curAgent={id:col1.trim(), name:col0.trim()};
        continue;
      }

      if (!curAgent||!isDate) continue;

      // Parse date
      let date=dateCol;
      if (date.includes('/')) {
        const p=date.split('/');
        date=p[2]+'-'+p[1].padStart(2,'0')+'-'+p[0].padStart(2,'0');
      }

      // Colonnes Vicidial standard : 5=appels, 9=attente, 11=comm, 13=qual/dispo
      const calls = parseInt(cols[5])||0;
      const wait  = U.toSec(cols[9]||'0');
      const comm  = U.toSec(cols[11]||cols[6]||'0');
      const qual  = U.toSec(cols[13]||'0');
      // RDV (SALE) : dernière colonne numérique non nulle
      const trailing=cols.slice(14).map(x=>parseInt(x)||0);
      const sales=trailing.length?trailing[trailing.length-1]:0;

      results.push({agId:curAgent.id, agName:curAgent.name, date, comm, wait, qual, calls, sales});
    }
    return results;
  },
};

exportCSV(agId) {
  const ag=DB.agents.find(a=>a.id===agId)||{name:agId};
  const s=U.calc(agId, DB.period);
  let csv='Date;Communication;Attente;Qualification payée;Réunions;Total;Appels;RDV;Taux RDV\n';
  [...s.recs].sort((a,b)=>a.date.localeCompare(b.date)).forEach(r=>{
    const qp=Math.min(r.qual,QUAL_CAP),tot=r.comm+r.wait+qp+(r.mtg||0);
    const rate=r.calls>0?((r.sales/r.calls)*100).toFixed(1):'0';
    csv+=`${r.date};${U.hms(r.comm)};${U.hms(r.wait)};${U.hms(qp)};${U.hms(r.mtg||0)};${U.hms(tot)};${r.calls||0};${r.sales||0};${rate}%\n`;
  });
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'}));
  a.download=`Rapport_${ag.name.replace(/ /g,'_')}_${DB.period}.csv`;
  a.click(); App.toast('Export CSV téléchargé','s');
},

        </div>

handleFile(file) {
  if(!file) return;
  document.getElementById('imp-st').textContent=`Lecture de ${file.name}…`;
  const reader=new FileReader();
  reader.onload=e=>{ V._processImport(e.target.result, file.name); };
  reader.readAsText(file,'UTF-8');
},

doImportText() {
  const raw=document.getElementById('imp-raw')?.value||'';
  if(!raw.trim()) return App.toast('Aucune donnée à importer','e');
  V._processImport(raw,'saisie manuelle');
},

_processImport(text, src) {
  const entries=U.parseVicidial(text);
  if(!entries.length){ App.toast('Aucune ligne détectée — vérifiez le format','e'); return; }
  let added=0,updated=0;
  entries.forEach(e=>{
    const {agId,agName,date,comm,wait,qual,calls,sales}=e;
    if(!DB.agents.find(a=>a.id===agId||a.viciId===agId)){
      DB.agents.push({id:agId,viciId:agId,name:agName,pw:'0000',color:COLORS[DB.agents.length%COLORS.length]});
    }

    if(ex){Object.assign(ex,entry);updated++;}else{DB.records[agId].push(entry);added++;}
  });

  const preview=entries.slice(0,15);
  document.getElementById('imp-st') && (document.getElementById('imp-st').textContent=`Source : "${src}"`);

          <td>${p.calls}</td>

        ${entries.length>15?`<tr><td colspan="7" style="text-align:center;color:var(--dim);padding:10px">… et ${entries.length-15} autres lignes</td></tr>`:''}
      </tbody>

},

              <span style="color:var(--grn);font-family:'JetBrains Mono';font-weight:700">+${m.durMin}min</span>
              ${m.note?`<span style="font-size:10px;color:var(--mu)">${m.note}</span>`:''}
              <button class="btn btnd bsm" style="padding:3px 8px;font-size:11px" onclick="V.delMtg('${m.agId}','${m.date}',${m.durMin},'${m.type}')">✕</button>
            </div>`;}).join('')}
        </div>
      </div>
    </div>`;
},

saveMtg() {
  const sel=[...document.querySelectorAll('#agcl input:checked')].map(c=>c.value);
  const date=document.getElementById('m-dt').value;
  const dur=parseInt(document.getElementById('m-dur').value);
  const type=document.getElementById('m-type').value;
  const note=document.getElementById('m-note').value;
  if(!sel.length) return App.toast('Sélectionnez au moins un agent','e');
  if(!date||isNaN(dur)||dur<=0) return App.toast('Date et durée requises','e');
  sel.forEach(agId=>{
    DB.mtg_log.push({agId,date,period:DB.period,durMin:dur,type,note});
    if(!DB.records[agId]) DB.records[agId]=[];
    const day=DB.records[agId].find(r=>r.date===date&&r.period===DB.period);
    if(day) day.mtg=(day.mtg||0)+dur*60;
    else DB.records[agId].push({period:DB.period,date,comm:0,wait:0,qual:0,calls:0,sales:0,mtg:dur*60});
  });
  save(); App.toast(`Temps ajouté à ${sel.length} agent(s)`,'s'); R.go('ad-mtg');
},

delMtg(agId,date,dur,type){
  if(!confirm('Supprimer cette entrée ?')) return;
  const i=DB.mtg_log.findIndex(m=>m.agId===agId&&m.date===date&&m.durMin===dur&&m.type===type);
  if(i>-1) DB.mtg_log.splice(i,1);
  const day=(DB.records[agId]||[]).find(r=>r.date===date&&r.period===DB.period);
  if(day) day.mtg=Math.max(0,(day.mtg||0)-dur*60);
  save(); App.toast('Entrée supprimée','i'); R.go('ad-mtg');
},

            <td style="color:var(--acc)">${U.hms(s.tC)}</td>
            <td style="color:var(--amb)">${U.hms(s.tW)}</td>
            <td style="color:var(--pur)">${U.hms(s.tQP)}</td>
            <td style="color:var(--grn)">${U.hms(s.tM)}</td>
            <td style="color:var(--cyn);font-weight:700">${U.hms(s.tot)}</td>
            <td><span class="badge ${U.pbadge(s.pct)}">${s.pct.toFixed(1)}%</span></td>
            <td style="color:var(--red)">${s.tSales}</td>
            <td>${s.rdvRate.toFixed(1)}%</td>
          </tr>`;}).join('')}
        </tbody>
      </table></div>
    </div>`;
},

exportMtg() {
  const logs=DB.mtg_log.filter(m=>m.period===DB.period);
  let csv='Agent;Date;Durée (min);Type;Note\n';
  logs.forEach(m=>{
    const ag=DB.agents.find(a=>a.id===m.agId);
    csv+=`${ag?.name||m.agId};${m.date};${m.durMin};${m.type};${m.note||''}\n`;
  });
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob(['\uFEFF'+csv],{type:'text/csv'}));
  a.download=`Reunions_${DB.period}.csv`;
  a.click(); App.toast('Export réunions téléchargé','s');
},

}; // fin V

// Init
window.addEventListener('DOMContentLoaded',()=>{
  document.getElementById('log-id').focus();
});
</script>
</body>
