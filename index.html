<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ASP Connect · Expert Performance</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@500&display=swap');

        :root {
            --bg: #090b10;
            --card: #12151c;
            --border: rgba(255,255,255,0.08);
            --accent: #3e70f7;
            --accent-glow: rgba(62, 112, 247, 0.2);
            --text: #ffffff;
            --text-dim: #848995;
            --green: #10b981;
            --amber: #f59e0b;
            --red: #ef4444;
            --radius: 14px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-font-smoothing: antialiased; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); overflow: hidden; height: 100vh; }

        /* --- Global Layout --- */
        #app { max-width: 480px; margin: 0 auto; height: 100vh; display: flex; flex-direction: column; position: relative; border-left: 1px solid var(--border); border-right: 1px solid var(--border); }
        .screen { display: none; flex: 1; flex-direction: column; overflow: hidden; animation: slideUp 0.4s ease-out; }
        .screen.active { display: flex; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .scroll-body { flex: 1; overflow-y: auto; padding: 20px 16px 100px; scrollbar-width: none; }
        .scroll-body::-webkit-scrollbar { display: none; }

        /* --- Components --- */
        .card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px; margin-bottom: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.2); }
        .label { font-size: 11px; font-weight: 700; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; display: block; }
        
        .metric-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .metric-box { background: rgba(255,255,255,0.03); padding: 14px; border-radius: 10px; border: 1px solid var(--border); }
        .metric-val { font-family: 'JetBrains Mono'; font-size: 20px; font-weight: 600; margin-top: 4px; }
        .metric-sub { font-size: 11px; color: var(--text-dim); margin-top: 2px; }

        /* --- Bars --- */
        .prog-wrap { margin-top: 8px; }
        .prog-bar { height: 6px; background: rgba(255,255,255,0.05); border-radius: 10px; overflow: hidden; }
        .prog-fill { height: 100%; background: var(--accent); transition: width 0.6s cubic-bezier(0.22, 1, 0.36, 1); }

        /* --- Buttons & Inputs --- */
        .btn { width: 100%; padding: 14px; border-radius: 10px; border: none; font-family: inherit; font-weight: 600; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-primary { background: var(--accent); color: white; box-shadow: 0 4px 15px var(--accent-glow); }
        .btn-primary:active { transform: scale(0.97); }
        .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--text); }

        .input-group { margin-bottom: 16px; }
        input, select, textarea { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--border); padding: 12px; border-radius: 8px; color: white; outline: none; font-size: 14px; }
        input:focus { border-color: var(--accent); background: rgba(255,255,255,0.08); }

        /* --- Navigation --- */
        .nav { position: absolute; bottom: 0; width: 100%; background: rgba(18, 21, 28, 0.95); backdrop-filter: blur(10px); border-top: 1px solid var(--border); display: flex; padding: 8px 0 24px; z-index: 100; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; font-size: 10px; color: var(--text-dim); cursor: pointer; border: none; background: none; }
        .nav-item.active { color: var(--accent); }
        .nav-item svg { width: 22px; height: 22px; margin-bottom: 4px; }

        /* --- Specific Elements --- */
        .badge { font-size: 10px; padding: 2px 8px; border-radius: 20px; font-weight: 600; }
        .badge-amber { background: rgba(245, 158, 11, 0.15); color: var(--amber); }
        .badge-green { background: rgba(16, 185, 129, 0.15); color: var(--green); }

        .table-hist { width: 100%; border-collapse: collapse; font-size: 12px; }
        .table-hist th { text-align: left; padding: 8px; color: var(--text-dim); border-bottom: 1px solid var(--border); }
        .table-hist td { padding: 10px 8px; border-bottom: 1px solid var(--border); font-family: 'JetBrains Mono'; }

        /* --- Toast --- */
        #toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: var(--accent); color: white; padding: 10px 20px; border-radius: 50px; font-size: 13px; font-weight: 600; display: none; z-index: 1000; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

<div id="toast">Copié !</div>

<div id="app">

    <!-- LOGIN SCREEN -->
    <section class="screen active" id="scr-login">
        <div class="scroll-body" style="display:flex; flex-direction:column; justify-content:center; align-items:center;">
            <div style="background:var(--accent); width:64px; height:64px; border-radius:20px; display:flex; align-items:center; justify-content:center; margin-bottom:20px; box-shadow:0 0 30px var(--accent-glow);">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
            </div>
            <h1 style="font-size:24px; font-weight:800; margin-bottom:4px;">ASP Connect</h1>
            <p style="color:var(--text-dim); margin-bottom:32px; font-size:14px;">Suivi de performance en temps réel</p>

            <div class="input-group" style="width:100%">
                <input type="text" id="log-id" placeholder="ID Agent (ex: 06980713)">
            </div>
            <div class="input-group" style="width:100%">
                <input type="password" id="log-pw" placeholder="Mot de passe">
            </div>
            <button class="btn btn-primary" onclick="Auth.login()">Se connecter</button>
            <p style="margin-top:20px; font-size:12px; color:var(--text-dim);">Admin : SUPER / 1234</p>
        </div>
    </section>

    <!-- AGENT DASHBOARD -->
    <section class="screen" id="scr-agent">
        <div class="scroll-body" id="agent-ui">
            <!-- Dynamique -->
        </div>
        <nav class="nav">
            <button class="nav-item active" onclick="Router.go('agent-dash', this)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>Dashboard</button>
            <button class="nav-item" onclick="Router.go('agent-hist', this)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>Historique</button>
            <button class="nav-item" onclick="Auth.logout()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/></svg>Sortie</button>
        </nav>
    </section>

    <!-- ADMIN DASHBOARD -->
    <section class="screen" id="scr-admin">
        <div class="scroll-body" id="admin-ui">
            <!-- Dynamique -->
        </div>
        <nav class="nav">
            <button class="nav-item active" onclick="Router.go('admin-team', this)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87m-4-12a4 4 0 010 7.75"/></svg>Équipe</button>
            <button class="nav-item" onclick="Router.go('admin-import', this)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/></svg>Import</button>
            <button class="nav-item" onclick="Router.go('admin-mtg', this)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 6v6m0 0v6m0-6h6m-6 0H6"/></svg>Réunions</button>
            <button class="nav-item" onclick="Auth.logout()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/></svg>Sortie</button>
        </nav>
    </section>

</div>

<script>
/**
 * APP LOGIC - ASP CONNECT
 */

const GOAL_HOURS = 132;
const QUAL_LIMIT = 1800; // 30 min en secondes

// Data Store (LocalStorage)
let DB = JSON.parse(localStorage.getItem('asp_db')) || {
    agents: [
        {id: '06980713', name: 'Houyem Haddad', pw: '0001'},
        {id: '104806005', name: 'Amal Ainseba', pw: '0002'}
    ],
    records: {}, // id: [{date, comm, wait, qual, mtg}]
    logs: []
};

const Utils = {
    save: () => localStorage.setItem('asp_db', JSON.stringify(DB)),
    
    hmsToSec: (hms) => {
        if(!hms || !hms.includes(':')) return 0;
        const [h, m, s] = hms.split(':').map(Number);
        return (h * 3600) + (m * 60) + s;
    },

    fmtHms: (sec) => {
        const h = Math.floor(sec / 3600);
        const m = Math.floor((sec % 3600) / 60);
        return `${h}h${m.toString().padStart(2, '0')}`;
    },

    toast: (msg) => {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.style.display = 'block';
        setTimeout(() => t.style.display = 'none', 2500);
    },

    calcAgent: (id) => {
        const data = DB.records[id] || [];
        let tComm = 0, tWait = 0, tQualPaid = 0, tMtg = 0, tQualReal = 0;
        
        data.forEach(r => {
            tComm += r.comm;
            tWait += r.wait;
            tQualReal += r.qual;
            tQualPaid += Math.min(r.qual, QUAL_LIMIT);
            tMtg += (r.mtg || 0);
        });

        const totalPaidSec = tComm + tWait + tQualPaid + tMtg;
        const totalHours = totalPaidSec / 3600;
        const progress = (totalHours / GOAL_HOURS) * 100;

        return { tComm, tWait, tQualPaid, tQualReal, tMtg, totalPaidSec, totalHours, progress, count: data.length };
    }
};

const Auth = {
    cur: null,
    login: () => {
        const id = document.getElementById('log-id').value;
        const pw = document.getElementById('log-pw').value;

        if(id === 'SUPER' && pw === '1234') {
            Auth.cur = { role: 'admin', name: 'Superviseur' };
            UI.showScreen('scr-admin');
            Router.go('admin-team');
            return;
        }

        const ag = DB.agents.find(a => a.id === id && a.pw === pw);
        if(ag) {
            Auth.cur = { ...ag, role: 'agent' };
            UI.showScreen('scr-agent');
            Router.go('agent-dash');
        } else {
            Utils.toast("Identifiants incorrects");
        }
    },
    logout: () => {
        Auth.cur = null;
        UI.showScreen('scr-login');
    }
};

const Router = {
    go: (path, el) => {
        if(el) {
            const nav = el.closest('.nav');
            nav.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
        }
        UI.render(path);
    }
};

const UI = {
    showScreen: (id) => {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    },

    render: (path) => {
        const agContainer = document.getElementById('agent-ui');
        const adContainer = document.getElementById('admin-ui');

        if(path === 'agent-dash') {
            const s = Utils.calcAgent(Auth.cur.id);
            agContainer.innerHTML = `
                <div style="margin-bottom:24px">
                    <h2 style="font-size:22px; font-weight:700;">Salut, ${Auth.cur.name.split(' ')[0]} 👋</h2>
                    <p style="color:var(--text-dim); font-size:14px;">Mois de Mars 2026</p>
                </div>

                <div class="card">
                    <span class="label">Avancement Objectif</span>
                    <div style="display:flex; justify-content:space-between; align-items:flex-end; margin-bottom:8px;">
                        <span style="font-size:28px; font-weight:800; font-family:'JetBrains Mono';">${s.progress.toFixed(1)}%</span>
                        <span style="color:var(--text-dim); font-size:13px;">${Utils.fmtHms(s.totalPaidSec)} / ${GOAL_HOURS}h</span>
                    </div>
                    <div class="prog-bar"><div class="prog-fill" style="width:${s.progress}%"></div></div>
                </div>

                <div class="metric-grid">
                    <div class="metric-box">
                        <span class="label">📞 Appels</span>
                        <div class="metric-val">${Utils.fmtHms(s.tComm)}</div>
                    </div>
                    <div class="metric-box">
                        <span class="label">⏳ Attente</span>
                        <div class="metric-val">${Utils.fmtHms(s.tWait)}</div>
                    </div>
                    <div class="metric-box">
                        <span class="label">📝 Qualif. <span class="badge badge-amber">Capped</span></span>
                        <div class="metric-val">${Utils.fmtHms(s.tQualPaid)}</div>
                        <div class="metric-sub">Hors-plafond: ${Utils.fmtHms(s.tQualReal - s.tQualPaid)}</div>
                    </div>
                    <div class="metric-box">
                        <span class="label">👥 Réunions</span>
                        <div class="metric-val" style="color:var(--green)">+${Utils.fmtHms(s.tMtg)}</div>
                    </div>
                </div>
            `;
        }

        if(path === 'agent-hist') {
            const records = DB.records[Auth.cur.id] || [];
            const rows = records.slice().reverse().map(r => `
                <tr>
                    <td>${r.date.split('-').reverse().join('/')}</td>
                    <td>${Utils.fmtHms(r.comm)}</td>
                    <td>${Utils.fmtHms(Math.min(r.qual, 1800))}</td>
                    <td style="font-weight:700; color:var(--text)">${Utils.fmtHms(r.comm + r.wait + Math.min(r.qual, 1800) + (r.mtg||0))}</td>
                </tr>
            `).join('');

            agContainer.innerHTML = `
                <div class="card">
                    <span class="label">Historique détaillé</span>
                    <table class="table-hist">
                        <thead><tr><th>Date</th><th>Comm.</th><th>Qual.</th><th>Total</th></tr></thead>
                        <tbody>${rows || '<tr><td colspan="4" style="text-align:center; padding:20px; color:var(--text-dim)">Aucune donnée</td></tr>'}</tbody>
                    </table>
                </div>
            `;
        }

        if(path === 'admin-team') {
            const list = DB.agents.map(ag => {
                const s = Utils.calcAgent(ag.id);
                return `
                    <div class="card" style="padding:14px; margin-bottom:10px;">
                        <div style="display:flex; justify-content:space-between; align-items:center;">
                            <div>
                                <div style="font-weight:600; font-size:14px;">${ag.name}</div>
                                <div style="font-size:11px; color:var(--text-dim);">${ag.id} • ${s.count} jours</div>
                            </div>
                            <div style="text-align:right">
                                <div style="font-family:'JetBrains Mono'; font-weight:700; color:${s.progress > 80 ? 'var(--green)' : 'var(--text)'}">${s.progress.toFixed(1)}%</div>
                                <div style="font-size:10px; color:var(--text-dim);">${Utils.fmtHms(s.totalPaidSec)}</div>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
            adContainer.innerHTML = `<h2 style="margin-bottom:16px;">Performances Équipe</h2>${list}`;
        }

        if(path === 'admin-import') {
            adContainer.innerHTML = `
                <div class="card">
                    <span class="label">Importation Vicidial</span>
                    <p style="font-size:13px; color:var(--text-dim); margin-bottom:16px;">Collez le contenu de votre fichier Vicidial (TXT/CSV) ci-dessous :</p>
                    <textarea id="csv-data" placeholder="Copiez les lignes du CRM ici..." style="height:200px; font-family:'JetBrains Mono'; font-size:10px; margin-bottom:16px;"></textarea>
                    <button class="btn btn-primary" onclick="UI.handleImport()">Analyser et Sauvegarder</button>
                </div>
                <div class="card">
                    <span class="label">Format Attendu</span>
                    <p style="font-size:11px; color:var(--text-dim); line-height:1.5;">
                        L'outil cherche automatiquement l'ID (colonne 2), la Date (colonne 5), le temps Comm (colonne 12), Wait (colonne 10) et Qualif (colonne 14).
                    </p>
                </div>
            `;
        }

        if(path === 'admin-mtg') {
            const opts = DB.agents.map(a => `<option value="${a.id}">${a.name}</option>`).join('');
            adContainer.innerHTML = `
                <div class="card">
                    <span class="label">Nouvelle Réunion / Coaching</span>
                    <div class="input-group"><select id="mtg-ag">${opts}</select></div>
                    <div class="input-group"><input type="date" id="mtg-date" value="${new Date().toISOString().split('T')[0]}"></div>
                    <div class="input-group"><input type="number" id="mtg-dur" placeholder="Durée en minutes (ex: 45)"></div>
                    <button class="btn btn-primary" onclick="UI.handleMeeting()">Ajouter le temps</button>
                </div>
            `;
        }
    },

    handleImport: () => {
        const raw = document.getElementById('csv-data').value;
        if(!raw) return;

        const lines = raw.split('\n');
        let importCount = 0;

        lines.forEach(line => {
            // Nettoyage des guillemets et split
            const cols = line.split('","').map(c => c.replace(/"/g, '').trim());
            
            // On cherche la ligne de détail qui a une date en colonne 4 (index)
            if(cols.length > 10 && cols[4].includes('2026')) {
                const id = cols[1];
                const date = cols[4];
                const wait = Utils.hmsToSec(cols[9]);
                const comm = Utils.hmsToSec(cols[11]);
                const qual = Utils.hmsToSec(cols[13]);

                if(!DB.records[id]) DB.records[id] = [];
                
                // Eviter les doublons
                const existingIdx = DB.records[id].findIndex(r => r.date === date);
                const newData = { date, comm, wait, qual, mtg: 0 };
                
                if(existingIdx > -1) {
                    // On fusionne mais garde les réunions déjà saisies
                    newData.mtg = DB.records[id][existingIdx].mtg || 0;
                    DB.records[id][existingIdx] = newData;
                } else {
                    DB.records[id].push(newData);
                }
                
                // Si l'agent n'existe pas encore en base, on le crée
                if(!DB.agents.find(a => a.id === id)) {
                    DB.agents.push({id, name: cols[0] || 'Agent Inconnu', pw: '0000'});
                }
                importCount++;
            }
        });

        Utils.save();
        Utils.toast(`${importCount} entrées traitées`);
        Router.go('admin-team');
    },

    handleMeeting: () => {
        const id = document.getElementById('mtg-ag').value;
        const date = document.getElementById('mtg-date').value;
        const min = parseInt(document.getElementById('mtg-dur').value);

        if(!id || !date || isNaN(min)) return Utils.toast("Erreur de saisie");

        if(!DB.records[id]) DB.records[id] = [];
        const day = DB.records[id].find(r => r.date === date);
        
        if(day) {
            day.mtg = (day.mtg || 0) + (min * 60);
        } else {
            DB.records[id].push({ date, comm:0, wait:0, qual:0, mtg: (min * 60) });
        }

        Utils.save();
        Utils.toast("Temps ajouté !");
        Router.go('admin-team');
    }
};

// Start
window.onload = () => {
    // Initialisation
};

</script>
</body>
</html>
