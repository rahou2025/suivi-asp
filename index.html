<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASP CONNECT PRO · Gestion & Rémunération</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@500&display=swap');

        :root {
            --bg: #0b0e14;
            --sidebar: #12161f;
            --card: #1a1f2b;
            --border: rgba(255,255,255,0.06);
            --accent: #4f7ef8;
            --accent-soft: rgba(79, 126, 248, 0.1);
            --text: #f0f2f5;
            --text-dim: #94a3b8;
            --green: #10b981;
            --amber: #f59e0b;
            --red: #ef4444;
            --radius: 12px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; overflow: hidden; }

        /* --- Layout --- */
        .sidebar { width: 280px; background: var(--sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 24px; }
        .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .top-bar { height: 70px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 32px; background: var(--sidebar); }
        .content { flex: 1; padding: 32px; overflow-y: auto; }

        /* --- Sidebar Nav --- */
        .logo { display: flex; align-items: center; gap: 12px; margin-bottom: 40px; font-weight: 800; font-size: 20px; color: var(--accent); }
        .nav-group { margin-bottom: 24px; }
        .nav-label { font-size: 11px; font-weight: 700; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; display: block; }
        .nav-link { padding: 12px 16px; border-radius: 8px; color: var(--text-dim); text-decoration: none; font-weight: 500; display: flex; align-items: center; gap: 12px; margin-bottom: 4px; cursor: pointer; transition: 0.2s; }
        .nav-link:hover, .nav-link.active { background: var(--accent-soft); color: var(--accent); }

        /* --- Cards & Tables --- */
        .card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; margin-bottom: 24px; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 12px; color: var(--text-dim); font-size: 12px; border-bottom: 2px solid var(--border); text-transform: uppercase; }
        td { padding: 14px 12px; border-bottom: 1px solid var(--border); font-size: 14px; }
        
        /* --- Form Elements --- */
        input, select, textarea { width: 100%; background: rgba(0,0,0,0.2); border: 1px solid var(--border); padding: 12px; border-radius: 8px; color: white; margin-bottom: 16px; font-family: inherit; transition: 0.2s; }
        input:focus { border-color: var(--accent); outline: none; }
        .btn { padding: 12px 24px; border-radius: 8px; border: none; font-weight: 700; cursor: pointer; transition: 0.2s; display: inline-flex; align-items: center; gap: 8px; }
        .btn-primary { background: var(--accent); color: white; }
        .btn-green { background: var(--green); color: white; }

        /* --- Stats --- */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; margin-bottom: 32px; }
        .stat-box { background: var(--card); border: 1px solid var(--border); padding: 24px; border-radius: var(--radius); }
        .stat-label { font-size: 13px; color: var(--text-dim); margin-bottom: 8px; display: block; }
        .stat-value { font-size: 26px; font-weight: 800; font-family: 'JetBrains Mono'; }
        .mad { color: var(--green); font-size: 18px; margin-left: 4px; }

        /* --- Utils --- */
        .badge { padding: 4px 10px; border-radius: 6px; font-size: 10px; font-weight: 800; }
        .badge-ae { background: rgba(167, 139, 250, 0.1); color: #a78bfa; border: 1px solid rgba(167, 139, 250, 0.2); }
        .badge-sal { background: rgba(79, 126, 248, 0.1); color: #4f7ef8; border: 1px solid rgba(79, 126, 248, 0.2); }
        .progress-bar { height: 6px; background: rgba(0,0,0,0.3); border-radius: 10px; overflow: hidden; margin-top: 8px; }
        .progress-fill { height: 100%; background: var(--accent); transition: width 0.5s ease; }

        /* --- Multi-select list --- */
        .agent-selector { max-height: 200px; overflow-y: auto; border: 1px solid var(--border); border-radius: 8px; padding: 10px; background: rgba(0,0,0,0.2); }
        .agent-option { display: flex; align-items: center; gap: 10px; padding: 8px; cursor: pointer; border-radius: 4px; }
        .agent-option:hover { background: rgba(255,255,255,0.05); }

        #login-screen { position: fixed; inset: 0; background: var(--bg); z-index: 2000; display: flex; align-items: center; justify-content: center; }
        .login-card { width: 400px; background: var(--sidebar); padding: 40px; border-radius: 20px; border: 1px solid var(--border); text-align: center; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-card">
        <div class="logo" style="justify-content: center; margin-bottom: 30px;">ASP CONNECT</div>
        <input type="text" id="log-id" placeholder="ID Agent ou ADMIN">
        <input type="password" id="log-pw" placeholder="Mot de passe">
        <button class="btn btn-primary" style="width: 100%;" onclick="Auth.login()">Accéder au portail</button>
        <p style="margin-top: 20px; font-size: 11px; color: var(--text-dim);">SUPER / 1234</p>
    </div>
</div>

<aside class="sidebar">
    <div class="logo">ASP CONNECT</div>
    
    <div id="nav-agent" style="display:none;">
        <span class="nav-label">Mon Espace</span>
        <div class="nav-link active" onclick="Router.go('agent-dash', this)">Tableau de bord</div>
        <div class="nav-link" onclick="Router.go('agent-hist', this)">Mes relevés</div>
    </div>

    <div id="nav-admin" style="display:none;">
        <span class="nav-label">Administration</span>
        <div class="nav-link active" onclick="Router.go('admin-team', this)">Gestion Équipe</div>
        <div class="nav-link" onclick="Router.go('admin-import', this)">Import Vicidial</div>
        <div class="nav-link" onclick="Router.go('admin-reunion', this)">Réunions & Coaching</div>
    </div>

    <div style="margin-top: auto;">
        <div class="nav-link" style="color: var(--red);" onclick="location.reload()">Déconnexion</div>
    </div>
</aside>

<main class="main">
    <header class="top-bar">
        <h2 id="view-title">Dashboard</h2>
        <div id="user-display" style="display: flex; align-items: center; gap: 12px;">
            <span id="user-name-tag" style="font-weight: 700; font-size: 14px;">Utilisateur</span>
            <div style="width: 36px; height: 36px; background: var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 12px;">AG</div>
        </div>
    </header>

    <div class="content" id="view-port"></div>
</main>

<script>
/**
 * ASP CONNECT - VERSION 4.0 (MOROCCO EDITION)
 */

const DB_KEY = 'asp_v4_maroc';
const QUAL_LIMIT = 1800; // 30min

let DB = JSON.parse(localStorage.getItem(DB_KEY)) || {
    agents: [
        {id: '06980713', name: 'Houyem Haddad', type: 'AE', base: 4500, goal: 132},
        {id: '104806005', name: 'Amal Ainseba', type: 'SALARIE', base: 5500, goal: 132}
    ],
    records: {}, // format: { agentId: { "YYYY-MM-DD": {comm, wait, qual, mtg} } }
    managers: ['Marie', 'Wissal', 'Yasmine', 'Admin']
};

const Utils = {
    save: () => localStorage.setItem(DB_KEY, JSON.stringify(DB)),
    
    hmsToSec: (hms) => {
        if(!hms || typeof hms !== 'string' || !hms.includes(':')) return 0;
        const p = hms.split(':').map(Number);
        return p.length === 3 ? (p[0]*3600 + p[1]*60 + p[2]) : (p[0]*60 + p[1]);
    },

    fmtHms: (s) => {
        const h = Math.floor(s/3600);
        const m = Math.floor((s%3600)/60);
        return `${h}h${m.toString().padStart(2, '0')}`;
    },

    calc: (id) => {
        const ag = DB.agents.find(a => a.id === id);
        if(!ag) return null;
        
        const days = DB.records[id] || {};
        let tComm=0, tWait=0, tQualPaid=0, tMtg=0;

        Object.values(days).forEach(d => {
            tComm += d.comm;
            tWait += d.wait;
            tQualPaid += Math.min(d.qual, QUAL_LIMIT);
            tMtg += (d.mtg || 0);
        });

        const totalSec = tComm + tWait + tQualPaid + tMtg;
        const totalHrs = totalSec / 3600;
        const progress = (totalHrs / ag.goal) * 100;
        const earned = (totalHrs / ag.goal) * ag.base;

        return { tComm, tWait, tQualPaid, tMtg, totalSec, totalHrs, progress, earned, base: ag.base, goal: ag.goal };
    }
};

const Auth = {
    user: null,
    login: () => {
        const id = document.getElementById('log-id').value;
        const pw = document.getElementById('log-pw').value;

        if(id === 'SUPER' && pw === '1234') {
            Auth.user = { role: 'admin', name: 'Superviseur' };
            document.getElementById('nav-admin').style.display = 'block';
        } else {
            const ag = DB.agents.find(a => a.id === id);
            if(ag) {
                Auth.user = { ...ag, role: 'agent' };
                document.getElementById('nav-agent').style.display = 'block';
            }
        }

        if(Auth.user) {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('user-name-tag').textContent = Auth.user.name;
            Router.go(Auth.user.role === 'admin' ? 'admin-team' : 'agent-dash');
        }
    }
};

const Router = {
    go: (path, el) => {
        if(el) {
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            el.classList.add('active');
        }
        document.getElementById('view-title').textContent = path.replace('admin-', '').replace('agent-', '').toUpperCase();
        UI.render(path);
    }
};

const UI = {
    render: (path) => {
        const v = document.getElementById('view-port');
        
        if(path === 'agent-dash') {
            const s = Utils.calc(Auth.user.id);
            v.innerHTML = `
                <div class="stats-grid">
                    <div class="stat-box"><span class="stat-label">Salaire estimé (Temps réel)</span><div class="stat-value">${s.earned.toFixed(2)}<span class="mad">DH</span></div></div>
                    <div class="stat-box"><span class="stat-label">Progression</span><div class="stat-value">${s.progress.toFixed(1)}%</div><div class="progress-bar"><div class="progress-fill" style="width:${s.progress}%"></div></div></div>
                    <div class="stat-box"><span class="stat-label">Total Heures</span><div class="stat-value">${s.totalHrs.toFixed(1)}h<span style="font-size:14px;color:var(--text-dim)"> / ${s.goal}h</span></div></div>
                    <div class="stat-box"><span class="stat-label">Com + Réunions</span><div class="stat-value" style="color:var(--accent)">${Utils.fmtHms(s.tComm + s.tMtg)}</div></div>
                </div>
                <div class="card"><canvas id="ag-chart" style="height:300px;"></canvas></div>
            `;
            new Chart(document.getElementById('ag-chart'), { type: 'bar', data: { labels: ['Communication', 'Attente', 'Qualif (Payée)', 'Réunions'], datasets: [{ label: 'Secondes', data: [s.tComm, s.tWait, s.tQualPaid, s.tMtg], backgroundColor: '#4f7ef8' }] }, options: { maintainAspectRatio: false } });
        }

        if(path === 'admin-team') {
            const rows = DB.agents.map(ag => {
                const s = Utils.calc(ag.id);
                return `<tr>
                    <td><b>${ag.name}</b><br><small>${ag.id}</small></td>
                    <td><span class="badge ${ag.type === 'AE' ? 'badge-ae' : 'badge-sal'}">${ag.type}</span></td>
                    <td><input type="number" value="${ag.base}" onchange="UI.updAg('${ag.id}', 'base', this.value)" style="width:100px;margin:0"> DH</td>
                    <td><input type="number" value="${ag.goal}" onchange="UI.updAg('${ag.id}', 'goal', this.value)" style="width:70px;margin:0"> h</td>
                    <td style="width:200px">
                        <div style="display:flex;justify-content:space-between;font-size:11px"><span>${s.progress.toFixed(1)}%</span><span>${s.totalHrs.toFixed(1)}h</span></div>
                        <div class="progress-bar"><div class="progress-fill" style="width:${s.progress}%"></div></div>
                    </td>
                    <td style="color:var(--green);font-weight:800">${s.earned.toFixed(2)} DH</td>
                </tr>`;
            }).join('');

            v.innerHTML = `
                <div class="card">
                    <div style="display:flex;justify-content:space-between;margin-bottom:20px;"><h2>Gestion de l'équipe</h2><button class="btn btn-primary" onclick="UI.addAgent()">+ Nouvel Agent</button></div>
                    <table><thead><tr><th>Agent</th><th>Type</th><th>Rémunération Base</th><th>Objectif</th><th>Progression</th><th>Salaire Actuel</th></tr></thead><tbody>${rows}</tbody></table>
                </div>`;
        }

        if(path === 'admin-import') {
            v.innerHTML = `
                <div class="card">
                    <h2>Import Vicidial Direct</h2>
                    <p style="color:var(--text-dim);margin-bottom:20px;">Copiez-collez l'export brut de Vicidial ci-dessous.</p>
                    <textarea id="raw-data" placeholder="Coller ici..." style="height:350px;font-family:'JetBrains Mono';font-size:11px;"></textarea>
                    <button class="btn btn-primary" onclick="UI.doImport()">Analyser & Injecter les données</button>
                </div>`;
        }

        if(path === 'admin-reunion') {
            const ags = DB.agents.map(a => `<div class="agent-option"><input type="checkbox" name="mtg-ags" value="${a.id}"> ${a.name}</div>`).join('');
            const mans = DB.managers.map(m => `<option>${m}</option>`).join('');
            v.innerHTML = `
                <div class="card" style="max-width:600px">
                    <h2>Saisie Réunion & Coaching</h2>
                    <label class="nav-label">1. Responsable</label>
                    <select id="mtg-man">${mans}</select>
                    <label class="nav-label">2. Agents concernés</label>
                    <div class="agent-selector">${ags}</div>
                    <label class="nav-label" style="margin-top:15px">3. Détails</label>
                    <div style="display:grid;grid-template-columns:1fr 1fr;gap:15px">
                        <input type="date" id="mtg-date" value="${new Date().toISOString().split('T')[0]}">
                        <input type="number" id="mtg-dur" placeholder="Durée (min)">
                    </div>
                    <button class="btn btn-green" style="width:100%" onclick="UI.doMtg()">Enregistrer pour tous les agents sélectionnés</button>
                </div>`;
        }
    },

    addAgent: () => {
        const name = prompt("Nom de l'agent :");
        const id = prompt("ID Vicidial :");
        if(name && id) {
            DB.agents.push({id, name, type: 'SALARIE', base: 5000, goal: 132});
            Utils.save();
            Router.go('admin-team');
        }
    },

    updAg: (id, key, val) => {
        const ag = DB.agents.find(a => a.id === id);
        if(ag) {
            ag[key] = parseFloat(val);
            Utils.save();
            UI.render('admin-team');
        }
    },

    doMtg: () => {
        const ids = Array.from(document.querySelectorAll('input[name="mtg-ags"]:checked')).map(i => i.value);
        const date = document.getElementById('mtg-date').value;
        const dur = parseInt(document.getElementById('mtg-dur').value) * 60;
        
        if(!ids.length || !dur) return alert("Veuillez sélectionner des agents et une durée.");

        ids.forEach(id => {
            if(!DB.records[id]) DB.records[id] = {};
            if(!DB.records[id][date]) DB.records[id][date] = {comm:0, wait:0, qual:0, mtg:0};
            DB.records[id][date].mtg += dur;
        });

        Utils.save();
        alert("Réunion enregistrée !");
        Router.go('admin-team');
    },

    doImport: () => {
        const raw = document.getElementById('raw-data').value;
        if(!raw) return;
        const lines = raw.split('\n');
        let count = 0;

        lines.forEach(line => {
            // Split par tabulation ou par virgule/guillemets selon l'export
            const cols = line.includes('","') ? line.split('","').map(c => c.replace(/"/g, '').trim()) : line.split('\t');
            
            // On cherche la ligne qui contient la date (format YYYY-MM-DD)
            if(cols.length > 10) {
                let id = "", date = "", wait = 0, talk = 0, dispo = 0;

                // On cherche l'ID et la date dans les colonnes (basé sur ton fichier)
                // Dans ton fichier : Col 1 = ID, Col 4 = Date, Col 9 = Wait, Col 11 = Talk, Col 13 = Dispo
                id = cols[1];
                date = cols[4] || cols[5]; // dépend si ligne de titre ou data
                
                if(date && date.match(/\d{4}-\d{2}-\d{2}/)) {
                    wait = Utils.hmsToSec(cols[9]);
                    talk = Utils.hmsToSec(cols[11]);
                    dispo = Utils.hmsToSec(cols[13]);

                    if(!DB.records[id]) DB.records[id] = {};
                    const mtgPrev = DB.records[id][date] ? DB.records[id][date].mtg : 0;
                    
                    DB.records[id][date] = {
                        comm: talk,
                        wait: wait,
                        qual: dispo,
                        mtg: mtgPrev
                    };
                    count++;
                }
            }
        });

        Utils.save();
        alert(count + " lignes synchronisées !");
        Router.go('admin-team');
    }
};

window.onload = () => { /* Initialisé */ };

</script>
</body>
</html>
