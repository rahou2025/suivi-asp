<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASP CONNECT ULTIME · BI & Rémunération</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500&display=swap');
        :root {
            --bg: #0A0C10; --sidebar: #11151C; --card: #1A1F29; --border: #2D3440;
            --accent: #5E56F0; --accent-soft: rgba(94, 86, 240, 0.1);
            --text: #EAEBF0; --text-dim: #8A91A0;
            --green: #22C55E; --amber: #F59E0B; --red: #EF4444; --radius: 10px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; overflow: hidden; }

        .sidebar { width: 260px; background: var(--sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 20px; }
        .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .top-bar { height: 65px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 30px; background: var(--sidebar); flex-shrink: 0; }
        .content { flex: 1; padding: 30px; overflow-y: auto; }
        #login-overlay { position: fixed; inset: 0; background: rgba(10, 12, 16, 0.9); backdrop-filter: blur(10px); z-index: 1000; display: flex; align-items: center; justify-content: center; }
        .login-box { width: 400px; background: var(--sidebar); padding: 40px; border-radius: var(--radius); border: 1px solid var(--border); text-align: center; }

        .logo { font-weight: 800; font-size: 22px; color: var(--text); margin-bottom: 30px; }
        .nav-group-label { font-size: 11px; font-weight: 700; color: var(--text-dim); text-transform: uppercase; margin: 20px 0 10px 12px; }
        .nav-link { padding: 10px 12px; border-radius: 6px; color: var(--text-dim); font-weight: 500; display: flex; align-items: center; gap: 10px; margin-bottom: 4px; cursor: pointer; transition: 0.2s; }
        .nav-link:hover, .nav-link.active { background: var(--accent); color: white; }

        .card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; margin-bottom: 24px; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 12px; color: var(--text-dim); font-size: 11px; border-bottom: 2px solid var(--border); text-transform: uppercase; white-space: nowrap; }
        td { padding: 14px 12px; border-bottom: 1px solid var(--border); font-size: 14px; vertical-align: middle; }
        input, select, textarea { width: 100%; background: var(--bg); border: 1px solid var(--border); padding: 12px; border-radius: 6px; color: white; margin-bottom: 16px; font-family: inherit; }
        .btn { padding: 12px 20px; border-radius: 6px; border: none; font-weight: 600; cursor: pointer; transition: 0.2s; display: inline-flex; align-items: center; gap: 8px; }
        .btn-primary { background: var(--accent); color: white; }
        .btn[disabled] { background: var(--border); color: var(--text-dim); cursor: not-allowed; }
        
        #import-status { margin-top: 20px; padding: 12px; border-radius: 6px; font-weight: 500; display: none; }
        .status-success { background-color: rgba(34, 197, 94, 0.1); color: var(--green); border: 1px solid var(--green); }
        .status-error { background-color: rgba(239, 68, 68, 0.1); color: var(--red); border: 1px solid var(--red); }
    </style>
</head>
<body>

<div id="login-overlay">
    <div class="login-box">
        <h2 class="logo">ASP CONNECT</h2>
        <input type="text" id="log-id" placeholder="ID Utilisateur">
        <input type="password" id="log-pw" placeholder="Mot de passe">
        <button class="btn btn-primary" style="width: 100%;" onclick="Auth.login()">Connexion</button>
        <p style="margin-top: 20px; font-size: 11px; color: var(--text-dim);">Admin: SUPER / 1234</p>
    </div>
</div>

<aside class="sidebar">
    <h1 class="logo">ASP CONNECT</h1>
    <div id="nav-container"></div>
    <div style="margin-top: auto;">
        <div class="nav-link" style="color: var(--red);" onclick="location.reload()">Déconnexion</div>
    </div>
</aside>

<main class="main">
    <header class="top-bar">
        <h2 id="view-title" style="font-weight: 600;"></h2>
        <div id="user-display" style="display: flex; align-items: center; gap: 12px;">
            <span id="user-name-tag" style="font-weight: 600; font-size: 14px;"></span>
        </div>
    </header>
    <div class="content" id="view-port"></div>
</main>

<script>
const CONFIG = {
    DB_KEY: 'asp_definitive_db_v2', // Changed key to avoid old data conflicts
    QUAL_LIMIT_SEC: 1800,
    WORKING_DAYS_IN_MONTH: 22,
};

let DB = JSON.parse(localStorage.getItem(CONFIG.DB_KEY)) || {
    agents: [],
    records: {},
    managers: ['Marie', 'Wissal', 'Yasmine', 'Admin'],
    logs: []
};

const Parser = {
    parseVicidial: (textContent) => {
        const lines = textContent.split('\n').filter(line => line.trim() !== '');
        const data = [];
        let currentAgent = { name: null, id: null };

        for (const line of lines) {
            // Your Excel export uses tabs as delimiters when pasted or converted. Let's use that.
            const cols = line.split('\t');
            
            // Skip header and irrelevant lines
            if (cols.length < 15 || cols[0].includes("USER NAME") || cols[0].includes("---")) continue;

            // Fill-down logic: update current agent if name/ID are present in the correct columns
            if (cols[0] && cols[0].trim() !== "") currentAgent.name = cols[0].trim();
            if (cols[2] && cols[2].trim() !== "") currentAgent.id = cols[2].trim();

            // Identify data lines by checking for a valid date in column E (index 4)
            const dateStr = cols[4] ? cols[4].trim() : '';
            if (dateStr.match(/^\d{2}\/\d{2}\/\d{4}$/)) {
                const [day, month, year] = dateStr.split('/');
                const formattedDate = `${year}-${month.padStart(2, '0')}-${day.padStart(2, '0')}`;
                
                if (currentAgent.id && currentAgent.name) {
                    data.push({
                        id: currentAgent.id,
                        name: currentAgent.name,
                        date: formattedDate,
                        comm: Engine.hmsToSec(cols[12] ? cols[12].trim() : '0:0:0'), // TALK
                        wait: Engine.hmsToSec(cols[10] ? cols[10].trim() : '0:0:0'), // WAIT
                        qual: Engine.hmsToSec(cols[14] ? cols[14].trim() : '0:0:0'), // DISPO
                    });
                }
            }
        }
        return data;
    }
};

const Engine = {
    save: () => localStorage.setItem(CONFIG.DB_KEY, JSON.stringify(DB)),
    hmsToSec: (hms) => {
        if (!hms || typeof hms !== 'string' || !hms.includes(':')) return 0;
        const p = hms.split(':').map(Number);
        return (p[0] * 3600) + (p[1] * 60) + (p[2] || 0);
    },
    fmtHms: (s) => {
        const h = Math.floor(s / 3600);
        const m = Math.floor((s % 3600) / 60);
        return `${h}h ${m.toString().padStart(2, '0')}m`;
    },
    processImport: (parsedData) => {
        let newAgentsCount = 0;
        let updatedRecordsCount = 0;

        parsedData.forEach(record => {
            let agent = DB.agents.find(a => a.id === record.id);
            if (!agent) {
                DB.agents.push({
                    id: record.id,
                    name: record.name,
                    type: 'SALARIE',
                    base: 5000,
                    goal: 132
                });
                newAgentsCount++;
            }

            if (!DB.records[record.id]) DB.records[record.id] = {};
            const prevMtg = DB.records[record.id][record.date] ? DB.records[record.id][record.date].mtg : 0;
            DB.records[record.id][record.date] = {
                comm: record.comm,
                wait: record.wait,
                qual: record.qual,
                mtg: prevMtg
            };
            updatedRecordsCount++;
        });
        
        Engine.logAction(Auth.user.name, "Import Vicidial", `${updatedRecordsCount} lignes traitées, ${newAgentsCount} agents créés.`);
        Engine.save();
        return { newAgentsCount, updatedRecordsCount };
    },
    calculateStats: (id) => {
        const agent = DB.agents.find(a => a.id === id);
        if (!agent) return { totalHrs: 0, progress: 0, earned: 0, projectedEarned: 0, daysWorked: 0, qualAlert: false, avgDaily: 0 };

        const days = DB.records[id] ? Object.values(DB.records[id]) : [];
        let tComm=0, tWait=0, tQualPaid=0, tMtg=0;
        days.forEach(d => {
            tComm += d.comm; tWait += d.wait; tQualPaid += Math.min(d.qual, CONFIG.QUAL_LIMIT_SEC); tMtg += (d.mtg || 0);
        });

        const totalSec = tComm + tWait + tQualPaid + tMtg;
        const totalHrs = totalSec / 3600;
        const progress = (totalHrs / agent.goal) * 100;
        const earned = (progress / 100) * agent.base;
        const daysWorked = days.length;
        const avgDailyHrs = daysWorked > 0 ? totalHrs / daysWorked : 0;
        const projectedHrs = avgDailyHrs * CONFIG.WORKING_DAYS_IN_MONTH;
        const projectedEarned = (projectedHrs / agent.goal) * agent.base;
        
        return { totalHrs, progress, earned, projectedEarned, daysWorked, avgDaily: avgDailyHrs };
    },
    logAction: (manager, action, details) => {
        DB.logs.unshift({ date: new Date().toISOString(), manager, action, details });
        Engine.save();
    },
    exportAccounting: () => {
        // ... (same as previous version)
        const data = DB.agents.map(ag => {
            const stats = Engine.calculateStats(ag.id);
            return {
                "ID Agent": ag.id, "Nom": ag.name, "Type Contrat": ag.type,
                "Base Fixe (MAD)": ag.base, "Objectif (h)": ag.goal,
                "Heures Réalisées": stats.totalHrs.toFixed(2),
                "Atteinte (%)": stats.progress.toFixed(2),
                "Rémunération Brute (MAD)": stats.earned.toFixed(2),
                "Projection Fin de Mois (MAD)": stats.projectedEarned.toFixed(2)
            };
        });
        const wb = XLSX.utils.book_new();
        const ws = XLSX.utils.json_to_sheet(data);
        XLSX.utils.book_append_sheet(wb, ws, "Rapport de Paie");
        XLSX.writeFile(wb, `Export_Comptable_ASP_${new Date().toISOString().split('T')[0]}.xlsx`);
    }
};

const Auth = {
    user: null,
    login: () => {
        const id = document.getElementById('log-id').value.trim();
        const pw = document.getElementById('log-pw').value;
        let foundUser = null;

        if(id.toUpperCase() === 'SUPER' && pw === '1234') {
            foundUser = { role: 'admin', name: 'Superviseur' };
        } else {
            const agent = DB.agents.find(a => a.id === id);
            if(agent) foundUser = { ...agent, role: 'agent' };
        }
        
        if (foundUser) {
            Auth.user = foundUser;
            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('user-name-tag').textContent = Auth.user.name;
            UI.buildNav();
            Router.go(Auth.user.role === 'admin' ? 'admin-team' : 'agent-dash', document.querySelector('.nav-link'));
        } else {
            alert("Identifiant incorrect.");
        }
    }
};

const Router = {
    go: (path, el) => {
        if(el) {
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            el.classList.add('active');
        }
        document.getElementById('view-title').textContent = el ? el.textContent : path.split('-')[1].charAt(0).toUpperCase() + path.split('-')[1].slice(1);
        UI.render(path);
    }
};

const UI = {
    buildNav: () => {
        const nav = document.getElementById('nav-container');
        if (Auth.user.role === 'admin') {
            nav.innerHTML = `
                <div class="nav-group-label">Pilotage</div>
                <div class="nav-link" onclick="Router.go('admin-team', this)">Équipe & Paie</div>
                <div class="nav-link" onclick="Router.go('admin-import', this)">Import Vicidial</div>
                <div class="nav-link" onclick="Router.go('admin-reunion', this)">Réunions</div>
                <div class="nav-group-label">Reporting</div>
                <div class="nav-link" onclick="Router.go('admin-compta', this)">Comptabilité</div>
                <div class="nav-link" onclick="Router.go('admin-logs', this)">Historique Actions</div>
            `;
        } else {
            nav.innerHTML = `
                <div class="nav-group-label">Mon Espace</div>
                <div class="nav-link" onclick="Router.go('agent-dash', this)">Dashboard</div>
            `;
        }
    },
    render: (path) => {
        const view = document.getElementById('view-port');
        
        if (path === 'agent-dash') {
            const s = Engine.calculateStats(Auth.user.id);
            view.innerHTML = `<div class="stats-grid">
                <div class="stat-box"><span class="stat-label">Gains actuels</span><div class="stat-value">${s.earned.toFixed(2)}<span class="stat-unit">MAD</span></div></div>
                <div class="stat-box"><span class="stat-label">Projection Fin de Mois</span><div class="stat-value">${s.projectedEarned.toFixed(2)}<span class="stat-unit">MAD</span></div></div>
                <div class="stat-box"><span class="stat-label">Progression Objectif</span><div class="stat-value">${s.progress.toFixed(1)}%</div></div>
                <div class="stat-box"><span class="stat-label">Heures/jour (moy.)</span><div class="stat-value">${Engine.fmtHms(s.avgDaily*3600)}</div></div>
            </div>
            <div class="card"><canvas id="perfChart" style="height:300px;"></canvas></div>`;
            new Chart(document.getElementById('perfChart'), { type: 'bar', data: { /* ... */ }});
        }
        
        if (path === 'admin-team') {
            const rows = DB.agents.map(ag => {
                const s = Engine.calculateStats(ag.id);
                return `<tr>
                    <td><b>${ag.name}</b><br><small style="color:var(--text-dim)">${ag.id}</small></td>
                    <td><input value="${ag.type}" onchange="UI.updateAgent('${ag.id}', 'type', this.value)" style="width:100px;"></td>
                    <td><input type="number" value="${ag.base}" onchange="UI.updateAgent('${ag.id}', 'base', this.value)" style="width:100px;"></td>
                    <td><input type="number" value="${ag.goal}" onchange="UI.updateAgent('${ag.id}', 'goal', this.value)" style="width:80px;"></td>
                    <td style="width:180px">
                         <div class="progress-bar"><div class="progress-fill" style="width:${s.progress}%"></div></div>
                         <div style="font-size:11px; margin-top:4px;">${s.totalHrs.toFixed(1)}h / ${ag.goal}h (${s.progress.toFixed(1)}%)</div>
                    </td>
                    <td style="font-weight:700; color:var(--green)">${s.earned.toFixed(2)} MAD</td>
                </tr>`;
            }).join('');
            view.innerHTML = `<div class="card"><h2>Gestion de l'équipe et de la paie</h2><table><thead><tr><th>Agent</th><th>Type</th><th>Base (MAD)</th><th>Objectif (h)</th><th>Progression</th><th>Gains Actuels</th></tr></thead><tbody>${rows}</tbody></table></div>`;
        }

        if (path === 'admin-import') {
            view.innerHTML = `<div class="card"><h2>Importation Fichier Vicidial</h2><p style="color:var(--text-dim);margin-bottom:20px;">Le système créera les agents et mettra à jour leurs données automatiquement.</p><input type="file" id="file-input" accept=".xls,.xlsx,.csv,.txt"><button id="import-btn" class="btn btn-primary" onclick="UI.handleImport()">Lancer l'import</button><div id="import-status"></div></div>`;
        }
        
        if (path === 'admin-reunion') {
            const agentsHtml = DB.agents.map(a => `<label style="display:block; padding: 4px;"><input type="checkbox" name="agent-ids" value="${a.id}"> ${a.name}</label>`).join('');
            view.innerHTML = `<div class="card" style="max-width: 600px;"><h2>Saisie de Réunion Groupée</h2>
                <div class="agent-multiselect" style="margin-top:10px;">${agentsHtml}</div>
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:15px; margin-top:15px;"><input type="date" id="mtg-date" value="${new Date().toISOString().split('T')[0]}"><input type="number" id="mtg-duration" placeholder="Durée en minutes"></div>
                <button class="btn btn-primary" style="width:100%; margin-top:10px" onclick="UI.saveMeeting()">Enregistrer le temps</button></div>`;
        }

        if (path === 'admin-compta') { /* ... */ }
        if (path === 'admin-logs') { /* ... */ }
    },

    updateAgent: (id, key, value) => {
        const agent = DB.agents.find(a => a.id === id);
        if (agent) {
            agent[key] = (key === 'base' || key === 'goal') ? parseFloat(value) : value;
            Engine.logAction(Auth.user.name, `Modification Agent`, `Agent ${id}: ${key} -> ${value}`);
            Engine.save();
            UI.render('admin-team');
        }
    },
    
    handleImport: () => {
        const file = document.getElementById('file-input').files[0];
        const btn = document.getElementById('import-btn');
        const statusDiv = document.getElementById('import-status');
        if (!file) return alert("Veuillez sélectionner un fichier.");
        
        btn.textContent = "Traitement en cours...";
        btn.disabled = true;
        statusDiv.style.display = 'none';

        const reader = new FileReader();
        reader.onload = (e) => {
            const content = e.target.result;
            let textContent;

            try {
                if (file.name.endsWith('.xls') || file.name.endsWith('.xlsx')) {
                    const workbook = XLSX.read(content, {type: 'binary'});
                    const sheetName = workbook.SheetNames[0];
                    const sheet = workbook.Sheets[sheetName];
                    textContent = XLSX.utils.sheet_to_csv(sheet, {FS: '\t'});
                } else {
                    textContent = content;
                }

                const parsedData = Parser.parseVicidial(textContent);
                const { newAgentsCount, updatedRecordsCount } = Engine.processImport(parsedData);

                statusDiv.className = 'status-success';
                statusDiv.innerHTML = `<strong>Succès !</strong><br>${updatedRecordsCount} lignes de données traitées.<br>${newAgentsCount} nouveaux agents créés.`;
                statusDiv.style.display = 'block';

            } catch (error) {
                statusDiv.className = 'status-error';
                statusDiv.innerHTML = `<strong>Erreur lors du traitement.</strong><br>Veuillez vérifier que le fichier est un export Vicidial valide.`;
                statusDiv.style.display = 'block';
                console.error("Import Error:", error);
            } finally {
                btn.textContent = "Lancer l'import";
                btn.disabled = false;
            }
        };
        
        if (file.name.endsWith('.xls') || file.name.endsWith('.xlsx')) {
            reader.readAsBinaryString(file);
        } else {
            reader.readAsText(file);
        }
    },

    saveMeeting: () => {
        const ids = Array.from(document.querySelectorAll('input[name="agent-ids"]:checked')).map(cb => cb.value);
        const date = document.getElementById('mtg-date').value;
        const duration = parseInt(document.getElementById('mtg-duration').value) * 60;
        
        if (ids.length === 0 || !duration) return alert("Veuillez sélectionner les agents et la durée.");

        ids.forEach(id => {
            if(!DB.records[id]) DB.records[id] = {};
            if(!DB.records[id][date]) DB.records[id][date] = {comm:0, wait:0, qual:0, mtg:0};
            DB.records[id][date].mtg += duration;
        });

        Engine.logAction(Auth.user.name, "Ajout Réunion", `${duration/60}min pour ${ids.length} agents.`);
        Engine.save();
        alert("Temps de réunion enregistré !");
    },
};

window.onload = () => { /* App Ready */ };
</script>
</body>
</html>
