<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0f1117">
<title>ASP · Expert Temps</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

:root {
  --bg: #0b0e14;
  --bg-card: #161b26;
  --bg-input: #1f2633;
  --border: rgba(255,255,255,0.08);
  --accent: #4f7ef8;
  --accent-soft: rgba(79,126,248,0.15);
  --text: #f0f2f5;
  --text-dim: #94a3b8;
  --green: #10b981;
  --amber: #f59e0b;
  --red: #ef4444;
  --radius: 16px;
  --font: 'Plus Jakarta Sans', sans-serif;
  --mono: 'JetBrains Mono', monospace;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { 
    font-family: var(--font); background: var(--bg); color: var(--text); 
    line-height: 1.6; overflow: hidden; height: 100vh;
}

/* --- Layout --- */
#app { max-width: 500px; margin: 0 auto; height: 100vh; display: flex; flex-direction: column; position: relative; }
.screen { display: none; flex: 1; flex-direction: column; overflow: hidden; animation: fadeIn 0.4s ease; }
.screen.active { display: flex; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

.scroll-area { flex: 1; overflow-y: auto; padding: 20px 16px 100px; scrollbar-width: none; }
.scroll-area::-webkit-scrollbar { display: none; }

/* --- UI Elements --- */
.card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px; margin-bottom: 16px; }
.card-label { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-dim); margin-bottom: 12px; font-weight: 700; }

.btn { 
    width: 100%; padding: 14px; border-radius: 12px; border: none; font-family: var(--font); 
    font-weight: 600; cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px;
}
.btn-primary { background: var(--accent); color: white; }
.btn-primary:active { transform: scale(0.98); opacity: 0.9; }
.btn-ghost { background: var(--bg-input); color: var(--text); border: 1px solid var(--border); }

/* --- Metrics --- */
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
.stat-card { background: var(--bg-card); padding: 16px; border-radius: var(--radius); border: 1px solid var(--border); position: relative; }
.stat-val { font-family: var(--mono); font-size: 22px; font-weight: 600; margin: 4px 0; }
.stat-label { font-size: 11px; color: var(--text-dim); }

/* --- Progress Bar --- */
.prog-container { margin: 10px 0; }
.prog-bar { height: 8px; background: var(--bg-input); border-radius: 10px; overflow: hidden; margin-top: 6px; }
.prog-fill { height: 100%; background: var(--accent); transition: width 1s cubic-bezier(0.34, 1.56, 0.64, 1); }

/* --- Form --- */
.field { margin-bottom: 16px; }
.field label { display: block; font-size: 13px; margin-bottom: 6px; color: var(--text-dim); }
.field input, .field select { 
    width: 100%; background: var(--bg-input); border: 1px solid var(--border); 
    padding: 12px; border-radius: 10px; color: white; font-family: var(--font); outline: none;
}
.field input:focus { border-color: var(--accent); }

/* --- Navigation --- */
.nav { 
    position: absolute; bottom: 0; left: 0; right: 0; background: rgba(22, 27, 38, 0.8);
    backdrop-filter: blur(12px); border-top: 1px solid var(--border); display: flex; padding: 10px 10px 24px;
}
.nav-item { 
    flex: 1; display: flex; flex-direction: column; align-items: center; font-size: 10px; 
    color: var(--text-dim); cursor: pointer; transition: 0.2s; 
}
.nav-item svg { width: 22px; height: 22px; margin-bottom: 4px; stroke-width: 1.5; }
.nav-item.active { color: var(--accent); }

/* --- Toast --- */
#toast {
    position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
    background: var(--accent); color: white; padding: 12px 24px; border-radius: 50px;
    font-weight: 600; box-shadow: 0 10px 25px rgba(0,0,0,0.3); z-index: 1000;
    display: none; animation: slideDown 0.3s ease;
}
@keyframes slideDown { from { top: -50px; } to { top: 20px; } }

/* --- Data Table --- */
.table-scroll { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th { text-align: left; padding: 10px; color: var(--text-dim); border-bottom: 1px solid var(--border); font-weight: 600; }
td { padding: 12px 10px; border-bottom: 1px solid var(--border); font-family: var(--mono); }
</style>
</head>
<body>

<div id="toast">Message</div>

<div id="app">

    <!-- LOGIN -->
    <section class="screen active" id="scr-login">
        <div class="scroll-area" style="display:flex; flex-direction:column; justify-content:center;">
            <div style="text-align:center; margin-bottom:40px;">
                <div style="background:var(--accent); width:60px; height:60px; border-radius:18px; margin:0 auto 16px; display:flex; align-items:center; justify-content:center; box-shadow:0 0 20px var(--accent-soft)">
                    <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
                </div>
                <h1 style="font-size:24px; font-weight:800;">ASP Connect</h1>
                <p style="color:var(--text-dim); font-size:14px;">Gestion du temps & performance</p>
            </div>

            <div class="field">
                <label>Identifiant</label>
                <input type="text" id="login-id" placeholder="Ex: FATIMA_01" value="FATIMA_01">
            </div>
            <div class="field">
                <label>Mot de passe</label>
                <input type="password" id="login-pw" placeholder="••••" value="0001">
            </div>
            <button class="btn btn-primary" onclick="Auth.login()">Se connecter</button>
            
            <p style="text-align:center; font-size:12px; color:var(--text-dim); margin-top:20px;">
                Superviseur : SUPER / 1234
            </p>
        </div>
    </section>

    <!-- AGENT VIEW -->
    <section class="screen" id="scr-agent">
        <div class="scroll-area" id="agent-content">
            <!-- Injecté par JS -->
        </div>
        <nav class="nav">
            <div class="nav-item active" onclick="Router.go('agent-dash', this)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>Dashboard</div>
            <div class="nav-item" onclick="Router.go('agent-hist', this)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>Historique</div>
            <div class="nav-item" onclick="Auth.logout()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>Quitter</div>
        </nav>
    </section>

    <!-- SUPERVISOR VIEW -->
    <section class="screen" id="scr-super">
        <div class="scroll-area" id="super-content">
            <!-- Injecté par JS -->
        </div>
        <nav class="nav">
            <div class="nav-item active" onclick="Router.go('super-team', this)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87m-4-12a4 4 0 010 7.75"/></svg>Équipe</div>
            <div class="nav-item" onclick="Router.go('super-import', this)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/></svg>Import</div>
            <div class="nav-item" onclick="Router.go('super-reunion', this)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 6v6m0 0v6m0-6h6m-6 0H6"/></svg>Réunion</div>
            <div class="nav-item" onclick="Auth.logout()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>Quitter</div>
        </nav>
    </section>

</div>

<script>
/**
 * CONFIGURATION & LOGIQUE MÉTIER
 */
const CONFIG = {
    GOAL_HOURS: 132,
    QUAL_LIMIT_SEC: 1800, // 30 min
    MONTH: 'Mars 2026',
    STORAGE_KEY: 'asp_data_v1'
};

const AGENTS_DB = [
    {id:'FATIMA_01', pw:'0001', name:'Fatima El Amrani'},
    {id:'SARA_02', pw:'0002', name:'Sara Benali'},
    {id:'NADIA_03', pw:'0003', name:'Nadia Ouali'},
    {id:'SUPER', pw:'1234', role:'super', name:'Superviseur'}
];

// État Global
let State = {
    user: null,
    data: {}, // { agentId: [ {date, comm, wait, qual, reunion} ] }
    logs: []
};

/**
 * CORE ENGINE
 */
const Core = {
    init() {
        const saved = localStorage.getItem(CONFIG.STORAGE_KEY);
        if(saved) State.data = JSON.parse(saved);
        else this.seed();
    },

    seed() {
        AGENTS_DB.filter(a => a.id !== 'SUPER').forEach(ag => {
            State.data[ag.id] = [
                { date: '2026-03-02', comm: 14400, wait: 3600, qual: 2400, reunion: 1800 },
                { date: '2026-03-03', comm: 12000, wait: 4000, qual: 1200, reunion: 0 }
            ];
        });
        this.save();
    },

    save() {
        localStorage.setItem(CONFIG.STORAGE_KEY, JSON.stringify(State.data));
    },

    fmtHms(sec) {
        const h = Math.floor(sec / 3600);
        const m = Math.floor((sec % 3600) / 60);
        return `${h}h${m.toString().padStart(2, '0')}`;
    },

    calcStats(agentId) {
        const days = State.data[agentId] || [];
        let tComm = 0, tWait = 0, tQualReal = 0, tQualPaid = 0, tReunion = 0;

        days.forEach(d => {
            tComm += d.comm;
            tWait += d.wait;
            tQualReal += d.qual;
            tQualPaid += Math.min(d.qual, CONFIG.QUAL_LIMIT_SEC);
            tReunion += (d.reunion || 0);
        });

        const totalPaidSec = tComm + tWait + tQualPaid + tReunion;
        const totalHours = totalPaidSec / 3600;
        const progress = Math.min(100, (totalHours / CONFIG.GOAL_HOURS) * 100);

        return { tComm, tWait, tQualPaid, tQualReal, tReunion, totalPaidSec, totalHours, progress, days };
    }
};

/**
 * AUTHENTICATION
 */
const Auth = {
    login() {
        const id = document.getElementById('login-id').value.toUpperCase();
        const pw = document.getElementById('login-pw').value;
        const user = AGENTS_DB.find(u => u.id === id && u.pw === pw);

        if(!user) return UI.toast("Identifiants incorrects", "error");

        State.user = user;
        UI.toast(`Bienvenue ${user.name}`);
        
        if(user.role === 'super') {
            Router.go('super-team');
            UI.showScreen('scr-super');
        } else {
            Router.go('agent-dash');
            UI.showScreen('scr-agent');
        }
    },
    logout() {
        State.user = null;
        UI.showScreen('scr-login');
    }
};

/**
 * ROUTER / NAVIGATION
 */
const Router = {
    go(view, el) {
        if(el) {
            el.parentElement.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
        }

        switch(view) {
            case 'agent-dash': UI.renderAgentDash(); break;
            case 'agent-hist': UI.renderAgentHist(); break;
            case 'super-team': UI.renderSuperTeam(); break;
            case 'super-import': UI.renderSuperImport(); break;
            case 'super-reunion': UI.renderSuperReunion(); break;
        }
    }
};

/**
 * USER INTERFACE
 */
const UI = {
    showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    },

    toast(msg) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.style.display = 'block';
        setTimeout(() => t.style.display = 'none', 3000);
    },

    renderAgentDash() {
        const s = Core.calcStats(State.user.id);
        const lastDay = s.days[s.days.length - 1] || {comm:0, wait:0, qual:0, reunion:0};
        
        document.getElementById('agent-content').innerHTML = `
            <div style="margin-bottom:24px">
                <h2 style="font-size:20px">Bonjour, ${State.user.name.split(' ')[0]} 👋</h2>
                <p style="color:var(--text-dim); font-size:14px">${CONFIG.MONTH}</p>
            </div>

            <div class="grid-2">
                <div class="stat-card">
                    <div class="stat-label">Total Payé</div>
                    <div class="stat-val">${Core.fmtHms(s.totalPaidSec)}</div>
                    <div class="stat-label">Objectif: ${CONFIG.GOAL_HOURS}h</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Progression</div>
                    <div class="stat-val" style="color:var(--accent)">${s.progress.toFixed(1)}%</div>
                    <div class="prog-bar"><div class="prog-fill" style="width:${s.progress}%"></div></div>
                </div>
            </div>

            <div class="card">
                <div class="card-label">Détails Cumulés</div>
                <div style="display:flex; justify-content:space-between; margin-bottom:8px;">
                    <span>📞 Communication</span>
                    <span class="mono">${Core.fmtHms(s.tComm)}</span>
                </div>
                <div style="display:flex; justify-content:space-between; margin-bottom:8px;">
                    <span>⏳ Attente fiches</span>
                    <span class="mono">${Core.fmtHms(s.tWait)}</span>
                </div>
                <div style="display:flex; justify-content:space-between; margin-bottom:8px;">
                    <span>📝 Qualification (payée)</span>
                    <span class="mono">${Core.fmtHms(s.tQualPaid)}</span>
                </div>
                <div style="display:flex; justify-content:space-between; margin-bottom:8px;">
                    <span>👥 Réunions</span>
                    <span class="mono">${Core.fmtHms(s.tReunion)}</span>
                </div>
                <div style="border-top:1px solid var(--border); margin-top:12px; padding-top:12px; font-weight:700; display:flex; justify-content:space-between;">
                    <span>Total Payable</span>
                    <span style="color:var(--green)">${Core.fmtHms(s.totalPaidSec)}</span>
                </div>
            </div>

            <div class="card">
                <div class="card-label">Dernière activité : ${lastDay.date}</div>
                <p style="font-size:13px; color:var(--text-dim)">
                    Production : ${Core.fmtHms(lastDay.comm + lastDay.wait + Math.min(lastDay.qual, 1800))} payés.
                </p>
            </div>
        `;
    },

    renderAgentHist() {
        const s = Core.calcStats(State.user.id);
        const rows = s.days.sort((a,b) => b.date.localeCompare(a.date)).map(d => `
            <tr>
                <td>${d.date.split('-').reverse().slice(0,2).join('/')}</td>
                <td>${Core.fmtHms(d.comm)}</td>
                <td>${Core.fmtHms(Math.min(d.qual, 1800))}</td>
                <td><strong>${Core.fmtHms(d.comm + d.wait + Math.min(d.qual, 1800) + (d.reunion||0))}</strong></td>
            </tr>
        `).join('');

        document.getElementById('agent-content').innerHTML = `
            <div class="card">
                <div class="card-label">Historique Mars 2026</div>
                <div class="table-scroll">
                    <table>
                        <thead><tr><th>Date</th><th>Comm.</th><th>Qual.</th><th>Total</th></tr></thead>
                        <tbody>${rows}</tbody>
                    </table>
                </div>
            </div>
            <button class="btn btn-ghost" onclick="UI.exportCSV('${State.user.id}')">Exporter mon rapport (CSV)</button>
        `;
    },

    renderSuperTeam() {
        const summaries = AGENTS_DB.filter(a => a.role !== 'super').map(ag => {
            return { name: ag.name, stats: Core.calcStats(ag.id) };
        }).sort((a,b) => b.stats.progress - a.stats.progress);

        const cards = summaries.map(u => `
            <div class="card" style="padding:14px;">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <div>
                        <div style="font-weight:700;">${u.name}</div>
                        <div style="font-size:12px; color:var(--text-dim);">${Core.fmtHms(u.stats.totalPaidSec)} / ${CONFIG.GOAL_HOURS}h</div>
                    </div>
                    <div style="text-align:right">
                        <div style="font-family:var(--mono); font-weight:700; color:var(--accent)">${u.stats.progress.toFixed(1)}%</div>
                    </div>
                </div>
                <div class="prog-bar"><div class="prog-fill" style="width:${u.stats.progress}%"></div></div>
            </div>
        `).join('');

        document.getElementById('super-content').innerHTML = `
            <h2 style="margin-bottom:20px;">Performance Équipe</h2>
            ${cards}
        `;
    },

    renderSuperImport() {
        document.getElementById('super-content').innerHTML = `
            <div class="card">
                <div class="card-label">Importation Vicidial</div>
                <p style="font-size:13px; color:var(--text-dim); margin-bottom:16px;">
                    Collez ici le contenu de l'export CSV Vicidial (Colonnes Agent, Date, Comm, Qual).
                </p>
                <div class="field">
                    <textarea id="csv-raw" style="width:100%; height:150px; background:var(--bg-input); border:1px solid var(--border); border-radius:8px; color:white; padding:10px; font-family:var(--mono); font-size:11px;" placeholder="agent_id;call_date;comm_sec;qual_sec..."></textarea>
                </div>
                <button class="btn btn-primary" onclick="UI.processImport()">Lancer l'analyse</button>
            </div>
            <div class="card" id="import-preview" style="display:none"></div>
        `;
    },

    renderSuperReunion() {
        const opts = AGENTS_DB.filter(a => a.role !== 'super').map(a => `<option value="${a.id}">${a.name}</option>`).join('');
        document.getElementById('super-content').innerHTML = `
            <div class="card">
                <div class="card-label">Ajouter du temps (Réunion/Coaching)</div>
                <div class="field">
                    <label>Agent</label>
                    <select id="re-agent">${opts}</select>
                </div>
                <div class="field">
                    <label>Date</label>
                    <input type="date" id="re-date" value="${new Date().toISOString().split('T')[0]}">
                </div>
                <div class="field">
                    <label>Durée (minutes)</label>
                    <input type="number" id="re-dur" value="30">
                </div>
                <button class="btn btn-primary" onclick="UI.saveReunion()">Enregistrer</button>
            </div>
        `;
    },

    // ACTIONS
    saveReunion() {
        const agId = document.getElementById('re-agent').value;
        const date = document.getElementById('re-date').value;
        const dur = parseInt(document.getElementById('re-dur').value) * 60;

        if(!State.data[agId]) State.data[agId] = [];
        const day = State.data[agId].find(d => d.date === date);
        
        if(day) day.reunion = (day.reunion || 0) + dur;
        else State.data[agId].push({ date, comm:0, wait:0, qual:0, reunion: dur });

        Core.save();
        UI.toast("Temps ajouté avec succès");
        Router.go('super-team');
    },

    processImport() {
        const raw = document.getElementById('csv-raw').value.trim();
        if(!raw) return;

        const lines = raw.split('\n');
        let count = 0;

        // Simulation simple de parsing
        // On attend : agent_id;date;comm;wait;qual
        lines.forEach((line, index) => {
            if(index === 0 && line.includes('agent')) return; // skip header
            const col = line.split(/[;,]/);
            if(col.length >= 5) {
                const id = col[0].trim().toUpperCase();
                const date = col[1].trim();
                if(!State.data[id]) State.data[id] = [];
                
                // Update or push
                const existing = State.data[id].find(d => d.date === date);
                const entry = {
                    date,
                    comm: parseInt(col[2]) || 0,
                    wait: parseInt(col[3]) || 0,
                    qual: parseInt(col[4]) || 0,
                    reunion: 0
                };

                if(existing) Object.assign(existing, entry);
                else State.data[id].push(entry);
                count++;
            }
        });

        Core.save();
        UI.toast(`${count} lignes importées`);
        Router.go('super-team');
    },

    exportCSV(agentId) {
        const s = Core.calcStats(agentId);
        let csv = "Date;Communication;Attente;QualificationPayee;Réunion;TotalJournalier\n";
        s.days.forEach(d => {
            const tot = d.comm + d.wait + Math.min(d.qual, 1800) + (d.reunion||0);
            csv += `${d.date};${d.comm};${d.wait};${Math.min(d.qual, 1800)};${d.reunion||0};${tot}\n`;
        });
        
        const blob = new Blob([csv], { type: 'text/csv' });
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `Rapport_${agentId}_${CONFIG.MONTH}.csv`;
        a.click();
    }
};

/**
 * INITIALISATION
 */
window.onload = () => {
    Core.init();
};

</script>
</body>
</html>
